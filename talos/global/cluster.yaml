---
# Shared controlPlane cluster config. Per-cluster etcd subnets are layered on
# via each cluster's patches/controller/etcd.yaml (applied after this patch).
cluster:
  discovery:
    enabled: true
    registries:
      kubernetes:
        disabled: true
      service: {}
  allowSchedulingOnControlPlanes: true
  controllerManager:
    extraArgs:
      bind-address: 0.0.0.0
  coreDNS:
    disabled: true
  etcd:
    extraArgs:
      listen-metrics-urls: http://0.0.0.0:2381
  proxy:
    disabled: true
  scheduler:
    extraArgs:
      bind-address: 0.0.0.0
    config:
      apiVersion: kubescheduler.config.k8s.io/v1
      kind: KubeSchedulerConfiguration
      profiles:
        - schedulerName: default-scheduler
          plugins:
            score:
              disabled:
                - name: ImageLocality
          pluginConfig:
            - name: PodTopologySpread
              args:
                defaultingType: List
                defaultConstraints:
                  - maxSkew: 1
                    topologyKey: kubernetes.io/hostname
                    whenUnsatisfiable: ScheduleAnyway
  apiServer:
    extraArgs:
      runtime-config: admissionregistration.k8s.io/v1beta1=true
      feature-gates: ImageVolume=true
