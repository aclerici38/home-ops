---
# A feature renders only if its key is present in the HelmRelease values.
# `dragonfly: {}` enables it with defaults; omit the key to disable.
# Sub-knobs all have in-template defaults — only override what actually varies.
# To change anything else, edit the template directly; that's the point.
#
# Optional: override the app name. Defaults to the release name minus "-resources",
# so a release named "immich-resources" yields app=immich automatically.
# app: immich
#
# --- Reference of every knob (all optional) -------------------------------
# cnpg:
#   mode: init            # REQUIRED: init | restore | no-backup | shared
#                         #   shared -> no per-app Cluster; instead attach to the
#                         #   shared "pg18" cluster (home only). Renders a
#                         #   DatabaseRole + Database + role password into the
#                         #   cloudnative-pg namespace and the app connection
#                         #   secret into this namespace. Ignores the cluster-level
#                         #   knobs below (instances/capacity/pgExtensions/preload/
#                         #   clusterSpec); honors database/poolMode/dbExtensions.
#   database: <app>       # shared: postgres db + role name (default = app name)
#   instances: 3          # 1 = single-node mode: drops PDB, sync replication and
#                         #     switchover, and relaxes pod anti-affinity
#   capacity: 2Gi
#   poolMode: transaction # transaction | session
#   backup: true          # false drops object-store backups (old "no-backup")
#   pgExtensions: []      # spec.postgresql.extensions (image-mounted)
#   preload: []           # spec.postgresql.shared_preload_libraries
#   dbExtensions: []      # Database CR extensions (CREATE EXTENSION)
#   clusterSpec: {}       # deep-merged onto Cluster .spec (roles, pg_hba, params, ...)
# dragonfly:
#   extraArgs: []
# pocketId:
#   group: admin
#   secretRotation: true
#   url: <app>.clerici.tech   # default; override per app
#   callbackUrls: []
# externalSecret: {}      # 1Password app secret (key = app name)
#   data: []              # extra per-key pulls (ExternalSecret spec.data entries)
# volsync:                # renders PVC + ReplicationDestination + ReplicationSource
#   capacity: 5Gi
#   cacheCapacity: <cap>  # kopia cache PVC for both movers; defaults to capacity
#   cephfs: false         # true -> RWX on ceph-filesystem
#   restoreFrom: <ns>     # one-time cross-namespace restore: old source namespace
#                         # (kopia identity is <name>@<namespace>). Drop after the
#                         # PVC is seeded so future restores use this namespace.
#   restoreName: <name>   # only if the old source name differed from this app
# kopiur:                 # kopiur equivalent of volsync (raphael cluster): renders
#                         # PVC + SnapshotPolicy + SnapshotSchedule + Restore.
#                         # Backs up the app PVC to the shared 'versity'
#                         # ClusterRepository and seeds it via the volume populator
#                         # on a fresh/rebuilt cluster (deploy-or-restore). No
#                         # per-app secret: the operator projects the repo creds.
#   capacity: 5Gi
#   repository: versity   # ClusterRepository name (in the kopiur namespace)
#   storageClass: miroir  # PVC + restore target storageClass (snapshot-capable)
#   snapshotClass: miroir # VolumeSnapshotClass for copyMethod: Snapshot
#   schedule: "0 3 * * *" # default daily (write-minimised); "0 */12 * * *" etc.
#   parallelism: 1        # kopia --max-parallel-file-reads (CPU/heat cap)
#   preflight: true       # default: hold the backup Pending when the S3 store is
#                         # unreachable instead of crashlooping a mover Job.
#                         # Needs health.probe enabled on the repository.
#   preflightTimeout: 0s  # 0s = hold indefinitely (runs when home); a duration
#                         # like 15m fails the Snapshot after that, retry next tick
#   retain:               # any subset; maps to kopia keep* rules
#     daily: 7
#     weekly: 4
#     # hourly / monthly / annual / latest also supported
#   restoreFrom: <ns>     # one-time cross-namespace seed: old policy namespace.
#                         # Drop once the PVC is populated.
#   restoreName: <name>   # only if the old policy name differed from this app
#
# cnpg and volsync each also render the supporting credentials secret they
# reference (cloudnative-pg, volsync-kopia-versity) into the app's namespace —
# no cluster-wide secret broadcast. kopiur renders none: the operator projects
# the shared repository credentials into the mover namespace.
# gpu: {}                 # Intel GPU ResourceClaimTemplate (<app>-gpu)
