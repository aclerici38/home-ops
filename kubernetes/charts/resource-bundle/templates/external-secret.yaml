{{- if hasKey .Values "externalSecret" }}
{{- $app := include "resources.app" . -}}
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ $app }}
  labels:
    dormammu.io/component: external-secret
spec:
  refreshInterval: "1m"
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  dataFrom:
    - extract:
        key: {{ $app }}
{{- end }}
