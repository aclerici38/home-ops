{{- if hasKey .Values "kopiur" }}
{{- $app := include "resources.app" . -}}
{{- $ns := include "resources.ns" . -}}
{{- $k := .Values.kopiur -}}
{{- $cap := dig "capacity" "5Gi" $k -}}
{{- /* Shared ClusterRepository (kopiur ns). Its credential Secret is projected
       into this namespace by the operator, so — unlike the volsync block — no
       per-app ExternalSecret is rendered here. */ -}}
{{- $repo := dig "repository" "versity" $k -}}
{{- /* Storage/snapshot classes default to home's Ceph (the cluster carrying the
       most policies); raphael overrides these to "miroir" per app. cephfs:true
       flips the volume to RWX CephFS, mirroring the volsync block. */ -}}
{{- $cephfs := dig "cephfs" false $k -}}
{{- $sc := dig "storageClass" (ternary "ceph-filesystem" "ceph-block" $cephfs) $k -}}
{{- $snapClass := dig "snapshotClass" (ternary "csi-ceph-filesystem" "csi-ceph-blockpool" $cephfs) $k -}}
{{- $access := dig "accessMode" (ternary "ReadWriteMany" "ReadWriteOnce" $cephfs) $k -}}
{{- /* CephFS: stage the backup's source snapshot on a backingSnapshot (shallow,
       read-only) class so kopiur mounts the snapshot directly instead of Ceph
       doing a slow full clone — a 25Gi clone blew past the 10m staging timeout.
       Block/RBD clones are fast CoW, so default empty (kopiur uses the data SC). */ -}}
{{- $stagingClass := dig "stagingClass" (ternary "ceph-filesystem-backingsnapshot" "" $cephfs) $k -}}
{{- /* Daily by default (write-minimised: each run is a Snapshot CR + mover Job
       + VolumeSnapshot). Override per app for hotter data. */ -}}
{{- $schedule := dig "schedule" "0 3 * * *" $k -}}
{{- /* IANA zone the cron is evaluated in. Defaulted here (not left to the
       controller's UTC default) so "0 3" means 3am local across every app. */ -}}
{{- $tz := dig "timezone" "America/Los_Angeles" $k -}}
{{- $retain := dig "retain" (dict "daily" 7 "weekly" 4) $k -}}
{{- /* kopia --max-parallel-file-reads. Defaults to 4 for home's beefy nodes;
       raphael overrides to 1 so a backup can't spike its 4-core N100 (heat). */ -}}
{{- $par := dig "parallelism" 4 $k -}}
{{- /* Gate each scheduled backup on backend reachability: when the RV is away
       from the home S3 the Snapshot holds Pending (PreflightFailed) instead of
       spawning a mover Job that crashloops. timeout "0s" holds indefinitely and
       the schedule's default Forbid concurrency keeps exactly one waiting, so it
       runs as soon as you're home. Requires health.probe on the repository
       (backendReachable reads true when the probe is off). Set preflight:false
       to opt out. */ -}}
{{- $preflight := dig "preflight" true $k -}}
{{- $preflightTimeout := dig "preflightTimeout" "0s" $k -}}
{{- /* Don't record a snapshot when the source is unchanged since the last run. */ -}}
{{- $ignoreIdentical := dig "ignoreIdentical" true $k -}}
{{- /* kopia compressor; "" leaves kopia's default (none). */ -}}
{{- $compressor := dig "compression" "zstd" $k -}}
{{- /* Restore identity. Defaults to this app's own policy@namespace. Override
       restoreFrom (old namespace) / restoreName (old policy name) for a one-time
       cross-namespace seed, then drop them once the PVC is populated — same
       ergonomics as the volsync block. */ -}}
{{- $srcNs := dig "restoreFrom" $ns $k -}}
{{- $srcName := dig "restoreName" $app $k -}}
{{- /* Backup-only / adopt mode. When true, render only the SnapshotPolicy +
       SnapshotSchedule against an already-existing PVC (e.g. one still owned by
       the volsync block mid-migration) and skip the Restore + populator PVC — so
       kopiur backs the live volume up to the new bucket without touching it. Flip
       to false (delete the old PVC first) to recreate the PVC on the populator. */ -}}
{{- $existingClaim := dig "existingClaim" false $k -}}
{{- /* Per-policy mover securityContext override. The repo's moverDefaults run
       the mover as uid 1000; a root app (HA) writes root:root 0600 files the
       1000 mover can't read on backup (nor own on restore), so point mover at
       {securityContext:{runAsUser:0,runAsGroup:0},podSecurityContext:{fsGroup:0}}
       for those. Passed straight through to SnapshotPolicy.spec.mover. */ -}}
{{- $mover := dig "mover" dict $k -}}
{{- $retainKeys := dict "hourly" "keepHourly" "daily" "keepDaily" "weekly" "keepWeekly" "monthly" "keepMonthly" "annual" "keepAnnual" "latest" "keepLatest" -}}
---
# WHAT to back up (the recipe; idempotent, runs nothing on its own).
apiVersion: kopiur.home-operations.com/v1alpha1
kind: SnapshotPolicy
metadata:
  name: {{ $app }}
  labels:
    dormammu.internal/component: kopiur
spec:
  repository:
    kind: ClusterRepository
    name: {{ $repo }}
  sources:
    - pvc:
        name: {{ $app }}
  copyMethod: Snapshot
  volumeSnapshotClassName: {{ $snapClass }}
  {{- if $stagingClass }}
  # Stage the CSI snapshot as a read-only shallow mount (no full clone). Only the
  # mover reads it, so ReadOnlyMany is enough and staging binds near-instantly.
  staging:
    storageClassName: {{ $stagingClass }}
    accessModes: ["ReadOnlyMany"]
  {{- end }}
  {{- with $mover }}
  mover:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  {{- if $compressor }}
  compression:
    compressor: {{ $compressor }}
  {{- end }}
  upload:
    maxParallelFileReads: {{ $par }}
  files:
    ignoreIdenticalSnapshots: {{ $ignoreIdentical }}
  retention:
    {{- range $short, $key := $retainKeys }}
    {{- with (dig $short nil $retain) }}
    {{ $key }}: {{ . }}
    {{- end }}
    {{- end }}
  # The shared repo lives in the kopiur namespace; project its creds into this
  # mover's namespace. Requires credentialProjection.allowed on the repository
  # and features.credentialProjection on the operator (both set).
  credentialProjection:
    enabled: true
  {{- if $preflight }}
  preflight:
    checks:
      - name: backend-reachable
        expr: "repository.backendReachable"
        message: "S3 store unreachable"
    timeout: {{ $preflightTimeout | quote }}
  {{- end }}
---
# WHEN. Stamps Snapshot CRs on the cron; runOnCreate:false so applying the
# release does not fire an immediate backup.
apiVersion: kopiur.home-operations.com/v1alpha1
kind: SnapshotSchedule
metadata:
  name: {{ $app }}
  labels:
    dormammu.internal/component: kopiur
spec:
  policyRef:
    name: {{ $app }}
  schedule:
    cron: {{ $schedule | quote }}
    timezone: {{ $tz | quote }}
    jitter: 30m
    runOnCreate: false
{{- if not $existingClaim }}
---
# Deploy-or-restore seed. The populator restores the PVC below from the newest
# snapshot at provision time; onMissingSnapshot:Continue provisions a blank
# volume on an empty repo instead of failing. Create-time only, so it seeds a
# fresh/rebuilt cluster but never clobbers a live volume.
apiVersion: kopiur.home-operations.com/v1alpha1
kind: Restore
metadata:
  name: {{ $app }}
  labels:
    dormammu.internal/component: kopiur
spec:
  source:
    fromPolicy:
      name: {{ $srcName }}
      namespace: {{ $srcNs }}
      offset: 0
  target:
    populator: {}
  policy:
    onMissingSnapshot: Continue
  credentialProjection:
    enabled: true
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ $app }}
  labels:
    dormammu.internal/component: kopiur
spec:
  accessModes: [{{ $access | quote }}]
  dataSourceRef:
    apiGroup: kopiur.home-operations.com
    kind: Restore
    name: {{ $app }}
  resources:
    requests:
      storage: {{ $cap | quote }}
  storageClassName: {{ $sc }}
{{- end }}
{{- end }}
