{{- if hasKey .Values "volsync" }}
{{- $app := include "resources.app" . -}}
{{- $ns := include "resources.ns" . -}}
{{- $v := .Values.volsync -}}
{{- $cap := dig "capacity" "5Gi" $v -}}
{{- $cephfs := dig "cephfs" false $v -}}
{{- $sc := ternary "ceph-filesystem" "ceph-block" $cephfs -}}
{{- $access := ternary "ReadWriteMany" "ReadWriteOnce" $cephfs -}}
---
# Kopia repository credentials, pulled per-namespace (used by both the
# ReplicationSource and the ReplicationDestination movers).
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: volsync-kopia-versity
  labels:
    dormammu.internal/component: volsync
spec:
  refreshInterval: "1m"
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    template:
      data:
        KOPIA_REPOSITORY: s3://volsync
        AWS_S3_ENDPOINT: http://versitygw.versity.svc.cluster.local:7070
        KOPIA_S3_DISABLE_TLS: "true"
        KOPIA_PASSWORD: {{ "{{ .KOPIA_PASSWORD }}" | quote }}
        AWS_ACCESS_KEY_ID: {{ "{{ .AWS_ACCESS_KEY_ID }}" | quote }}
        AWS_SECRET_ACCESS_KEY: {{ "{{ .AWS_SECRET_ACCESS_KEY }}" | quote }}
  data:
    - secretKey: AWS_ACCESS_KEY_ID
      remoteRef:
        key: versity
        property: username
    - secretKey: AWS_SECRET_ACCESS_KEY
      remoteRef:
        key: versity
        property: password
  dataFrom:
    - extract:
        key: volsync-kopia-versity
---
# ReplicationDestination seeds the PVC from the kopia repo on first creation
# (restore-once). Once the PVC is bound it never restores again, so it is safe
# to render unconditionally alongside the ReplicationSource.
apiVersion: volsync.backube/v1alpha1
kind: ReplicationDestination
metadata:
  name: {{ $app }}-dst
  labels:
    kustomize.toolkit.fluxcd.io/ssa: IfNotPresent
    dormammu.internal/component: volsync
spec:
  trigger:
    manual: restore-once
  kopia:
    repository: volsync-kopia-versity
    copyMethod: Snapshot
    volumeSnapshotClassName: csi-ceph-blockpool
    cacheStorageClassName: ceph-block
    cacheAccessModes: ["ReadWriteOnce"]
    storageClassName: {{ $sc }}
    accessModes: [{{ $access | quote }}]
    capacity: {{ $cap | quote }}
    moverSecurityContext:
      runAsUser: 1000
      runAsGroup: 1000
      fsGroup: 1000
      fsGroupChangePolicy: OnRootMismatch
    enableFileDeletion: true
    cleanupCachePVC: true
    cleanupTempPVC: true
    sourceIdentity:
      sourceName: {{ $app }}
      sourceNamespace: {{ $ns }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ $app }}
  labels:
    dormammu.internal/component: volsync
spec:
  accessModes: [{{ $access | quote }}]
  dataSourceRef:
    kind: ReplicationDestination
    apiGroup: volsync.backube
    name: {{ $app }}-dst
  resources:
    requests:
      storage: {{ $cap | quote }}
  storageClassName: {{ $sc }}
---
apiVersion: volsync.backube/v1alpha1
kind: ReplicationSource
metadata:
  name: {{ $app }}
spec:
  sourcePVC: {{ $app }}
  trigger:
    schedule: "0 */12 * * *"
  kopia:
    accessModes: [{{ $access | quote }}]
    compression: zstd-best-compression
    copyMethod: Snapshot
    moverSecurityContext:
      runAsUser: 1000
      runAsGroup: 1000
      fsGroup: 1000
      fsGroupChangePolicy: OnRootMismatch
    parallelism: 2
    repository: volsync-kopia-versity
    retain:
      hourly: 24
      daily: 7
    storageClassName: {{ $sc }}
    volumeSnapshotClassName: csi-ceph-blockpool
    cacheStorageClassName: ceph-filesystem
    cacheCapacity: 5Gi
    cacheAccessModes: ["ReadWriteOnce"]
{{- end }}
