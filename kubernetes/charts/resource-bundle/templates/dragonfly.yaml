{{- if hasKey .Values "dragonfly" }}
{{- $app := include "resources.app" . -}}
---
apiVersion: dragonflydb.io/v1alpha1
kind: Dragonfly
metadata:
  name: {{ $app }}-dragonfly-db
spec:
  image: ghcr.io/dragonflydb/dragonfly:v1.38.1@sha256:baf70ba7ad182a992b988497cfa31a488978c8fab7712079784c2401f447e402
  replicas: 3
  env:
    - name: MAX_MEMORY
      valueFrom:
        resourceFieldRef:
          resource: limits.memory
          divisor: 1Mi
  args:
    - --maxmemory=$(MAX_MEMORY)Mi
    - --dbnum=1
    - --dbfilename=
    - --proactor_threads=4
    - --version_check=false
    - --cluster_mode=emulated
    - --lock_on_hashtags
    {{- range .Values.dragonfly.extraArgs }}
    - {{ . }}
    {{- end }}
  resources:
    requests: {cpu: 100m}
    limits: {memory: 1Gi}
{{- end }}
