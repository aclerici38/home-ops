{{- if and .Values.cnpg.enabled (ne .Values.cnpg.mode "no-backup") }}
{{- $b := .Values.cnpg.backup -}}
---
# Versity S3 creds for plugin-barman-cloud, rendered per cnpg consumer in its own
# namespace so the ObjectStore can reference it locally (no cluster-wide CES).
# Omitted in no-backup mode (no ObjectStore → no creds needed).
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ $b.barmanObjectStore.credentialsSecretName }}
  labels:
    dormammu.io/component: cnpg
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  data:
    - secretKey: versity-access-key-id
      remoteRef:
        key: versity
        property: username
    - secretKey: versity-secret-access-key
      remoteRef:
        key: versity
        property: password
{{- end }}
