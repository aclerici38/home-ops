{{- if .Values.cnpg.enabled }}
{{- $user := .Values.cnpg.user.name -}}
{{- $dbname := .Values.cnpg.user.dbName -}}
{{- $secretName := include "base.cnpg.secretName" . -}}
{{- $clusterName := include "base.cnpg.clusterName" . -}}
{{- $poolerHost := include "base.cnpg.poolerHost" . -}}
---
# yaml-language-server: $schema=https://k8s-versioned-schemas.pages.dev/external-secrets/2.5.0/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ $secretName }}
  labels:
    dormammu.io/component: cnpg
spec:
  refreshPolicy: OnChange
  target:
    name: {{ $secretName }}
    creationPolicy: Merge
    template:
      engineVersion: v2
      metadata:
        labels:
          cnpg.io/cluster: {{ $clusterName }}
          cnpg.io/userType: app
          cnpg.io/reload: "true"
      data:
        user: {{ $user | quote }}
        username: {{ $user | quote }}
        dbname: {{ $dbname | quote }}
        pooler-host: {{ $poolerHost | quote }}
        password: "{{ `{{ .password }}` }}"
        port: "5432"
        pooler-pgpass: {{ printf "%s:5432:%s:%s:{{ .password }}" $poolerHost $dbname $user | quote }}
        pooler-jdbc-uri: {{ printf "jdbc:postgresql://%s:5432/%s?password={{ .password }}&user=%s" $poolerHost $dbname $user | quote }}
        pooler-uri: {{ printf "postgresql://%s:{{ .password }}@%s:5432/%s" $user $poolerHost $dbname | quote }}
  dataFrom:
    - sourceRef:
        generatorRef:
          apiVersion: generators.external-secrets.io/v1alpha1
          kind: ClusterGenerator
          name: cnpg-pass-generator
{{- end }}
