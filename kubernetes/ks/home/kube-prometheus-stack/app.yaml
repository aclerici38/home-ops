---
# yaml-language-server: $schema=https://k8s-versioned-schemas.pages.dev/flux/2.9.0/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: kube-prometheus-stack
  namespace: flux-system
spec:
  targetNamespace: kube-prometheus-stack
  dependsOn:
    - name: kube-prometheus-stack-base
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./kubernetes/apps/home/kube-prometheus-stack/app
  commonMetadata:
    labels:
      app.kubernetes.io/name: kube-prometheus-stack
