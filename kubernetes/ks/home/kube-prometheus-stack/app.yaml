---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: kube-prometheus-stack
  namespace: flux-system
spec:
  targetNamespace: kube-prometheus-stack
  dependsOn:
    - name: kube-prometheus-stack-base
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./kubernetes/apps/home/kube-prometheus-stack/app
  commonMetadata:
    labels:
      app.kubernetes.io/name: kube-prometheus-stack
