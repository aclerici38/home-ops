---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: coredns
  namespace: flux-system
spec:
  targetNamespace: kube-system
  dependsOn:
    - name: coredns-base
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./kubernetes/apps/home/coredns
  commonMetadata:
    labels:
      app.kubernetes.io/name: coredns
