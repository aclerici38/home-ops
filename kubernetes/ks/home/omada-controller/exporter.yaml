---
# yaml-language-server: $schema=https://k8s-versioned-schemas.pages.dev/flux/2.9.3/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: omada-exporter
  namespace: flux-system
spec:
  targetNamespace: omada-controller
  dependsOn:
    - name: omada-controller
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./kubernetes/apps/home/omada-controller/exporter
  commonMetadata:
    labels:
      app.kubernetes.io/name: omada-exporter
