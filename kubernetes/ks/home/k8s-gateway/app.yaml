---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: k8s-gateway
  namespace: flux-system
spec:
  targetNamespace: k8s-gateway
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./kubernetes/apps/home/k8s-gateway/app
  commonMetadata:
    labels:
      app.kubernetes.io/name: k8s-gateway
