---
# yaml-language-server: $schema=https://k8s-versioned-schemas.pages.dev/flux/2.9.0/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: node-feature-discovery-rules
  namespace: flux-system
spec:
  targetNamespace: node-feature-discovery
  dependsOn:
    - name: node-feature-discovery
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./kubernetes/apps/home/node-feature-discovery/rules
  commonMetadata:
    labels:
      app.kubernetes.io/name: node-feature-discovery
