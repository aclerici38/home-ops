kind: Kustomization
metadata:
  name: trek
  namespace: flux-system
spec:
  targetNamespace: trek
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./kubernetes/apps/home/trek/app
  commonMetadata:
    labels:
      app.kubernetes.io/name: trek
