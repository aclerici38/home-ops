---
# yaml-language-server: $schema=https://k8s-versioned-schemas.pages.dev/flux/2.9.2/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: rook-ceph-cluster
  namespace: flux-system
spec:
  targetNamespace: rook-ceph
  dependsOn:
    - name: rook-ceph
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./kubernetes/apps/home/rook-ceph/cluster
  commonMetadata:
    labels:
      app.kubernetes.io/name: rook-ceph-cluster
