---
# yaml-language-server: $schema=https://k8s-versioned-schemas.pages.dev/flux/2.9.2/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: cnpg-cluster
  namespace: flux-system
spec:
  targetNamespace: cloudnative-pg
  dependsOn:
    - name: cloudnative-pg
    - name: plugin-barman-cloud
    - name: external-secrets
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./kubernetes/apps/home/cloudnative-pg/cluster
  commonMetadata:
    labels:
      app.kubernetes.io/name: cnpg-cluster
