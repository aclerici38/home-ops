---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: homebox
  namespace: flux-system
spec:
  targetNamespace: homebox
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./kubernetes/apps/home/homebox/app
  commonMetadata:
    labels:
      app.kubernetes.io/name: homebox
