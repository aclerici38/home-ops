---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: mosquitto
  namespace: flux-system
spec:
  targetNamespace: mosquitto
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./kubernetes/apps/mosquitto/app
  commonMetadata:
    labels:
      app.kubernetes.io/name: mosquitto
