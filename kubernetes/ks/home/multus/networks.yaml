---
# yaml-language-server: $schema=https://k8s-versioned-schemas.pages.dev/flux/2.9.1/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: multus-networks
  namespace: flux-system
spec:
  targetNamespace: multus
  dependsOn:
    - name: multus
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./kubernetes/apps/home/multus/networks
  commonMetadata:
    labels:
      app.kubernetes.io/name: multus-networks
