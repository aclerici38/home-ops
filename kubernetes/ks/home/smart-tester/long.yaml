---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: long-smart-tester
  namespace: flux-system
spec:
  targetNamespace: smart-tester
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./kubernetes/apps/smart-tester/app
  commonMetadata:
    labels:
      app.kubernetes.io/name: smart-tester
  postBuild:
    substitute:
      TEST_TYPE: long
      TEST_SCHEDULE: "0 2 3 * *"
