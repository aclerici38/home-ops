---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: firefox
  namespace: flux-system
spec:
  targetNamespace: firefox
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./kubernetes/apps/firefox/app
  commonMetadata:
    labels:
      app.kubernetes.io/name: firefox
