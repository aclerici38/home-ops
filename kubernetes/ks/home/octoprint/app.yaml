---
# yaml-language-server: $schema=https://k8s-versioned-schemas.pages.dev/flux/2.9.3/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: octoprint
  namespace: flux-system
spec:
  targetNamespace: octoprint
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./kubernetes/apps/home/octoprint/app
  commonMetadata:
    labels:
      app.kubernetes.io/name: octoprint
