---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: envoy-proxy-crowdsec-bouncer
  namespace: flux-system
spec:
  targetNamespace: envoy-proxy-crowdsec-bouncer
  dependsOn:
    - name: kgateway
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./kubernetes/apps/home/envoy-proxy-crowdsec-bouncer/app
  commonMetadata:
    labels:
      app.kubernetes.io/name: envoy-proxy-crowdsec-bouncer
