---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: opencloud
  namespace: flux-system
spec:
  targetNamespace: opencloud
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./kubernetes/apps/opencloud/app
  commonMetadata:
    labels:
      app.kubernetes.io/name: opencloud
