---
# yaml-language-server: $schema=https://raw.githubusercontent.com/yannh/kubernetes-json-schema/master/v1.36.2-standalone-strict/namespace-v1.json
apiVersion: v1
kind: Namespace
metadata:
  name: flux-system
  labels:
    # Never let the apps Kustomization prune the namespace that runs Flux itself.
    kustomize.toolkit.fluxcd.io/prune: disabled
    # flux-operator + the flux distribution controllers are all restricted-compliant.
    pod-security.kubernetes.io/enforce: restricted
    pod-security.kubernetes.io/audit: restricted
    pod-security.kubernetes.io/warn: restricted
