---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: tuppr-upgrades
  namespace: flux-system
spec:
  targetNamespace: tuppr
  dependsOn:
    - name: tuppr
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./kubernetes/apps/home/tuppr/upgrades
  commonMetadata:
    labels:
      app.kubernetes.io/name: tuppr
