---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: frigate
  namespace: flux-system
spec:
  targetNamespace: frigate
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./kubernetes/apps/home/frigate/app
  commonMetadata:
    labels:
      app.kubernetes.io/name: frigate
