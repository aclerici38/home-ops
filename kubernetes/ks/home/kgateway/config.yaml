---
# Home-specific kgateway config (internal Gateway + policies). The shared common
# config (external Gateway, cert, params) is applied by kgateway-config in ks/shared.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: kgateway-config-cluster
  namespace: flux-system
spec:
  targetNamespace: kgateway
  dependsOn:
    - name: kgateway-config
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./kubernetes/apps/home/kgateway/config
  commonMetadata:
    labels:
      app.kubernetes.io/name: kgateway
