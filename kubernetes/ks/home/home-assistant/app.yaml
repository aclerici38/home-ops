---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: home-assistant
  namespace: flux-system
spec:
  targetNamespace: home-assistant
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./kubernetes/apps/home/home-assistant/app
  commonMetadata:
    labels:
      app.kubernetes.io/name: home-assistant
