---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: recyclarr
  namespace: flux-system
spec:
  targetNamespace: recyclarr
  dependsOn:
    - name: sonarr
    - name: radarr
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./kubernetes/apps/recyclarr/app
  commonMetadata:
    labels:
      app.kubernetes.io/name: recyclarr
