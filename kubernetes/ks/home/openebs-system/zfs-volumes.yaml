---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: openebs-zfs-volumes
  namespace: flux-system
spec:
  targetNamespace: openebs-system
  dependsOn:
    - name: openebs
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./kubernetes/apps/home/openebs-system/zfs-volumes
  commonMetadata:
    labels:
      app.kubernetes.io/name: openebs
