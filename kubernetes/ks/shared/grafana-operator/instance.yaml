---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: grafana-operator-instance
  namespace: flux-system
spec:
  targetNamespace: grafana-operator
  dependsOn:
    - name: grafana-instance
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./kubernetes/apps/shared/grafana-operator/instance
  commonMetadata:
    labels:
      app.kubernetes.io/name: grafana-operator-instance
