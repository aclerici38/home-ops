---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: cilium-base
  namespace: flux-system
spec:
  targetNamespace: cilium
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./kubernetes/apps/shared/cilium/app
  commonMetadata:
    labels:
      app.kubernetes.io/name: cilium
