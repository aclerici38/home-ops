kind: Kustomization
metadata:
  name: reloader
  namespace: flux-system
spec:
  targetNamespace: reloader
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./kubernetes/apps/shared/reloader/app
  commonMetadata:
    labels:
