---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: coredns-base
  namespace: flux-system
spec:
  targetNamespace: kube-system
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./kubernetes/apps/shared/coredns
  commonMetadata:
    labels:
      app.kubernetes.io/name: coredns
