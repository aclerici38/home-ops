---
# yaml-language-server: $schema=https://k8s-versioned-schemas.pages.dev/flux/2.9.1/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: k8tz
  namespace: flux-system
spec:
  targetNamespace: k8tz
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./kubernetes/apps/shared/k8tz/app
  dependsOn:
    - name: cert-manager
  commonMetadata:
    labels:
      app.kubernetes.io/name: k8tz
