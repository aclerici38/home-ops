---
# yaml-language-server: $schema=https://k8s-versioned-schemas.pages.dev/flux/2.9.0/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: kgateway-config
  namespace: flux-system
spec:
  targetNamespace: kgateway
  dependsOn:
    - name: kgateway
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./kubernetes/apps/shared/kgateway/config
  commonMetadata:
    labels:
      app.kubernetes.io/name: kgateway
