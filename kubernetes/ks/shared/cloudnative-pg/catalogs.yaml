---
# yaml-language-server: $schema=https://k8s-versioned-schemas.pages.dev/flux/2.9.3/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: cloudnative-pg-catalogs
  namespace: flux-system
spec:
  targetNamespace: cloudnative-pg
  dependsOn:
    - name: cloudnative-pg
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./kubernetes/apps/shared/cloudnative-pg/catalogs
  commonMetadata:
    labels:
      app.kubernetes.io/name: cloudnative-pg
