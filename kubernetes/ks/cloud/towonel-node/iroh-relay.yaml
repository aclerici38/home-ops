---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: towonel-node-iroh-relay
  namespace: flux-system
spec:
  targetNamespace: towonel-node
  dependsOn:
    - name: cert-manager
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./kubernetes/apps/cloud/towonel-node/iroh-relay
  commonMetadata:
    labels:
      app.kubernetes.io/name: iroh-relay
