---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: external-dns-endpoints
  namespace: flux-system
spec:
  targetNamespace: external-dns
  dependsOn:
    - name: external-dns
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./kubernetes/apps/cloud/external-dns
  commonMetadata:
    labels:
      app.kubernetes.io/name: external-dns
