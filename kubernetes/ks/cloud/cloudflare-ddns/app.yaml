---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: cloudflare-ddns
  namespace: flux-system
spec:
  targetNamespace: cloudflare-ddns
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./kubernetes/apps/cloud/cloudflare-ddns/app
  commonMetadata:
    labels:
      app.kubernetes.io/name: cloudflare-ddns
