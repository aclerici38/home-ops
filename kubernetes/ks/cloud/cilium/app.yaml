---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: cilium
  namespace: flux-system
spec:
  targetNamespace: cilium
  dependsOn:
    - name: cilium-base
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./kubernetes/apps/cloud/cilium/app
  commonMetadata:
    labels:
      app.kubernetes.io/name: cilium
