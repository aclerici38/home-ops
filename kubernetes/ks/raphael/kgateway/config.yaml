---
# raphael's kgateway config: gateways (internal/external), params, cert, policies.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: kgateway-config
  namespace: flux-system
spec:
  targetNamespace: kgateway
  dependsOn:
    - name: kgateway
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./kubernetes/apps/raphael/kgateway/config
  commonMetadata:
    labels:
      app.kubernetes.io/name: kgateway
