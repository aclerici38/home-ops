---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: actions-runner-controller-runners
  namespace: flux-system
spec:
  targetNamespace: actions-runner-controller
  dependsOn:
    # The scale set CRDs (AutoscalingRunnerSet) are installed by the controller.
    - name: actions-runner-controller
    - name: external-secrets
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./kubernetes/apps/actions-runner-controller/runners
  commonMetadata:
    labels:
      app.kubernetes.io/name: actions-runner-controller
