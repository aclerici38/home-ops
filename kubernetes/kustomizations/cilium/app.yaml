---
# Deploys the apps/cilium/app payload (no kustomization.yaml there — kustomize-controller
# auto-generates one over the path).
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: cilium
  namespace: flux-system
spec:
  targetNamespace: cilium
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./kubernetes/apps/cilium/app
  commonMetadata:
    labels:
      app.kubernetes.io/name: cilium
