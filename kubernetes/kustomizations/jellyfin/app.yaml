---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: jellyfin
  namespace: flux-system
spec:
  targetNamespace: jellyfin
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./kubernetes/apps/jellyfin/app
  commonMetadata:
    labels:
      app.kubernetes.io/name: jellyfin
