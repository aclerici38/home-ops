---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: open-webui
  namespace: flux-system
spec:
  targetNamespace: open-webui
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./kubernetes/apps/open-webui/app
  commonMetadata:
    labels:
      app.kubernetes.io/name: open-webui
