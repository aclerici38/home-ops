---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: ssd-zfs-scrubber
  namespace: flux-system
spec:
  targetNamespace: zfs-scrubber
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./kubernetes/apps/zfs-scrubber/app
  commonMetadata:
    labels:
      app.kubernetes.io/name: zfs-scrubber
  postBuild:
    substitute:
      POOL: ssd
      SCRUB_SCHEDULE: "0 0 1,15 * *"
