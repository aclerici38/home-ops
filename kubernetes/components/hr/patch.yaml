---
# yaml-language-server: $schema=https://k8s-versioned-schemas.pages.dev/flux/2.8.2/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: defaults-patch
spec:
  maxHistory: 1
  driftDetection:
    mode: ${DRIFT_DETECTION:=enabled}
  install:
    crds: CreateReplace
    disableTakeOwnership: true
    strategy:
      name: RetryOnFailure
  upgrade:
    crds: CreateReplace
    disableTakeOwnership: true
    cleanupOnFail: true
    strategy:
      name: RemediateOnFailure
  postRenderers:
    - kustomize:
        patches:
          - patch: |
              - op: add
                path: /spec/rules/0/timeouts
                value:
                  request: 0s
            target:
              group: gateway.networking.k8s.io
              kind: HTTPRoute
