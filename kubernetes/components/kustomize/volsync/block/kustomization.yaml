---
# yaml-language-server: $schema=https://json.schemastore.org/kustomization
apiVersion: kustomize.config.k8s.io/v1alpha1
kind: Component
patches:
  - patch: |-
      - op: add
        path: /spec/components/-
        value: ../../../../components/volsync
    target: &target
      group: kustomize.toolkit.fluxcd.io
      kind: Kustomization
      labelSelector: components.dormammu/ks
  - path: ../../deps/eso.yaml
    target: *target
  - path: ../../deps/eso-stores.yaml
    target: *target
  - path: ../../deps/versity.yaml
    target: *target
  - path: ../../deps/volsync.yaml
    target: *target
  - patch: |-
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: patch
      data:
        VOLSYNC_STORAGECLASS: ceph-block
        VOLSYNC_SNAPSHOTCLASS: csi-ceph-blockpool
        VOLSYNC_ACCESSMODES: ReadWriteOnce
    target:
      kind: ConfigMap
      labelSelector: kustomize.dormammu/app-vars
