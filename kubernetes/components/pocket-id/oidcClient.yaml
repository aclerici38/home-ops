---
# yaml-language-server: $schema=https://raw.githubusercontent.com/aclerici38/pocket-id-operator/refs/tags/v0.4.4/dist/schemas/pocketidoidcclient_v1alpha1.json
apiVersion: pocketid.internal/v1alpha1
kind: PocketIDOIDCClient
metadata:
  name: ${APP}
spec:
  clientID: ${APP}
  launchUrl: https://${APP_URL}
  pkceEnabled: ${OIDC_PKCE:=true}
  allowedUserGroups:
    - name: ${OIDC_GROUP:=admin}
      namespace: home-infra
