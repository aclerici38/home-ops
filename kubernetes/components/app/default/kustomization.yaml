---
# yaml-language-server: $schema=https://json.schemastore.org/kustomization
apiVersion: kustomize.config.k8s.io/v1alpha1
kind: Component
resources:
  - ./namespace.yaml
configMapGenerator:
  - name: cluster-settings
    envs:
      - ../../../../globals.env
generatorOptions:
  disableNameSuffixHash: true
components:
  - ../base
replacements:
  # Everything is named from the ks's own metadata.name (== the app/namespace name).
  - source:
      kind: Kustomization
      group: kustomize.toolkit.fluxcd.io
      fieldPath: metadata.name
    targets:
      - select:
          kind: Namespace
        fieldPaths:
          - metadata.name
      - select:
          kind: Kustomization
          group: kustomize.toolkit.fluxcd.io
        fieldPaths:
          - spec.targetNamespace
          - metadata.namespace
        options:
          create: true
      - select:
          kind: ConfigMap
          name: cluster-settings
        fieldPaths:
          - metadata.namespace
          - data.NS
        options:
          create: true
