---
# Default Flux Kustomization spec, merged onto every app's ks.yaml.
# spec.components path is relative to spec.path (the app's app/ dir), which is
# always apps/<folder>/<app>/app — so ../../../../components/hr is constant.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: defaults
spec:
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  components:
    - ../../../../components/hr
  interval: 30m
  timeout: 3m
  prune: true
  wait: true
  postBuild:
    substituteFrom:
      - kind: ConfigMap
        name: cluster-settings
        optional: false
      - kind: Secret
        name: cluster-secrets
        optional: false
