---
# yaml-language-server: $schema=https://json.schemastore.org/kustomization
apiVersion: kustomize.config.k8s.io/v1alpha1
kind: Component
# Injects the shared Flux Kustomization defaults (components/hr, interval/timeout,
# prune/wait, cluster-settings/secrets substituteFrom) so each app's ks.yaml only
# carries app-specific fields (name, path, APP_URL).
#
# This does NOT touch the namespace. Pair it with:
#   - ../privileged or ../unprivileged  -> app gets its own namespace == ks name
#   - nothing (use base directly) + an explicit spec.targetNamespace in ks.yaml
#     -> app lives in a pre-existing shared namespace (e.g. kube-system, flux-system)
patches:
  - path: ./ks.yaml
    target:
      kind: Kustomization
      group: kustomize.toolkit.fluxcd.io
