---
# yaml-language-server: $schema=https://json.schemastore.org/kustomization
apiVersion: kustomize.config.k8s.io/v1alpha1
kind: Component
# Privileged path: the default namespace component, with PodSecurity bumped to
# privileged + DRA admin-access (for GPU/host-level workloads).
components:
  - ../default
patches:
  - target:
      kind: Namespace
    patch: |-
      - op: replace
        path: /metadata/labels/pod-security.kubernetes.io~1enforce
        value: privileged
      - op: replace
        path: /metadata/labels/pod-security.kubernetes.io~1audit
        value: privileged
      - op: replace
        path: /metadata/labels/pod-security.kubernetes.io~1warn
        value: privileged
      - op: add
        path: /metadata/labels/resource.kubernetes.io~1admin-access
        value: "true"
