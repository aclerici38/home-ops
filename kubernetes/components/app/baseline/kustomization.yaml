---
# yaml-language-server: $schema=https://json.schemastore.org/kustomization
apiVersion: kustomize.config.k8s.io/v1alpha1
kind: Component
# Baseline path: the default namespace component, with PodSecurity relaxed from
# restricted to baseline. For workloads that pass baseline (no privileged/host
# namespaces/non-baseline caps) but can't satisfy restricted (run as root, don't
# drop ALL caps, or lack a seccomp profile).
components:
  - ../default
patches:
  - target:
      kind: Namespace
    patch: |-
      - op: replace
        path: /metadata/labels/pod-security.kubernetes.io~1enforce
        value: baseline
      - op: replace
        path: /metadata/labels/pod-security.kubernetes.io~1audit
        value: baseline
      - op: replace
        path: /metadata/labels/pod-security.kubernetes.io~1warn
        value: baseline
