---
# yaml-language-server: $schema=https://k8s-versioned-schemas.pages.dev/kgateway/2.2.2/gatewayextension_v1alpha1.json
apiVersion: gateway.kgateway.dev/v1alpha1
kind: GatewayExtension
metadata:
  name: ${APP}-oauth
spec:
  oauth2:
    forwardAccessToken: ${OIDC_FORWARD_ACCESS_TOKEN:=false}
    # Why is this required??
    backendRef:
      group: gateway.kgateway.dev
      kind: Backend
      name: ${APP}-oauth-backend
    issuerURI: "https://id.${SECRET_DOMAIN}"
    scopes: ["openid", "profile", "email", "groups"]
    credentials:
      clientID: "${CLIENT_ID:=${APP}}"
      clientSecretRef:
        name: ${APP}-oidc-credentials
    cookies:
      domain: "${SECRET_DOMAIN}"
