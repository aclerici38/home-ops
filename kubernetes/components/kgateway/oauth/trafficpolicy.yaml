---
# yaml-language-server: $schema=https://k8s-versioned-schemas.pages.dev/kgateway/2.3.2/trafficpolicy_v1alpha1.json
apiVersion: gateway.kgateway.dev/v1alpha1
kind: TrafficPolicy
metadata:
  name: ${APP}-oauth
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: ${APP}
  csrf:
    percentageEnabled: 100
    additionalOrigins:
      - exact: "https://id.clerici.tech"
  oauth2:
    extensionRef:
      name: ${APP}-oauth
