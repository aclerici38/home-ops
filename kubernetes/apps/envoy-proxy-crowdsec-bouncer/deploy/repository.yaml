apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  name: envoy-proxy-crowdsec-bouncer
  namespace: flux-system
  labels:
    app.kubernetes.io/name: envoy-proxy-crowdsec-bouncer
    dormammu.internal/managed: "true"
spec:
  interval: 1h
  url: oci://ghcr.io/aclerici38/home-ops/envoy-proxy-crowdsec-bouncer
  ref:
    tag: main
  layerSelector:
    mediaType: application/vnd.cncf.flux.content.v1.tar+gzip
    operation: extract
