---
# yaml-language-server: $schema=https://k8s-versioned-schemas.pages.dev/flux/2.8.3/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: crowdsec-bouncer
spec:
  interval: 1h
  maxHistory: 1
  chart:
    spec:
      chart: envoy-proxy-bouncer
      sourceRef:
        kind: HelmRepository
        name: envoy-proxy-bouncer
      version: 0.5.4
  install:
    timeout: 2m
    remediation:
      retries: 1
  upgrade:
    timeout: 2m
    remediation:
      retries: 1
  values:
    fullnameOverride: crowdsec-bouncer
    image:
      repository: ghcr.io/kdwils/envoy-proxy-bouncer
      tag: v0.5.4@sha256:61ec5b933859d2f6b629a17833856600b83a3d48b150e4bee7b5b5d4183b65f8
    config:
      server:
        grpcPort: 8080
        logLevel: info
      trustedProxies:
        - 172.16.0.0/16
      bouncer:
        enabled: true
        lapiURL: http://crowdsec-service.network.svc.cluster.local:8080
        tickerInterval: 10s
        apiKeySecretRef:
          name: crowdsec-bouncer
          key: BOUNCER_API_KEY
    resources:
      requests:
        cpu: 10m
        memory: 64Mi
      limits:
        memory: 128Mi
