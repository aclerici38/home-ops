---
apiVersion: v1
kind: Service
metadata:
  name: opensprinkler
spec:
  ports:
    - name: http
      port: 80
      protocol: TCP
      targetPort: 80
---
apiVersion: discovery.k8s.io/v1
kind: EndpointSlice
metadata:
  name: opensprinkler-1
  labels:
    kubernetes.io/service-name: opensprinkler
addressType: IPv4
ports:
  - name: http
    port: 80
    protocol: TCP
endpoints:
  - addresses:
      - 10.0.20.96
---
# yaml-language-server: $schema=https://k8s-versioned-schemas.pages.dev/gateway-api/1.5.1/httproute_v1.json
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: opensprinkler
spec:
  hostnames:
    - h2o.${SECRET_DOMAIN}
  parentRefs:
    - name: internal
      namespace: gateway-system
      sectionName: https
  rules:
    - backendRefs:
        - name: opensprinkler
          port: 80
