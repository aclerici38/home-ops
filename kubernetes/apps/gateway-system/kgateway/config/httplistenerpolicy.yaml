---
# yaml-language-server: $schema=https://datreeio.github.io/CRDs-catalog/gateway.kgateway.dev/httplistenerpolicy_v1alpha1.json
apiVersion: gateway.kgateway.dev/v1alpha1
kind: HTTPListenerPolicy
metadata:
  name: http-listener-policy
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: internal
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: external
  streamIdleTimeout: 0s
  upgradeConfig:
    enabledUpgrades:
      - websocket
