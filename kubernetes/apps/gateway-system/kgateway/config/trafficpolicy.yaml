---
# yaml-language-server: $schema=https://datreeio.github.io/CRDs-catalog/gateway.kgateway.dev/trafficpolicy_v1alpha1.json
apiVersion: gateway.kgateway.dev/v1alpha1
kind: TrafficPolicy
metadata:
  name: traffic-policy
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: internal
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: external
  buffer:
    disable: {}
  compression:
    requestDecompression: {}
    responseCompression: {}
