---
# yaml-language-server: $schema=https://k8s-versioned-schemas.pages.dev/flux/2.8.8/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: kgateway
spec:
  targetNamespace: kgateway
  dependsOn:
    - name: kgateway-crds
  path: ./kubernetes/apps/gateway-system/kgateway/app
  commonMetadata:
    labels:
      app.kubernetes.io/name: kgateway
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: kgateway-config
spec:
  targetNamespace: kgateway
  dependsOn:
    - name: kgateway
  path: ./kubernetes/apps/gateway-system/kgateway/config
  commonMetadata:
    labels:
      app.kubernetes.io/name: kgateway
