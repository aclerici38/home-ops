---
# yaml-language-server: $schema=https://k8s-versioned-schemas.pages.dev/flux/2.8.3/helmrelease_v2.json?values=envoy-proxy-crowdsec-bouncer/0.5.5
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: envoy-proxy-crowdsec-bouncer
spec:
  interval: 1h
  maxHistory: 1
  chartRef:
    kind: OCIRepository
    name: envoy-proxy-crowdsec-bouncer
  install:
    timeout: 2m
    remediation:
      retries: 1
  upgrade:
    timeout: 2m
    remediation:
      retries: 1
  values:
    replicaCount: 2
    fullnameOverride: crowdsec-bouncer
    image:
      pullPolicy: IfNotPresent
      repository: ghcr.io/kdwils/envoy-proxy-bouncer
      tag: 0.5.5@sha256:da85657cd1eea9ac813b03be24c50c8d861cd5c4b72563cd8d62d6d403686a3c
    config:
      server:
        grpcPort: 8080
        logLevel: info
      trustedProxies:
        - 172.16.0.0/16
      bouncer:
        enabled: true
        metrics: true
        metricsInterval: 10m
        lapiURL: http://crowdsec-service.network.svc.cluster.local:8080
        tickerInterval: 10s
        apiKeySecretRef:
          name: crowdsec-bouncer
          key: BOUNCER_API_KEY
      waf:
        enabled: true
        appSecURL: http://crowdsec-appsec-service.network.svc.cluster.local:7422
        apiKeySecretRef:
          name: crowdsec-bouncer
          key: BOUNCER_API_KEY
      resources:
        requests:
          cpu: 10m
          memory: 64Mi
        limits:
          memory: 128Mi
