---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: silence-operator-silences
  namespace: flux-system
spec:
  targetNamespace: silence-operator
  dependsOn:
    - name: silence-operator
  sourceRef:
    kind: OCIRepository
    name: silence-operator
  path: ./silences
  commonMetadata:
    labels:
      app.kubernetes.io/name: silence-operator-silences
