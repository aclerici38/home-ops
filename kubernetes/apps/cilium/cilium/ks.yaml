---
# yaml-language-server: $schema=https://k8s-versioned-schemas.pages.dev/flux/2.8.8/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: cilium
spec:
  targetNamespace: cilium
  path: ./kubernetes/apps/cilium/cilium/app
  commonMetadata:
    labels:
      app.kubernetes.io/name: cilium
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: cilium-networking
spec:
  targetNamespace: cilium
  dependsOn:
    - name: cilium
  path: ./kubernetes/apps/cilium/cilium/networking
  commonMetadata:
    labels:
      app.kubernetes.io/name: cilium
