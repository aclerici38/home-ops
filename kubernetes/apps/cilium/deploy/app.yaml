---
# Deploys the ../app payload (path is artifact-relative: ./app inside the cilium artifact).
# No kustomization.yaml there — kustomize-controller auto-generates one over the path.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: cilium
  namespace: flux-system
spec:
  interval: 1h
  targetNamespace: cilium
  sourceRef:
    kind: OCIRepository
    name: cilium
  path: ./app
  prune: true
  wait: true
  commonMetadata:
    labels:
      app.kubernetes.io/name: cilium
  postBuild:
    substitute:
      NS: cilium
    substituteFrom:
      - kind: ConfigMap
        name: cluster-settings
      - kind: Secret
        name: cluster-secrets
