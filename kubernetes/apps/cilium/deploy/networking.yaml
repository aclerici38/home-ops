---
# Deploys the ../networking payload after the cilium install is ready.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: cilium-networking
  namespace: flux-system
spec:
  interval: 1h
  targetNamespace: cilium
  dependsOn:
    - name: cilium
  sourceRef:
    kind: OCIRepository
    name: cilium
  path: ./networking
  prune: true
  wait: true
  commonMetadata:
    labels:
      app.kubernetes.io/name: cilium
  postBuild:
    substitute:
      NS: cilium
    substituteFrom:
      - kind: ConfigMap
        name: cluster-settings
      - kind: Secret
        name: cluster-secrets
