---
# yaml-language-server: $schema=https://k8s-versioned-schemas.pages.dev/flux/2.8.5/helmrelease_v2.json?values=xpumd/2.0.0-rc.0
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: xpumd
spec:
  interval: 1h
  maxHistory: 1
  chartRef:
    kind: OCIRepository
    name: xpumd
  install:
    timeout: 2m
    remediation:
      retries: 1
  upgrade:
    timeout: 2m
    remediation:
      retries: 1
  values:
    gpuAccess: dra
    prometheus:
      monitor: true
      release: kube-prometheus-stack
    grafana:
      dashboards: true
      namespace: ${NS}
  postRenderers:
    - kustomize:
        patches:
          - patch: |-
              - op: replace
                path: /metadata/labels/app.kubernetes.io~1version
                value: 2.0.0-rc.0
            target:
              labelSelector: app.kubernetes.io/version=xpumd/v2.0.0-rc.0