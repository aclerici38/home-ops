---
# yaml-language-server: $schema=https://k8s-versioned-schemas.pages.dev/flux/2.8.1/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: intel-device-plugins-operator
spec:
  interval: 1h
  maxHistory: 1
  chartRef:
    kind: OCIRepository
    name: intel-device-plugins-operator
  install:
    timeout: 2m
    remediation:
      retries: 1
  upgrade:
    timeout: 2m
    remediation:
      retries: 1
  values:
    manager:
      image:
        hub: mirror.gcr.io/intel
      devices:
        gpu: true
