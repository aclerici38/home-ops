---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/refs/tags/app-template-4.6.2/charts/library/common/values.schema.json
controllers:
  onepassword-connect:
    strategy: RollingUpdate
    replicas: 1
    defaultContainerOptionsStrategy: merge
    defaultContainerOptions:
      env:
        XDG_DATA_HOME: &configDir /config
        OP_SESSION:
          valueFrom:
            secretKeyRef:
              name: onepassword-connect
              key: 1password-credentials.json
      securityContext:
        allowPrivilegeEscalation: false
        readOnlyRootFilesystem: true
        capabilities: { drop: ["ALL"] }
      resources:
        requests:
          cpu: 10m
        limits:
          memory: 256M
    pod:
      hostUsers: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 999
        runAsGroup: 999
        fsGroup: 999
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile: { type: RuntimeDefault }
    containers:
      api:
        image:
          repository: mirror.gcr.io/1password/connect-api
          tag: 1.8.2@sha256:e915c0c843972f02b0e7e2de502bda8bd4a092288b3f1866098a857bd715a281
        env:
          OP_HTTP_PORT: &apiPort 80
          OP_BUS_PORT: 11220
          OP_BUS_PEERS: localhost:11221
        probes: &probes
          liveness:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /heartbeat
                port: *apiPort
              initialDelaySeconds: 15
              periodSeconds: 30
              failureThreshold: 3
          readiness:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /health
                port: *apiPort
              initialDelaySeconds: 15
      sync:
        image:
          repository: mirror.gcr.io/1password/connect-sync
          tag: 1.8.2@sha256:6297ca6136c0f0fb096bc64c49e1bc8df2aab35282ebff8c7bb60745ef176d0d
        env:
          OP_HTTP_PORT: 8081
          OP_BUS_PORT: 11221
          OP_BUS_PEERS: localhost:11220
        probes: *probes
service:
  onepassword-connect:
    controller: onepassword-connect
    ports:
      http:
        port: *apiPort
persistence:
  config:
    type: emptyDir
    globalMounts:
      - path: *configDir
