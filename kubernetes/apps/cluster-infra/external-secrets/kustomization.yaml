---
# yaml-language-server: $schema=https://json.schemastore.org/kustomization
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
configMapGenerator:
  - name: APP-app-vars
    literals:
      - APP=external-secrets
      - RESOURCES=stores
replacements:
  - sourceValue: "true"
    targets:
      - select:
          kind: Kustomization
          group: kustomize.toolkit.fluxcd.io
        fieldPaths:
          - spec.postBuild.substituteFrom.1.optional
components:
  - ../../../components/ks/app-resources
