---
# yaml-language-server: $schema=https://k8s-versioned-schemas.pages.dev/flux/2.8.8/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: external-secrets
spec:
  targetNamespace: external-secrets
  path: ./kubernetes/apps/cluster-infra/external-secrets/app
  commonMetadata:
    labels:
      app.kubernetes.io/name: external-secrets
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: external-secrets-stores
spec:
  targetNamespace: external-secrets
  dependsOn:
    - name: external-secrets
  path: ./kubernetes/apps/cluster-infra/external-secrets/stores
  commonMetadata:
    labels:
      app.kubernetes.io/name: external-secrets
