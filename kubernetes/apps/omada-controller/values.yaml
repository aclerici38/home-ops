---
base:
  externalSecret:
    enabled: true

  # Sidecar exporter via simple-mode app-template (the main workload comes
  # from the omada-controller subchart).
  image:
    repository: ghcr.io/charlie-haley/omada_exporter
    tag: 0.13.1@sha256:f1b939655866d87bcc5df4e6017627cfe690dee81c4a8550382d108e9e852171
  ports:
    http: 9202
  env:
    OMADA_HOST: https://omada-controller
    OMADA_INSECURE: "true"
    OMADA_SITE: Lab
    OMADA_USER:
      valueFrom:
        secretKeyRef:
          name: omada-controller
          key: username
    OMADA_PASS:
      valueFrom:
        secretKeyRef:
          name: omada-controller
          key: password
  serviceMonitor: true

  cnpg:
    enabled: true
    mode: init
    pooler:
      poolMode: session
    cluster:
      extensions:
        - documentdb
      sharedPreloadLibraries:
        - pg_cron
        - pg_documentdb_core
        - pg_documentdb
      managed:
        roles:
          - name: app
            login: true
            inRoles:
              - documentdb_admin_role
      pgHba:
        # pg_cron and documentdb connect to app db via localhost
        - host app postgres localhost trust
        - host app app localhost trust
        - host app documentdb_bg_worker_role localhost trust
      parameters:
        max_connections: "200"
        # https://github.com/FerretDB/FerretDB/issues/5284#issuecomment-3326399933
        cron.database_name: app
        documentdb.bg_worker_database_name: app
        documentdb.enableBackgroundWorker: "true"
        documentdb.enableBackgroundWorkerJobs: "true"
        documentdb.enableCompact: "true"
        documentdb.enableLetAndCollationForQueryMatch: "true"
        documentdb.enableNowSystemVariable: "true"
        documentdb.enableSortbyIdPushDownToPrimaryKey: "true"
        documentdb.enableSchemaValidation: "true"
        documentdb.enableBypassDocumentValidation: "true"
        documentdb.enableUserCrud: "true"
        documentdb.maxUserLimit: "100"

omada-controller:
  initContainers:
    - name: ferretdb
      image: ghcr.io/ferretdb/ferretdb:2.7.0@sha256:5706414241eb84f0515512c37b46db0f1b1eac9e5ceb7e4c2523211c184b1985
      restartPolicy: Always
      env:
        - name: FERRETDB_TELEMETRY
          value: disabled
        - name: FERRETDB_AUTH
          value: "false"
        - name: FERRETDB_LISTEN_ADDR
          value: "127.0.0.1:27017"
        - name: FERRETDB_POSTGRESQL_URL
          valueFrom:
            secretKeyRef:
              # cnpg helper provides pooler-uri (pgbouncer)
              key: pooler-uri
              name: omada-controller-db-app
      volumeMounts:
        - name: tmpfs
          mountPath: /state
          subPath: ferretdb
      livenessProbe: &probe
        exec:
          command:
            - "/ferretdb"
            - "ping"
        failureThreshold: 3
        periodSeconds: 10
        successThreshold: 1
        timeoutSeconds: 1
      readinessProbe: *probe
  image:
    repository: mirror.gcr.io/mbentley/omada-controller
    pullPolicy: IfNotPresent
    tag: 6.2.10.17-openj9@sha256:3bf81dfc8a6884f0269a601decab88ea9ed36297ff64ad1bbe040aa2d733c842
  serviceAccount:
    create: false
  config:
    rootless: true
    tlsSecretName: omada-controller-tls
    externalMongoDBUrl: "mongodb://127.0.0.1:27017/app"
    ports:
      manageHttp: 8080
      manageHttps: 443
  service:
    type: LoadBalancer
    annotations:
      # populated per-cluster from the HR
      lbipam.cilium.io/ips: ""
      coredns.io/hostname: omada.clerici.tech
  resources:
    requests:
      cpu: 500m
      memory: 1200Mi
    limits:
      memory: 5Gi
  persistence:
    data:
      enabled: false
    logs:
      enabled: false
    extraVolumeMounts:
      - name: tmpfs
        mountPath: /opt/tplink/EAPController/data
        subPath: data
      - name: tmpfs
        mountPath: /opt/tplink/EAPController/logs
        subPath: logs
    extraVolumes:
      - name: tmpfs
        emptyDir: {}
