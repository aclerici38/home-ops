---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: omada-exporter
  namespace: flux-system
spec:
  targetNamespace: omada-controller
  dependsOn:
    - name: omada-controller
  sourceRef:
    kind: OCIRepository
    name: omada-controller
  path: ./exporter
  commonMetadata:
    labels:
      app.kubernetes.io/name: omada-exporter
