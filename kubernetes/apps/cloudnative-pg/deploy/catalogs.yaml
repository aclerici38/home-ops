---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: cloudnative-pg-catalogs
  namespace: flux-system
spec:
  targetNamespace: cloudnative-pg
  dependsOn:
    - name: cloudnative-pg
  sourceRef:
    kind: OCIRepository
    name: cloudnative-pg
  path: ./catalogs
  commonMetadata:
    labels:
      app.kubernetes.io/name: cloudnative-pg
