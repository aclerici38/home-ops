---
# yaml-language-server: $schema=https://k8s-versioned-schemas.pages.dev/flux/2.9.1/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: towonel-operator-resources
spec:
  interval: 1h
  chart:
    spec:
      chart: kubernetes/charts/resource-bundle
      sourceRef:
        kind: GitRepository
        name: flux-system
        namespace: flux-system
  install:
    timeout: 5m
  upgrade:
    timeout: 5m
  values:
    externalSecret:
      key: towonel-node
