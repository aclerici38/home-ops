---
# yaml-language-server: $schema=https://k8s-versioned-schemas.pages.dev/flux/2.8.8/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: towonel-agent
spec:
  interval: 1h
  maxHistory: 1
  chartRef:
    kind: OCIRepository
    name: towonel-agent
  install:
    timeout: 2m
    remediation:
      retries: 1
  upgrade:
    timeout: 2m
    remediation:
      retries: 1
  dependsOn:
    - name: towonel-agent-resources
  values:
    defaultPodOptions:
      hostUsers: false
    agent:
      inviteTokenSecret:
        name: ${CLUSTER_NAME}-k8s-token
      services:
        - hostname: "*.clerici.tech"
          origin: external.kgateway.svc.cluster.local:443
    serviceMonitor:
      enabled: true
    monitoring:
      prometheusRule:
        enabled: true
      dashboards:
        enabled: true
        grafanaOperator:
          enabled: true
