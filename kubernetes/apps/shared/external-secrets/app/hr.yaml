---
# yaml-language-server: $schema=https://k8s-versioned-schemas.pages.dev/flux/2.9.2/helmrelease_v2.json?values=external-secrets/2.8.0
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: external-secrets
spec:
  interval: 1h
  maxHistory: 1
  chartRef:
    kind: OCIRepository
    name: external-secrets
  install:
    timeout: 2m
    remediation:
      retries: 1
  upgrade:
    timeout: 2m
    remediation:
      retries: 1
  values:
    installCRDs: true
    replicaCount: 2
    leaderElect: true
    hostUsers: false
    image:
      repository: ghcr.io/external-secrets/external-secrets
    podSecurityContext:
      runAsNonRoot: true
      runAsUser: 1000
      seccompProfile:
        type: RuntimeDefault
    webhook:
      hostUsers: false
      image:
        repository: ghcr.io/external-secrets/external-secrets
      podSecurityContext:
        runAsNonRoot: true
        runAsUser: 1000
        seccompProfile:
          type: RuntimeDefault
      serviceMonitor:
        enabled: true
        interval: 1m
    certController:
      hostUsers: false
      image:
        repository: ghcr.io/external-secrets/external-secrets
      podSecurityContext:
        runAsNonRoot: true
        runAsUser: 1000
        seccompProfile:
          type: RuntimeDefault
      serviceMonitor:
        enabled: true
        interval: 1m
    serviceMonitor:
      enabled: true
      interval: 1m
