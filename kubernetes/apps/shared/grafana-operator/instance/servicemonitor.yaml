---
# yaml-language-server: $schema=https://k8s-versioned-schemas.pages.dev/prometheus-operator/0.92.1/servicemonitor_v1.json
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: grafana
spec:
  endpoints:
    - port: grafana
      path: /metrics
      honorLabels: true
  jobLabel: grafana
  namespaceSelector:
    matchNames:
      - grafana-operator
  selector:
    matchLabels:
      grafana.internal/instance: grafana
