---
apiVersion: v1
kind: Service
metadata:
  name: towonel-agent-metrics
  labels:
    app.kubernetes.io/instance: ${CLUSTER_NAME}
    app.kubernetes.io/component: metrics
spec:
  selector:
    app.kubernetes.io/name: towonel-agent
    app.kubernetes.io/part-of: towonel-operator
  ports:
    - name: metrics
      port: 9090
      targetPort: 9090
---
# yaml-language-server: $schema=https://k8s-versioned-schemas.pages.dev/monitoring.coreos.com/servicemonitor_v1.json
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: towonel-agent
spec:
  selector:
    matchLabels:
      app.kubernetes.io/instance: ${CLUSTER_NAME}
      app.kubernetes.io/component: metrics
  endpoints:
    - port: metrics
      path: /metrics
      interval: 30s
