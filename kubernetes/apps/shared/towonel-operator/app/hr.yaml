---
# yaml-language-server: $schema=https://k8s-versioned-schemas.pages.dev/flux/2.8.8/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: towonel-operator
spec:
  interval: 1h
  maxHistory: 1
  chartRef:
    kind: OCIRepository
    name: towonel-operator
  install:
    timeout: 5m
    remediation:
      retries: 1
  upgrade:
    timeout: 5m
    remediation:
      retries: 1
  dependsOn:
    - name: towonel-resources
  values:
    replicas: 2
    logLevel: debug
    # observability:
    #   metrics:
    #     serviceMonitor:
    #       enabled: true
    credentials:
      existingSecret: towonel-operator
      tokenKey: TOWONEL_OPERATOR_API_KEY
    agentNodeRBAC:
      create: false
