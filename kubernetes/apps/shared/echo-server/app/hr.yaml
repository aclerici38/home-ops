---
# yaml-language-server: $schema=https://k8s-versioned-schemas.pages.dev/flux/2.9.3/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: echo-server
spec:
  interval: 1h
  maxHistory: 1
  chartRef:
    kind: OCIRepository
    name: echo
  install:
    timeout: 2m
    remediation:
      retries: 1
  upgrade:
    timeout: 2m
    remediation:
      retries: 1
  values:
    config:
      metricsEnabled: true
    resources:
      requests:
        cpu: 10m
      limits:
        memory: 64Mi
    monitoring:
      serviceMonitor:
        enabled: true
    httpRoute:
      enabled: true
      parentRefs:
        - name: external
          namespace: kgateway
      hostnames:
        - echo.${CLUSTER_NAME}.clerici.tech
