---
# yaml-language-server: $schema=https://k8s-versioned-schemas.pages.dev/flux/2.8.8/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: echo-server
  namespace: echo-server
spec:
  interval: 1h
  maxHistory: 1
  chart:
    spec:
      chart: ./kubernetes/apps/shared/echo-server/chart
      sourceRef:
        kind: GitRepository
        name: flux-system
        namespace: flux-system
  install:
    timeout: 2m
    remediation:
      retries: 1
  upgrade:
    timeout: 2m
    remediation:
      retries: 1
  values:
    base:
      strategy: RollingUpdate
      pod:
        hostUsers: false
      image:
        repository: ghcr.io/mendhak/http-https-echo
        tag: 40@sha256:d072446da821a767d05dc19fa5ab6a27b1150bfb5c6ecfaecf3a2e5f9812794c
      env:
        HTTP_PORT: &port 8080
        LOG_WITHOUT_NEWLINE: true
        LOG_IGNORE_PATH: /healthz
        PROMETHEUS_ENABLED: true
      ports:
        http: *port
      probes:
        liveness: &probes
          enabled: true
          custom: true
          spec:
            httpGet:
              path: /healthz
              port: *port
        readiness: *probes
      resources:
        requests:
          cpu: 10m
        limits:
          memory: 64Mi
      serviceMonitor: true
      host:
        name: echo-server.clerici.tech
        gateway: external
