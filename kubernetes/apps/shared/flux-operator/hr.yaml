---
# yaml-language-server: $schema=https://k8s-versioned-schemas.pages.dev/flux/2.8.8/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: flux-operator
  namespace: flux-system
spec:
  interval: 1h
  chart:
    spec:
      chart: ./kubernetes/apps/shared/flux-operator/chart
      sourceRef:
        kind: GitRepository
        name: flux-system
        namespace: flux-system
  install:
    timeout: 5m
    remediation:
      retries: 1
  upgrade:
    timeout: 5m
    remediation:
      retries: 1
  valuesFrom:
    - kind: Secret
      name: flux-operator-oidc-credentials
      valuesKey: client_secret
      targetPath: flux-operator.web.config.authentication.oauth2.clientSecret
      optional: true
    - kind: Secret
      name: flux-operator-oidc-credentials
      valuesKey: client_id
      targetPath: flux-operator.web.config.authentication.oauth2.clientID
      optional: true
  values:
    base:
      app-template:
        enabled: false
      pocketid:
        enabled: true
        launchUrl: https://flux.clerici.tech
    flux-instance:
      instance:
        cluster:
          networkPolicy: false
        sync:
          kind: GitRepository
          url: https://github.com/aclerici38/home-ops.git
          ref: refs/heads/main
          path: kubernetes/flux # override per-cluster from the HR
        kustomize:
          patches:
            - target:
                kind: Deployment
                name: "(kustomize-controller|helm-controller|source-controller)"
              patch: |
                - op: add
                  path: /spec/template/spec/containers/0/args/-
                  value: --concurrent=20
                - op: add
                  path: /spec/template/spec/containers/0/args/-
                  value: --requeue-dependency=5s
            - target:
                kind: Deployment
                name: "(kustomize-controller|helm-controller|source-controller)"
              patch: |
                apiVersion: apps/v1
                kind: Deployment
                metadata:
                  name: all
                spec:
                  template:
                    spec:
                      containers:
                        - name: manager
                          resources:
                            limits:
                              cpu: 3000m
                              memory: 4Gi
            - target:
                kind: Deployment
                name: kustomize-controller
              patch: |
                - op: replace
                  path: /spec/template/spec/volumes/0
                  value:
                    name: temp
                    emptyDir:
                      medium: Memory
            - # Enable Helm repositories caching
              target:
                kind: Deployment
                name: source-controller
              patch: |
                - op: add
                  path: /spec/template/spec/containers/0/args/-
                  value: --helm-cache-max-size=20
                - op: add
                  path: /spec/template/spec/containers/0/args/-
                  value: --helm-cache-ttl=60m
                - op: add
                  path: /spec/template/spec/containers/0/args/-
                  value: --helm-cache-purge-interval=5m
            - # OOM detection for helm-controller
              target:
                kind: Deployment
                name: helm-controller
              patch: |
                - op: add
                  path: /spec/template/spec/containers/0/args/-
                  value: --feature-gates=OOMWatch=true
                - op: add
                  path: /spec/template/spec/containers/0/args/-
                  value: --oom-watch-memory-threshold=95
                - op: add
                  path: /spec/template/spec/containers/0/args/-
                  value: --oom-watch-interval=500ms
            - # Disable chart digest tracking
              target:
                kind: Deployment
                name: helm-controller
              patch: |
                - op: add
                  path: /spec/template/spec/containers/0/args/-
                  value: --feature-gates=DisableChartDigestTracking=true
            - # Watch configmaps/secrets attached to HelmReleases and Kustomizations
              target:
                kind: Deployment
                name: (helm-controller|kustomize-controller)
              patch: |-
                - op: add
                  path: /spec/template/spec/containers/0/args/-
                  value: --watch-configs-label-selector=owner!=helm
            - # Cancel health checks on new Kustomization revisions
              target:
                kind: Deployment
                name: "(kustomize-controller|helm-controller)"
              patch: |-
                - op: add
                  path: /spec/template/spec/containers/0/args/-
                  value: --feature-gates=CancelHealthCheckOnNewRevision=true
            - # Fail postBuilds if a variable is not present
              target:
                kind: Deployment
                name: kustomize-controller
              patch: |-
                - op: add
                  path: /spec/template/spec/containers/0/args/-
                  value: --feature-gates=StrictPostBuildSubstitutions=true
    flux-operator:
      serviceMonitor:
        create: true
      installCRDs: true
      securityContext:
        runAsNonRoot: true
        readOnlyRootFilesystem: true
        allowPrivilegeEscalation: false
        capabilities:
          drop: [ALL]
        seccompProfile:
          type: RuntimeDefault
      resources:
        limits:
          cpu: 1000m
          memory: 1Gi
        requests:
          cpu: 100m
          memory: 64Mi
      web:
        networkPolicy:
          create: false
        config:
          baseURL: https://flux.clerici.tech
          authentication:
            type: OAuth2
            oauth2:
              provider: OIDC
              issuerURL: https://id.clerici.tech
              scopes: [openid, profile, email, groups]
              impersonation:
                groups: "['system:masters']"
        httpRoute:
          enabled: true
          parentRefs:
            - name: internal
              namespace: gateway-system
              sectionName: https
          hostnames: [flux.clerici.tech]
