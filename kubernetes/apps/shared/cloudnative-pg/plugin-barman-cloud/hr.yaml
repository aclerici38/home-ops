---
# yaml-language-server: $schema=https://k8s-versioned-schemas.pages.dev/flux/2.9.0/helmrelease_v2.json?values=plugin-barman-cloud/0.7.0
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
