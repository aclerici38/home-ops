---
# yaml-language-server: $schema=https://k8s-versioned-schemas.pages.dev/flux/2.8.8/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cert-manager
  namespace: cert-manager
spec:
  interval: 1h
  chart:
    spec:
      chart: ./kubernetes/apps/shared/cert-manager/chart
      sourceRef:
        kind: GitRepository
        name: flux-system
        namespace: flux-system
  install:
    timeout: 5m
    crds: CreateReplace
    remediation:
      retries: 1
  upgrade:
    timeout: 5m
    crds: CreateReplace
    remediation:
      retries: 1
  values:
    base:
      app-template:
        enabled: false
      externalSecret:
        enabled: true
        name: cloudflare
        key: cloudflare
    cert-manager:
      crds:
        enabled: true
      replicaCount: 2
      dns01RecursiveNameservers: https://1.1.1.1:443/dns-query,https://1.0.0.1:443/dns-query
      dns01RecursiveNameserversOnly: true
      prometheus:
        enabled: true
        servicemonitor:
          enabled: true
