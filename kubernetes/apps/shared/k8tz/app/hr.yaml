---
# yaml-language-server: $schema=https://k8s-versioned-schemas.pages.dev/flux/2.9.2/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: k8tz
spec:
  interval: 1h
  maxHistory: 1
  chartRef:
    kind: OCIRepository
    name: k8tz
  install:
    timeout: 2m
    remediation:
      retries: 1
  upgrade:
    timeout: 2m
    remediation:
      retries: 1
  values:
    namespace: k8tz
    createNamespace: false
    replicaCount: 2
    timezone: ${TZ}
    cronJobTimeZone: true
    # injectionStrategy: imageVolume
    podOwnerLookup: true
    webhook:
      failurePolicy: Fail
      ignoredNamespaces:
        - cilium
        - kube-system
        - cert-manager
        - external-secrets
        - flux-system
      certManager:
        enabled: true
        issuerRef:
          name: k8tz-webhook-selfsign
          kind: Issuer
