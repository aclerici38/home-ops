---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: multus-networks
  namespace: flux-system
spec:
  targetNamespace: multus
  dependsOn:
    - name: multus
  sourceRef:
    kind: OCIRepository
    name: multus
  path: ./networks
  commonMetadata:
    labels:
      app.kubernetes.io/name: multus-networks
