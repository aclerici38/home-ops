---
# yaml-language-server: $schema=https://k8s-versioned-schemas.pages.dev/multus/4.2.4/networkattachmentdefinition_v1.json
apiVersion: k8s.cni.cncf.io/v1
kind: NetworkAttachmentDefinition
metadata:
  name: lab
spec:
  config: |-
    {
      "cniVersion": "1.1.0",
      "name": "lab",
      "plugins": [
        {
          "type": "macvlan",
          "master": "bond0",
          "mode": "bridge",
          "ipam": {
            "type": "static"
          }
        }
      ]
    }
