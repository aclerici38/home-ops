---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: dragonfly-operator
  namespace: flux-system
spec:
  interval: 1h
  targetNamespace: dragonfly-operator
  sourceRef:
    kind: OCIRepository
    name: dragonfly-operator
  path: ./app
  prune: true
  wait: true
  commonMetadata:
    labels:
      app.kubernetes.io/name: dragonfly-operator
  postBuild:
    substitute:
      NS: dragonfly-operator
    substituteFrom:
      - kind: ConfigMap
        name: cluster-settings
      - kind: Secret
        name: cluster-secrets
