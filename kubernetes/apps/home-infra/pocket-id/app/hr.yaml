---
# yaml-language-server: $schema=https://k8s-versioned-schemas.pages.dev/flux/2.8.5/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: pocket-id-operator
spec:
  interval: 1h
  maxHistory: 1
  chartRef:
      kind: OCIRepository
      name: pocket-id-operator
  # chart:
  #   spec:
  #     chart: dist/chart
  #     sourceRef:
  #       kind: GitRepository
  #       name: pocket-id-operator-main
  install:
    timeout: 2m
    remediation:
      retries: 1
  upgrade:
    timeout: 2m
    remediation:
      retries: 1
  values:
    operator:
      # image:
      #   tag: PR-237@sha256:8a07067b70f26cc7f2f258f22750a7fb194d6217769f88db7a78ac1f2dcd8cf2
      args:
        - --zap-log-level=debug
    metrics:
      enabled: true
      serviceMonitor:
        enabled: true
      dashboard:
        enabled: true
    instance:
      name: pocket-id
      spec:
        image: ghcr.io/pocket-id/pocket-id:v2.6.0-distroless@sha256:69e3a04ee3cbe975297cce6d0d3e0fcd9190ea732afd6b1e31cb42f125f79e98
        route:
          enabled: true
          parentRefs:
            - group: gateway.networking.k8s.io
              kind: Gateway
              name: external
              namespace: gateway-system
              sectionName: https
        encryptionKey:
          valueFrom:
            secretKeyRef:
              name: pocket-id
              key: ENCRYPTION_KEY
        databaseUrl:
          valueFrom:
            secretKeyRef:
              name: pocket-id-db-app
              key: uri
        appUrl: https://id.${SECRET_DOMAIN}
        hostUsers: false
        versionCheckDisabled: true
        fileBackend: database
        ui:
          sessionDuration: 1440
        smtp:
          host: smtp-relay.cluster-infra.svc.cluster.local
          from: bot@${SECRET_DOMAIN}
          port: 25
          tls: none
        emailNotifications:
          loginNotification: true
          oneTimeAccessAsAdmin: true
          apiKeyExpiration: true
          verification: true
        persistence:
          enabled: false
        metrics:
          enabled: true

      serviceMonitor:
        enabled: true
    users:
      - name: anthony
        spec:
          locale: en
          admin: true
          email:
            valueFrom:
              key: EMAIL
              name: cluster-settings
          firstName:
            value: Anthony
          lastName:
            value: Clerici
      - name: steve
        spec:
          locale: en
          userInfoSecretRef:
            name: pocket-id-steve-info
    userGroups:
      - name: admin
        spec:
          users:
            userRefs:
              - name: anthony
          customClaims:
            - key: oc_groups
              value: opencloud-admins
            - key: immich_role
              value: admin
      - name: fam
        spec:
          users: &fam
            userRefs:
              - name: anthony
              - name: steve
            usernames:
              - melanie
      - name: all
        spec:
          users:
            <<: *fam
            userIDs:
              - 56f6f365-feb5-464f-bf31-f537d3a34a9e
          customClaims:
            - key: oc_groups
              value: opencloud-users
            - key: immich_role
              value: user
