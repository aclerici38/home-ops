---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/refs/tags/app-template-4.6.2/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: airconnect
spec:
  interval: 1h
  maxHistory: 1
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  install:
    timeout: 2m
    remediation:
      retries: 1
  upgrade:
    timeout: 2m
    remediation:
      retries: 1
  values:
    controllers:
      airconnect:
        pod:
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
            runAsNonRoot: true
            seccompProfile: { type: RuntimeDefault }
          annotations:
            k8s.v1.cni.cncf.io/networks: |
              [
                {
                  "name":"house",
                  "namespace": "network",
                  "ips": ["10.0.20.24/24"],
                  "mac": "64:16:7F:4A:13:03"
                }
              ]
        containers:
          main:
            image:
              repository: docker.io/1activegeek/airconnect
              tag: 1.9.3@sha256:2f0cc606f54756b8dd81063bdc8f446ee5db5c3efca8bee75464c3d4a18ab90d
            env:
              # Sonos only
              AIRCAST_VAR: kill
              AIRUPNP_VAR: -l 1000:2000
              
              S6_YES_I_WANT_A_WORLD_WRITABLE_RUN_BECAUSE_KUBERNETES: 1
              S6_READ_ONLY_ROOT: 1
            resources:
              requests:
                cpu: 25m
              limits:
                memory: 256Mi
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: {drop: [ALL]}
    persistence:
      tmpfs:
        type: emptyDir
        globalMounts:
          - path: /run
            subPath: run
