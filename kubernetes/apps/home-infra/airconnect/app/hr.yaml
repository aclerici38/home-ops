---
# yaml-language-server: $schema=https://k8s-versioned-schemas.pages.dev/flux/2.8.6/helmrelease_v2.json?values=app-template/4.6.2
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: airconnect
spec:
  interval: 1h
  maxHistory: 1
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  install:
    timeout: 2m
    remediation:
      retries: 1
  upgrade:
    timeout: 2m
    remediation:
      retries: 1
  values:
    controllers:
      airconnect:
        pod:
          hostUsers: false
          nodeSelector:
            network.dormammu/multus: "true"
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
            runAsNonRoot: true
            seccompProfile: { type: RuntimeDefault }
          annotations:
            k8s.v1.cni.cncf.io/networks: |
              [
                {
                  "name":"house",
                  "namespace": "network",
                  "ips": ["10.0.20.24/24"],
                  "mac": "64:16:7F:4A:13:03"
                }
              ]
        containers:
          main:
            image:
              repository: mirror.gcr.io/1activegeek/airconnect
              tag: 1.9.3@sha256:c1b2b2c2b956363f7c37557b1834bbc7bf356e2617d607f300ce2155b6804994
            env:
              # Sonos connect boxes only
              # For all sonos devices "-l 1000:2000 -o S1,S3,S5,S9,S12,ZP80,ZP90,S15,ZP100,ZP120,1.0,LibreWireless"
              # (allegedly)
              AIRCAST_VAR: kill
              AIRUPNP_VAR: -l 200:400 -o S15
              
              S6_YES_I_WANT_A_WORLD_WRITABLE_RUN_BECAUSE_KUBERNETES: 1
              S6_READ_ONLY_ROOT: 1
            resources:
              requests:
                cpu: 25m
              limits:
                memory: 256Mi
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: {drop: [ALL]}
    configMaps:
      config:
        data: 
          type: oneshot
    persistence:
      type:
        type: configMap
        name: airconnect
        globalMounts:
          - path: /etc/s6-overlay/s6-rc.d/svc-aircast/type
            subPath: type
      tmpfs:
        type: emptyDir
        globalMounts:
          - path: /run
            subPath: run
