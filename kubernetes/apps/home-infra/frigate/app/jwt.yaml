---
# yaml-language-server: $schema=https://k8s-versioned-schemas.pages.dev/kgateway/2.2.2/gatewayextension_v1alpha1.json
apiVersion: gateway.kgateway.dev/v1alpha1
kind: GatewayExtension
metadata:
  name: ${APP}-jwt
spec:
  jwt:
    providers:
      - name: pocket-id
        issuer: "https://id.${SECRET_DOMAIN}"
        jwks:
          remote:
            url: "https://id.${SECRET_DOMAIN}/.well-known/jwks.json"
            backendRef:
              group: gateway.kgateway.dev
              kind: Backend
              name: ${APP}-oauth-backend
        claimsToHeaders:
          - name: "groups"
            header: "X-Forwarded-Group"
          - name: "email"
            header: "X-Forwarded-Email"
          - name: "preferred_username"
            header: "X-Forwarded-User"
        tokenSource:
          header:
            header: "Authorization"
            prefix: "Bearer "
    validationMode: Strict
---
# yaml-language-server: $schema=https://k8s-versioned-schemas.pages.dev/kgateway/2.2.2/trafficpolicy_v1alpha1.json
apiVersion: gateway.kgateway.dev/v1alpha1
kind: TrafficPolicy
metadata:
  name: ${APP}-jwt
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: ${APP}
  jwtAuth:
    extensionRef:
      name: ${APP}-jwt
