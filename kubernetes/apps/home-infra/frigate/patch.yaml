---
# yaml-language-server: $schema=https://k8s-versioned-schemas.pages.dev/flux/2.8.2/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: patch
spec:
  patches:
    - patch: |-
        apiVersion: pocketid.internal/v1alpha1
        kind: PocketIDOIDCClient
        metadata:
          name: patch
        spec:
          secret:
            keys:
              clientID: client-id
              clientSecret: client-secret
      target:
        kind: PocketIDOIDCClient
