---
# yaml-language-server: $schema=https://k8s-versioned-schemas.pages.dev/pocket-id-operator/0.5.0/pocketidoidcclient_v1alpha1.json
apiVersion: pocketid.internal/v1alpha1
kind: PocketIDOIDCClient
metadata:
  name: opencloud-web
spec:
  logo:
    nameOverride: open-cloud
  clientID: opencloud-web
  isPublic: true
  pkceEnabled: true
  callbackUrls:
    - https://cloud.${SECRET_DOMAIN}
    - https://cloud.${SECRET_DOMAIN}/oidc-callback.html
    - https://cloud.${SECRET_DOMAIN}/oidc-silent-redirect.html
  allowedUserGroups:
    - name: admin
    - name: all
---
# yaml-language-server: $schema=https://k8s-versioned-schemas.pages.dev/pocket-id-operator/0.5.0/pocketidoidcclient_v1alpha1.json
apiVersion: pocketid.internal/v1alpha1
kind: PocketIDOIDCClient
metadata:
  name: opencloud-ios
spec:
  logo:
    nameOverride: open-cloud
  clientID: OpenCloudIOS
  isPublic: true
  pkceEnabled: true
  callbackUrls:
    - oc://ios.opencloud.eu
  logoutCallbackUrls:
    - oc://ios.opencloud.eu
  allowedUserGroups:
    - name: admin
    - name: all
---
# yaml-language-server: $schema=https://k8s-versioned-schemas.pages.dev/pocket-id-operator/0.5.0/pocketidoidcclient_v1alpha1.json
apiVersion: pocketid.internal/v1alpha1
kind: PocketIDOIDCClient
metadata:
  name: opencloud-desktop
spec:
  logo:
    nameOverride: open-cloud
  clientID: OpenCloudDesktop
  isPublic: true
  pkceEnabled: true
  callbackUrls:
    - http://127.0.0.1
    - http://localhost
  allowedUserGroups:
    - name: admin
    - name: all
