---
# yaml-language-server: $schema=https://k8s-versioned-schemas.pages.dev/flux/2.8.3/helmrelease_v2.json?values=app-template/4.6.2
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: opencloud
spec:
  interval: 1h
  maxHistory: 1
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  install:
    timeout: 2m
    remediation:
      retries: 1
  upgrade:
    timeout: 2m
    remediation:
      retries: 1
  values:
    controllers:
      opencloud:
        strategy: RollingUpdate
        forceRename: opencloud
        containers:
          opencloud:
            image: &img
              repository: mirror.gcr.io/opencloudeu/opencloud-rolling
              tag: 6.0.0@sha256:283b1df495bd7c8571868bb8662336cc6e6fe3078b0bf907955651f245cf938f
            command:
              - "/bin/sh"
              - "-c"
              - "opencloud init || true; opencloud server"
            env:
              OC_ADMIN_USER_ID: a15f91db-50ff-4b61-aafa-ad5276a4c21e
              OC_ENABLE_OCM: false
              OC_INSECURE: false
              OC_LOG_LEVEL: info
              OC_URL: &url https://cloud.${SECRET_DOMAIN}
              OC_OIDC_ISSUER: https://id.${SECRET_DOMAIN}
              OC_EXCLUDE_RUN_SERVICES: idp,ocm,nats
              OC_ADD_RUN_SERVICES: notifications
              OC_SHARING_PUBLIC_SHARE_MUST_HAVE_PASSWORD: true
              OC_OIDC_CLIENT_ID: opencloud-web

              FRONTEND_APP_HANDLER_SECURE_VIEW_APP_ADDR: eu.opencloud.api.collaboration.CollaboraOnline
              GRAPH_AVAILABLE_ROLES: "b1e2218d-eef8-4d4c-b82d-0f1a1b48f3b5,a8d5fe5e-96e3-418d-825b-534dbdf22b99,fb6c3e19-e378-47e5-b277-9732f9de6e21,58c63c02-1d89-4572-916a-870abc5a1b7d,2d00ce52-1fc2-4dbc-8b95-a73b73395f5a,1c996275-f1c9-4e71-abdf-a42f6495e960,312c0871-5ef7-4b3a-85b6-0e4074c64049,aa97fe03-7980-45ac-9e50-b325749fd7e6"

              PROXY_TLS: false
              PROXY_AUTOPROVISION_ACCOUNTS: true
              PROXY_ROLE_ASSIGNMENT_DRIVER: oidc
              PROXY_ROLE_ASSIGNMENT_OIDC_CLAIM: oc_groups
              PROXY_USER_OIDC_CLAIM: preferred_username
              WEB_OIDC_SCOPE: "openid profile email"
              PROXY_CSP_CONFIG_FILE_LOCATION: &cspPath /etc/opencloud/csp.yaml
              PROXY_OIDC_REWRITE_WELLKNOWN: true # mobile apps try to re-register via internal idp
              PROXY_OIDC_USERINFO_CACHE_TTL: 1m
              PROXY_HTTP_ADDR: 0.0.0.0:9200
              # metrics
              PROXY_DEBUG_ADDR: 0.0.0.0:9205

              # For collaboration to connect
              GATEWAY_GRPC_ADDR: 0.0.0.0:9142

              MICRO_REGISTRY_ADDRESS: &nats nats-opencloud.home-infra.svc.cluster.local:4222
              MICRO_REGISTRY: nats-js-kv
              OC_CACHE_STORE_NODES: *nats
              OC_PERSISTENT_STORE_NODES: *nats
              OC_EVENTS_ENDPOINT: *nats
              OC_EVENTS_CLUSTER: opencloud-cluster

              SETTINGS_SETUP_DEFAULT_ASSIGNMENTS: false

              GRAPH_ASSIGN_DEFAULT_USER_ROLE: false
              GRAPH_USERNAME_MATCH: "none"
              GRAPH_SPACES_DEFAULT_QUOTA: 0

              WEB_OPTION_ACCOUNT_EDIT_LINK_HREF: https://id.${SECRET_DOMAIN}/settings/apps
              # prevent nested mounts
              WEB_ASSET_APPS_PATH: /opt/extensions/usr/share/nginx/html/apps

              NOTIFICATIONS_SMTP_HOST: smtp-relay.cluster-infra
              NOTIFICATIONS_SMTP_PORT: 25
              NOTIFICATIONS_SMTP_SENDER: bot@${SECRET_DOMAIN}
              NOTIFICATIONS_SMTP_INSECURE: true

              STORAGE_USERS_DRIVER: decomposeds3
              STORAGE_USERS_DECOMPOSEDS3_BUCKET: opencloud
              STORAGE_USERS_DECOMPOSEDS3_ENDPOINT: http://versitygw.storage.svc.cluster.local:7070
              STORAGE_USERS_DECOMPOSEDS3_REGION: us-east-1
              STORAGE_USERS_DECOMPOSEDS3_ACCESS_KEY:
                secretKeyRef:
                  name: opencloud
                  key: DECOMPOSEDS3_ACCESS_KEY
              STORAGE_USERS_DECOMPOSEDS3_SECRET_KEY:
                secretKeyRef:
                  name: opencloud
                  key: DECOMPOSEDS3_SECRET_KEY
              STORAGE_USERS_ID_CACHE_STORE: nats-js-kv

              SEARCH_EXTRACTOR_TYPE: tika
              SEARCH_EXTRACTOR_TIKA_TIKA_URL: http://opencloud-tika:9998
              FRONTEND_FULL_TEXT_SEARCH_ENABLED: "true"
            securityContext: &sec
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: { drop: ["ALL"] }
            resources:
              requests:
                cpu: 200m
                memory: 512Mi
              limits:
                memory: 2Gi
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    port: &port 9200
                    path: /health
              readiness: *probes
      wopi:
        strategy: RollingUpdate
        containers:
          wopi:
            image: *img
            command:
              - "/bin/sh"
              - "-c"
              - "opencloud collaboration server"
            env:
              COLLABORATION_WOPI_SRC: http://opencloud-wopi:9300
              COLLABORATION_APP_NAME: CollaboraOnline
              COLLABORATION_APP_PRODUCT: Collabora
              COLLABORATION_APP_INSECURE: true
              COLLABORATION_CS3API_DATAGATEWAY_INSECURE: true
              COLLABORATION_APP_ADDR: https://collabora.${SECRET_DOMAIN}
              COLLABORATION_APP_ICON: https://collabora.${SECRET_DOMAIN}/favicon.ico
              COLLABORATION_APP_PROOF_DISABLE: true
              COLLABORATION_GRPC_ADDR: 0.0.0.0:9301
              COLLABORATION_HTTP_ADDR: 0.0.0.0:9300
              MICRO_REGISTRY_ADDRESS: *nats
              OC_PERSISTENT_STORE_NODES: *nats
              OC_CACHE_STORE: nats-js-kv
              MICRO_REGISTRY: nats-js-kv
              OC_URL: *url
            securityContext: *sec
      collabora:
        strategy: RollingUpdate
        pod:
          hostUsers: false
          securityContext:
            # Upstream 'cool' group
            runAsUser: 1001
            runAsGroup: 1001
            seccompProfile:
              type: Unconfined # This seems necessary
        containers:
          collabora:
            image:
              repository: mirror.gcr.io/collabora/code
              tag: 25.04.9.4.1@sha256:fe49c08c27e102c1877ad4ef2ac1a7bd8ccd2dfaa6641d4533389c204a92bb88
            env:
              aliasgroup1: http://opencloud-wopi:9300
              DONT_GEN_SSL_CERT: "YES"
              extra_params: |
                --o:ssl.enable=false \
                --o:ssl.ssl_verification=false \
                --o:ssl.termination=true \
                --o:welcome.enable=false \
                --o:net.frame_ancestors=cloud.${SECRET_DOMAIN}
              username:
                valueFrom:
                  secretKeyRef:
                    name: opencloud
                    key: COLLABORA_ADMIN_USER
              password:
                valueFrom:
                  secretKeyRef:
                    name: opencloud
                    key: COLLABORA_ADMIN_PASS
            securityContext:
              <<: *sec
              capabilities:
                add:
                  - MKNOD
                drop:
                  - ALL
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    port: 9980
                    path: /hosting/discovery
              readiness: *probes
      tika:
        strategy: RollingUpdate
        replicas: 2
        pod:
          hostUsers: false
        containers:
          tika:
            image:
              repository: mirror.gcr.io/apache/tika
              tag: 3.3.0.0-full@sha256:ecdd37e204308266b1f8e28569f8516ebd5b96d7a4518a71d3904710b20c03b3
            env:
              JAVA_OPTS: "-Xmx3g"
            securityContext: *sec
            resources:
              requests:
                cpu: 200m
                memory: 500Mi
              limits:
                memory: 5Gi
    defaultPodOptionsStrategy: merge
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile: { type: RuntimeDefault }
    service:
      opencloud:
        forceRename: opencloud
        controller: opencloud
        ports:
          http:
            port: *port
          grpc:
            port: 9142
          debug:
            port: 9205
      tika:
        controller: tika
        ports:
          http:
            port: 9998
      wopi:
        controller: wopi
        ports:
          http:
            port: 9300
          grpc:
            port: 9301
      collabora:
        controller: collabora
        ports:
          http:
            port: 9980
    serviceMonitor:
      opencloud:
        serviceName: opencloud
        endpoints:
          - port: debug
    route:
      opencloud:
        forceRename: opencloud
        hostnames:
          - cloud.${SECRET_DOMAIN}
        parentRefs:
          - name: external
            namespace: gateway-system
            sectionName: https
        rules:
          - backendRefs:
            - identifier: opencloud
              port: *port
      wopi:
        annotations:
          gatus.home-operations.com/endpoint: |-
            conditions: ["[STATUS] == 404"]
        hostnames:
          - wopi.${SECRET_DOMAIN}
        parentRefs:
          - name: external
            namespace: gateway-system
            sectionName: https
        rules:
          - backendRefs:
            - identifier: wopi
              port: 9300
      collabora:
        hostnames:
          - collabora.${SECRET_DOMAIN}
        parentRefs:
          - name: external
            namespace: gateway-system
            sectionName: https
        rules:
          - backendRefs:
            - identifier: collabora
              port: 9980
    persistence:
      config:
        type: configMap
        name: opencloud
        advancedMounts:
          opencloud:
            opencloud:
              - path: *cspPath
                subPath: csp.yaml
              - path: /etc/opencloud/proxy.yaml
                subPath: proxy.yaml
      data:
        existingClaim: opencloud
        advancedMounts:
          opencloud:
            opencloud:
              - path: /var/lib/opencloud
                subPath: data
              - path: /etc/opencloud
                subPath: config
          wopi:
            wopi:
              - path: /etc/opencloud
                subPath: config
      tmpfs:
        type: emptyDir
        advancedMounts:
          tika:
            tika:
              - path: /tmp
          collabora:
            collabora:
              - path: /tmp
                subPath: tmp
              - path: /opt/cool/cache
                subPath: cache
              - path: /opt/cool/child-roots
                subPath: roots
      # Web extensions
      unzip:
        type: image
        image: mirror.gcr.io/opencloudeu/web-extensions:unzip-1.0.4@sha256:217e325154a8f5a1732a2cbde4532600b532450e93b85d53522f1df6c84fd173
        advancedMounts:
          opencloud:
            opencloud:
              - path: /opt/extensions
    configMaps: 
      config:
        data:
          csp.yaml: |
            directives:
              child-src:
                - '''self'''
              connect-src:
                - '''self'''
                - 'blob:'
                - 'https://wopi.${SECRET_DOMAIN}/'
                - 'wss://wopi.${SECRET_DOMAIN}/'
                - 'https://raw.githubusercontent.com/opencloud-eu/awesome-apps/'
                - 'https://id.${SECRET_DOMAIN}/'
              default-src:
                - '''none'''
              font-src:
                - '''self'''
              frame-ancestors:
                - '''self'''
              frame-src:
                - '''self'''
                - 'blob:'
                - 'https://embed.diagrams.net/'
                - 'https://collabora.${SECRET_DOMAIN}/'
                # This is needed for the external-sites web extension when embedding sites
                - 'https://docs.opencloud.eu'
              img-src:
                - '''self'''
                - 'data:'
                - 'blob:'
                - 'https://raw.githubusercontent.com/opencloud-eu/awesome-apps/'
                - 'https://collabora.${SECRET_DOMAIN}/'
              manifest-src:
                - '''self'''
              media-src:
                - '''self'''
              object-src:
                - '''self'''
                - 'blob:'
              script-src:
                - '''self'''
                - '''unsafe-inline'''
                - 'https://id.${SECRET_DOMAIN}/'
              style-src:
                - '''self'''
                - '''unsafe-inline'''
          proxy.yaml: |
            role_assignment:
              driver: oidc
              oidc_role_mapper:
                role_claim: oc_groups
                role_mapping:
                  - role_name: admin
                    claim_value: opencloud-admins
                  - role_name: user
                    claim_value: opencloud-users
                  - role_name: guest
                    claim_value: opencloud-guests
