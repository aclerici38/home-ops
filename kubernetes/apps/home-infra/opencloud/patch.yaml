---
# yaml-language-server: $schema=https://datreeio.github.io/CRDs-catalog/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: patch
spec:
  patches:
    # patch secret to all namespaces
    - patch: |
        apiVersion: external-secrets.io/v1
        kind: ClusterExternalSecret
        metadata:
          name: patch
        spec:
          externalSecretSpec:
            data:
              - secretKey: DECOMPOSEDS3_ACCESS_KEY
                remoteRef:
                  key: versity
                  property: username
              - secretKey: DECOMPOSEDS3_SECRET_KEY
                remoteRef:
                  key: versity
                  property: password
      target:
        kind: ClusterExternalSecret
        labelSelector: dormammu.io/component=external-secret
