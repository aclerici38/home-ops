---
# yaml-language-server: $schema=https://k8s-versioned-schemas.pages.dev/flux/2.8.8/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: immich
spec:
  path: ./kubernetes/apps/home-infra/immich/app
  commonMetadata:
    labels:
      app.kubernetes.io/name: immich
  postBuild:
    substitute:
      APP_URL: immich.clerici.tech
