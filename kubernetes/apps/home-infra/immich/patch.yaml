---
# yaml-language-server: $schema=https://k8s-versioned-schemas.pages.dev/flux/2.8.5/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: immich
spec:
  patches:
    - patch: |-
        apiVersion: postgresql.cnpg.io/v1
        kind: Cluster
        metadata:
          name: patch
        spec:
          postgresql:
            shared_preload_libraries:
              - "vchord.so"
            extensions:
              - name: pgvector
              - name: vchord
      target:
        kind: Cluster
    - patch: |-
        - op: add
          path: /spec/args/-
          value: --default_lua_flags=allow-undeclared-keys
      target:
        kind: Dragonfly
    - patch: |-
        apiVersion: pocketid.internal/v1alpha1
        kind: PocketIDOIDCClient
        metadata:
          name: patch
        spec:
          callbackUrls:
            - app.immich:///oauth-callback
            - https://immich.${SECRET_DOMAIN}/auth/login
            - https://immich.${SECRET_DOMAIN}/user-settings
      target:
        kind: PocketIDOIDCClient
