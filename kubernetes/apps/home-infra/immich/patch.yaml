---
# yaml-language-server: $schema=https://k8s-versioned-schemas.pages.dev/flux/2.8.7/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: immich
spec:
  patches:
    - patch: |-
        - op: add
          path: /spec/args/-
          value: --default_lua_flags=allow-undeclared-keys
      target:
        kind: Dragonfly
    - patch: |-
        apiVersion: pocketid.internal/v1alpha1
        kind: PocketIDOIDCClient
        metadata:
          name: patch
        spec:
          callbackUrls:
            - app.immich:///oauth-callback
            - https://immich.${SECRET_DOMAIN}/auth/login
            - https://immich.${SECRET_DOMAIN}/user-settings
      target:
        kind: PocketIDOIDCClient
    # Chart 0.6.0 does not pass through cluster.postgresql.extensions, so
    # append the opt-in to the existing plugin postRenderer. Drop once
    # upstream support lands (cloudnative-pg/charts#838 or a sibling PR).
    - patch: |-
        - op: add
          path: /spec/postRenderers/0/kustomize/patches/-
          value:
            target:
              kind: Cluster
              name: immich-db
            patch: |
              apiVersion: postgresql.cnpg.io/v1
              kind: Cluster
              metadata:
                name: immich-db
              spec:
                postgresql:
                  extensions:
                    - name: pgvector
                    - name: vchord
      target:
        kind: HelmRelease
        name: immich-db
