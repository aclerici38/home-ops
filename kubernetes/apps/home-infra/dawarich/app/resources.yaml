---
# yaml-language-server: $schema=https://k8s-versioned-schemas.pages.dev/flux/2.8.8/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: dawarich-resources
spec:
  interval: 1h
  chart:
    spec:
      chart: kubernetes/charts/resource-bundle
      sourceRef:
        kind: GitRepository
        name: flux-system
        namespace: flux-system
  install:
    timeout: 5m
  upgrade:
    timeout: 5m
  dependsOn:
    - name: cloudnative-pg
      namespace: cloudnative-pg
    - name: dragonfly-operator
      namespace: dragonfly-operator
    - name: external-secrets
      namespace: external-secrets
    - name: kube-prometheus-stack
      namespace: kube-prometheus-stack
    - name: plugin-barman-cloud
      namespace: plugin-barman-cloud
    - name: pocket-id-operator
      namespace: pocket-id-operator
    - name: volsync
      namespace: volsync
  values:
    cnpg:
      poolMode: session
      pgExtensions: [postgis]
      dbExtensions:
        - postgis
        - postgis_raster
        - postgis_sfcgal
        - fuzzystrmatch
        - address_standardizer
        - address_standardizer_data_us
        - postgis_tiger_geocoder
        - postgis_topology
    dragonfly:
      extraArgs:
        - --default_lua_flags=allow-undeclared-keys
    externalSecret: {}
    pocketId:
      group: fam
    volsync:
      cephfs: true
