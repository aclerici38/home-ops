---
# yaml-language-server: $schema=https://k8s-versioned-schemas.pages.dev/flux/2.8.4/helmrelease_v2.json?values=app-template/4.6.2
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: matter-server
spec:
  interval: 1h
  maxHistory: 1
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  install:
    timeout: 2m
    remediation:
      retries: 1
  upgrade:
    timeout: 2m
    remediation:
      retries: 1
  values:
    controllers:
      matter-server:
        pod:
          nodeSelector:
            network.dormammu/multus: "true"
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
            fsGroup: 1000
            fsGroupChangePolicy: OnRootMismatch
            runAsNonRoot: true
            seccompProfile: { type: RuntimeDefault }
            supplementalGroups:
              # Matter?
              - 34
          annotations:
            k8s.v1.cni.cncf.io/networks: |
              [
                {
                  "name":"iot",
                  "namespace": "network",
                  "ips": ["10.0.80.23/24"],
                  "mac": "64:16:7F:33:88:AC"
                }
              ]
        containers:
          matter-server:
            image:
              repository: ghcr.io/home-assistant-libs/python-matter-server
              tag: 8.1.0@sha256:170aa093ce91c76cde4cc390918307590f0f5558fcec93f913af3cb019e6562a
            args:
              - --storage-path=/data
              - --paa-root-cert-dir=/data/credentials
              - --ota-provider-dir=/data/ota
              - --primary-interface=net1
            resources:
              requests:
                cpu: 47m
              limits:
                memory: 100Mi
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: {drop: [ALL]}
    service:
      matter-server:
        controller: matter-server
        ports:
          http:
            port: &port 5580
    route:
      matter-server:
        hostnames:
          - ${APP_URL}
        parentRefs:
          - name: internal
            namespace: gateway-system
            sectionName: https
        rules:
          - backendRefs:
            - identifier: matter-server
              port: *port
    persistence:
      data:
        existingClaim: matter-server
        globalMounts:
          - path: /data
      tmpfs:
        type: emptyDir
        globalMounts:
          - path: /tmp
            subPath: tmp
