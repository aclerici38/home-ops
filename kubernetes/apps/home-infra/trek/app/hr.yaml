---
# yaml-language-server: $schema=https://k8s-versioned-schemas.pages.dev/flux/2.8.6/helmrelease_v2.json?values=app-template/4.6.2
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: trek
spec:
  interval: 1h
  maxHistory: 1
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  install:
    timeout: 2m
  upgrade:
    timeout: 2m
  values:
    controllers:
      trek:
        pod:
          hostUsers: false
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
            fsGroup: 1000
            fsGroupChangePolicy: OnRootMismatch
            runAsNonRoot: true
            seccompProfile: { type: RuntimeDefault }
        containers:
          trek:
            image:
              repository: mirror.gcr.io/mauriceboe/trek
              tag: 3.0.13@sha256:18db8cb0e93c67d394ec52c0b7032fb874631823062fc817c0ad34b2e133302c
            args: ["node", "--import", "tsx", "src/index.ts"]
            env:
              ALLOW_INTERNAL_NETWORK: true
              LOG_LEVEL: debug
              APP_URL: https://${APP_URL}
              ALLOWED_ORIGINS: https://${APP_URL}
              TRUST_PROXY: true
              ADMIN_EMAIL: ${EMAIL}
              ADMIN_PASSWORD:
                secretKeyRef:
                  name: trek
                  key: ADMIN_PASSWORD
              ENCRYPTION_KEY:
                secretKeyRef:
                  name: trek
                  key: ENCRYPTION_KEY

              OIDC_ONLY: true
              OIDC_ADMIN_CLAIM: groups
              OIDC_ADMIN_VALUE: admin
              OIDC_SCOPE: openid email profile groups
              OIDC_DISPLAY_NAME: Pocket ID
              OIDC_ISSUER:
                secretKeyRef:
                  name: trek-oidc-credentials
                  key: issuer_url
              OIDC_CLIENT_ID:
                secretKeyRef:
                  name: trek-oidc-credentials
                  key: client_id
              OIDC_CLIENT_SECRET:
                secretKeyRef:
                  name: trek-oidc-credentials
                  key: client_secret
              
              SMTP_HOST: smtp-relay.cluster-infra
              SMTP_PORT: 25
              SMTP_FROM: TREK <bot@${SECRET_DOMAIN}>
            probes:
              readiness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    port: &port 3000
                    path: /api/health
              liveness: *probes
            resources:
              requests:
                cpu: 12m
                memory: 128M
              limits:
                memory: 512M
            securityContext:
              runAsNonRoot: true
              allowPrivilegeEscalation: false
              seccompProfile: { type: RuntimeDefault }
              capabilities: { drop: ["ALL"] }
    service:
      trek:
        controller: trek
        ports:
          http:
            port: *port
    route:
      trek:
        hostnames:
          - ${APP_URL}
        parentRefs:
          - name: external
            namespace: gateway-system
    persistence:
      data:
        existingClaim: trek
        globalMounts:
          - path: /app/data
            subPath: data
          - path: /app/uploads
            subPath: uploads
