---
# Expose Tesla Fleet API public key for oauth
---
# yaml-language-server: $schema=https://k8s-versioned-schemas.pages.dev/kgateway/2.3.1/directresponse_v1alpha1.json
apiVersion: gateway.kgateway.dev/v1alpha1
kind: DirectResponse
metadata:
  name: tesla-pubkey
spec:
  status: 200
  body: |
    -----BEGIN PUBLIC KEY-----
    MFkwEwYHKoZIzj0CAQYIKoZIzj0DAQcDQgAEFUkYSTPOxeNBmBYAmPzChCExcPB6
    mx2op69TheDVBSA7TuJEzxGZO5TtURjYtNfVuynPVgfuOSETCo31v90HhA==
    -----END PUBLIC KEY-----
---
# yaml-language-server: $schema=https://k8s-versioned-schemas.pages.dev/gateway-api/1.5.1/httproute_v1.json
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: tesla-pubkey
spec:
  hostnames:
    - tesla.${SECRET_DOMAIN}
  parentRefs:
    - name: external
      namespace: gateway-system
      sectionName: https
  rules:
    - matches:
        - path:
            type: Exact
            value: /.well-known/appspecific/com.tesla.3p.public-key.pem
      filters:
        - type: ExtensionRef
          extensionRef:
            group: gateway.kgateway.dev
            kind: DirectResponse
            name: tesla-pubkey
