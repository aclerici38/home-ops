---
# yaml-language-server: $schema=https://k8s-versioned-schemas.pages.dev/flux/2.8.8/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: openebs
spec:
  targetNamespace: openebs
  path: ./kubernetes/apps/openebs-system/openebs/app
  commonMetadata:
    labels:
      app.kubernetes.io/name: openebs
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: openebs-zfs-volumes
spec:
  targetNamespace: openebs
  dependsOn:
    - name: openebs
  path: ./kubernetes/apps/openebs-system/openebs/zfs-volumes
  commonMetadata:
    labels:
      app.kubernetes.io/name: openebs
