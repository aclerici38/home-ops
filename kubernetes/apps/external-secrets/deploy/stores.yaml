---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: external-secrets-stores
  namespace: flux-system
spec:
  targetNamespace: external-secrets
  dependsOn:
    - name: external-secrets
  sourceRef:
    kind: OCIRepository
    name: external-secrets
  path: ./stores
  commonMetadata:
    labels:
      app.kubernetes.io/name: external-secrets
