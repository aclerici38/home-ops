---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: external-secrets
  namespace: flux-system
spec:
  interval: 1h
  targetNamespace: external-secrets
  sourceRef:
    kind: OCIRepository
    name: external-secrets
  path: ./app
  prune: true
  wait: true
  commonMetadata:
    labels:
      app.kubernetes.io/name: external-secrets
  postBuild:
    substitute:
      NS: external-secrets
    substituteFrom:
      - kind: ConfigMap
        name: cluster-settings
      - kind: Secret
        name: cluster-secrets
