---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: external-secrets
  namespace: flux-system
spec:
  targetNamespace: external-secrets
  sourceRef:
    kind: OCIRepository
    name: external-secrets
  path: ./app
  commonMetadata:
    labels:
      app.kubernetes.io/name: external-secrets
