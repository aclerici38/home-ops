---
# yaml-language-server: $schema=https://k8s-versioned-schemas.pages.dev/external-secrets/2.6.0/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: &name github-app-credentials
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  refreshInterval: "1h"
  target:
    name: *name
    template:
      engineVersion: v2
      data:
        PEM: '{{ index . "PRIVATE_KEY.pem" }}'
        APP_ID: "1155719"
        INSTALL_ID: "61553692"
  dataFrom:
    - extract:
        key: renovate-operator-private-key
