---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: intel-gpu-resource-driver
  namespace: flux-system
spec:
  interval: 1h
  targetNamespace: intel-gpu-resource-driver
  sourceRef:
    kind: OCIRepository
    name: intel-gpu-resource-driver
  path: ./app
  prune: true
  wait: true
  commonMetadata:
    labels:
      app.kubernetes.io/name: intel-gpu-resource-driver
  postBuild:
    substitute:
      NS: intel-gpu-resource-driver
    substituteFrom:
      - kind: ConfigMap
        name: cluster-settings
      - kind: Secret
        name: cluster-secrets
