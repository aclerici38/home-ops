---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: open-webui
  namespace: flux-system
spec:
  targetNamespace: open-webui
  sourceRef:
    kind: OCIRepository
    name: open-webui
  path: ./app
  commonMetadata:
    labels:
      app.kubernetes.io/name: open-webui
