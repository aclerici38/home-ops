---
base:
  cnpg:
    enabled: true
    mode: no-backup

  dragonfly:
    enabled: true

  controllers:
    blocky:
      strategy: RollingUpdate
      replicas: 3
      rollingUpdate:
        surge: 1
        unavailable: 1
      pod:
        affinity:
          podAntiAffinity:
            requiredDuringSchedulingIgnoredDuringExecution:
              - labelSelector:
                  matchLabels:
                    app.kubernetes.io/instance: blocky
                topologyKey: kubernetes.io/hostname
      containers:
        blocky:
          image:
            repository: ghcr.io/0xerr0r/blocky
            tag: v0.30.0@sha256:d9f15eddffedded40797406349012cbd5966ef99c286b13321e7a76efddb9bdc
          env:
            PGCONNECT_TIMEOUT: 10
            PGHOST:
              valueFrom:
                secretKeyRef:
                  name: blocky-db-app
                  key: pooler-host
            PGPORT:
              valueFrom:
                secretKeyRef:
                  name: blocky-db-app
                  key: port
            PGUSER:
              valueFrom:
                secretKeyRef:
                  name: blocky-db-app
                  key: username
            PGPASSWORD:
              valueFrom:
                secretKeyRef:
                  name: blocky-db-app
                  key: password
            PGDATABASE:
              valueFrom:
                secretKeyRef:
                  name: blocky-db-app
                  key: dbname
          probes:
            readiness: &probes
              enabled: true
              custom: true
              spec:
                exec:
                  command:
                    - /app/blocky
                    - healthcheck
            liveness: *probes
          resources:
            requests:
              cpu: 50m
              memory: 100Mi
            limits:
              memory: 512Mi
          securityContext:
            capabilities:
              add: [NET_BIND_SERVICE]

  service:
    dns:
      controller: blocky
      type: LoadBalancer
      annotations:
        # populated per-cluster from HR
        lbipam.cilium.io/ips: ""
        coredns.io/hostname: dot.clerici.tech
      ports: &dnsPorts
        dns-tcp:
          port: 53
        dns-udp:
          port: 53
          protocol: UDP
        dns-tls:
          port: 853
    k8s:
      controller: blocky
      # populated per-cluster from HR
      clusterIP: ""
      ports:
        <<: *dnsPorts
        http:
          port: 4000

  serviceMonitor:
    blocky:
      serviceName: blocky-k8s
      endpoints:
        - port: http

  route:
    blocky-DOH:
      annotations:
        # google.com base64
        gatus.home-operations.com/endpoint: |-
          url: https://dns.clerici.tech/dns-query?dns=AAABAAABAAAAAAAABmdvb2dsZQNjb20AAAEAAQ
      hostnames:
        - dns.clerici.tech
      parentRefs:
        - name: external
          namespace: kgateway
          sectionName: https
      rules:
        - matches:
            - path:
                type: PathPrefix
                value: /dns-query
          backendRefs:
            - identifier: k8s
              port: 4000

  persistence:
    config:
      type: configMap
      name: blocky
      globalMounts:
        - path: /app/config.yml
          subPath: config.yml
    tls:
      type: secret
      name: blocky-tls
      globalMounts:
        - path: /certs/tls.crt
          subPath: tls.crt
        - path: /certs/tls.key
          subPath: tls.key
