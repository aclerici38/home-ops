---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: cert-manager external-secrets intel-gpu-resource-driver k8tz node-feature-discovery onepassword-connect reloader smtp-relay spegel
  namespace: flux-system
spec:
  interval: 1h
  targetNamespace: cert-manager external-secrets intel-gpu-resource-driver k8tz node-feature-discovery onepassword-connect reloader smtp-relay spegel
  sourceRef:
    kind: OCIRepository
    name: cert-manager external-secrets intel-gpu-resource-driver k8tz node-feature-discovery onepassword-connect reloader smtp-relay spegel
  path: ./app
  prune: true
  wait: true
  commonMetadata:
    labels:
      app.kubernetes.io/name: cert-manager external-secrets intel-gpu-resource-driver k8tz node-feature-discovery onepassword-connect reloader smtp-relay spegel
  postBuild:
    substitute:
      NS: cert-manager external-secrets intel-gpu-resource-driver k8tz node-feature-discovery onepassword-connect reloader smtp-relay spegel
    substituteFrom:
      - kind: ConfigMap
        name: cluster-settings
      - kind: Secret
        name: cluster-secrets
