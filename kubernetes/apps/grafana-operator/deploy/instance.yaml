---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: grafana-operator-instance
  namespace: flux-system
spec:
  targetNamespace: grafana-operator
  dependsOn:
    - name: grafana-operator
  sourceRef:
    kind: OCIRepository
    name: grafana-operator
  path: ./instance
  commonMetadata:
    labels:
      app.kubernetes.io/name: grafana-operator-instance
