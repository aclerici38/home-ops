---
# yaml-language-server: $schema=https://k8s-versioned-schemas.pages.dev/renovate-operator/4.10.1/renovatejob_v1alpha1.json
apiVersion: renovate-operator.mogenius.com/v1alpha1
kind: RenovateJob
metadata:
  name: ${NAME}
spec:
  provider:
    name: github
  discoveryFilters:
    - /aclerici38\/(${REPOS})/
  extraEnv:
    - name: LOG_LEVEL
      value: debug
    - name: RENOVATE_ALLOWED_COMMANDS
      value: >-
        [
          "pnpm run bundle"
        ]
    - name: RENOVATE_PLATFORM_COMMIT
      value: enabled
    - name: DOCKERHUB_USERNAME
      valueFrom:
        secretKeyRef:
          name: renovate-operator
          key: DOCKERHUB_USERNAME
    - name: DOCKERHUB_TOKEN
      valueFrom:
        secretKeyRef:
          name: renovate-operator
          key: DOCKERHUB_TOKEN
    - name: RENOVATE_HOST_RULES
      value: >-
        [
          {
            "hostType": "docker",
            "matchHost": "docker.io",
            "username": "$(DOCKERHUB_USERNAME)",
            "password": "$(DOCKERHUB_TOKEN)"
          }
        ]
    - name: RENOVATE_REDIS_URL
      value: redis://renovate-operator-dragonfly-db:6379
    - name: RENOVATE_REPOSITORY_CACHE
      value: enabled
    - name: RENOVATE_CACHE_PRIVATE_PACKAGES
      value: "true"
    - name: RENOVATE_CUSTOM_ENV_VARIABLES
      value: >-
        {"MISE_TRUSTED_CONFIG_PATHS": "/tmp/repos"}
  image: ghcr.io/renovatebot/renovate:43.216.3@sha256:80b639fd0e421c09ee7b5140f4eeed43e1ff7c4ba1e471e17fbe06d1e4d5d4a7
  parallelism: 5
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
  schedule: "${SCHEDULE}"
  secretRef: botthebuilder-auth
