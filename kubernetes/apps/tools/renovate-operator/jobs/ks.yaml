---
# yaml-language-server: $schema=https://k8s-versioned-schemas.pages.dev/flux/2.8.6/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: renovate-operator-30-min
  labels:
    components.dormammu/no_app_url: true
spec:
  targetNamespace: ${NS}
  dependsOn:
    - name: renovate-operator-resources
  path: ./kubernetes/apps/tools/renovate-operator/jobs/template
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  wait: true
  prune: true
  interval: 30m
  timeout: 3m
  postBuild:
    substitute:
      NAME: 30-min
      SCHEDULE: "'*/30 * * * *'"
      REPOS: "home-ops|pocket-id-operator|containers"
---
# yaml-language-server: $schema=https://k8s-versioned-schemas.pages.dev/flux/2.8.6/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: renovate-operator-15-min
  labels:
    components.dormammu/no_app_url: true
spec:
  targetNamespace: ${NS}
  dependsOn:
    - name: renovate-operator-resources
  path: ./kubernetes/apps/tools/renovate-operator/jobs/template
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  wait: true
  prune: true
  interval: 30m
  timeout: 3m
  postBuild:
    substitute:
      NAME: 15-min
      SCHEDULE: "'*/15 * * * *'"
      REPOS: "k8s-versioned-schemas|pocket-id-go-client|workflows"
