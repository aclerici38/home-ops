---
# yaml-language-server: $schema=https://k8s-versioned-schemas.pages.dev/flux/2.8.6/helmrelease_v2.json?values=app-template/4.6.2
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: mcpo
spec:
  interval: 1h
  maxHistory: 1
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  install:
    timeout: 2m
    remediation:
      retries: 1
  upgrade:
    timeout: 2m
    remediation:
      retries: 1
  values:
    controllers:
      mcpo:
        strategy: RollingUpdate
        pod:
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            fsGroup: 1000
            fsGroupChangePolicy: OnRootMismatch
            seccompProfile: { type: RuntimeDefault }
        containers:
          mcpo:
            image:
              repository: ghcr.io/open-webui/mcpo
              tag: main@sha256:1e82c9555c19e50b80745705f32b47a2647589f35279527b5118ecd3a71bd467
            env:
              HOME: /data # mcpo persists OAuth tokens to ~/.mcpo/tokens
            args:
              - --host
              - 0.0.0.0
              - --port
              - "8000"
              - --config
              - /config/config.json
            resources:
              requests:
                cpu: 50m
                memory: 128Mi
              limits:
                memory: 512Mi
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: { drop: [ALL] }
    service:
      mcpo:
        controller: mcpo
        ports:
          http:
            port: 8000
            primary: true
          callback:
            port: 3030
    persistence:
      config:
        type: configMap
        name: mcpo
        globalMounts:
          - path: /config/config.json
            subPath: config.json
            readOnly: true
      data:
        existingClaim: mcpo
        globalMounts:
          - path: /data
      tmp:
        type: emptyDir
    configMaps:
      config:
        data:
          config.json: |
            {
              "mcpServers": {
                "trek": {
                  "type": "streamable-http",
                  "url": "https://trek.${SECRET_DOMAIN}/mcp",
                  "oauth": {
                    "server_url": "https://trek.${SECRET_DOMAIN}/mcp",
                    "storage_type": "file"
                  }
                }
              }
            }
