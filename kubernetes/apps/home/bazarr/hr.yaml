---
# yaml-language-server: $schema=https://k8s-versioned-schemas.pages.dev/flux/2.8.8/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: bazarr
  namespace: bazarr
spec:
  interval: 1h
  chart:
    spec:
      chart: ./kubernetes/apps/home/bazarr/chart
      sourceRef:
        kind: GitRepository
        name: flux-system
        namespace: flux-system
  install:
    timeout: 5m
    remediation:
      retries: 1
  upgrade:
    timeout: 5m
    remediation:
      retries: 1
  values:
    base:
      cnpg:
        enabled: true
        mode: restore
      volsync:
        enabled: true
      host: bazarr.clerici.tech
      image:
        repository: ghcr.io/home-operations/bazarr
        tag: 1.5.6@sha256:79fc37491f55c7e24427bcd669bce3df2d7415ca432a47ce9d53cc5988af8411
      ports:
        http: 6767
      env:
        BAZARR__APP__INSTANCENAME: Bazarr
        BAZARR__APP__THEME: dark
        BAZARR__AUTH__METHOD: External
        BAZARR__AUTH__REQUIRED: DisabledForLocalAddresses
        BAZARR__LOG__DBENABLED: "False"
        BAZARR__LOG__LEVEL: info
        POSTGRES_ENABLED: "true"
        POSTGRES_HOST:
          valueFrom:
            secretKeyRef:
              name: bazarr-db-app
              key: pooler-host
        POSTGRES_USERNAME:
          valueFrom:
            secretKeyRef:
              name: bazarr-db-app
              key: username
        POSTGRES_PASSWORD:
          valueFrom:
            secretKeyRef:
              name: bazarr-db-app
              key: password
        POSTGRES_DATABASE:
          valueFrom:
            secretKeyRef:
              name: bazarr-db-app
              key: dbname
      probes:
        liveness: &probes
          enabled: true
          custom: true
          spec:
            httpGet:
              path: /health
              port: 6767
        readiness: *probes
      resources:
        requests:
          cpu: 100m
          memory: 100Mi
        limits:
          memory: 4Gi
      persistence:
        config:
          existingClaim: bazarr
        media:
          type: nfs
          server: nfs.clerici.tech
          path: /media
          globalMounts:
            - path: /allMedia
