---
# yaml-language-server: $schema=https://k8s-versioned-schemas.pages.dev/flux/2.9.3/helmrelease_v2.json?values=gatus-sidecar/0.3.6
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: drm-exporter
spec:
  interval: 1h
  maxHistory: 1
  chartRef:
    kind: OCIRepository
    name: drm-exporter
  install:
    timeout: 2m
    remediation:
      retries: 1
  upgrade:
    timeout: 2m
    remediation:
      retries: 1
  values:
    affinity:
      nodeAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          nodeSelectorTerms:
            - matchExpressions:
                - key: intel.feature.node.kubernetes.io/gpu
                  operator: In
                  values:
                    - "true"
                - key: kubernetes.io/hostname
                  operator: NotIn
                  values:
                    - belt
    dra:
      enabled: true
      deviceClassName: gpu.intel.com
    monitoring:
      serviceMonitor:
        enabled: true
      dashboards:
        enabled: true
        grafanaOperator:
          enabled: true
          matchLabels:
            grafana.internal/instance: grafana
    resources:
      requests:
        cpu: 10m
      limits:
        memory: 128Mi
