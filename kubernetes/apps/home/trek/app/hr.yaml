---
# yaml-language-server: $schema=https://k8s-versioned-schemas.pages.dev/flux/2.9.0/helmrelease_v2.json?values=app-template/5.0.1
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: trek
spec:
  interval: 1h
  maxHistory: 1
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  install:
    timeout: 2m
  upgrade:
    timeout: 2m
  values:
    controllers:
      trek:
        pod:
          hostUsers: false
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
            fsGroup: 1000
            fsGroupChangePolicy: OnRootMismatch
            runAsNonRoot: true
            seccompProfile: {type: RuntimeDefault}
        containers:
          trek:
            image:
              repository: mirror.gcr.io/mauriceboe/trek
              tag: 3.2.0@sha256:e5588fcc6dad04c6b95c8a4690d3ea2415af292462fe0653560066974664ad6f
            args:
              - sh
              - -c
              - cd /app/server && exec node --require tsconfig-paths/register dist/index.js
            env:
              ALLOW_INTERNAL_NETWORK: true
              LOG_LEVEL: debug
              APP_URL: https://trek.clerici.tech
              ALLOWED_ORIGINS: https://trek.clerici.tech
              TRUST_PROXY: true
              ADMIN_EMAIL: anthony@clerici.me
              ADMIN_PASSWORD:
                secretKeyRef:
                  name: trek
                  key: ADMIN_PASSWORD
              ENCRYPTION_KEY:
                secretKeyRef:
                  name: trek
                  key: ENCRYPTION_KEY
              OIDC_ONLY: true
              OIDC_ADMIN_CLAIM: groups
              OIDC_ADMIN_VALUE: admin
              OIDC_SCOPE: openid email profile groups
              OIDC_DISPLAY_NAME: Pocket ID
              OIDC_ISSUER:
                secretKeyRef:
                  name: trek-oidc-credentials
                  key: issuer_url
              OIDC_CLIENT_ID:
                secretKeyRef:
                  name: trek-oidc-credentials
                  key: client_id
              OIDC_CLIENT_SECRET:
                secretKeyRef:
                  name: trek-oidc-credentials
                  key: client_secret
              SMTP_HOST: smtp-relay.smtp-relay
              SMTP_PORT: 25
              SMTP_FROM: TREK <bot@clerici.tech>
            probes:
              readiness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    port: &port 3000
                    path: /api/health
              liveness: *probes
            resources:
              requests:
                cpu: 12m
                memory: 128M
              limits:
                memory: 512M
            securityContext:
              runAsNonRoot: true
              allowPrivilegeEscalation: false
              seccompProfile: {type: RuntimeDefault}
              capabilities: {drop: ["ALL"]}
    service:
      trek:
        controller: trek
        ports:
          http:
            port: *port
    route:
      trek:
        hostnames:
          - trek.clerici.tech
        parentRefs:
          - name: external
            namespace: kgateway
    persistence:
      data:
        existingClaim: trek
        globalMounts:
          - path: /app/data
            subPath: data
          - path: /app/uploads
            subPath: uploads
  dependsOn:
    - name: trek-resources
