---
# yaml-language-server: $schema=https://k8s-versioned-schemas.pages.dev/flux/2.8.8/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: trek
  namespace: trek
spec:
  interval: 1h
  maxHistory: 1
  chart:
    spec:
      chart: ./kubernetes/apps/home/trek/chart
      sourceRef:
        kind: GitRepository
        name: flux-system
        namespace: flux-system
  install:
    timeout: 5m
    remediation:
      retries: 1
  upgrade:
    timeout: 5m
    remediation:
      retries: 1
  values:
    base:
      externalSecret:
        enabled: true
      volsync:
        enabled: true
        flavor: block
      pocketid:
        enabled: true
        pkceEnabled: false
        launchUrl: https://trek.clerici.tech
        allowedUserGroups:
          - name: fam
            namespace: home-infra
      controllers:
        trek:
          pod:
            hostUsers: false
            securityContext:
              runAsUser: 1000
              runAsGroup: 1000
              fsGroup: 1000
              fsGroupChangePolicy: OnRootMismatch
              runAsNonRoot: true
              seccompProfile: {type: RuntimeDefault}
          containers:
            trek:
              image:
                repository: mirror.gcr.io/mauriceboe/trek
                tag: 3.0.22@sha256:c6cfd1ee6f32b1ac6ca580c6ed4060d7108c5fa7ba4d26a3954647574568ccce
              args:
                - "node"
                - "--import"
                - "tsx"
                - "src/index.ts"
              env:
                ALLOW_INTERNAL_NETWORK: true
                LOG_LEVEL: debug
                APP_URL: https://trek.clerici.tech
                ALLOWED_ORIGINS: https://trek.clerici.tech
                TRUST_PROXY: true
                ADMIN_EMAIL: ${EMAIL}
                ADMIN_PASSWORD:
                  secretKeyRef:
                    name: trek
                    key: ADMIN_PASSWORD
                ENCRYPTION_KEY:
                  secretKeyRef:
                    name: trek
                    key: ENCRYPTION_KEY

                OIDC_ONLY: true
                OIDC_ADMIN_CLAIM: groups
                OIDC_ADMIN_VALUE: admin
                OIDC_SCOPE: openid email profile groups
                OIDC_DISPLAY_NAME: Pocket ID
                OIDC_ISSUER:
                  secretKeyRef:
                    name: trek-oidc-credentials
                    key: issuer_url
                OIDC_CLIENT_ID:
                  secretKeyRef:
                    name: trek-oidc-credentials
                    key: client_id
                OIDC_CLIENT_SECRET:
                  secretKeyRef:
                    name: trek-oidc-credentials
                    key: client_secret

                SMTP_HOST: smtp-relay.smtp-relay
                SMTP_PORT: 25
                SMTP_FROM: TREK <bot@clerici.tech>
              probes:
                readiness: &probes
                  enabled: true
                  custom: true
                  spec:
                    httpGet:
                      port: &port 3000
                      path: /api/health
                liveness: *probes
              resources:
                requests:
                  cpu: 12m
                  memory: 128M
                limits:
                  memory: 512M
              securityContext:
                runAsNonRoot: true
                allowPrivilegeEscalation: false
                seccompProfile: {type: RuntimeDefault}
                capabilities: {drop: ["ALL"]}
      service:
        trek:
          controller: trek
          ports:
            http:
              port: *port
      route:
        trek:
          hostnames:
            - trek.clerici.tech
          parentRefs:
            - name: external
              namespace: kgateway
              sectionName: https
      persistence:
        data:
          existingClaim: trek
          globalMounts:
            - path: /app/data
              subPath: data
            - path: /app/uploads
              subPath: uploads
