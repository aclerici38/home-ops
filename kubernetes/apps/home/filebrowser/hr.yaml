---
# yaml-language-server: $schema=https://k8s-versioned-schemas.pages.dev/flux/2.8.8/helmrelease_v2.json
# yaml-language-server: $schema=https://k8s-versioned-schemas.pages.dev/flux/2.8.8/helmrelease_v2.json?values=app-template/5.0.1
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: filebrowser
  namespace: filebrowser
spec:
  interval: 1h
  maxHistory: 1
  install:
    timeout: 2m
    remediation:
      retries: 1
  upgrade:
    timeout: 2m
    remediation:
      retries: 1
  values:
    base:
      controllers:
        filebrowser:
          pod:
            securityContext:
              runAsNonRoot: true
              runAsUser: 1000
              runAsGroup: 1000
              fsGroup: 1000
              fsGroupChangePolicy: OnRootMismatch
              seccompProfile: {type: RuntimeDefault}
          containers:
            main:
              image:
                repository: ghcr.io/gtsteffaniak/filebrowser
                tag: 1.3.3-stable@sha256:eb3733681db8757412632c61a99ad656f0d94ed6781bb2ea114b4d70babab78c
              env:
                FILEBROWSER_DISABLE_AUTOMATIC_BACKUP: true
                FILEBROWSER_OIDC_CLIENT_ID:
                  secretKeyRef:
                    name: filebrowser-oidc-credentials
                    key: client_id
                FILEBROWSER_OIDC_CLIENT_SECRET:
                  secretKeyRef:
                    name: filebrowser-oidc-credentials
                    key: client_secret
              probes:
                liveness: &probes
                  enabled: true
                  custom: true
                  spec:
                    httpGet:
                      path: /health
                      port: &port 8080
                readiness: *probes
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities: {drop: ["ALL"]}
              resources:
                requests:
                  cpu: 100m
                  memory: 100Mi
                limits:
                  memory: 6Gi
      service:
        main:
          controller: filebrowser
          ports:
            http:
              port: *port
      route:
        main:
          hostnames:
            - filebrowser.clerici.tech
          parentRefs:
            - name: internal
              namespace: kgateway
              sectionName: https
      persistence:
        database:
          existingClaim: filebrowser
          globalMounts:
            - path: /home/filebrowser/database
        tmpfs:
          type: emptyDir
          globalMounts:
            - path: /tmp
        config:
          type: configMap
          name: filebrowser
          globalMounts:
            - path: /home/filebrowser/data/config.yaml
              subPath: config.yaml
        media:
          type: nfs
          server: nfs.clerici.tech
          path: /media
          globalMounts:
            - path: /mnt/media
      configMaps:
        config:
          data:
            config.yaml: |-
              server:
                disableUpdateCheck: true
                port: 8080
                externalUrl: https://filebrowser.clerici.tech
                internalUrl: http://filebrowser.tools.svc.cluster.local:8080
                cacheDir: /tmp
                database: /home/filebrowser/database/filebrowser.db
                sources:
                  - name: Media
                    path: /mnt/media
              auth:
                methods:
                  noauth: false
                  password:
                    enabled: false
                  oidc:
                    enabled: true
                    issuerUrl: https://id.clerici.tech
                    scopes: "email openid profile groups"
                    adminGroup: admin
                    createUser: true
      volsync:
        enabled: true
      pocketid:
        enabled: true
        pkceEnabled: false
        launchUrl: https://filebrowser.clerici.tech
  chart:
    spec:
      chart: ./kubernetes/apps/home/filebrowser/chart
      sourceRef:
        kind: GitRepository
        name: flux-system
        namespace: flux-system
