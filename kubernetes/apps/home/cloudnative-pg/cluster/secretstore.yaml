---
# Lets app-namespace ExternalSecrets read the generated CNPG role passwords out
# of the cloudnative-pg namespace (the single source of truth that the
# DatabaseRole.passwordSecret also references), so the same password lands in
# both namespaces without regenerating it.
# yaml-language-server: $schema=https://k8s-versioned-schemas.pages.dev/external-secrets/2.8.0/clustersecretstore_v1.json
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: cnpg-role-secrets
spec:
  provider:
    kubernetes:
      remoteNamespace: cloudnative-pg
      server:
        caProvider:
          type: ConfigMap
          name: kube-root-ca.crt
          namespace: cloudnative-pg
          key: ca.crt
      auth:
        serviceAccount:
          name: cnpg-secret-reader
          namespace: cloudnative-pg
---
# yaml-language-server: $schema=https://raw.githubusercontent.com/yannh/kubernetes-json-schema/master/v1.36.2-standalone-strict/serviceaccount-v1.json
apiVersion: v1
kind: ServiceAccount
metadata:
  name: cnpg-secret-reader
  namespace: cloudnative-pg
---
# The identity ESO assumes to read the role secrets.
# yaml-language-server: $schema=https://raw.githubusercontent.com/yannh/kubernetes-json-schema/master/v1.36.2-standalone-strict/role-rbac-v1.json
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: cnpg-secret-reader
  namespace: cloudnative-pg
rules:
  - apiGroups:
      - ""
    resources:
      - secrets
    verbs:
      - get
      - list
      - watch
---
# yaml-language-server: $schema=https://raw.githubusercontent.com/yannh/kubernetes-json-schema/master/v1.36.2-standalone-strict/rolebinding-rbac-v1.json
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: cnpg-secret-reader
  namespace: cloudnative-pg
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: cnpg-secret-reader
subjects:
  - kind: ServiceAccount
    name: cnpg-secret-reader
    namespace: cloudnative-pg
---
# yaml-language-server: $schema=https://raw.githubusercontent.com/yannh/kubernetes-json-schema/master/v1.36.2-standalone-strict/role-rbac-v1.json
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: cnpg-secret-reader-token
  namespace: cloudnative-pg
rules:
  - apiGroups:
      - ""
    resources:
      - serviceaccounts/token
    resourceNames:
      - cnpg-secret-reader
    verbs:
      - create
---
# yaml-language-server: $schema=https://raw.githubusercontent.com/yannh/kubernetes-json-schema/master/v1.36.2-standalone-strict/rolebinding-rbac-v1.json
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: cnpg-secret-reader-token
  namespace: cloudnative-pg
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: cnpg-secret-reader-token
subjects:
  - kind: ServiceAccount
    name: external-secrets
    namespace: external-secrets
