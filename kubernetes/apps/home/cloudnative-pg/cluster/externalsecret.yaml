---
# yaml-language-server: $schema=https://k8s-versioned-schemas.pages.dev/external-secrets/2.7.0/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: cloudnative-pg
  labels:
    dormammu.internal/component: cnpg
spec:
  refreshInterval: "1m"
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  data:
    - secretKey: versity-access-key-id
      remoteRef:
        key: versity
        property: username
    - secretKey: versity-secret-access-key
      remoteRef:
        key: versity
        property: password
  dataFrom:
    - extract:
        key: cloudnative-pg
