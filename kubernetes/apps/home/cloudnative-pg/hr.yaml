---
# yaml-language-server: $schema=https://k8s-versioned-schemas.pages.dev/flux/2.8.8/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cloudnative-pg
  namespace: cloudnative-pg
spec:
  interval: 1h
  chart:
    spec:
      chart: ./kubernetes/apps/home/cloudnative-pg/chart
      sourceRef:
        kind: GitRepository
        name: flux-system
        namespace: flux-system
  install:
    timeout: 5m
    remediation:
      retries: 1
  upgrade:
    timeout: 5m
    remediation:
      retries: 1
  values:
    base:
      app-template:
        enabled: false
      # Versity S3 creds for plugin-barman-cloud — distributed to any namespace
      # labeled with dormammu.io/cnpg-cluster=true so CNPG ObjectStore objects can
      # reference the `cloudnative-pg` secret.
      externalSecret:
        enabled: true
        name: cloudnative-pg
        namespaceSelectors:
          - matchLabels:
              dormammu.io/cnpg-cluster: "true"
        data:
          - secretKey: versity-access-key-id
            remoteRef:
              key: versity
              property: username
          - secretKey: versity-secret-access-key
            remoteRef:
              key: versity
              property: password
      createNamespace: false
    cloudnative-pg:
      crds:
        create: true
      replicaCount: 2
      monitoring:
        podMonitorEnabled: true
        grafanaDashboard:
          create: true
