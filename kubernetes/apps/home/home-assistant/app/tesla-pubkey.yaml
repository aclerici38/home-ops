---
# Expose Tesla Fleet API public key for oauth
---
# yaml-language-server: $schema=https://k8s-versioned-schemas.pages.dev/kgateway/2.3.5/directresponse_v1alpha1.json
apiVersion: gateway.kgateway.dev/v1alpha1
kind: DirectResponse
metadata:
  name: tesla-pubkey
spec:
  status: 200
  body: |
    -----BEGIN PUBLIC KEY-----
    MFkwEwYHKoZIzj0CAQYIKoZIzj0DAQcDQgAEffMfD1y6NlM81/x2I544iMsSavTO
    vJhjUoPOK+Kxnwa/BQAcZIZnm2q1t3WP2e30c4R2jNuOqvglRci5D68o3A==
    -----END PUBLIC KEY-----
---
# yaml-language-server: $schema=https://k8s-versioned-schemas.pages.dev/gateway-api/1.5.1/httproute_v1.json
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: tesla-pubkey
spec:
  hostnames:
    - tesla.clerici.tech
  parentRefs:
    - name: external
      namespace: kgateway
      sectionName: https
  rules:
    - matches:
        - path:
            type: Exact
            value: /.well-known/appspecific/com.tesla.3p.public-key.pem
      filters:
        - type: ExtensionRef
          extensionRef:
            group: gateway.kgateway.dev
            kind: DirectResponse
            name: tesla-pubkey
