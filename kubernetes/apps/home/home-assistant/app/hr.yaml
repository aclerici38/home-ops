---
# yaml-language-server: $schema=https://k8s-versioned-schemas.pages.dev/flux/2.8.8/helmrelease_v2.json?values=app-template/5.0.1
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: home-assistant
spec:
  interval: 1h
  maxHistory: 1
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  install:
    timeout: 2m
    remediation:
      retries: 1
  upgrade:
    timeout: 2m
    remediation:
      retries: 1
  values:
    controllers:
      home-assistant:
        pod:
          nodeSelector:
            network.dormammu/multus: "true"
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
            fsGroup: 1000
            fsGroupChangePolicy: OnRootMismatch
            runAsNonRoot: true
            seccompProfile: {type: RuntimeDefault}
          hostname: home-assistant
          annotations:
            k8s.v1.cni.cncf.io/networks: |
              [
                {
                  "name":"house",
                  "namespace": "multus",
                  "interface": "house",
                  "ips": ["10.0.20.25/24"],
                  "mac": "64:16:7F:E9:23:A5"
                },
                {
                  "name":"cottage",
                  "namespace": "multus",
                  "interface": "cottage",
                  "ips": ["10.0.40.25/24"],
                  "mac": "64:16:7F:41:52:65"
                },
                {
                  "name":"iot",
                  "namespace": "multus",
                  "interface": "iot",
                  "ips": ["10.0.80.25/24"],
                  "mac": "64:16:7F:13:97:2A"
                }
              ]
        containers:
          home-assistant:
            image:
              repository: ghcr.io/home-operations/home-assistant
              tag: 2026.6.4@sha256:4d510e8826491e17049ede51d8c89afba28791e7bf7ba72ab8411e66e02255e6
            env:
              VENV_FOLDER: /venv
              DBUS_SYSTEM_BUS_ADDRESS: "unix:path=/tmp/dbus-stub"
            resources:
              requests:
                cpu: 47m
              limits:
                memory: 2Gi
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: {drop: [ALL]}
    service:
      home-assistant:
        controller: home-assistant
        ports:
          http:
            port: &port 8123
    route:
      home-assistant:
        annotations:
          towonel.io/tunnel-ref: towonel-operator/${CLUSTER_NAME}-k8s
          towonel.io/agent-ref: ${CLUSTER_NAME}
        hostnames:
          - hass.clerici.tech
        parentRefs:
          - name: external
            namespace: kgateway
    persistence:
      config:
        existingClaim: home-assistant
      hass-cache:
        existingClaim: hass-cache
        globalMounts:
          - path: /venv
      tmpfs:
        type: emptyDir
        globalMounts:
          # Because of https://github.com/home-assistant/core/blob/0d66d298ec57b8e50379cc2ec31cbebf771705c3/homeassistant/util/package.py#L29
          - path: /.dockerenv
            subPath: dockerenv
          - path: /config/logs
            subPath: logs
          - path: /config/tts
            subPath: tts
          - path: /tmp
            subPath: tmp
  dependsOn:
    - name: home-assistant-resources
