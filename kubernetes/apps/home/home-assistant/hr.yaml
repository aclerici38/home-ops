---
# yaml-language-server: $schema=https://k8s-versioned-schemas.pages.dev/flux/2.8.8/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: home-assistant
  namespace: home-assistant
spec:
  interval: 1h
  maxHistory: 1
  chart:
    spec:
      chart: ./kubernetes/apps/home/home-assistant/chart
      sourceRef:
        kind: GitRepository
        name: flux-system
        namespace: flux-system
  install:
    timeout: 5m
    remediation:
      retries: 1
  upgrade:
    timeout: 5m
    remediation:
      retries: 1
  values:
    base:
      volsync:
        enabled: true
        flavor: cephfs
        capacity: 25Gi
      controllers:
        home-assistant:
          pod:
            nodeSelector:
              network.dormammu/multus: "true"
            securityContext:
              runAsUser: 1000
              runAsGroup: 1000
              fsGroup: 1000
              fsGroupChangePolicy: OnRootMismatch
              runAsNonRoot: true
              seccompProfile: {type: RuntimeDefault}
            hostname: home-assistant
            annotations:
              k8s.v1.cni.cncf.io/networks: |
                [
                  {
                    "name":"house",
                    "namespace": "network",
                    "ips": ["10.0.20.25/24"],
                    "mac": "64:16:7F:E9:23:A5"
                  },
                  {
                    "name":"cottage",
                    "namespace": "network",
                    "ips": ["10.0.40.25/24"],
                    "mac": "64:16:7F:41:52:65"
                  },
                  {
                    "name":"iot",
                    "namespace": "network",
                    "ips": ["10.0.80.25/24"],
                    "mac": "64:16:7F:13:97:2A"
                  }
                ]
          containers:
            main:
              image:
                repository: ghcr.io/home-operations/home-assistant
                tag: 2026.5.4@sha256:42d1bc5e99ed0ae8f49b72b8994e25e1a6b0f1467ba26c1b959f54ca42541ffd
              env:
                VENV_FOLDER: /venv
                DBUS_SYSTEM_BUS_ADDRESS: "unix:path=/tmp/dbus-stub"
              resources:
                requests:
                  cpu: 47m
                limits:
                  memory: 2Gi
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities: {drop: [ALL]}
      service:
        main:
          controller: home-assistant
          ports:
            http:
              port: &port 8123
      route:
        main:
          hostnames:
            - hass.clerici.tech
          parentRefs:
            - name: external
              namespace: kgateway
              sectionName: https
      persistence:
        config:
          existingClaim: home-assistant
        hass-cache:
          existingClaim: hass-cache
          globalMounts:
            - path: /venv
        tmpfs:
          type: emptyDir
          globalMounts:
            # Because of https://github.com/home-assistant/core/blob/0d66d298ec57b8e50379cc2ec31cbebf771705c3/homeassistant/util/package.py#L29
            - path: /.dockerenv
              subPath: dockerenv
            - path: /config/logs
              subPath: logs
            - path: /config/tts
              subPath: tts
            - path: /tmp
              subPath: tmp
