---
# yaml-language-server: $schema=https://k8s-versioned-schemas.pages.dev/flux/2.9.1/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: open-webui-resources
spec:
  interval: 1h
  chart:
    spec:
      chart: kubernetes/charts/resource-bundle
      sourceRef:
        kind: GitRepository
        name: flux-system
        namespace: flux-system
  install:
    timeout: 5m
  upgrade:
    timeout: 5m
  dependsOn:
    - name: cloudnative-pg
      namespace: cloudnative-pg
    - name: external-secrets
      namespace: external-secrets
    - name: pocket-id-operator
      namespace: pocket-id-operator
    - name: volsync
      namespace: volsync
  values:
    cnpg:
      mode: shared
      pgExtensions:
        - pgvector
      dbExtensions:
        - {name: vector, ensure: present}
    externalSecret:
      data:
        - secretKey: EMAIL
          remoteRef:
            key: cluster-secrets
            property: EMAIL
    pocketId:
      group: fam
    volsync:
      cephfs: true
      restoreFrom: tools
      capacity: 25Gi
