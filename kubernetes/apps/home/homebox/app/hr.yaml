---
# yaml-language-server: $schema=https://k8s-versioned-schemas.pages.dev/flux/2.8.8/helmrelease_v2.json?values=app-template/5.0.1
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: homebox
spec:
  interval: 1h
  maxHistory: 1
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  install:
    timeout: 2m
  upgrade:
    timeout: 2m
  values:
    controllers:
      homebox:
        pod:
          hostUsers: false
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
            fsGroup: 1000
            fsGroupChangePolicy: OnRootMismatch
            runAsNonRoot: true
            seccompProfile: {type: RuntimeDefault}
        containers:
          homebox:
            image:
              repository: ghcr.io/sysadminsmedia/homebox
              tag: 0.26.2-rootless@sha256:a41a3081ac724a2f4955b71b9294bd916b0e92035e4ea8438e84def74f4ae692
            env:
              HBOX_OPTIONS_GITHUB_RELEASE_CHECK: false
              HBOX_OPTIONS_ALLOW_LOCAL_LOGIN: false
              HBOX_OPTIONS_TRUST_PROXY: true
              HBOX_OPTIONS_HOSTNAME: homebox.clerici.tech
              HBOX_MAILER_HOST: smtp-relay.smtp-relay
              HBOX_MAILER_PORT: 25
              HBOX_DATABASE_DRIVER: postgres
              HBOX_DATABASE_HOST:
                secretKeyRef:
                  name: homebox-db-app
                  key: host
              HBOX_DATABASE_USERNAME:
                secretKeyRef:
                  name: homebox-db-app
                  key: user
              HBOX_DATABASE_PASSWORD:
                secretKeyRef:
                  name: homebox-db-app
                  key: password
              HBOX_DATABASE_DATABASE:
                secretKeyRef:
                  name: homebox-db-app
                  key: dbname
              HBOX_DATABASE_PORT:
                secretKeyRef:
                  name: homebox-db-app
                  key: port
              HBOX_OIDC_ENABLED: true
              HBOX_OIDC_ISSUER_URL:
                secretKeyRef:
                  name: homebox-oidc-credentials
                  key: issuer_url
              HBOX_OIDC_CLIENT_ID:
                secretKeyRef:
                  name: homebox-oidc-credentials
                  key: client_id
              HBOX_OIDC_CLIENT_SECRET:
                secretKeyRef:
                  name: homebox-oidc-credentials
                  key: client_secret
            probes:
              readiness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    port: &port 7745
                    path: /api/v1/status
              liveness: *probes
            resources:
              requests:
                cpu: 12m
                memory: 128M
              limits:
                memory: 512M
            securityContext:
              allowPrivilegeEscalation: false
              seccompProfile: {type: RuntimeDefault}
              capabilities: {drop: ["ALL"]}
    service:
      homebox:
        controller: homebox
        ports:
          http:
            port: *port
    route:
      homebox:
        annotations:
          towonel.io/tunnel: enable
          towonel.io/tunnel-ref: towonel-operator/${CLUSTER_NAME}-k8s
          towonel.io/agent-ref: ${CLUSTER_NAME}
        hostnames:
          - homebox.clerici.tech
        parentRefs:
          - name: external
            namespace: kgateway
    persistence:
      data:
        existingClaim: homebox
  dependsOn:
    - name: homebox-resources
