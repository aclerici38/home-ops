---
# yaml-language-server: $schema=https://k8s-versioned-schemas.pages.dev/flux/2.8.8/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: homebox
  namespace: homebox
spec:
  interval: 1h
  maxHistory: 1
  chart:
    spec:
      chart: ./kubernetes/apps/home/homebox/chart
      sourceRef:
        kind: GitRepository
        name: flux-system
        namespace: flux-system
  install:
    timeout: 5m
    remediation:
      retries: 1
  upgrade:
    timeout: 5m
    remediation:
      retries: 1
  values:
    base:
      cnpg:
        enabled: true
        mode: init
        pooler:
          poolMode: session
      volsync:
        enabled: true
        flavor: cephfs
        capacity: 25Gi
      pocketid:
        enabled: true
        launchUrl: https://homebox.clerici.tech
        allowedUserGroups:
          - name: fam
            namespace: home-infra
      controllers:
        homebox:
          pod:
            hostUsers: false
            securityContext:
              runAsUser: 1000
              runAsGroup: 1000
              fsGroup: 1000
              fsGroupChangePolicy: OnRootMismatch
              runAsNonRoot: true
              seccompProfile: {type: RuntimeDefault}
          containers:
            homebox:
              image:
                repository: ghcr.io/sysadminsmedia/homebox
                tag: 0.25.0-rootless@sha256:cf105dc0b1b74468b31180f3e64368538af5eae75f6d0a221e77f5218a83795c
              env:
                HBOX_OPTIONS_GITHUB_RELEASE_CHECK: false
                HBOX_OPTIONS_ALLOW_LOCAL_LOGIN: false
                HBOX_OPTIONS_TRUST_PROXY: true
                HBOX_OPTIONS_HOSTNAME: homebox.clerici.tech
                HBOX_MAILER_HOST: smtp-relay.smtp-relay
                HBOX_MAILER_PORT: 25
                HBOX_DATABASE_DRIVER: postgres
                HBOX_DATABASE_HOST:
                  secretKeyRef:
                    name: homebox-db-app
                    key: host
                HBOX_DATABASE_USERNAME:
                  secretKeyRef:
                    name: homebox-db-app
                    key: user
                HBOX_DATABASE_PASSWORD:
                  secretKeyRef:
                    name: homebox-db-app
                    key: password
                HBOX_DATABASE_DATABASE:
                  secretKeyRef:
                    name: homebox-db-app
                    key: dbname
                HBOX_DATABASE_PORT:
                  secretKeyRef:
                    name: homebox-db-app
                    key: port
                HBOX_OIDC_ENABLED: true
                HBOX_OIDC_ISSUER_URL:
                  secretKeyRef:
                    name: homebox-oidc-credentials
                    key: issuer_url
                HBOX_OIDC_CLIENT_ID:
                  secretKeyRef:
                    name: homebox-oidc-credentials
                    key: client_id
                HBOX_OIDC_CLIENT_SECRET:
                  secretKeyRef:
                    name: homebox-oidc-credentials
                    key: client_secret
              probes:
                readiness: &probes
                  enabled: true
                  custom: true
                  spec:
                    httpGet:
                      port: &port 7745
                      path: /api/v1/status
                liveness: *probes
              resources:
                requests:
                  cpu: 12m
                  memory: 128M
                limits:
                  memory: 512M
              securityContext:
                allowPrivilegeEscalation: false
                seccompProfile: {type: RuntimeDefault}
                capabilities: {drop: ["ALL"]}
      service:
        homebox:
          controller: homebox
          ports:
            http:
              port: *port
      route:
        homebox:
          hostnames:
            - homebox.clerici.tech
          parentRefs:
            - name: external
              namespace: kgateway
              sectionName: https
      persistence:
        data:
          existingClaim: homebox
