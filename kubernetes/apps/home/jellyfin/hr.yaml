---
# yaml-language-server: $schema=https://k8s-versioned-schemas.pages.dev/flux/2.8.8/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: jellyfin
  namespace: jellyfin
spec:
  interval: 1h
  chart:
    spec:
      chart: ./kubernetes/apps/home/jellyfin/chart
      sourceRef:
        kind: GitRepository
        name: flux-system
        namespace: flux-system
  install:
    timeout: 5m
    remediation:
      retries: 1
  upgrade:
    timeout: 5m
    remediation:
      retries: 1
  values:
    base:
      gpu:
        enabled: true
      volsync:
        enabled: true
      controllers:
        jellyfin:
          pod:
            resourceClaims:
              - name: gpu
                resourceClaimTemplateName: jellyfin-gpu
          containers:
            main:
              image:
                repository: ghcr.io/jellyfin/jellyfin
                tag: 10.11.10@sha256:6497f0245de93fac642926c065b427362ca5e626e659f690516599c8c3817a38
              probes:
                liveness: &probes
                  enabled: true
                  custom: true
                  spec:
                    httpGet:
                      path: /health
                      port: &port 8096
                    periodSeconds: 5
                    failureThreshold: 20
                    initialDelaySeconds: 10
                readiness: *probes
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities: {drop: ["ALL"]}
              resources:
                requests:
                  cpu: 100m
                  memory: 500Mi
                limits:
                  memory: 16Gi
                claims:
                  - name: gpu
      service:
        main:
          controller: jellyfin
          forceRename: jellyfin
          ports:
            http:
              port: *port
      serviceMonitor:
        main:
          serviceName: jellyfin-main
          endpoints:
            - port: http
      route:
        main:
          hostnames:
            - jellyfin.clerici.tech
            - tv.clerici.tech
          parentRefs:
            - name: external
              namespace: kgateway
              sectionName: https
          rules:
            - backendRefs:
                - identifier: main
                  port: *port
      persistence:
        config:
          existingClaim: jellyfin
          advancedMounts:
            jellyfin:
              main:
                - path: /config
        cache:
          existingClaim: jellyfin-cache
          advancedMounts:
            jellyfin:
              main:
                - path: /config/metadata
        media:
          type: nfs
          server: nfs.clerici.tech
          path: /media
          advancedMounts:
            jellyfin:
              main:
                - path: /allMedia
        tmpfs:
          type: emptyDir
          advancedMounts:
            jellyfin:
              main:
                - path: /cache
                  subPath: cache
                - path: /config/log
                  subPath: log
          globalMounts:
            - path: /tmp
              subPath: tmp
