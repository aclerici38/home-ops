---
# yaml-language-server: $schema=https://k8s-versioned-schemas.pages.dev/flux/2.8.8/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: flaresolverr
  namespace: flaresolverr
spec:
  interval: 1h
  chart:
    spec:
      chart: ./kubernetes/apps/home/flaresolverr/chart
      sourceRef:
        kind: GitRepository
        name: flux-system
        namespace: flux-system
  install:
    timeout: 5m
    remediation:
      retries: 1
  upgrade:
    timeout: 5m
    remediation:
      retries: 1
  values:
    base:
      image:
        repository: ghcr.io/flaresolverr/flaresolverr
        tag: v3.5.0@sha256:139dfee1c6f89249c8d665d1333a42e8ec74ec0a86bc6bb1c8461e10d3a66a47
      ports:
        http: 8191
      probes:
        liveness: &probes
          enabled: true
          custom: true
          spec:
            httpGet:
              path: /health
              port: 8191
        readiness: *probes
      securityContext:
        # TODO: test RO root fs
        readOnlyRootFilesystem: false
      resources:
        requests:
          cpu: 10m
          memory: 150Mi
        limits:
          memory: 2Gi
      persistence:
        tmpfs:
          type: emptyDir
          globalMounts:
            - path: /tmp
              subPath: tmp
            - path: /app/.local
              subPath: local
      createNamespace: false
