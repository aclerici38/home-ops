---
# yaml-language-server: $schema=https://k8s-versioned-schemas.pages.dev/flux/2.9.0/helmrelease_v2.json?values=app-template/5.0.1
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: atuin
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  install:
    timeout: 3m
  upgrade:
    timeout: 3m
  values:
    controllers:
      atuin:
        strategy: RollingUpdate
        pod:
          hostUsers: false
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            fsGroup: 1000
            fsGroupChangePolicy: OnRootMismatch
            seccompProfile: {type: RuntimeDefault}
        containers:
          atuin:
            image:
              repository: ghcr.io/atuinsh/atuin
              tag: 18.16.1@sha256:9d4d79507b51be6d292b218f5cc791d79ca0a72f51ab48f786b091bd6eafb39f
            args:
              - "start"
            env:
              ATUIN_HOST: 0.0.0.0
              ATUIN_PORT: &port 8888
              ATUIN_OPEN_REGISTRATION: true
              ATUIN_TLS__ENABLE: false
              ATUIN_TLS__CERT_PATH: ""
              ATUIN_TLS__PKEY_PATH: ""
              RUST_LOG: info
              ATUIN_DB_URI:
                valueFrom:
                  secretKeyRef:
                    name: atuin-db-app
                    key: uri
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    port: *port
                    path: /healthz
              readiness:
                enabled: true
                type: HTTP
            resources:
              requests:
                cpu: 10m
                memory: 20Mi
              limits:
                memory: 100Mi
            securityContext:
              allowPrivilegeEscalation: false
              seccompProfile: {type: RuntimeDefault}
              capabilities: {drop: ["ALL"]}
    service:
      atuin:
        controller: atuin
        ports:
          http:
            port: *port
    route:
      atuin:
        hostnames:
          - atuin.clerici.tech
        parentRefs:
          - name: internal
            namespace: kgateway
    persistence:
      config:
        type: emptyDir
  dependsOn:
    - name: atuin-resources
