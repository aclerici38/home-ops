---
# yaml-language-server: $schema=https://k8s-versioned-schemas.pages.dev/flux/2.8.8/helmrelease_v2.json?values=app-template/5.0.1
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: searxng
spec:
  interval: 1h
  maxHistory: 1
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  install:
    timeout: 2m
    remediation:
      retries: 1
  upgrade:
    timeout: 2m
    remediation:
      retries: 1
  values:
    controllers:
      searxng:
        pod:
          # hostUsers: false
          securityContext:
            runAsNonRoot: true
            runAsUser: &uid 977 # upstream searxng user
            runAsGroup: *uid
            fsGroup: *uid
            fsGroupChangePolicy: OnRootMismatch
            seccompProfile: {type: RuntimeDefault}
        strategy: RollingUpdate
        containers:
          searxng:
            image:
              repository: ghcr.io/searxng/searxng
              tag: 2026.6.23-e3713717f@sha256:f66b296a6fdfe3f656a19e98ac999a9acffa780773e39b3cbbdf673e9c474deb
            env:
              SEARXNG_BASE_URL: &url https://search.clerici.tech
              SEARXNG_URL: *url
              SEARXNG_PORT: &port 8080
              SEARXNG_VALKEY_URL: redis://searxng-dragonfly-db:6379
              UWSGI_THREADS:
                valueFrom:
                  resourceFieldRef:
                    containerName: searxng
                    resource: limits.cpu
              UWSGI_WORKERS: 1
            envFrom:
              - secretRef:
                  name: searxng
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /healthz
                    port: *port
                  initialDelaySeconds: 1
                  periodSeconds: 10
                  timeoutSeconds: 1
                  failureThreshold: 2
              readiness: *probes
            resources:
              requests:
                cpu: 10m
                memory: 1Gi
              limits:
                memory: 3Gi
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop:
                  - ALL
    service:
      searxng:
        controller: searxng
        ports:
          http:
            port: *port
    route:
      searxng:
        annotations:
          towonel.io/tunnel-ref: towonel-operator/${CLUSTER_NAME}-k8s
          towonel.io/agent-ref: ${CLUSTER_NAME}
        hostnames:
          - search.clerici.tech
        parentRefs:
          - name: external
            namespace: kgateway
    persistence:
      config:
        type: configMap
        name: searxng
        globalMounts:
          - path: /etc/searxng/settings.yml
            subPath: settings.yml
      tmp:
        type: emptyDir
    configMaps:
      config:
        data:
          settings.yml: |-
            use_default_settings: true

            server:
              public_instance: false
              limiter: true
              image_proxy: true
              method: GET # https://github.com/searxng/searxng/pull/3619

            outgoing:
              request_timeout: 1.0

            search:
              autocomplete: google
              favicon_resolver: duckduckgo
              languages:
                - en
                - en-US
              formats:
                - html
                - json

            ui:
              static_use_hash: true
              default_theme: simple
              theme_args:
                simple_style: dark
              infinite_scroll: true
              results_on_new_tab: false

            enabled_plugins:
              - Basic Calculator
              - Hash plugin
              - Hostnames plugin
              - Open Access DOI rewrite
              - Self Informations
              - Tracker URL remover
              - Unit converter plugin

            hostnames:
              high_priority:
                - (.*)\/blog\/(.*)
                - (.*\.)?wikipedia.org$
                - (.*\.)?github.com$
                - (.*\.)?reddit.com$
                - (.*\.)?docker.com$
                - (.*\.)?archlinux.org$
                - (.*\.)?stackoverflow.com$
                - (.*\.)?askubuntu.com$
                - (.*\.)?superuser.com$
  dependsOn:
    - name: searxng-resources
