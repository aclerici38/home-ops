---
# yaml-language-server: $schema=https://k8s-versioned-schemas.pages.dev/flux/2.9.3/helmrelease_v2.json?values=app-template/5.0.1
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: collabora
spec:
  interval: 1h
  maxHistory: 1
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  install:
    timeout: 2m
    remediation:
      retries: 1
  upgrade:
    timeout: 2m
    remediation:
      retries: 1
  dependsOn:
    - name: collabora-resources
  values:
    controllers:
      collabora:
        forceRename: collabora
        strategy: RollingUpdate
        pod:
          hostUsers: false
          securityContext:
            # upstream 'cool' user
            runAsUser: 1001
            runAsGroup: 1001
            seccompProfile:
              type: Unconfined
        containers:
          collabora:
            image:
              repository: mirror.gcr.io/collabora/code
              tag: 26.04.2.4.1@sha256:1f864ce3f0c49e867787b6dd303bd6ba989542d3023f6809df558eafd04c1b97
            env:
              aliasgroup1: http://opencloud-wopi:9300
              DONT_GEN_SSL_CERT: "YES"
              extra_params: |
                --o:ssl.enable=false \
                --o:ssl.ssl_verification=false \
                --o:ssl.termination=true \
                --o:welcome.enable=false \
                --o:net.frame_ancestors=cloud.clerici.tech
              username:
                secretKeyRef:
                  name: collabora
                  key: COLLABORA_ADMIN_USER
              password:
                secretKeyRef:
                  name: collabora
                  key: COLLABORA_ADMIN_PASS
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                add:
                  - MKNOD
                drop:
                  - ALL
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    port: 9980
                    path: /hosting/discovery
              readiness: *probes
    defaultPodOptionsStrategy: merge
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile: {type: RuntimeDefault}
    service:
      collabora:
        forceRename: collabora
        controller: collabora
        ports:
          http:
            port: 9980
    route:
      collabora:
        hostnames:
          - collabora.clerici.tech
        parentRefs:
          - name: external
            namespace: kgateway
    persistence:
      tmpfs:
        type: emptyDir
        globalMounts:
          - path: /tmp
            subPath: tmp
          - path: /opt/cool/cache
            subPath: cache
          - path: /opt/cool/child-roots
            subPath: roots
