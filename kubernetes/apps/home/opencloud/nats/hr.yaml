---
# yaml-language-server: $schema=https://k8s-versioned-schemas.pages.dev/flux/2.9.3/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: nats-opencloud
spec:
  interval: 1h
  maxHistory: 1
  chart:
    spec:
      chart: nats
      sourceRef:
        kind: HelmRepository
        name: nats
      version: 2.14.2
  install:
    timeout: 2m
  upgrade:
    timeout: 2m
  values:
    global:
      image:
        registry: mirror.gcr.io
    config:
      cluster:
        enabled: true
        replicas: 3
        merge:
          name: opencloud-cluster
      jetstream:
        enabled: true
        fileStore:
          pvc:
            size: &pvc 10Gi
            storageClassName: ceph-filesystem
          maxSize: *pvc
        memoryStore:
          enabled: true
          maxSize: &mem 256Mi
    natsBox:
      enabled: false
    container:
      env:
        # Should be ~80% of memory limit
        GOMEMLIMIT: 410MiB
      merge:
        securityContext: &sec
          allowPrivilegeEscalation: false
          capabilities:
            drop:
              - ALL
          privileged: false
          readOnlyRootFilesystem: true
        resources:
          requests:
            cpu: 200m
            memory: 512Mi
          limits:
            memory: 512Mi
    reloader:
      merge:
        securityContext: *sec
    promExporter:
      enabled: true
      merge:
        securityContext: *sec
        resources:
          requests:
            cpu: 10m
            memory: 32Mi
          limits:
            memory: 64Mi
      podMonitor:
        enabled: true
        merge:
          spec:
            podMetricsEndpoints:
              - port: prom-metrics
                metricRelabelings:
                  - sourceLabels:
                      - "__name__"
                      - "stream_name"
                    regex: "nats_consumer_.*;KV_.*"
                    action: drop
                  - sourceLabels:
                      - "__name__"
                      - "consumer_name"
                    regex: "nats_consumer_.*;sse-.*"
                    action: drop
    serviceAccount:
      enabled: true
    podTemplate:
      topologySpreadConstraints:
        kubernetes.io/hostname:
          maxSkew: 1
          whenUnsatisfiable: DoNotSchedule
      merge:
        spec:
          hostUsers: false
          automountServiceAccountToken: false
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            fsGroup: 1000
            seccompProfile:
              type: RuntimeDefault
