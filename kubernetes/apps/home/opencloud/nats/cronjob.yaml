---
# yaml-language-server: $schema=https://raw.githubusercontent.com/yannh/kubernetes-json-schema/master/v1.36.2-standalone-strict/cronjob-batch-v1.json
apiVersion: batch/v1
kind: CronJob
metadata:
  name: nats-opencloud-stream-replicas
spec:
  # opencloud creates its JetStream streams/KVs at R=1
  schedule: "*/15 * * * *"
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 1
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      backoffLimit: 0
      activeDeadlineSeconds: 120
      template:
        spec:
          restartPolicy: Never
          automountServiceAccountToken: false
          hostUsers: false
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: stream-replicas
              image: mirror.gcr.io/natsio/nats-box:0.19.7-nonroot@sha256:e86b9681f330ab1aa45744dd5cb367d44205b28fac2519a2f74ca0255803161a
              env:
                - name: HOME
                  value: /tmp
                - name: XDG_CONFIG_HOME
                  value: /tmp
                - name: XDG_DATA_HOME
                  value: /tmp
                - name: NATS_URL
                  value: nats://nats-opencloud.opencloud.svc.cluster.local:4222
              command:
                - "sh"
                - "-c"
              args:
                - |
                  set -u
                  # Bump every stream/KV to R=3. opencloud creates them at R=1.
                  streams=$(nats stream ls -n) || exit 1
                  test -n "$streams" || { echo "no streams returned"; exit 1; }

                  rc=0
                  for s in $streams; do
                    echo "=== $s"
                    nats stream edit "$s" --replicas 3 -f || rc=1
                  done
                  exit $rc
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities:
                  drop:
                    - ALL
              resources:
                requests:
                  cpu: 10m
                  memory: 32Mi
                limits:
                  memory: 64Mi
              volumeMounts:
                - name: tmp
                  mountPath: /tmp
          volumes:
            - name: tmp
              emptyDir: {}
