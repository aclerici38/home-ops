---
# yaml-language-server: $schema=https://k8s-versioned-schemas.pages.dev/external-secrets/2.5.0/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ .Release.Name }}
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: {{ .Release.Name }}
  dataFrom:
    - extract:
        key: {{ .Release.Name }}
  data:
    - secretKey: DECOMPOSEDS3_ACCESS_KEY
      remoteRef:
        key: versity
        property: username
    - secretKey: DECOMPOSEDS3_SECRET_KEY
      remoteRef:
        key: versity
        property: password
