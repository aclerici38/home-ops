---
# yaml-language-server: $schema=https://k8s-versioned-schemas.pages.dev/flux/2.9.3/helmrelease_v2.json?values=app-template/5.0.1
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: convertx
spec:
  interval: 1h
  maxHistory: 1
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  install:
    timeout: 5m
    remediation:
      retries: 1
  upgrade:
    timeout: 5m
    remediation:
      retries: 1
  values:
    controllers:
      convertx:
        strategy: RollingUpdate
        pod:
          resourceClaims:
            - name: gpu
              resourceClaimTemplateName: convertx-gpu
          hostUsers: false
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            fsGroup: 1000
            fsGroupChangePolicy: OnRootMismatch
            seccompProfile: {type: RuntimeDefault}
        containers:
          convertx:
            image:
              repository: ghcr.io/c4illin/convertx
              tag: v0.18.0@sha256:b515b04bfd25298a5cdc775b2fcd48b9399bab658ce13e2598b65df1b16098c8
            env:
              ACCOUNT_REGISTRATION: false
              HTTP_ALLOWED: false
              ALLOW_UNAUTHENTICATED: true
              AUTO_DELETE_EVERY_N_HOURS: 1
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    port: &port 3000
                    path: /healthcheck
              readiness: *probes
            resources:
              requests:
                cpu: 100m
                memory: 115Mi
              limits:
                memory: 8Gi
              claims:
                - name: gpu
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop:
                  - ALL
    service:
      convertx:
        controller: convertx
        ports:
          http:
            port: *port
    route:
      convertx:
        hostnames:
          - convertx.clerici.tech
        parentRefs:
          - name: external
            namespace: kgateway
        rules:
          - backendRefs:
              - identifier: convertx
                port: *port
    persistence:
      tmpfs:
        type: emptyDir
        globalMounts:
          - path: /app/data
            subPath: data
          - path: /nonexistent
            subPath: nonexistent
  dependsOn:
    - name: convertx-resources
