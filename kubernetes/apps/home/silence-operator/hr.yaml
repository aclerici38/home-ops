---
# yaml-language-server: $schema=https://k8s-versioned-schemas.pages.dev/flux/2.8.8/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: silence-operator
  namespace: silence-operator
spec:
  interval: 1h
  chart:
    spec:
      chart: ./kubernetes/apps/home/silence-operator/chart
      sourceRef:
        kind: GitRepository
        name: flux-system
        namespace: flux-system
  install:
    timeout: 5m
    remediation:
      retries: 1
  upgrade:
    timeout: 5m
    remediation:
      retries: 1
  values:
    base:
      app-template:
        enabled: false
    silence-operator:
      # FQDN required now that the operator lives outside the observability namespace
      alertmanagerAddress: http://kube-prometheus-stack-alertmanager.observability.svc.cluster.local:9093
      networkPolicy:
        enabled: false
