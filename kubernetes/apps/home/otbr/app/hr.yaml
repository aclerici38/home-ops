---
# yaml-language-server: $schema=https://k8s-versioned-schemas.pages.dev/flux/2.9.2/helmrelease_v2.json?values=app-template/5.0.1
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: otbr
spec:
  interval: 1h
  maxHistory: 1
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  install:
    timeout: 2m
    remediation:
      retries: 1
  upgrade:
    timeout: 2m
    remediation:
      retries: 1
  dependsOn:
    - name: otbr-resources
  values:
    controllers:
      cottage:
        pod:
          annotations:
            k8s.v1.cni.cncf.io/networks: |
              [
                {
                  "name":"cottage",
                  "namespace": "multus",
                  "interface": "backbone",
                  "ips": ["10.0.40.21/24"],
                  "mac": "64:16:7F:9B:69:70"
                }
              ]
        containers:
          otbr: &container
            image:
              repository: ghcr.io/wittdennis/homeassistant-otbr
              tag: 4.1.0@sha256:44f91c0d338caa567259ed53b4d0d9e8971b2954551a21e265364e9f8e07fa17
            lifecycle:
              postStart:
                exec:
                  command:
                    # Set TX power
                    - sh
                    - -c
                    - for i in $(seq 1 60); do ot-ctl txpower 20 >/dev/null 2>&1 && exit 0; sleep 2; done; exit 0
            env: &env
              BACKBONE_IF: backbone
              BAUDRATE: "460800"
              FIREWALL: "1"
              NAT64: "1"
              NETWORK_DEVICE: cottage-slzb-ultima3.iot.internal:7638
              S6_YES_I_WANT_A_WORLD_WRITABLE_RUN_BECAUSE_KUBERNETES: 1
              S6_READ_ONLY_ROOT: 1
            resources:
              requests:
                cpu: 50m
                memory: 64Mi
              limits:
                memory: 128Mi
                devic.es/tun: 1
            probes:
              liveness: &probe
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /node/state
                    port: &port 8081
              readiness: *probe
            securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                drop:
                  - ALL
                add:
                  - NET_ADMIN
                  - NET_RAW
      house:
        pod:
          annotations:
            k8s.v1.cni.cncf.io/networks: |
              [
                {
                  "name":"house",
                  "namespace": "multus",
                  "interface": "backbone",
                  "ips": ["10.0.20.21/24"],
                  "mac": "64:16:7F:61:46:5C"
                }
              ]
        containers:
          otbr:
            <<: *container
            env:
              <<: *env
              NETWORK_DEVICE: house-slzb-ultima3.iot.internal:7638
    defaultPodOptions:
      securityContext:
        sysctls:
          - name: net.ipv6.conf.all.forwarding
            value: "1"
          - name: net.ipv6.conf.backbone.accept_ra
            value: "2"
          - name: net.ipv6.conf.backbone.accept_ra_rt_info_max_plen
            value: "64"
        seccompProfile:
          type: RuntimeDefault
      nodeSelector:
        network.dormammu/multus: "true"
    service:
      cottage:
        controller: cottage
        ports:
          http:
            port: *port
      house:
        controller: house
        ports:
          http:
            port: *port
    persistence:
      data:
        existingClaim: otbr
        advancedMounts:
          cottage:
            otbr:
              - path: /data
                subPath: cottage
          house:
            otbr:
              - path: /data
                subPath: house
      tmpfs:
        type: emptyDir
        globalMounts:
          - path: /run
            subPath: run
