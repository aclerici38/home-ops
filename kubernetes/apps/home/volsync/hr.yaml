---
# yaml-language-server: $schema=https://k8s-versioned-schemas.pages.dev/flux/2.8.8/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: volsync
  namespace: volsync
spec:
  interval: 1h
  chart:
    spec:
      chart: ./kubernetes/apps/home/volsync/chart
      sourceRef:
        kind: GitRepository
        name: flux-system
        namespace: flux-system
  install:
    timeout: 5m
    remediation:
      retries: 1
  upgrade:
    timeout: 5m
    remediation:
      retries: 1
  dependsOn:
    - name: snapshot-controller
      namespace: snapshot-controller
  values:
    base:
      app-template:
        enabled: false
    volsync:
      fullNameOverride: volsync
      image: &image
        repository: ghcr.io/perfectra1n/volsync
        tag: v0.17.11
      kopia: *image
      rclone: *image
      restic: *image
      rsync: *image
      rsync-tls: *image
      syncthing: *image
      replicaCount: 2
      manageCRDs: true
      metrics:
        disableAuth: true
      podSecurityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        seccompProfile: {type: RuntimeDefault}
