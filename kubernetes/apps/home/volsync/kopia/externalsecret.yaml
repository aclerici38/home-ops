---
# Repo credentials for the kopia server + maintenance CRs in this namespace.
# App namespaces get their own copy: chart-managed apps via resource-bundle's
# volsync feature, the static-PV apps via the volsync backup component.
# yaml-language-server: $schema=https://k8s-versioned-schemas.pages.dev/external-secrets/2.8.0/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: volsync-kopia-versity
spec:
  refreshInterval: "1m"
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    template:
      data:
        KOPIA_REPOSITORY: s3://volsync
        AWS_S3_ENDPOINT: http://versitygw.versity.svc.cluster.local:7070
        KOPIA_S3_DISABLE_TLS: "true"
        KOPIA_PASSWORD: "{{ .KOPIA_PASSWORD }}"
        AWS_ACCESS_KEY_ID: "{{ .AWS_ACCESS_KEY_ID }}"
        AWS_SECRET_ACCESS_KEY: "{{ .AWS_SECRET_ACCESS_KEY }}"
  data:
    - secretKey: AWS_ACCESS_KEY_ID
      remoteRef:
        key: versity
        property: username
    - secretKey: AWS_SECRET_ACCESS_KEY
      remoteRef:
        key: versity
        property: password
  dataFrom:
    - extract:
        key: volsync-kopia-versity
---
# yaml-language-server: $schema=https://k8s-versioned-schemas.pages.dev/external-secrets/2.8.0/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: volsync-kopia-backblaze
spec:
  refreshInterval: "1m"
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    template:
      data:
        KOPIA_REPOSITORY: s3://kopia-k8s
        AWS_S3_ENDPOINT: https://s3.us-west-004.backblazeb2.com
        KOPIA_PASSWORD: "{{ .KOPIA_PASSWORD }}"
        AWS_ACCESS_KEY_ID: "{{ .AWS_ACCESS_KEY_ID }}"
        AWS_SECRET_ACCESS_KEY: "{{ .AWS_SECRET_ACCESS_KEY }}"
  dataFrom:
    - extract:
        key: volsync-kopia-backblaze
