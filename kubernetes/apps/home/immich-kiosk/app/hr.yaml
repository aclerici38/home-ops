---
# yaml-language-server: $schema=https://k8s-versioned-schemas.pages.dev/flux/2.9.0/helmrelease_v2.json?values=app-template/5.0.1
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: immich-kiosk
spec:
  interval: 1h
  maxHistory: 1
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  install:
    timeout: 2m
  upgrade:
    timeout: 2m
  values:
    controllers:
      immich-kiosk:
        strategy: RollingUpdate
        pod:
          hostUsers: false
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
            fsGroup: 1000
            fsGroupChangePolicy: OnRootMismatch
            runAsNonRoot: true
            seccompProfile: {type: RuntimeDefault}
        containers:
          immich-kiosk:
            image:
              repository: ghcr.io/damongolding/immich-kiosk
              tag: 0.40.0@sha256:909f3480526bafba3b2fed74ebe3339b37a26d8349409a53a9d7ef2282e55ffc
            env:
              LANG: en_US
              KIOSK_IMMICH_API_KEY:
                secretKeyRef:
                  name: immich-kiosk
                  key: IMMICH_API_KEY
              KIOSK_IMMICH_URL: http://immich-server.immich:2283
              KIOSK_IMMICH_EXTERNAL_URL: https://immich.clerici.tech
              # TV pics
              KIOSK_ALBUMS: d64b33a8-d61d-4468-9403-f7a594ed6bd9
              KIOSK_SHOW_TIME: true
              KIOSK_TIME_FORMAT: 12
              KIOSK_CLOCK_SOURCE: server
              KIOSK_SHOW_DATE: true
              KIOSK_DATE_FORMAT: MM/DD/YY
              KIOSK_SHOW_PROGRESS_BAR: true
              KIOSK_SHOW_USER: true
              KIOSK_SHOW_PERSON_NAME: true
              KIOSK_SHOW_IMAGE_DATE: true
              KIOSK_SHOW_AM_PM: true
              KIOSK_IMAGE_DATE_FORMAT: MM/DD/YYYY
              KIOSK_SHOW_IMAGE_DESCRIPTION: true
              KIOSK_SHOW_IMAGE_LOCATION: true
              KIOSK_BEHIND_PROXY: true
              KIOSK_SHOW_VIDEOS: true
              KIOSK_TRANSITION: fade
            probes:
              readiness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    port: &port 3000
                    path: /health
              liveness: *probes
            resources:
              requests:
                cpu: 250m
                memory: 128M
              limits:
                memory: 512M
            securityContext:
              runAsNonRoot: true
              allowPrivilegeEscalation: false
              seccompProfile: {type: RuntimeDefault}
              capabilities: {drop: ["ALL"]}
    service:
      immich-kiosk:
        controller: immich-kiosk
        ports:
          http:
            port: *port
    route:
      immich-kiosk:
        hostnames:
          - immich-kiosk.clerici.tech
        parentRefs:
          - name: internal
            namespace: kgateway
    persistence:
      config:
        type: secret
        name: immich-kiosk-config
        globalMounts:
          - path: /config/config.yaml
            subPath: config.yaml
  dependsOn:
    - name: immich-kiosk-resources
