---
# yaml-language-server: $schema=https://k8s-versioned-schemas.pages.dev/external-secrets/2.8.0/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: kopiur-backblaze
spec:
  refreshInterval: "1m"
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: kopiur-backblaze
  dataFrom:
    - extract:
        key: kopiur-backblaze
