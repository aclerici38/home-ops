---
# yaml-language-server: $schema=https://k8s-versioned-schemas.pages.dev/flux/2.9.3/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: home-ops-runners
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: gha-runner-scale-set
  install:
    timeout: 5m
  upgrade:
    timeout: 5m
  dependsOn:
    - name: gha-runner-scale-set-controller
    - name: home-ops-runners-resources
  values:
    # The label workflows target with `runs-on:`.
    runnerScaleSetName: home-ops-runners
    githubConfigUrl: https://github.com/aclerici38/home-ops
    githubConfigSecret: home-ops-runners
    # Scale to zero when idle
    minRunners: 0
    maxRunners: 1
    controllerServiceAccount:
      namespace: actions-runner-controller
      name: gha-rs-controller
    listenerTemplate:
      spec:
        securityContext:
          runAsNonRoot: true
          seccompProfile: {type: RuntimeDefault}
        containers:
          - name: listener
            securityContext:
              allowPrivilegeEscalation: false
              capabilities: {drop: [ALL]}
    template:
      spec:
        securityContext:
          runAsNonRoot: true
          runAsUser: 1001
          runAsGroup: 1001
          fsGroup: 1001
          seccompProfile: {type: RuntimeDefault}
        containers:
          - name: runner
            image: ghcr.io/home-operations/actions-runner:2.336.0@sha256:281a9a090522fafbf4967f158b8c97d03552b1978b688893c5f7cb1944bc5fe5
            command:
              - "/home/runner/run.sh"
            securityContext:
              allowPrivilegeEscalation: false
              capabilities: {drop: [ALL]}
            resources:
              requests:
                cpu: 100m
                memory: 256Mi
              limits:
                memory: 1Gi
