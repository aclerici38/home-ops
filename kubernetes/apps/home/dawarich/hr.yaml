---
# yaml-language-server: $schema=https://k8s-versioned-schemas.pages.dev/flux/2.8.8/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: dawarich
  namespace: dawarich
spec:
  interval: 1h
  maxHistory: 1
  chart:
    spec:
      chart: ./kubernetes/apps/home/dawarich/chart
      sourceRef:
        kind: GitRepository
        name: flux-system
        namespace: flux-system
  install:
    timeout: 5m
    remediation:
      retries: 1
  upgrade:
    timeout: 5m
    remediation:
      retries: 1
  values:
    base:
      externalSecret:
        enabled: true
      cnpg:
        enabled: true
        mode: init
        pooler:
          poolMode: session
        cluster:
          extensions:
            - name: postgis
      dragonfly:
        enabled: true
      volsync:
        enabled: true
        flavor: cephfs
      pocketid:
        enabled: true
        launchUrl: https://dawarich.clerici.tech
        allowedUserGroups:
          - name: fam
            namespace: home-infra
      controllers:
        dawarich:
          pod:
            hostUsers: false
            securityContext:
              runAsNonRoot: true
              runAsUser: 1000
              runAsGroup: 1000
              fsGroup: 1000
              fsGroupChangePolicy: OnRootMismatch
              seccompProfile: {type: RuntimeDefault}
          containers:
            server: &container
              image:
                repository: mirror.gcr.io/freikin/dawarich
                tag: 1.7.10@sha256:72734044cb7a2bd5a263e7fcdc09b2029691eae8ada9558f6ca8da57f1e58921
              command:
                - "web-entrypoint.sh"
              args:
                - "bin/rails"
                - "server"
                - "-p"
                - "3000"
                - "-b"
                - "::"
              env: &env
                RAILS_ENV: production
                SELF_HOSTED: true
                REDIS_URL: redis://dawarich-dragonfly-db:6379
                TIME_ZONE: ${TZ}
                PROMETHEUS_EXPORTER_ENABLED: true
                SIDEKIQ_METRICS_URL: http://127.0.0.1:9395/metrics
                APPLICATION_HOSTS: dawarich.clerici.tech,dawarich.dawarich.svc.cluster.local
                DISTANCE_UNIT: mi
                STORE_GEODATA: true
                RAILS_CACHE_DB: 0
                RAILS_JOB_QUEUE_DB: 0
                RAILS_WS_DB: 0
                SMTP_SERVER: smtp-relay.smtp-relay
                SMTP_PORT: 25
                SMTP_FROM: bot@clerici.tech
                DOMAIN: clerici.tech
                SECRET_KEY_BASE:
                  secretKeyRef:
                    name: dawarich
                    key: SECRET_KEY_BASE
                OTP_ENCRYPTION_PRIMARY_KEY:
                  secretKeyRef:
                    name: dawarich
                    key: OTP_ENCRYPTION_PRIMARY_KEY
                OTP_ENCRYPTION_DETERMINISTIC_KEY:
                  secretKeyRef:
                    name: dawarich
                    key: OTP_ENCRYPTION_DETERMINISTIC_KEY
                OTP_ENCRYPTION_KEY_DERIVATION_SALT:
                  secretKeyRef:
                    name: dawarich
                    key: OTP_ENCRYPTION_KEY_DERIVATION_SALT

                DATABASE_HOST:
                  secretKeyRef:
                    name: dawarich-db-app
                    key: host
                DATABASE_USERNAME:
                  secretKeyRef:
                    name: dawarich-db-app
                    key: user
                DATABASE_PASSWORD:
                  secretKeyRef:
                    name: dawarich-db-app
                    key: password
                DATABASE_NAME:
                  secretKeyRef:
                    name: dawarich-db-app
                    key: dbname

                OIDC_CLIENT_ID:
                  secretKeyRef:
                    name: dawarich-oidc-credentials
                    key: client_id
                OIDC_CLIENT_SECRET:
                  secretKeyRef:
                    name: dawarich-oidc-credentials
                    key: client_secret
                OIDC_ISSUER:
                  secretKeyRef:
                    name: dawarich-oidc-credentials
                    key: issuer_url
                OIDC_REDIRECT_URI: https://dawarich.clerici.tech/users/auth/openid_connect/callback
                OIDC_PROVIDER_NAME: Pocket-ID
                OIDC_PKCE_ENABLED: true
                ALLOW_EMAIL_PASSWORD_REGISTRATION: false
                ALLOW_EMAIL_PASSWORD_LOGIN: false
              probes:
                liveness: &probes
                  enabled: true
                  custom: true
                  spec:
                    httpGet:
                      port: &port 3000
                      path: /api/v1/health
                readiness: *probes
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities: {drop: ["ALL"]}
              resources:
                requests:
                  cpu: 100m
                  memory: 512Mi
                limits:
                  memory: 4Gi
            sidekiq:
              <<: *container
              command:
                - "sidekiq-entrypoint.sh"
              args:
                - "bundle exec sidekiq"
              env:
                <<: *env
                PROMETHEUS_EXPORTER_PORT: 9395
              probes:
                liveness:
                  enabled: false
                readiness:
                  enabled: false
      service:
        dawarich:
          controller: dawarich
          ports:
            http:
              port: *port
            metrics:
              port: 9394
      serviceMonitor:
        dawarich:
          serviceName: dawarich
          endpoints:
            - port: metrics
              scheme: http
      route:
        dawarich:
          hostnames:
            - dawarich.clerici.tech
          parentRefs:
            - name: external
              namespace: kgateway
              sectionName: https
      persistence:
        data:
          existingClaim: dawarich
          globalMounts:
            - path: /var/app/storage
              subPath: storage
            - path: /var/app/public
              subPath: public
            # ruby won't let tmp dir be world-writeable so can't be emptydir
            - path: /tmp
              subPath: tmp
        tmpfs:
          type: emptyDir
          globalMounts:
            - path: /var/app/tmp
              subPath: app_tmp
