---
# yaml-language-server: $schema=https://k8s-versioned-schemas.pages.dev/flux/2.9.2/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: dawarich-resources
spec:
  interval: 1h
  chart:
    spec:
      chart: kubernetes/charts/resource-bundle
      sourceRef:
        kind: GitRepository
        name: flux-system
        namespace: flux-system
  install:
    timeout: 5m
  upgrade:
    timeout: 5m
  dependsOn:
    - name: cloudnative-pg
      namespace: cloudnative-pg
    - name: dragonfly-operator
      namespace: dragonfly-operator
    - name: external-secrets
      namespace: external-secrets
    - name: pocket-id-operator
      namespace: pocket-id-operator
    - name: volsync
      namespace: volsync
  values:
    cnpg:
      mode: shared
      poolMode: session
      dbExtensions:
        - {name: postgis}
        - {name: postgis_raster}
        - {name: postgis_sfcgal}
        - {name: fuzzystrmatch}
        - {name: address_standardizer}
        - {name: address_standardizer_data_us}
        - {name: postgis_tiger_geocoder}
        - {name: postgis_topology}
    dragonfly:
      extraArgs:
        - --default_lua_flags=allow-undeclared-keys
    externalSecret: {}
    pocketId:
      group: fam
      callbackPaths:
        - /users/auth/openid_connect/callback
    volsync:
      cephfs: true
      restoreFrom: home-infra
