---
# yaml-language-server: $schema=https://k8s-versioned-schemas.pages.dev/cloudnative-pg/0.28.2/database_v1.json
apiVersion: postgresql.cnpg.io/v1
kind: Database
metadata:
  name: {{ .Release.Name }}
spec:
  name: app
  owner: app
  cluster:
    name: {{ .Release.Name }}-db
  extensions:
    - name: postgis
      ensure: present
    - name: postgis_raster
      ensure: present
    - name: postgis_sfcgal
      ensure: present
    - name: fuzzystrmatch
      ensure: present
    - name: address_standardizer
      ensure: present
    - name: address_standardizer_data_us
      ensure: present
    - name: postgis_tiger_geocoder
      ensure: present
    - name: postgis_topology
      ensure: present
