---
# yaml-language-server: $schema=https://k8s-versioned-schemas.pages.dev/flux/2.8.8/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: tuppr
  namespace: tuppr
spec:
  interval: 1h
  chart:
    spec:
      chart: ./kubernetes/apps/home/tuppr/chart
      sourceRef:
        kind: GitRepository
        name: flux-system
        namespace: flux-system
  install:
    timeout: 5m
    remediation:
      retries: 1
  upgrade:
    timeout: 5m
    remediation:
      retries: 1
  values:
    base:
      app-template:
        enabled: false
    tuppr:
      replicaCount: 2
      monitoring:
        serviceMonitor:
          enabled: true
        dashboards:
          enabled: true
          grafanaOperator:
            enabled: true
            allowCrossNamespaceImport: true
            matchLabels:
              grafana.internal/instance: grafana
