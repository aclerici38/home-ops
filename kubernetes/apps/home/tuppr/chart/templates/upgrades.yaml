{{- /* Talos/Kubernetes versions are sourced from the cluster-settings ConfigMap
       (generated from globals.env), resolved at Flux apply time. */ -}}
{{- $cs := (include "base.cluster-settings" .) | fromYaml }}
---
# yaml-language-server: $schema=https://k8s-versioned-schemas.pages.dev/tuppr/0.1.37/talosupgrade_v1alpha1.json
apiVersion: tuppr.home-operations.com/v1alpha1
kind: TalosUpgrade
metadata:
  name: talos
spec:
  talos:
    version: {{ $cs.TALOS_VERSION }}
  policy:
    rebootMode: powercycle
  healthChecks:
    - apiVersion: volsync.backube/v1alpha1
      kind: ReplicationSource
      expr: |-
        status.conditions.filter(c, c.type == "Synchronizing").all(c, c.status == "False")
    - apiVersion: ceph.rook.io/v1
      kind: CephCluster
      expr: |-
        status.ceph.health in ['HEALTH_OK', 'HEALTH_WARN']
---
# yaml-language-server: $schema=https://k8s-versioned-schemas.pages.dev/tuppr/0.1.37/kubernetesupgrade_v1alpha1.json
apiVersion: tuppr.home-operations.com/v1alpha1
kind: KubernetesUpgrade
metadata:
  name: kubernetes
spec:
  kubernetes:
    version: {{ $cs.KUBE_VERSION }}
  healthChecks:
    - apiVersion: volsync.backube/v1alpha1
      kind: ReplicationSource
      expr: |-
        status.conditions.filter(c, c.type == "Synchronizing").all(c, c.status == "False")
    - apiVersion: ceph.rook.io/v1
      kind: CephCluster
      expr: |-
        status.ceph.health in ['HEALTH_OK', 'HEALTH_WARN']
