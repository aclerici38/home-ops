---
# yaml-language-server: $schema=https://k8s-versioned-schemas.pages.dev/flux/2.9.2/helmrelease_v2.json?values=app-template/5.0.1
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: matter-server
spec:
  interval: 1h
  maxHistory: 1
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  install:
    timeout: 2m
    remediation:
      retries: 1
  upgrade:
    timeout: 2m
    remediation:
      retries: 1
  dependsOn:
    - name: matter-server-resources
  values:
    controllers:
      matter-server:
        pod:
          nodeSelector:
            network.dormammu/multus: "true"
          securityContext:
            sysctls:
              # accept RA route-info (Thread OMR prefix) on every multus interface
              - name: net.ipv6.conf.iot.accept_ra_rt_info_max_plen
                value: "64"
              - name: net.ipv6.conf.cottage.accept_ra_rt_info_max_plen
                value: "64"
              - name: net.ipv6.conf.house.accept_ra_rt_info_max_plen
                value: "64"
            runAsUser: 1000
            runAsGroup: 1000
            fsGroup: 1000
            fsGroupChangePolicy: OnRootMismatch
            runAsNonRoot: true
            seccompProfile: {type: RuntimeDefault}
          annotations:
            # iot = wifi matter devices; cottage/house = trusted VLANs
            # (Thread OMR routes + operational mDNS from the OTBR backbones)
            k8s.v1.cni.cncf.io/networks: |
              [
                {
                  "name":"iot",
                  "namespace": "multus",
                  "interface": "iot",
                  "ips": ["10.0.80.23/24"],
                  "mac": "64:16:7F:33:88:AC"
                },
                {
                  "name":"cottage",
                  "namespace": "multus",
                  "interface": "cottage",
                  "ips": ["10.0.40.23/24"],
                  "mac": "64:16:7F:33:88:AD"
                },
                {
                  "name":"house",
                  "namespace": "multus",
                  "interface": "house",
                  "ips": ["10.0.20.23/24"],
                  "mac": "64:16:7F:33:88:AE"
                }
              ]
        containers:
          matter-server:
            image:
              repository: ghcr.io/matter-js/matterjs-server
              tag: 1.2.7@sha256:3f2b19c26fa21f9a855fd1e31cc8e1b174e8fcece881ab4ac7f56b5d828446a6
            args:
              - --storage-path=/data
              - --ota-provider-dir=/data/ota
              - --production-mode
            probes:
              liveness: &probe
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: 5580
              readiness: *probe
            resources:
              requests:
                cpu: 47m
                memory: 100Mi
              limits:
                memory: 512Mi
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: {drop: [ALL]}
    service:
      matter-server:
        controller: matter-server
        ports:
          http:
            port: 5580
    route:
      matter-server:
        hostnames:
          - matter.clerici.tech
        parentRefs:
          - name: internal
            namespace: kgateway
    persistence:
      data:
        existingClaim: matter-server
        globalMounts:
          - path: /data
      tmpfs:
        type: emptyDir
        globalMounts:
          - path: /tmp
            subPath: tmp
