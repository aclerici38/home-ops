---
# yaml-language-server: $schema=https://k8s-versioned-schemas.pages.dev/flux/2.8.8/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: matter-server
  namespace: matter-server
spec:
  interval: 1h
  maxHistory: 1
  chart:
    spec:
      chart: ./kubernetes/apps/home/matter-server/chart
      sourceRef:
        kind: GitRepository
        name: flux-system
        namespace: flux-system
  install:
    timeout: 5m
    remediation:
      retries: 1
  upgrade:
    timeout: 5m
    remediation:
      retries: 1
  values:
    base:
      volsync:
        enabled: true
        flavor: block
      controllers:
        matter-server:
          pod:
            nodeSelector:
              network.dormammu/multus: "true"
            securityContext:
              runAsUser: 1000
              runAsGroup: 1000
              fsGroup: 1000
              fsGroupChangePolicy: OnRootMismatch
              runAsNonRoot: true
              seccompProfile: {type: RuntimeDefault}
              supplementalGroups:
                # Matter?
                - 34
            annotations:
              k8s.v1.cni.cncf.io/networks: |
                [
                  {
                    "name":"iot",
                    "namespace": "network",
                    "ips": ["10.0.80.23/24"],
                    "mac": "64:16:7F:33:88:AC"
                  }
                ]
          containers:
            matter-server:
              image:
                repository: ghcr.io/home-assistant-libs/python-matter-server
                tag: 8.1.0@sha256:170aa093ce91c76cde4cc390918307590f0f5558fcec93f913af3cb019e6562a
              args:
                - --storage-path=/data
                - --paa-root-cert-dir=/data/credentials
                - --ota-provider-dir=/data/ota
                - --primary-interface=net1
              resources:
                requests:
                  cpu: 47m
                  memory: 100Mi
                limits:
                  memory: 256Mi
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities: {drop: [ALL]}
      service:
        matter-server:
          controller: matter-server
          ports:
            http:
              port: &port 5580
      route:
        matter-server:
          hostnames:
            - matter-server.clerici.tech
          parentRefs:
            - name: internal
              namespace: kgateway
              sectionName: https
      persistence:
        data:
          existingClaim: matter-server
          globalMounts:
            - path: /data
        tmpfs:
          type: emptyDir
          globalMounts:
            - path: /tmp
              subPath: tmp
