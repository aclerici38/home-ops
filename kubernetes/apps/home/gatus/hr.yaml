---
# yaml-language-server: $schema=https://k8s-versioned-schemas.pages.dev/flux/2.8.8/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: gatus
  namespace: gatus
spec:
  interval: 1h
  chart:
    spec:
      chart: ./kubernetes/apps/home/gatus/chart
      sourceRef:
        kind: GitRepository
        name: flux-system
        namespace: flux-system
  install:
    timeout: 5m
    remediation:
      retries: 1
  upgrade:
    timeout: 5m
    remediation:
      retries: 1
  values:
    base:
      cnpg:
        enabled: true
        mode: no-backup
      externalSecret:
        enabled: true
      pocketid:
        enabled: true
        pkceEnabled: false
        launchUrl: https://gatus.clerici.tech
      controllers:
        gatus:
          strategy: RollingUpdate
          pod:
            automountServiceAccountToken: true
            hostUsers: false
            securityContext:
              runAsNonRoot: true
              runAsUser: 1000
              runAsGroup: 1000
              fsGroup: 1000
              seccompProfile: {type: RuntimeDefault}
          initContainers:
            sidecar:
              restartPolicy: Always
              image:
                repository: ghcr.io/home-operations/gatus-sidecar
                tag: 0.0.18@sha256:3e8ab2f65ac6eba268c963919e34e6f4c4e10439979de3ded71242240621edcd
              args:
                - --auto-httproute
                - --enable-httproute
                - --enable-service
              resources:
                requests:
                  cpu: 10m
                limits:
                  cpu: 64Mi
              securityContext: &sec
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities:
                  drop:
                    - ALL
          containers:
            gatus:
              image:
                repository: ghcr.io/twin/gatus
                tag: v5.36.0@sha256:c5f210d095fa78e6efaa20ffeb14803f2ba4f10615e16a6d12087697149617f0
              env:
                GATUS_DELAY_START_SECONDS: 5
                GATUS_CONFIG_PATH: /config
                PG_URI:
                  secretKeyRef:
                    name: gatus-db-app
                    key: uri
                CLIENT_ID:
                  secretKeyRef:
                    name: gatus-oidc-credentials
                    key: client_id
                CLIENT_SECRET:
                  secretKeyRef:
                    name: gatus-oidc-credentials
                    key: client_secret
              probes:
                readiness: &probes
                  enabled: true
                  custom: true
                  spec:
                    httpGet:
                      port: &port 8080
                      path: /health
                liveness: *probes
              resources:
                requests:
                  cpu: 50m
                  memory: 100Mi
                limits:
                  memory: 512Mi
              securityContext: *sec
      service:
        gatus:
          controller: gatus
          ports:
            http:
              port: *port
      serviceMonitor:
        gatus:
          serviceName: gatus
          endpoints:
            - port: http
      route:
        gatus:
          annotations:
            gatus.home-operations.com/enabled: "false"
          hostnames:
            - gatus.clerici.tech
          parentRefs:
            - name: external
              namespace: kgateway
              sectionName: https
      rbac:
        roles:
          gatus:
            type: ClusterRole
            rules:
              - apiGroups:
                  - ""
                resources:
                  - services
                verbs:
                  - get
                  - list
                  - watch
              - apiGroups:
                  - gateway.networking.k8s.io
                resources:
                  - gateways
                  - httproutes
                verbs:
                  - get
                  - watch
                  - list
        bindings:
          gatus:
            type: ClusterRoleBinding
            roleRef:
              identifier: gatus
            subjects:
              - identifier: gatus
      persistence:
        config-file:
          type: configMap
          name: gatus
          globalMounts:
            - path: /config/config.yaml
              subPath: config.yaml
        config-cache:
          existingClaim: gatus-cache
          globalMounts:
            - path: /config
      configMaps:
        config:
          data:
            config.yaml: |-
              # PKCE
              web:
                read-buffer-size: 32768
              connectivity:
                checker:
                  target: ${COREDNS_CLUSTER_IP}:53
                  interval: 1m

              endpoints:
                - name: Cloudflare
                  group: connectivity
                  url: tcp://1.1.1.1:53
                  interval: 1m
                  conditions:
                    - "[CONNECTED] == true"

                - name: Google-DNS
                  group: connectivity
                  url: tcp://8.8.8.8:53
                  interval: 1m
                  conditions:
                    - "[CONNECTED] == true"

                - name: Quad9
                  group: connectivity
                  url: tcp://9.9.9.9:53
                  interval: 1m
                  conditions:
                    - "[CONNECTED] == true"

                - name: Google-HTTPS
                  group: connectivity
                  url: tcp://google.com:443
                  conditions:
                    - "[CONNECTED] == true"

                - name: Bambi
                  group: travel
                  url: tcp://192.168.8.1:80
                  conditions:
                    - "[CONNECTED] == true"

              metrics: true

              security:
                oidc:
                  issuer-url: https://id.clerici.tech
                  redirect-url: https://gatus.clerici.tech/authorization-code/callback
                  client-id: $${CLIENT_ID}
                  client-secret: $${CLIENT_SECRET}
                  scopes: [openid]

              storage:
                type: postgres
                caching: true
                path: $${PG_URI}
