---
# yaml-language-server: $schema=https://k8s-versioned-schemas.pages.dev/flux/2.9.2/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: backups-pvc-backup
  namespace: versity
spec:
  targetNamespace: versity
  path: ./kubernetes/components/volsync/resources/backup
  dependsOn:
    - name: volsync
      namespace: flux-system
    - name: external-secrets
      namespace: flux-system
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  wait: true
  prune: true
  interval: 30m
  timeout: 3m
  postBuild:
    substitute:
      APP: backups
      VOLSYNC_SCHEDULE: 0 2,14 * * *
      VOLSYNC_KOPIA_REPO: volsync-kopia-backblaze
      VOLSYNC_STORAGECLASS: zfs-ssd
      VOLSYNC_SNAPSHOTCLASS: openebs-zfs
      VOLSYNC_CACHE_STORAGECLASS: zfs-ssd
      VOLSYNC_CACHE_CAPACITY: 100Gi
