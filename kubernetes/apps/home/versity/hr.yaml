---
# yaml-language-server: $schema=https://k8s-versioned-schemas.pages.dev/flux/2.8.8/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: versitygw
  namespace: versity
spec:
  interval: 1h
  chart:
    spec:
      chart: ./kubernetes/apps/home/versity/chart
      sourceRef:
        kind: GitRepository
        name: flux-system
        namespace: flux-system
  install:
    timeout: 5m
    remediation:
      retries: 1
  upgrade:
    timeout: 5m
    remediation:
      retries: 1
  dependsOn:
    - name: volsync
      namespace: volsync
  values:
    base:
      app-template:
        enabled: false
      externalSecret:
        enabled: true
        name: versity
        key: versity
    versitygw:
      image:
        repository: ghcr.io/versity/versitygw
        tag: v1.4.1@sha256:0400cb59f59da0f1cf9f7fd49505191abc348dfadf54509bf1988caaff4eb96f
      serviceAccount:
        create: false
      podSecurityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      resources:
        requests:
          cpu: 100m
          memory: 20Mi
        limits:
          memory: 512Mi
      persistence:
        enabled: true
        create: false
        claimName: backups
      httpRoute:
        enabled: true
        parentRefs: &gateway
          - name: internal
            namespace: kgateway
            sectionName: https
        hostnames:
          - s3.clerici.tech
      auth:
        existingSecret: versity
      gateway:
        backend:
          type: posix
          # chart mounts at /mnt/data, need to use s3 subPath
          args: /mnt/data/s3
        debug: false
      webui:
        enabled: true
        apiGateways:
          - https://s3.clerici.tech
        httpRoute:
          enabled: true
          parentRefs: *gateway
          hostnames:
            - versity.clerici.tech
      extraEnv:
        - name: VGW_VERSIONING_DIR
          value: /mnt/data/versioning
        # kopia doesn't support xattrs so we must store metadata separately
        # this prob doesn't matter with no acls but why not
        - name: VGW_META_SIDECAR
          value: /mnt/data/sidecar
