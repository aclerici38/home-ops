{{- /*
  Static PVs binding the pre-existing openebs-zfs datasets that nfs-server
  re-exports over NFS. claimRef namespace follows the release namespace.
*/ -}}
{{- define "nfs-server.pv.nodeAffinity" -}}
required:
  nodeSelectorTerms:
    - matchExpressions:
        - key: kubernetes.io/hostname
          operator: In
          values:
            - bonds
{{- end -}}
{{- $ns := .Release.Namespace -}}
---
# yaml-language-server: $schema=https://raw.githubusercontent.com/yannh/kubernetes-json-schema/master/v1.36.1-standalone-strict/persistentvolume-v1.json
apiVersion: v1
kind: PersistentVolume
metadata:
  name: immich-pv
spec:
  accessModes:
    - ReadWriteMany
  capacity:
    storage: "59992103190528"
  claimRef:
    apiVersion: v1
    kind: PersistentVolumeClaim
    name: immich
    namespace: {{ $ns }}
  csi:
    driver: zfs.csi.openebs.io
    fsType: zfs
    volumeAttributes:
      openebs.io/poolname: tank
    volumeHandle: immich
  nodeAffinity:
    {{- include "nfs-server.pv.nodeAffinity" . | nindent 4 }}
  persistentVolumeReclaimPolicy: Retain
  storageClassName: zfs-tank
  volumeMode: Filesystem
---
