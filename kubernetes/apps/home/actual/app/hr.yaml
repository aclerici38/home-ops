---
# yaml-language-server: $schema=https://k8s-versioned-schemas.pages.dev/flux/2.9.0/helmrelease_v2.json?values=app-template/5.0.1
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: actual
spec:
  interval: 1h
  maxHistory: 1
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  install:
    timeout: 2m
  upgrade:
    timeout: 2m
  values:
    controllers:
      actual:
        pod:
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
            fsGroup: 1000
            fsGroupChangePolicy: OnRootMismatch
            runAsNonRoot: true
            seccompProfile: {type: RuntimeDefault}
        containers:
          actual:
            image:
              repository: ghcr.io/actualbudget/actual
              tag: 26.6.0-alpine@sha256:1d2712f4a69677f94c27f0ccdd817903dab5fa897f0e0ff4e165f9c77a8ebbb5
            env:
              ACTUAL_LOGIN_METHOD: openid
              ACTUAL_ALLOWED_LOGIN_METHODS: '[openid]'
              ACTUAL_OPENID_DISCOVERY_URL: https://id.clerici.tech
              ACTUAL_OPENID_SERVER_HOSTNAME: https://actual.clerici.tech
              ACTUAL_OPENID_AUTH_METHOD: openid
              ACTUAL_OPENID_ENFORCE: true
              ACTUAL_OPENID_CLIENT_ID:
                secretKeyRef:
                  name: actual-oidc-credentials
                  key: client_id
              ACTUAL_OPENID_CLIENT_SECRET:
                secretKeyRef:
                  name: actual-oidc-credentials
                  key: client_secret
            probes:
              readiness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    port: &port 5006
                    path: /health
                  initialDelaySeconds: 0
                  periodSeconds: 10
                  timeoutSeconds: 1
                  failureThreshold: 3
              liveness: *probes
            resources:
              requests:
                cpu: 12m
                memory: 128M
              limits:
                memory: 512M
            securityContext:
              runAsNonRoot: true
              allowPrivilegeEscalation: false
              seccompProfile: {type: RuntimeDefault}
              capabilities: {drop: ["ALL"]}
    service:
      actual:
        controller: actual
        ports:
          http:
            port: *port
    route:
      actual:
        hostnames:
          - actual.clerici.tech
        parentRefs:
          - name: internal
            namespace: kgateway
    persistence:
      data:
        existingClaim: actual
  dependsOn:
    - name: actual-resources
