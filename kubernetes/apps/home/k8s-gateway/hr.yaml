---
# yaml-language-server: $schema=https://k8s-versioned-schemas.pages.dev/flux/2.8.8/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: k8s-gateway
  namespace: k8s-gateway
spec:
  interval: 1h
  chart:
    spec:
      chart: ./kubernetes/apps/home/k8s-gateway/chart
      sourceRef:
        kind: GitRepository
        name: flux-system
        namespace: flux-system
  install:
    timeout: 5m
    remediation:
      retries: 1
  upgrade:
    timeout: 5m
    remediation:
      retries: 1
  values:
    base:
      app-template:
        enabled: false
    k8s-gateway:
      domain: clerici.tech
      fallthrough:
        enabled: true
        zones:
          - clerici.tech
      replicaCount: 2
      watchedResources:
        - HTTPRoute
        - Service
      extraZonePlugins:
        - name: log
        - name: errors
        - name: health
          configBlock: |-
            lameduck 5s
        - name: ready
        - name: prometheus
          parameters: 0.0.0.0:9153
        - name: forward
          parameters: . 1.1.1.1
      service:
        type: ClusterIP
        clusterIP: "${K8S_GATEWAY_CLUSTER_IP}"
      debug:
        enabled: true
      serviceAccount:
        create: true
        name: k8s-gateway
