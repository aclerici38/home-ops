---
# yaml-language-server: $schema=https://k8s-versioned-schemas.pages.dev/flux/2.9.2/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: coredns
spec:
  interval: 1h
  maxHistory: 1
  dependsOn:
    - name: blocky
      namespace: blocky
  chartRef:
    kind: OCIRepository
    name: coredns
  install:
    timeout: 2m
    remediation:
      retries: 1
  upgrade:
    force: true
    timeout: 2m
    remediation:
      retries: 1
  valuesFrom:
    - kind: ConfigMap
      name: coredns-values
      valuesKey: values.yaml
  values:
    servers:
      - zones:
          - zone: .
            scheme: dns://
            use_tcp: true
        port: 53
        plugins:
          - name: errors
          - name: health
            configBlock: |-
              lameduck 5s
          - name: ready
          - name: log
            configBlock: |-
              class error
          - name: prometheus
            parameters: 0.0.0.0:9153
          - name: kubernetes
            parameters: cluster.local in-addr.arpa ip6.arpa
            configBlock: |-
              pods verified
              fallthrough in-addr.arpa ip6.arpa
          # Enable ECS so blocky gets the client's ip as source instead of coredns
          - name: rewrite
            parameters: edns0 subnet set 32 128
          - name: forward
            parameters: . ${BLOCKY_CLUSTER_IP}
            configBlock: |-
              except cluster.local 16.172.in-addr.arpa 0.1.8.4.7.1.d.f.3.d.6.f.d.f.ip6.arpa 0.0.0.2.8.4.7.1.d.f.3.d.6.f.d.f.ip6.arpa
          - name: loop
          - name: reload
