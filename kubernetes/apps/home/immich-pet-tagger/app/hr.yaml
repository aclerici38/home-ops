---
# yaml-language-server: $schema=https://k8s-versioned-schemas.pages.dev/flux/2.9.2/helmrelease_v2.json?values=app-template/5.0.1
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: immich-pet-tagger
spec:
  interval: 1h
  maxHistory: 1
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  install:
    timeout: 5m
  upgrade:
    timeout: 5m
  dependsOn:
    - name: immich-pet-tagger-resources
  values:
    controllers:
      immich-pet-tagger:
        pod:
          hostUsers: false
          nodeSelector:
            kubernetes.io/hostname: "bonds"
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
            fsGroup: 1000
            fsGroupChangePolicy: OnRootMismatch
            runAsNonRoot: true
            seccompProfile: {type: RuntimeDefault}
        containers:
          immich-pet-tagger:
            image:
              repository: ghcr.io/tedornitier/immich-pet-tagger
              tag: v1.5.2-cpu@sha256:5e629db595375657a904cebf456b31912fc584450bc4527c2d6ce9b4855b820d
            env:
              IMMICH_URL: http://immich-server.immich:2283
              IMMICH_EXTERNAL_URL: https://immich.clerici.tech
              IMMICH_API_KEY:
                secretKeyRef:
                  name: immich-pet-tagger
                  key: IMMICH_API_KEY
              POLL_INTERVAL: "300"
              # 1280 detects smaller/farther dogs and yields tighter, higher-res crops feeding CLIP.
              YOLO_INPUT_SIZE: "1280"
              # 32 threads
              GPU_WORKERS: "2"
              OMP_NUM_THREADS: "8"
              MKL_NUM_THREADS: "8"
              # Moderate batches: on CPU large batches add latency/memory without
              # the throughput win they give a GPU.
              YOLO_BATCH_SIZE: "16"
              CLIP_BATCH_SIZE: "16"
              # Keep the inference pipeline fed with parallel thumbnail fetches.
              SCAN_WORKERS: "32"
              EMBED_CACHE_SIZE: "20000"
            probes:
              startup:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: &port 8000
                  periodSeconds: 5
                  failureThreshold: 60
                  timeoutSeconds: 5
              liveness: &probe
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: *port
              readiness: *probe
            resources:
              requests:
                cpu: "2"
                memory: 4Gi
              limits:
                memory: 16Gi
            securityContext:
              runAsNonRoot: true
              allowPrivilegeEscalation: false
              seccompProfile: {type: RuntimeDefault}
              capabilities: {drop: ["ALL"]}
    service:
      immich-pet-tagger:
        controller: immich-pet-tagger
        ports:
          http:
            port: *port
    route:
      immich-pet-tagger:
        hostnames:
          - pets.clerici.tech
        parentRefs:
          - name: internal
            namespace: kgateway
        rules:
          - backendRefs:
              - identifier: immich-pet-tagger
                port: *port
    persistence:
      data:
        existingClaim: immich-pet-tagger
        globalMounts:
          - path: /data
