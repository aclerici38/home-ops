---
# yaml-language-server: $schema=https://k8s-versioned-schemas.pages.dev/cert-manager/1.21.0/certificate_v1.json
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: clerici-tech
spec:
  dnsNames:
    - "clerici.tech"
    - "*.clerici.tech"
    - "*.${CLUSTER_NAME}.clerici.tech"
  duration: 160h
  issuerRef:
    kind: ClusterIssuer
    name: letsencrypt-production
  privateKey:
    algorithm: ECDSA
    size: 256
    rotationPolicy: Always
  secretName: clerici-tech-tls
  usages:
    - digital signature
