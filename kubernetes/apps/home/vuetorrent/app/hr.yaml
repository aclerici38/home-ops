---
# yaml-language-server: $schema=https://k8s-versioned-schemas.pages.dev/flux/2.9.2/helmrelease_v2.json?values=app-template/5.0.1
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: vuetorrent
spec:
  interval: 1h
  maxHistory: 1
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  install:
    timeout: 2m
    remediation:
      retries: 1
  upgrade:
    timeout: 2m
    remediation:
      retries: 1
  values:
    controllers:
      vuetorrent:
        strategy: RollingUpdate
        pod:
          hostUsers: false
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            fsGroupChangePolicy: OnRootMismatch
            seccompProfile: {type: RuntimeDefault}
        containers:
          vuetorrent:
            image:
              repository: ghcr.io/vuetorrent/vuetorrent-backend
              tag: 2.7.3@sha256:9e81304f91116961f07f0a85c5db5e2cbef2fcd6d86d3d5278f5508af41ed670
            resources:
              requests:
                cpu: 10m
                memory: 20Mi
              limits:
                memory: 200Mi
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /backend/ping
                    port: &port 8080
              readiness: *probes
            env:
              # renovate: datasource=github-releases depName=VueTorrent/VueTorrent
              RELEASE_TYPE: v2.34.1
              PORT: *port
              QBIT_BASE: http://qbittorrent.qbittorrent:8080
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop:
                  - ALL
    service:
      vuetorrent:
        controller: vuetorrent
        ports:
          http:
            port: *port
    route:
      vuetorrent:
        hostnames:
          - qbit.clerici.tech
        parentRefs:
          - name: internal
            namespace: kgateway
    persistence:
      vuetorrent:
        type: emptyDir
