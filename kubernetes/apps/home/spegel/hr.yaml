---
# yaml-language-server: $schema=https://k8s-versioned-schemas.pages.dev/flux/2.8.8/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: spegel
  namespace: spegel
spec:
  interval: 1h
  chart:
    spec:
      chart: ./kubernetes/apps/home/spegel/chart
      sourceRef:
        kind: GitRepository
        name: flux-system
        namespace: flux-system
  install:
    timeout: 5m
    remediation:
      retries: 1
  upgrade:
    timeout: 5m
    remediation:
      retries: 1
  values:
    base:
      app-template:
        enabled: false
    spegel:
      grafanaDashboard:
        enabled: true
        mode: GrafanaOperator
        grafanaOperator:
          matchLabels:
            grafana.internal/instance: grafana
      service:
        registry:
          hostPort: 29999
      serviceMonitor:
        enabled: true
      spegel:
        containerdSock: /run/containerd/containerd.sock
        containerdRegistryConfigPath: /etc/cri/conf.d/hosts
