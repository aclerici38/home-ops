---
# yaml-language-server: $schema=https://k8s-versioned-schemas.pages.dev/flux/2.8.8/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: mealie
  namespace: mealie
spec:
  interval: 1h
  maxHistory: 1
  chart:
    spec:
      chart: ./kubernetes/apps/home/mealie/chart
      sourceRef:
        kind: GitRepository
        name: flux-system
        namespace: flux-system
  install:
    timeout: 5m
    remediation:
      retries: 1
  upgrade:
    timeout: 5m
    remediation:
      retries: 1
  values:
    base:
      externalSecret:
        enabled: true
      cnpg:
        enabled: true
        mode: restore
      volsync:
        enabled: true
        flavor: cephfs
        capacity: 10Gi
      pocketid:
        enabled: true
        launchUrl: https://mealie.clerici.tech
        allowedUserGroups:
          - name: all
            namespace: home-infra
      controllers:
        mealie:
          strategy: RollingUpdate
          pod:
            securityContext:
              runAsNonRoot: true
              runAsUser: 1000
              runAsGroup: 1000
              fsGroup: 1000
              fsGroupChangePolicy: OnRootMismatch
              seccompProfile: {type: RuntimeDefault}
          containers:
            main:
              image:
                repository: ghcr.io/mealie-recipes/mealie
                tag: v3.19.1@sha256:67472993a2edb2378e92fd84a59b8b2db5f3dc0fa93d7b8e31a2f205372cfc07
              env:
                BASE_URL: https://mealie.clerici.tech
                DAILY_SCHEDULE_TIME: 05:00
                ALLOW_SIGNUP: "false"
                LOG_LEVEL: debug
                ALLOW_PASSWORD_LOGIN: false

                # OIDC
                OIDC_AUTH_ENABLED: "true"
                OIDC_SIGNUP_ENABLED: "true"
                OIDC_PROVIDER_NAME: Pocket ID
                OIDC_REMEMBER_ME: "true"
                OIDC_USER_CLAIM: email
                OIDC_AUTO_REDIRECT: 'true'
                OIDC_CONFIGURATION_URL:
                  secretKeyRef:
                    name: mealie-oidc-credentials
                    key: discovery_url
                OIDC_CLIENT_ID:
                  secretKeyRef:
                    name: mealie-oidc-credentials
                    key: client_id
                OIDC_CLIENT_SECRET:
                  secretKeyRef:
                    name: mealie-oidc-credentials
                    key: client_secret

                OPENAI_MODEL: gpt-5.2

                # postgres
                DB_ENGINE: postgres
                POSTGRES_URL_OVERRIDE:
                  valueFrom:
                    secretKeyRef:
                      name: mealie-db-app
                      key: uri

                # SMTP
                SMTP_HOST: smtp-relay.smtp-relay.svc.cluster.local
                SMTP_PORT: 25
                SMTP_AUTH_STRATEGY: None
                SMTP_FROM_EMAIL: bot@clerici.tech
              envFrom:
                - secretRef:
                    name: mealie
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities: {drop: ["ALL"]}
              resources:
                requests:
                  cpu: 100m
                  memory: 100Mi
                limits:
                  memory: 2Gi
              probes:
                liveness: &probes
                  enabled: true
                  custom: true
                  spec:
                    httpGet:
                      port: &port 9000
                      path: /api/app/about
                    periodSeconds: 10
                    failureThreshold: 12
                    initialDelaySeconds: 10
                    timeoutSeconds: 1
                readiness: *probes
      service:
        main:
          controller: mealie
          ports:
            http:
              port: *port
      route:
        main:
          hostnames:
            - mealie.clerici.tech
          parentRefs:
            - name: external
              namespace: kgateway
              sectionName: https
      persistence:
        data:
          existingClaim: mealie
          globalMounts:
            - path: /app/data
              subPath: data
            - path: /nltk_data
              subPath: nltk
        # Needed for recipe parser
        tmpfs:
          type: emptyDir
          globalMounts:
            - path: /tmp
              subPath: tmp
            - path: /nonexistent
              subPath: nonexistent
