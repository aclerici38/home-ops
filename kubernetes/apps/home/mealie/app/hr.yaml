---
# yaml-language-server: $schema=https://k8s-versioned-schemas.pages.dev/flux/2.8.8/helmrelease_v2.json?values=app-template/5.0.1
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: mealie
spec:
  interval: 1h
  maxHistory: 1
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  install:
    timeout: 2m
    remediation:
      retries: 1
  upgrade:
    timeout: 2m
    remediation:
      retries: 1
  values:
    controllers:
      mealie:
        strategy: RollingUpdate
        pod:
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            fsGroup: 1000
            fsGroupChangePolicy: OnRootMismatch
            seccompProfile: {type: RuntimeDefault}
        containers:
          mealie:
            image:
              repository: ghcr.io/mealie-recipes/mealie
              tag: v3.19.2@sha256:f68e959bf66f4f458893ea58facac71690fe6f2ac7a31466b5cecb41b4e99c02
            env:
              BASE_URL: https://mealie.clerici.tech
              DAILY_SCHEDULE_TIME: 05:00
              ALLOW_SIGNUP: "false"
              LOG_LEVEL: debug
              ALLOW_PASSWORD_LOGIN: false
              # OIDC
              OIDC_AUTH_ENABLED: "true"
              OIDC_SIGNUP_ENABLED: "true"
              OIDC_PROVIDER_NAME: Pocket ID
              OIDC_REMEMBER_ME: "true"
              OIDC_USER_CLAIM: email
              OIDC_AUTO_REDIRECT: 'true'
              OIDC_CONFIGURATION_URL:
                secretKeyRef:
                  name: mealie-oidc-credentials
                  key: discovery_url
              OIDC_CLIENT_ID:
                secretKeyRef:
                  name: mealie-oidc-credentials
                  key: client_id
              OIDC_CLIENT_SECRET:
                secretKeyRef:
                  name: mealie-oidc-credentials
                  key: client_secret
              OPENAI_MODEL: gpt-5.2
              # postgres
              DB_ENGINE: postgres
              POSTGRES_URL_OVERRIDE:
                valueFrom:
                  secretKeyRef:
                    name: mealie-db-app
                    key: uri
              # SMTP
              SMTP_HOST: smtp-relay.smtp-relay.svc.cluster.local
              SMTP_PORT: 25
              SMTP_AUTH_STRATEGY: None
              SMTP_FROM_EMAIL: bot@clerici.tech
            envFrom:
              - secretRef:
                  name: mealie
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: {drop: ["ALL"]}
            resources:
              requests:
                cpu: 100m
                memory: 100Mi
              limits:
                memory: 2Gi
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    port: &port 9000
                    path: /api/app/about
                  periodSeconds: 10
                  failureThreshold: 12
                  initialDelaySeconds: 10
                  timeoutSeconds: 1
              readiness: *probes
    service:
      mealie:
        controller: mealie
        ports:
          http:
            port: *port
    route:
      mealie:
        annotations:
          towonel.io/tunnel: enable
          towonel.io/agent-ref: ${CLUSTER_NAME}
        hostnames:
          - mealie.clerici.tech
        parentRefs:
          - name: external
            namespace: kgateway
    persistence:
      data:
        existingClaim: mealie
        globalMounts:
          - path: /app/data
            subPath: data
          - path: /nltk_data
            subPath: nltk
      # Needed for recipe parser
      tmpfs:
        type: emptyDir
        globalMounts:
          - path: /tmp
            subPath: tmp
          - path: /nonexistent
            subPath: nonexistent
  dependsOn:
    - name: mealie-resources
