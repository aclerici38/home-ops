---
# yaml-language-server: $schema=https://k8s-versioned-schemas.pages.dev/flux/2.8.8/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: csi-driver-nfs
  namespace: csi-driver-nfs
spec:
  interval: 1h
  chart:
    spec:
      chart: ./kubernetes/apps/home/csi-driver-nfs/chart
      sourceRef:
        kind: GitRepository
        name: flux-system
        namespace: flux-system
  install:
    timeout: 5m
    remediation:
      retries: 1
  upgrade:
    timeout: 5m
    remediation:
      retries: 1
  dependsOn:
    - name: nfs-server
      namespace: nfs-server
  values:
    base:
      app-template:
        enabled: false
    csi-driver-nfs:
      feature:
        enableFSGroupPolicy: false
      controller:
        enableSnapshotter: false
      storageClasses:
        - name: nfs-tank
          parameters:
            server: "nfs.clerici.tech"
            share: "/"
            subDir: /tank/$${pvc.metadata.namespace}/$${pvc.metadata.name}
          mountOptions: &opt
            - nfsvers=4.2
            - proto=tcp
            - softerr
            - timeo=10
            - retrans=2
            - nconnect=16
            - rsize=1048576
            - wsize=1048576
            - noatime
          reclaimPolicy: Retain
          volumeBindingMode: Immediate
        - name: nfs-ssd
          parameters:
            server: "nfs.clerici.tech"
            share: "/"
            subDir: /ssd/$${pvc.metadata.namespace}/$${pvc.metadata.name}
          mountOptions: *opt
          reclaimPolicy: Retain
          volumeBindingMode: Immediate
