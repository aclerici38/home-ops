---
# yaml-language-server: $schema=https://k8s-versioned-schemas.pages.dev/flux/2.8.8/helmrelease_v2.json?values=app-template/5.0.1
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: seerr
spec:
  interval: 1h
  maxHistory: 1
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  install:
    timeout: 2m
    remediation:
      retries: 1
  upgrade:
    timeout: 2m
    remediation:
      retries: 1
  values:
    controllers:
      seerr:
        pod:
          hostUsers: false
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            fsGroup: 1000
            fsGroupChangePolicy: OnRootMismatch
            seccompProfile: {type: RuntimeDefault}
        containers:
          seerr:
            image:
              repository: ghcr.io/seerr-team/seerr
              tag: v3.3.0@sha256:c92d2dc117f62185e7bcb88cd56efd374ea79210eaf433275449e8d5988eb5a8
            env:
              DB_TYPE: postgres
              DB_HOST:
                valueFrom:
                  secretKeyRef:
                    name: seerr-db-app
                    key: host
              DB_USER:
                valueFrom:
                  secretKeyRef:
                    name: seerr-db-app
                    key: username
              DB_PASS:
                valueFrom:
                  secretKeyRef:
                    name: seerr-db-app
                    key: password
              DB_NAME:
                valueFrom:
                  secretKeyRef:
                    name: seerr-db-app
                    key: dbname
            resources:
              requests:
                cpu: 15m
                memory: 350M
              limits:
                memory: 600M
            securityContext:
              readOnlyRootFilesystem: true
              allowPrivilegeEscalation: false
              capabilities:
                drop:
                  - ALL
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    port: &port 5055
                    path: /api/v1/status
              readiness: *probes
    service:
      seerr:
        controller: seerr
        ports:
          http:
            port: *port
    route:
      seerr:
        annotations:
          towonel.io/tunnel-ref: towonel-operator/${CLUSTER_NAME}-k8s
          towonel.io/agent-ref: ${CLUSTER_NAME}
        hostnames:
          - seer.clerici.tech
          - seerr.clerici.tech
        parentRefs:
          - name: external
            namespace: kgateway
    persistence:
      config:
        existingClaim: seerr
        globalMounts:
          - path: /app/config
      cache:
        type: emptyDir
        globalMounts:
          - path: /app/.next/cache
  dependsOn:
    - name: seerr-resources
