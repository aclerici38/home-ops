---
# yaml-language-server: $schema=https://k8s-versioned-schemas.pages.dev/flux/2.9.3/helmrelease_v2.json?values=app-template/5.0.1
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: frigate
spec:
  interval: 1h
  maxHistory: 1
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  install:
    timeout: 2m
    remediation:
      retries: 1
  upgrade:
    timeout: 2m
    remediation:
      retries: 1
  values:
    controllers:
      frigate:
        pod:
          resourceClaims:
            - name: gpu
              resourceClaimTemplateName: frigate-gpu
          securityContext:
            runAsNonRoot: false
            runAsUser: 0
            runAsGroup: 0
            fsGroupChangePolicy: OnRootMismatch
            seccompProfile: {type: Unconfined}
        containers:
          frigate:
            image:
              repository: ghcr.io/blakeblackshear/frigate
              tag: 0.18.0-beta1@sha256:ea0ca87d1a0de4e8cc1f6c2c814256c5bae38dd31669011c8c31039f58bc071a
            env:
              YOLO_MODELS: yolov7x-320
              HF_HOME: /tmp
              S6_YES_I_WANT_A_WORLD_WRITABLE_RUN_BECAUSE_KUBERNETES: 1
              S6_READ_ONLY_ROOT: 1
            envFrom:
              - secretRef:
                  name: frigate
            securityContext:
              allowPrivilegeEscalation: false
              # Frigate does in-place nginx config editing, so no true readonly root fs
              readOnlyRootFilesystem: false
              capabilities:
                drop:
                  - ALL
                add:
                  # S6
                  - CHOWN
                  - SETUID
                  - SETGID
                  - FOWNER
                  - DAC_OVERRIDE
            resources:
              requests:
                cpu: 2000m
                memory: 2Gi
              limits:
                memory: 16Gi
              claims:
                - name: gpu
    service:
      frigate:
        controller: frigate
        type: ClusterIP
        ports:
          http:
            port: 5000
          http-auth:
            primary: true
            port: &auth 8971
          rtsp:
            port: 8554
          webrtc:
            port: 8555
    route:
      auth:
        hostnames:
          - frigate.clerici.tech
        parentRefs:
          - name: external
            namespace: kgateway
        rules:
          - backendRefs:
              - identifier: frigate
                port: *auth
    persistence:
      config:
        existingClaim: frigate
      media:
        existingClaim: frigate-media
        globalMounts:
          - path: /media/frigate
      tmpfs:
        type: emptyDir
        globalMounts:
          - path: /run
            subPath: run
          - path: /tmp
            subPath: tmp
          - path: /dev/shm
            subPath: shm
          - path: /etc/letsencrypt
            subPath: letsencrypt
  dependsOn:
    - name: frigate-resources
