---
# yaml-language-server: $schema=https://k8s-versioned-schemas.pages.dev/flux/2.9.2/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: frigate-resources
spec:
  interval: 1h
  chart:
    spec:
      chart: kubernetes/charts/resource-bundle
      sourceRef:
        kind: GitRepository
        name: flux-system
        namespace: flux-system
  install:
    timeout: 5m
  upgrade:
    timeout: 5m
  dependsOn:
    - name: external-secrets
      namespace: external-secrets
    - name: intel-gpu-resource-driver
      namespace: intel-gpu-resource-driver
    - name: nfs-server
      namespace: nfs-server
    - name: volsync
      namespace: volsync
  values:
    externalSecret: {}
    gpu: {}
    volsync:
      restoreFrom: home-infra
      capacity: 25Gi
