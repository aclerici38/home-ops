---
# yaml-language-server: $schema=https://k8s-versioned-schemas.pages.dev/flux/2.8.8/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: reloader
  namespace: reloader
spec:
  interval: 1h
  chart:
    spec:
      chart: ./kubernetes/apps/home/reloader/chart
      sourceRef:
        kind: GitRepository
        name: flux-system
        namespace: flux-system
  install:
    timeout: 5m
    remediation:
      retries: 1
  upgrade:
    timeout: 5m
    remediation:
      retries: 1
  values:
    base:
      app-template:
        enabled: false
      createNamespace: false
    reloader:
      reloader:
        autoReloadAll: true
        watchGlobally: true
        enableCSIIntegration: true
        enableMetricsByNamespace: true
        ignoreNamespaces: "cilium,rook-ceph,kube-system"
        readOnlyRootFileSystem: true
        serviceMonitor:
          enabled: true
