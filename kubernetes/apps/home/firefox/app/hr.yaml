---
# yaml-language-server: $schema=https://k8s-versioned-schemas.pages.dev/flux/2.9.3/helmrelease_v2.json?values=app-template/5.0.1
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: firefox
spec:
  interval: 1h
  maxHistory: 1
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  install:
    timeout: 2m
    remediation:
      retries: 1
  upgrade:
    timeout: 2m
    remediation:
      retries: 1
  values:
    controllers:
      firefox:
        pod:
          securityContext:
            runAsUser: 0
            runAsGroup: 0
            seccompProfile: {type: RuntimeDefault}
            supplementalGroups:
              - 44
        containers:
          firefox:
            image:
              repository: ghcr.io/linuxserver/firefox
              tag: 1152.0.6
            env:
              PUID: 1000
              PGID: 1000
            securityContext:
              allowPrivilegeEscalation: true
              readOnlyRootFilesystem: false
              capabilities:
                drop:
                  - ALL
                add:
                  # S6
                  - CHOWN
                  - SETUID
                  - SETGID
                  - FOWNER
                  - DAC_OVERRIDE
            resources:
              requests:
                cpu: 100m
                memory: 800Mi
              limits:
                memory: 8Gi
            probes:
              liveness:
                enabled: true
                type: HTTP
              readiness:
                enabled: true
                type: HTTP
    service:
      firefox:
        controller: firefox
        ports:
          http:
            port: &port 3000
    route:
      firefox:
        hostnames:
          - firefox.clerici.tech
        parentRefs:
          - name: internal
            namespace: kgateway
    persistence:
      config:
        existingClaim: firefox
      data:
        type: nfs
        server: nfs.clerici.tech
        path: /media
        globalMounts:
          - path: /allMedia
  dependsOn:
    - name: firefox-resources
