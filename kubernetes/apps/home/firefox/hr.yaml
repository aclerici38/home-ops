---
# yaml-language-server: $schema=https://k8s-versioned-schemas.pages.dev/flux/2.8.8/helmrelease_v2.json
# yaml-language-server: $schema=https://k8s-versioned-schemas.pages.dev/flux/2.8.8/helmrelease_v2.json?values=app-template/5.0.1
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: firefox
  namespace: firefox
spec:
  interval: 1h
  maxHistory: 1
  install:
    timeout: 2m
    remediation:
      retries: 1
  upgrade:
    timeout: 2m
    remediation:
      retries: 1
  values:
    base:
      controllers:
        firefox:
          pod:
            securityContext:
              runAsUser: 0
              runAsGroup: 0
              seccompProfile: {type: RuntimeDefault}
              supplementalGroups:
                - 44
          containers:
            main:
              image:
                repository: ghcr.io/linuxserver/firefox
                tag: 1151.0.1
              env:
                PUID: 1000
                PGID: 1000
              securityContext:
                allowPrivilegeEscalation: true
                readOnlyRootFilesystem: false
                capabilities:
                  drop:
                    - ALL
                  add:
                    # S6
                    - CHOWN
                    - SETUID
                    - SETGID
                    - FOWNER
                    - DAC_OVERRIDE
              resources:
                requests:
                  cpu: 100m
                  memory: 800Mi
                limits:
                  memory: 8Gi
              probes:
                liveness:
                  enabled: true
                  type: HTTP
                readiness:
                  enabled: true
                  type: HTTP
      service:
        main:
          controller: firefox
          ports:
            http:
              port: &port 3000
      route:
        main:
          hostnames:
            - firefox.clerici.tech
          parentRefs:
            - name: internal
              namespace: kgateway
              sectionName: https
      persistence:
        config:
          existingClaim: firefox
        data:
          type: nfs
          server: nfs.clerici.tech
          path: /media
          globalMounts:
            - path: /allMedia
      volsync:
        enabled: true
  chart:
    spec:
      chart: ./kubernetes/apps/home/firefox/chart
      sourceRef:
        kind: GitRepository
        name: flux-system
        namespace: flux-system
