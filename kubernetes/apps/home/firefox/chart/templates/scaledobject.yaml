---
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: {{ .Release.Name }}
spec:
  advanced:
    restoreToOriginalReplicaCount: true
  pollingInterval: 10
  cooldownPeriod: 0
  idleReplicaCount: 0
  minReplicaCount: 1
  maxReplicaCount: 1
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ .Release.Name }}
  triggers:
    - type: prometheus
      metadata:
        serverAddress: http://prometheus-operated.observability.svc.cluster.local:9090
        query: max(kube_pod_status_ready{namespace="storage",pod=~"nfs-server-.*",condition="true"}) OR on() vector(0)
        threshold: "1"
