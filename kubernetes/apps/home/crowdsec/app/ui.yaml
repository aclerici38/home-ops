---
# yaml-language-server: $schema=https://k8s-versioned-schemas.pages.dev/flux/2.9.0/helmrelease_v2.json?values=app-template/5.0.1
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: crowdsec-ui
spec:
  interval: 1h
  maxHistory: 1
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  install:
    timeout: 2m
    remediation:
      retries: 1
  upgrade:
    timeout: 2m
    remediation:
      retries: 1
  values:
    controllers:
      crowdsec-ui:
        pod:
          hostUsers: false
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            seccompProfile: {type: RuntimeDefault}
        containers:
          crowdsec-ui:
            image:
              repository: ghcr.io/theduffman85/crowdsec-web-ui
              tag: 2026.7.2@sha256:da0bb67e2f22bf26bb1c2b2503a4309ae3642f30bfb69f2f40e1518967eb3bca
            env:
              CROWDSEC_URL: http://crowdsec-service:8080
              CROWDSEC_USER: crowdsec-web-ui
              CROWDSEC_PASSWORD:
                secretKeyRef:
                  name: crowdsec
                  key: WEBUI_PASS
              CROWDSEC_REFRESH_INTERVAL: 30s
            probes:
              liveness: &probe
                enabled: true
                custom: true
                spec:
                  httpGet:
                    port: &port 3000
                    path: /api/health
              readiness: *probe
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop:
                  - ALL
    service:
      crowdsec-ui:
        controller: crowdsec-ui
        ports:
          http:
            port: *port
    route:
      crowdsec-ui:
        hostnames:
          - crowdsec.clerici.tech
        parentRefs:
          - name: internal
            namespace: kgateway
    persistence:
      data:
        existingClaim: crowdsec
        globalMounts:
          - path: /app/data
            subPath: ui
  dependsOn:
    - name: crowdsec-resources
    - name: crowdsec
