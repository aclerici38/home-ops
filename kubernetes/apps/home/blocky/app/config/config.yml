---
# yaml-language-server: $schema=https://raw.githubusercontent.com/0xERR0R/blocky/refs/tags/v0.33.0/docs/config.schema.json
caching:
  minTime: 2m
  maxTime: 1h
  maxItemsCount: 0
  prefetching: true
  prefetchExpires: 1h
  prefetchThreshold: 30
  prefetchMaxItemsCount: 0
  cacheTimeNegative: -1
  exclude:
    - '/(^|\\.)clerici\\.tech$/'
    - '/\\.internal$/'
    - '/(^|\\.)cluster\\.local$/'
    - '/(^|\\.)in-addr\\.arpa$/'

log:
  level: info

connectIPVersion: dual
minTlsServeVersion: 1.3
certFile: /certs/tls.crt
keyFile: /certs/tls.key
ports:
  dns: 53
  tls: 853
  http: 4000

prometheus:
  enable: true

customDNS:
  mapping:
    wireguard.clerici.tech: 10.0.0.1

conditional:
  fallbackUpstream: false
  mapping:
    clerici.tech: ${K8S_GATEWAY_CLUSTER_IP}:53

    # House
    internal: ${NODE_GATEWAY}:53
    0.10.in-addr.arpa: ${NODE_GATEWAY}:53
    8.4.7.1.d.f.3.d.6.f.d.f.ip6.arpa: ${NODE_GATEWAY}:53

    # kube
    cluster.local: ${COREDNS_CLUSTER_IP}
    16.172.in-addr.arpa: ${COREDNS_CLUSTER_IP}
    0.1.8.4.7.1.d.f.3.d.6.f.d.f.ip6.arpa: ${COREDNS_CLUSTER_IP}
    0.0.0.2.8.4.7.1.d.f.3.d.6.f.d.f.ip6.arpa: ${COREDNS_CLUSTER_IP}

    # bambi
    bambi.internal: 192.168.8.1:53
    console.gl-inet.com: 192.168.8.1:53
    8.168.192.in-addr.arpa: 192.168.8.1:53

# ClientLookup is set to blocky so it can conditionally forward it to coredns/apt/house DHCP
clientLookup:
  upstream: 127.0.0.1
  clients:
    localhost:
      - 127.0.0.1

# To resolve devices behind coredns
ecs:
  useAsClient: true
  forward: false

bootstrapDns:
  - 8.8.8.8
  - 1.1.1.1
  - 9.9.9.9
  - 2620:fe::fe
  - 2606:4700:4700::1111
  - 2001:4860:4860::8888

upstreams:
  groups:
    default:
      - quic://dns.quad9.net
      - quic://p0.freedns.controld.com
      # TODO: swap to DoQ when it's supported by these
      - https://doh.opendns.com/dns-query
      - https://cloudflare-dns.com/dns-query

blocking:
  denylists:
    ads:
      - https://raw.githubusercontent.com/hagezi/dns-blocklists/main/wildcard/multi.txt
    security:
      - https://raw.githubusercontent.com/hagezi/dns-blocklists/main/wildcard/tif.mini.txt
  allowlists:
    ads:
      - |
        epi-graphql.conde.digital
  clientGroupsBlock:
    # all clients
    0.0.0.0/0:
      - security
    "::/0":
      - security
    # home
    10.0.20.0/24:
      - ads
    "fdf6:d3fd:1748:20::/64":
      - ads
    # cottage
    10.0.40.0/24:
      - ads
    "fdf6:d3fd:1748:40::/64":
      - ads

redis:
  address: blocky-dragonfly-db:6379
  connectionAttempts: 10
  connectionCooldown: 60s

queryLog:
  type: postgresql
  logRetentionDays: 90
  creationAttempts: 5
  creationCooldown: 60s
  flushInterval: 5s
