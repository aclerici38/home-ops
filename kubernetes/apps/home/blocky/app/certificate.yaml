---
# yaml-language-server: $schema=https://k8s-versioned-schemas.pages.dev/cert-manager/1.20.3/certificate_v1.json
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: blocky-tls
spec:
  secretName: blocky-tls
  issuerRef:
    name: letsencrypt-production
    kind: ClusterIssuer
  commonName: dot.clerici.tech
  dnsNames:
    - dot.clerici.tech
  privateKey:
    rotationPolicy: Always
