---
# yaml-language-server: $schema=https://k8s-versioned-schemas.pages.dev/flux/2.9.3/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: snapshot-controller
spec:
  interval: 1h
  maxHistory: 1
  chartRef:
    kind: OCIRepository
    name: snapshot-controller
  install:
    timeout: 2m
    remediation:
      retries: 1
  upgrade:
    timeout: 2m
    remediation:
      retries: 1
  values:
    controller:
      # openebs zfs-localpv snapshots are taken by the per-node CSI driver
      extraArgs:
        - --enable-distributed-snapshotting=true
    monitoring:
      serviceMonitor:
        enabled: true
