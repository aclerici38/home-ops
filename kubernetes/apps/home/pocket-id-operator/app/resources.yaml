---
# yaml-language-server: $schema=https://k8s-versioned-schemas.pages.dev/flux/2.9.0/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: pocket-id-operator-resources
spec:
  interval: 1h
  chart:
    spec:
      chart: kubernetes/charts/resource-bundle
      sourceRef:
        kind: GitRepository
        name: flux-system
        namespace: flux-system
  install:
    timeout: 5m
  upgrade:
    timeout: 5m
  dependsOn:
    - name: cloudnative-pg
      namespace: cloudnative-pg
    - name: external-secrets
      namespace: external-secrets
  values:
    app: pocket-id
    cnpg:
      mode: shared
    externalSecret:
      data:
        - secretKey: EMAIL
          remoteRef:
            key: cluster-secrets
            property: EMAIL
