---
# yaml-language-server: $schema=https://k8s-versioned-schemas.pages.dev/flux/2.8.8/helmrelease_v2.json?values=app-template/5.0.1
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: nodejs-poolcontroller
spec:
  interval: 1h
  maxHistory: 1
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  install:
    timeout: 5m
    remediation:
      retries: 1
  upgrade:
    timeout: 5m
    remediation:
      retries: 1
  dependsOn:
    - name: nodejs-poolcontroller-resources
  values:
    controllers:
      poolcontroller:
        pod:
          hostUsers: false
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            fsGroup: 1000
            fsGroupChangePolicy: OnRootMismatch
            seccompProfile: {type: RuntimeDefault}
        initContainers:
          # njspc hardcodes its config path to <cwd>/config.json. Seed it into
          # the PVC root so the main container can mount it directly as a file
          # subPath
          init-config:
            image:
              repository: ghcr.io/tagyoureit/njspc
              tag: 10.0.0@sha256:d2bc73cdbbbdf9e922300e55b150eeb5c7687813fc6822fdf90ed1d69b78b850
            command:
              - "/bin/sh"
              - "-c"
            args:
              - |
                set -e
                # the kubelet auto-creates a missing file-subPath as a directory;
                # remove any such stale dir from earlier runs before seeding
                if [ -e /seed/config.json ] && [ ! -f /seed/config.json ]; then
                  rm -rf /seed/config.json
                fi
                if [ ! -f /seed/config.json ]; then
                  if [ -f /seed/data/config.json ]; then
                    # migrate from the previous layout where config.json lived under data/
                    cp /seed/data/config.json /seed/config.json
                  else
                    cp /app/defaultConfig.json /seed/config.json
                  fi
                fi
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop:
                  - ALL
        containers:
          poolcontroller:
            image:
              repository: ghcr.io/tagyoureit/njspc
              tag: 10.0.0@sha256:d2bc73cdbbbdf9e922300e55b150eeb5c7687813fc6822fdf90ed1d69b78b850
            env:
              POOL_NET_CONNECT: "true"
              POOL_NET_HOST: ew11.iot.internal
              POOL_NET_PORT: "9801"
            probes:
              liveness: &probes
                enabled: true
              readiness: *probes
            resources:
              requests:
                cpu: 25m
                memory: 56Mi
              limits:
                memory: 128Mi
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop:
                  - ALL
      dashpanel:
        strategy: RollingUpdate
        pod:
          hostUsers: false
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            seccompProfile: {type: RuntimeDefault}
        containers:
          dashpanel:
            image:
              repository: ghcr.io/rstrouse/njspc-dash
              tag: 9.1.0@sha256:078ba688ab2d59e0cf5026827355c958f1bebd59fe4ac8d5f1655a35b3caba1c
            env:
              POOL_WEB_SERVICES_PROTOCOL: http://
              POOL_WEB_SERVICES_IP: nodejs-poolcontroller
              POOL_WEB_SERVICES_PORT: "4200"
              POOL_WEB_SERVICES_USEPROXY: true
            probes:
              liveness:
                enabled: true
              readiness:
                enabled: true
            resources:
              requests:
                cpu: 10m
                memory: 64Mi
              limits:
                memory: 128Mi
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop:
                  - ALL
    service:
      poolcontroller:
        controller: poolcontroller
        ports:
          http:
            port: 4200
      dashpanel:
        controller: dashpanel
        ports:
          http:
            port: &dashport 5150
    route:
      poolcontroller:
        hostnames:
          - pool.clerici.tech
        parentRefs:
          - name: internal
            namespace: kgateway
        rules:
          - backendRefs:
              - identifier: dashpanel
                port: *dashport
    persistence:
      data:
        existingClaim: nodejs-poolcontroller
        advancedMounts:
          poolcontroller:
            # init seeds config.json into the PVC root
            init-config:
              - path: /seed
            # main container mounts config.json as a file plus the writable dirs
            poolcontroller:
              - path: /app/config.json
                subPath: config.json
              - path: /app/data
                subPath: data
              - path: /app/web/bindings/custom
                subPath: bindings
      tmpfs:
        type: emptyDir
        advancedMounts:
          poolcontroller:
            poolcontroller:
              - path: /app/logs
                subPath: logs
              - path: /app/backups
                subPath: backups
