---
# yaml-language-server: $schema=https://k8s-versioned-schemas.pages.dev/flux/2.8.8/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: wyoming-piper
  namespace: wyoming
spec:
  interval: 1h
  maxHistory: 1
  chart:
    spec:
      chart: ./kubernetes/apps/home/wyoming-piper/chart
      sourceRef:
        kind: GitRepository
        name: flux-system
        namespace: flux-system
  install:
    timeout: 5m
    remediation:
      retries: 1
  upgrade:
    timeout: 5m
    remediation:
      retries: 1
  values:
    base:
      controllers:
        wyoming-piper:
          strategy: RollingUpdate
          pod:
            hostUsers: false
            securityContext:
              runAsUser: 1000
              runAsGroup: 1000
              fsGroup: 1000
              fsGroupChangePolicy: OnRootMismatch
              runAsNonRoot: true
              seccompProfile: {type: RuntimeDefault}
          containers:
            piper:
              image:
                repository: mirror.gcr.io/rhasspy/wyoming-piper
                tag: 2.2.2@sha256:c874e4a04657ae3381332ee5d0c8c70a310dae6722892840f530ac0890b44eb3
              args:
                - --voice
                - en_US-lessac-high
              resources:
                requests:
                  cpu: 50m
                limits:
                  memory: 1Gi
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities: {drop: [ALL]}
      service:
        wyoming-piper:
          controller: wyoming-piper
          ports:
            wyoming:
              port: 10200
      persistence:
        data:
          existingClaim: wyoming-piper-cache
          globalMounts:
            - path: /data
        tmpfs:
          type: emptyDir
          globalMounts:
            - path: /tmp
              subPath: tmp
