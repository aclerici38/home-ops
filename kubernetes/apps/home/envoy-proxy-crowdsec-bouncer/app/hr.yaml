---
# yaml-language-server: $schema=https://k8s-versioned-schemas.pages.dev/flux/2.9.3/helmrelease_v2.json?values=envoy-proxy-crowdsec-bouncer/0.6.3
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: envoy-proxy-crowdsec-bouncer
spec:
  interval: 1h
  maxHistory: 1
  chartRef:
    kind: OCIRepository
    name: envoy-proxy-crowdsec-bouncer
  install:
    timeout: 2m
    remediation:
      retries: 1
  upgrade:
    timeout: 2m
    remediation:
      retries: 1
  values:
    replicaCount: 2
    fullnameOverride: crowdsec-bouncer
    podSecurityContext:
      runAsNonRoot: true
      seccompProfile:
        type: RuntimeDefault
    securityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop:
          - "ALL"
      readOnlyRootFilesystem: true
      runAsNonRoot: true
      runAsUser: 1000
      seccompProfile:
        type: RuntimeDefault
    config:
      server:
        grpcPort: 8080
        logLevel: info
      trustedProxies:
        - ${CLUSTER_POD_CIDR}
      bouncer:
        enabled: true
        metrics: true
        metricsInterval: 10m
        lapiURL: http://crowdsec-service.crowdsec.svc.cluster.local:8080
        tickerInterval: 10s
        apiKeySecretRef:
          name: envoy-proxy-crowdsec-bouncer
          key: BOUNCER_API_KEY
      waf:
        enabled: true
        appSecURL: http://crowdsec-appsec-service.crowdsec.svc.cluster.local:7422
        apiKeySecretRef:
          name: envoy-proxy-crowdsec-bouncer
          key: BOUNCER_API_KEY
      prometheus:
        enabled: true
        serviceMonitor:
          enabled: true
      resources:
        requests:
          cpu: 10m
          memory: 64Mi
        limits:
          memory: 128Mi
  dependsOn:
    - name: envoy-proxy-crowdsec-bouncer-resources
