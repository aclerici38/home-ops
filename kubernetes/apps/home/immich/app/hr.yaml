---
# yaml-language-server: $schema=https://k8s-versioned-schemas.pages.dev/flux/2.9.0/helmrelease_v2.json?values=app-template/5.0.1
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: immich
spec:
  interval: 1h
  maxHistory: 1
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  install:
    timeout: 5m
  upgrade:
    timeout: 5m
  dependsOn:
    - name: nfs-server
      namespace: nfs-server
    - name: immich-resources
  values:
    controllers:
      server:
        forceRename: immich
        strategy: RollingUpdate
        pod:
          nodeSelector:
            kubernetes.io/hostname: "bonds"
        containers:
          immich-server:
            image:
              repository: ghcr.io/immich-app/immich-server
              tag: v3.0.0@sha256:685ba5c93337058ff8a189d3ed89f0ba470ef966b1c94d2eace1a3d991f9816e
            env:
              IMMICH_LOG_LEVEL: verbose
              REDIS_HOSTNAME: immich-dragonfly-db
              IMMICH_TELEMETRY_INCLUDE: all
              IMMICH_IGNORE_MOUNT_CHECK_ERRORS: true
              IMMICH_PROCESS_INVALID_IMAGES: true
              DB_URL:
                valueFrom:
                  secretKeyRef:
                    name: immich-db-app
                    key: uri
            probes:
              liveness: &probes
                custom: true
                spec:
                  httpGet:
                    path: /api/server/ping
                    port: &port 2283
              readiness: *probes
              startup:
                custom: true
                spec:
                  httpGet:
                    path: /api/server/ping
                    port: *port
                  periodSeconds: 5
                  failureThreshold: 18
                  initialDelaySeconds: 2
                  timeoutSeconds: 1
            securityContext: &contSec
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: {drop: ["ALL"]}
            resources:
              requests:
                cpu: 100m
                memory: 300Mi
              limits:
                memory: 12Gi
              claims:
                - name: gpu
      machine-learning:
        pod:
          nodeSelector:
            kubernetes.io/hostname: "bonds"
        containers:
          immich-ml:
            image:
              repository: ghcr.io/immich-app/immich-machine-learning
              tag: v3.0.0-openvino@sha256:9abb73aff96dc3a9aa28cfa090d1556708890811d3b8b9b6bacfb14436037a21
            env:
              HF_HOME: /cache/hf
              IMMICH_LOG_LEVEL: verbose
              MACHINE_LEARNING_MODEL_TTL: 0
              MACHINE_LEARNING_CACHE_FOLDER: /cache
              MACHINE_LEARNING_PRELOAD__CLIP__TEXTUAL: ViT-SO400M-16-SigLIP2-384__webli
              GUNICORN_CMD_ARGS: --no-control-socket
            resources:
              requests:
                cpu: 500m
                memory: 5Gi
              limits:
                memory: 16Gi
              claims:
                - name: gpu
            securityContext: *contSec
    defaultPodOptions:
      resourceClaims:
        - name: gpu
          resourceClaimTemplateName: immich-gpu
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile: {type: RuntimeDefault}
    service:
      server:
        controller: server
        ports:
          http:
            port: *port
          metrics-api:
            port: 8081
      ml:
        controller: machine-learning
        ports:
          http:
            port: 3003
    serviceMonitor:
      server:
        serviceName: immich-server
        endpoints:
          - port: metrics-api
            scheme: http
    route:
      immich:
        hostnames:
          - immich.clerici.tech
        parentRefs:
          - name: external
            namespace: kgateway
        rules:
          - backendRefs:
              - identifier: server
                port: *port
    persistence:
      data:
        type: nfs
        server: nfs.clerici.tech
        path: /immich
        advancedMounts:
          server:
            immich-server:
              - path: /data
      thumbnails:
        existingClaim: immich-thumbs
        advancedMounts:
          server:
            immich-server:
              - path: /data/thumbs
      encoded-video:
        existingClaim: immich-encoded-video
        advancedMounts:
          server:
            immich-server:
              - path: /data/encoded-video
      cache:
        existingClaim: immich-ml-cache
        advancedMounts:
          machine-learning:
            immich-ml:
              - path: /cache
                subPath: cache
              - path: /.config/matplotlib
                subPath: matplotlib-config
              - path: /.cache/matplotlib
                subPath: matplotlib-cache
      tmpfs:
        type: emptyDir
        globalMounts:
          - path: /tmp
            subPath: tmp
        advancedMounts:
          server:
            immich-server:
              - path: /data/backups
                subPath: backups
