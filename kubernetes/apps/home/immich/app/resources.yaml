---
# yaml-language-server: $schema=https://k8s-versioned-schemas.pages.dev/flux/2.9.2/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: immich-resources
spec:
  interval: 1h
  chart:
    spec:
      chart: kubernetes/charts/resource-bundle
      sourceRef:
        kind: GitRepository
        name: flux-system
        namespace: flux-system
  install:
    timeout: 5m
  upgrade:
    timeout: 5m
  dependsOn:
    - name: cloudnative-pg
      namespace: cloudnative-pg
    - name: external-secrets
      namespace: external-secrets
    - name: dragonfly-operator
      namespace: dragonfly-operator
    - name: pocket-id-operator
      namespace: pocket-id-operator
  values:
    cnpg:
      mode: shared
      poolMode: session
      dbExtensions:
        - name: vector
          ensure: present
        - name: vchord
          ensure: present
          # renovate: datasource=github-releases depName=tensorchord/VectorChord
          version: 1.1.1
        - name: earthdistance
          ensure: present
        - name: cube
          ensure: present
    externalSecret: {}
    dragonfly:
      extraArgs:
        - --default_lua_flags=allow-undeclared-keys
    pocketId:
      spec:
        secret:
          storeClientSecret: false
      group: all
      secretRotation: false
      callbackUrls:
        - app.immich:///oauth-callback
      callbackPaths:
        - /auth/login
        - /user-settings
    gpu: {}
