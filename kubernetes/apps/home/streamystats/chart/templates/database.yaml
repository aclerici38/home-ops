---
# yaml-language-server: $schema=https://k8s-versioned-schemas.pages.dev/cloudnative-pg/0.28.2/database_v1.json
apiVersion: postgresql.cnpg.io/v1
kind: Database
metadata:
  name: {{ .Release.Name }}
spec:
  name: app
  owner: app
  cluster:
    name: {{ .Release.Name }}-db
  extensions:
    - name: vector
      ensure: present
    - name: vchord
      ensure: present
      # renovate: datasource=github-releases depName=tensorchord/VectorChord
      version: 1.1.1
