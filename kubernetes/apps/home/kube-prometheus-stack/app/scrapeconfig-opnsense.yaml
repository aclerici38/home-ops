---
# yaml-language-server: $schema=https://k8s-versioned-schemas.pages.dev/prometheus-operator/0.92.0/scrapeconfig_v1alpha1.json
apiVersion: monitoring.coreos.com/v1alpha1
kind: ScrapeConfig
metadata:
  name: opnsense
spec:
  metricsPath: /metrics
  scrapeInterval: 60s
  staticConfigs:
    - targets:
        - ${NODE_GATEWAY}:9100
      labels:
        job: opnsense
