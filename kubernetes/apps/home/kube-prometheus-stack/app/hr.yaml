---
# yaml-language-server: $schema=https://k8s-versioned-schemas.pages.dev/flux/2.9.3/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kube-prometheus-stack
spec:
  interval: 1h
  maxHistory: 1
  chartRef:
    kind: OCIRepository
    name: kube-prometheus-stack
  install:
    timeout: 2m
    remediation:
      retries: 1
  upgrade:
    timeout: 2m
    remediation:
      retries: 1
  valuesFrom:
    - kind: ConfigMap
      name: kube-prometheus-stack-values
      valuesKey: values.yaml
  values:
    alertmanager:
      route:
        main:
          enabled: true
          hostnames:
            - "alertmanager.clerici.tech"
          parentRefs:
            - name: internal
              namespace: kgateway
              sectionName: https
      alertmanagerSpec:
        externalUrl: https://alertmanager.clerici.tech
        storage:
          volumeClaimTemplate:
            spec:
              storageClassName: ceph-filesystem
              resources:
                requests:
                  storage: 5Gi
    prometheus:
      route:
        main:
          enabled: true
          hostnames:
            - "prometheus.clerici.tech"
          parentRefs:
            - name: internal
              namespace: kgateway
              sectionName: https
      prometheusSpec:
        storageSpec:
          volumeClaimTemplate:
            spec:
              storageClassName: ceph-filesystem
              resources:
                requests:
                  storage: 50Gi
