---
# yaml-language-server: $schema=https://k8s-versioned-schemas.pages.dev/flux/2.9.3/helmrelease_v2.json?values=app-template/5.0.1
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: tika
spec:
  interval: 1h
  maxHistory: 1
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  install:
    timeout: 2m
    remediation:
      retries: 1
  upgrade:
    timeout: 2m
    remediation:
      retries: 1
  values:
    controllers:
      tika:
        strategy: RollingUpdate
        replicas: 2
        pod:
          affinity:
            nodeAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
                nodeSelectorTerms:
                  - matchExpressions:
                      - key: kubernetes.io/hostname
                        operator: In
                        values:
                          - bonds
                          - cain
          hostUsers: false
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            fsGroup: 1000
            fsGroupChangePolicy: OnRootMismatch
            seccompProfile: {type: RuntimeDefault}
        containers:
          tika:
            image:
              repository: mirror.gcr.io/apache/tika
              tag: 3.3.1.0-full@sha256:d8e6ed96260ad89307a93195a1b856102987a818ac648502f8efbaf313d32470
            args:
              - "-c"
              - "/etc/tika/tika-config.xml"
            env:
              JAVA_OPTS: "-Xmx3g"
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /tika
                    port: &port 9998
              readiness: *probes
            resources:
              requests:
                cpu: 200m
                memory: 500Mi
              limits:
                memory: 5Gi
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: {drop: [ALL]}
    service:
      tika:
        controller: tika
        ports:
          http:
            port: *port
    persistence:
      tmp:
        type: emptyDir
        globalMounts:
          - path: /tmp
      config:
        type: configMap
        name: tika
        globalMounts:
          - path: /etc/tika/tika-config.xml
            subPath: tika-config.xml
            readOnly: true
    configMaps:
      config:
        data:
          # No <parsers> element, so the default parser set (incl. the
          # Tesseract OCR parser and PDFParser ocrStrategy=AUTO) is kept.
          tika-config.xml: |-
            <?xml version="1.0" encoding="UTF-8"?>
            <properties>
              <server>
                <params>
                  <!-- default is 300000 (5m). A task exceeding this sets the
                       server status to TIMEOUT, which shuts down the whole
                       forked JVM and kills every concurrent request on this pod. -->
                  <taskTimeoutMillis>1800000</taskTimeoutMillis>
                </params>
              </server>
            </properties>
