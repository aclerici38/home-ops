---
# yaml-language-server: $schema=https://k8s-versioned-schemas.pages.dev/flux/2.8.8/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: sonarr
  namespace: sonarr
spec:
  interval: 1h
  chart:
    spec:
      chart: ./kubernetes/apps/home/sonarr/chart
      sourceRef:
        kind: GitRepository
        name: flux-system
        namespace: flux-system
  install:
    timeout: 5m
    remediation:
      retries: 1
  upgrade:
    timeout: 5m
    remediation:
      retries: 1
  values:
    base:
      cnpg:
        enabled: true
        mode: restore
      externalSecret:
        enabled: true
      host: sonarr.clerici.tech
      image:
        repository: ghcr.io/home-operations/sonarr
        tag: 4.0.17.2967@sha256:4ff5667a371e08b098858fa2457a99a5fef5f6a32640eb8567efe979d13ac9fc
      ports:
        http: 8989
      env:
        SONARR__APP__INSTANCENAME: Sonarr
        SONARR__APP__THEME: dark
        SONARR__AUTH__METHOD: External
        SONARR__AUTH__REQUIRED: DisabledForLocalAddresses
        SONARR__LOG__DBENABLED: "False"
        SONARR__LOG__LEVEL: info
        SONARR__SERVER__PORT: 8989
        SONARR__POSTGRES__HOST:
          valueFrom:
            secretKeyRef:
              name: sonarr-db-app
              key: pooler-host
        SONARR__POSTGRES__USER:
          valueFrom:
            secretKeyRef:
              name: sonarr-db-app
              key: username
        SONARR__POSTGRES__PASSWORD:
          valueFrom:
            secretKeyRef:
              name: sonarr-db-app
              key: password
        SONARR__POSTGRES__MAINDB:
          valueFrom:
            secretKeyRef:
              name: sonarr-db-app
              key: dbname
      envFrom:
        - secretRef:
            name: sonarr
      probes:
        liveness: &probes
          enabled: true
          custom: true
          spec:
            httpGet:
              path: /ping
              port: 8989
        readiness: *probes
      resources:
        requests:
          cpu: 100m
          memory: 100Mi
        limits:
          memory: 16Gi
      persistence:
        tmpfs:
          type: emptyDir
          globalMounts:
            - path: /tmp
              subPath: tmp
            - path: /config
              subPath: config
        media:
          type: nfs
          server: nfs.clerici.tech
          path: /media
          globalMounts:
            - path: /allMedia
