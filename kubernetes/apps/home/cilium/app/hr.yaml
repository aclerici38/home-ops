---
# yaml-language-server: $schema=https://k8s-versioned-schemas.pages.dev/flux/2.9.1/helmrelease_v2.json?values=cilium/1.19.5
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cilium
spec:
  interval: 1h
  maxHistory: 1
  chartRef:
    kind: OCIRepository
    name: cilium
  install:
    timeout: 2m
    remediation:
      retries: 1
  upgrade:
    timeout: 2m
    remediation:
      retries: 1
  valuesFrom:
    - kind: ConfigMap
      name: cilium-values
      valuesKey: values.yaml
  values:
    devices: bond0
    ipv4NativeRoutingCIDR: 172.16.0.0/16
    ipv6:
      enabled: true
    ipv6NativeRoutingCIDR: fdf6:d3fd:1748:1000::/56
    bgpControlPlane:
      enabled: true
    cluster:
      name: main
      id: 1
