---
# yaml-language-server: $schema=https://k8s-versioned-schemas.pages.dev/cilium/1.19.6/ciliumbgpclusterconfig_v2.json
apiVersion: cilium.io/v2
kind: CiliumBGPClusterConfig
metadata:
  name: cilium-bgp
spec:
  bgpInstances:
    - name: "lab"
      localASN: 64513
      peers:
        - name: "opnsense"
          peerASN: 64523
          peerAddress: ${NODE_GATEWAY}
          peerConfigRef:
            name: "cilium-peer-v4"
        - name: "opnsense-v6"
          peerASN: 64523
          peerAddress: ${NODE_GATEWAY_V6}
          peerConfigRef:
            name: "cilium-peer-v6"
---
# yaml-language-server: $schema=https://k8s-versioned-schemas.pages.dev/cilium/1.19.6/ciliumbgpclusterconfig_v2.json
apiVersion: cilium.io/v2
kind: CiliumBGPPeerConfig
metadata:
  name: cilium-peer-v4
spec:
  families:
    - afi: ipv4
      safi: unicast
      advertisements:
        matchLabels:
          advertise: "bgp"
---
apiVersion: cilium.io/v2
kind: CiliumBGPPeerConfig
metadata:
  name: cilium-peer-v6
spec:
  families:
    - afi: ipv6
      safi: unicast
      advertisements:
        matchLabels:
          advertise: "bgp"
---
apiVersion: cilium.io/v2
kind: CiliumBGPAdvertisement
metadata:
  name: lb-advertisement
  labels:
    advertise: bgp
spec:
  advertisements:
    - advertisementType: "Service"
      service:
        addresses:
          - LoadBalancerIP
      selector:
        matchExpressions:
          - {key: somekey, operator: NotIn, values: ['never-used-value']}
