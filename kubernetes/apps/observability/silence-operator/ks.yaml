---
# yaml-language-server: $schema=https://k8s-versioned-schemas.pages.dev/flux/2.8.8/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: silence-operator
spec:
  targetNamespace: silence-operator
  path: ./kubernetes/apps/observability/silence-operator/app
  commonMetadata:
    labels:
      app.kubernetes.io/name: silence-operator
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: silence-operator-silences
spec:
  targetNamespace: silence-operator
  dependsOn:
    - name: silence-operator
  path: ./kubernetes/apps/observability/silence-operator/silences
  commonMetadata:
    labels:
      app.kubernetes.io/name: silence-operator
