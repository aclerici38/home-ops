---
# yaml-language-server: $schema=https://k8s-versioned-schemas.pages.dev/kube-prometheus-stack/82.10.3/servicemonitor_v1.json
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: grafana
spec:
  endpoints:
    - port: grafana
      path: /metrics
      honorLabels: true
  jobLabel: grafana
  namespaceSelector:
    matchNames:
      - observability
  selector:
    matchLabels:
      grafana.internal/instance: grafana