---
# yaml-language-server: $schema=https://k8s-versioned-schemas.pages.dev/flux/2.8.8/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: grafana-operator
spec:
  targetNamespace: grafana-operator
  path: ./kubernetes/apps/observability/grafana-operator/app
  commonMetadata:
    labels:
      app.kubernetes.io/name: grafana-operator
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: grafana-operator-instance
spec:
  targetNamespace: grafana-operator
  dependsOn:
    - name: grafana-operator
  path: ./kubernetes/apps/observability/grafana-operator/instance
  commonMetadata:
    labels:
      app.kubernetes.io/name: grafana-operator
