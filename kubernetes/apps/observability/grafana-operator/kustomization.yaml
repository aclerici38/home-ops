---
# yaml-language-server: $schema=https://json.schemastore.org/kustomization
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: grafana-operator
resources:
  - ./namespace.yaml
  - ./ks.yaml
configMapGenerator:
  - name: cluster-settings
    envs:
      - ../../../../globals.env
    literals:
      - NS=grafana-operator
generatorOptions:
  disableNameSuffixHash: true
components:
  - ../../../components/app/base
