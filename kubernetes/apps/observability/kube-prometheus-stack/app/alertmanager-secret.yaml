---
# yaml-language-server: $schema=https://k8s-versioned-schemas.pages.dev/external-secrets/2.4.1/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: alertmanager
  namespace: observability
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: alertmanager
    template:
      type: opaque
  dataFrom:
    - extract:
        key: alertmanager

