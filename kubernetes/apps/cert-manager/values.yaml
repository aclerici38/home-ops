base:
  # cert-manager runs its own controllers — skip the app-template synthesis.
  app-template:
    enabled: false
  # ClusterExternalSecret named "cloudflare" extracting 1P entry "cloudflare",
  # distributed to cert-manager (for the ClusterIssuers) and network (for
  # whatever lives there). The Secret in each ns is also named "cloudflare".
  externalSecret:
    enabled: true
    name: cloudflare
    key: cloudflare
    namespaceSelectors:
      - matchLabels:
          kubernetes.io/metadata.name: cert-manager
      - matchLabels:
          kubernetes.io/metadata.name: network

cert-manager:
  crds:
    enabled: true
  replicaCount: 2
  dns01RecursiveNameservers: https://1.1.1.1:443/dns-query,https://1.0.0.1:443/dns-query
  dns01RecursiveNameserversOnly: true
  prometheus:
    enabled: true
    servicemonitor:
      enabled: true
