---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: cert-manager
  namespace: flux-system
spec:
  targetNamespace: cert-manager
  sourceRef:
    kind: OCIRepository
    name: cert-manager
  path: ./app
  commonMetadata:
    labels:
      app.kubernetes.io/name: cert-manager
