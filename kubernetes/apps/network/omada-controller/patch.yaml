---
# yaml-language-server: $schema=https://k8s-versioned-schemas.pages.dev/flux/2.8.7/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: patch
spec:
  patches:
    # Chart 0.6.0 does not pass through cluster.postgresql.extensions, so
    # append the opt-in to the existing plugin postRenderer.
    - patch: |-
        - op: add
          path: /spec/postRenderers/0/kustomize/patches/-
          value:
            target:
              kind: Cluster
              name: omada-controller-db
            patch: |
              apiVersion: postgresql.cnpg.io/v1
              kind: Cluster
              metadata:
                name: omada-controller-db
              spec:
                postgresql:
                  extensions:
                    - name: documentdb
      target:
        kind: HelmRelease
        name: omada-controller-db
