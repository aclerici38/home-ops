---
# yaml-language-server: $schema=https://k8s-versioned-schemas.pages.dev/flux/2.8.6/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: omada-controller
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: omada-controller
  install:
    timeout: 2m
  upgrade:
    timeout: 2m
  values:
    initContainers:
      - name: ferretdb
        image: ghcr.io/ferretdb/ferretdb:2.7.0@sha256:5706414241eb84f0515512c37b46db0f1b1eac9e5ceb7e4c2523211c184b1985
        restartPolicy: Always
        env:
          - name: FERRETDB_TELEMETRY
            value: disabled
          - name: FERRETDB_AUTH
            value: "false"
          - name: FERRETDB_LISTEN_ADDR
            value: "127.0.0.1:27017"
          - name: FERRETDB_POSTGRESQL_URL
            valueFrom:
              secretKeyRef:
                key: uri
                name: omada-controller-db-app
        volumeMounts:
          - name: tmpfs
            mountPath: /state
            subPath: ferretdb
        livenessProbe: &probe
          exec:
            command: ["/ferretdb", "ping"]
          failureThreshold: 3
          periodSeconds: 10
          successThreshold: 1
          timeoutSeconds: 1
        readinessProbe: *probe
    image:
      repository: mirror.gcr.io/mbentley/omada-controller
      pullPolicy: IfNotPresent
      tag: 6.2.10.17-openj9@sha256:f9e31bb331fe61486a1d454e3db64f27966fd689a070d5357fb8e58abf586a88
    serviceAccount:
      create: false
    config:
      rootless: true
      tlsSecretName: omada-controller-tls
      # ferretdb sidecar
      externalMongoDBUrl: "mongodb://127.0.0.1:27017/app"
      ports:
        manageHttp: 8080
        manageHttps: 443
    service:
      type: LoadBalancer
      annotations:
        lbipam.cilium.io/ips: 10.38.55.10
        coredns.io/hostname: ${APP_URL}
    resources:
      requests:
        cpu: 500m
        memory: 1200Mi
      limits:
        memory: 5Gi
    persistence:
      data:
        enabled: false
      logs:
        enabled: false
      extraVolumeMounts:
        - name: tmpfs
          mountPath: /opt/tplink/EAPController/data
          subPath: data
        - name: tmpfs
          mountPath: /opt/tplink/EAPController/logs
          subPath: logs
      extraVolumes:
        - name: tmpfs
          emptyDir: {}
      