---
# yaml-language-server: $schema=https://k8s-versioned-schemas.pages.dev/flux/2.8.3/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: omada-controller
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: omada-controller
  install:
    timeout: 2m
  upgrade:
    timeout: 2m
  values:
    image:
      repository: mirror.gcr.io/mbentley/omada-controller
      pullPolicy: IfNotPresent
      tag: 6.1.0.19@sha256:62a26660f008c8cf17e02b7064bd0c35a0fc0ef207910d7d0942fd2173bfcca1
    serviceAccount:
      create: false
    config:
      rootless: true
      tlsSecretName: omada-controller-tls
      # ferretdb sidecar
      externalMongoDBUrl: "mongodb://127.0.0.1:27017/app"
      ports:
        manageHttp: 8080
        manageHttps: 443
    service:
      type: LoadBalancer
      annotations:
        lbipam.cilium.io/ips: 10.38.55.10
        coredns.io/hostname: ${APP_URL}
    resources:
      requests:
        cpu: 500m
        memory: 1200Mi
      limits:
        memory: 5Gi
    persistence:
      data:
        storageClassName: ceph-filesystem
        size: 5Gi
      logs:
        storageClassName: ceph-filesystem
        size: 5Gi
      extraVolumes:
        - name: ferretdb-state
          emptyDir: {}
      