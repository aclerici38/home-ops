---
# yaml-language-server: $schema=https://k8s-versioned-schemas.pages.dev/flux/2.8.7/helmrelease_v2.json?values=app-template/5.0.1
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: blocky-ui
spec:
  interval: 1h
  maxHistory: 1
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  install:
    timeout: 2m
    remediation:
      retries: 1
  upgrade:
    timeout: 2m
    remediation:
      retries: 1
  values:
    controllers:
      blocky-ui:
        strategy: RollingUpdate
        pod:
          hostUsers: false
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            seccompProfile: { type: RuntimeDefault }
        containers:
          blocky-ui:
            image:
              repository: ghcr.io/gabeduartem/blocky-ui
              tag: 1.7.0@sha256:51b3fdc5c3d4d184e0a06126e1761df6b4ca948b9788ab3944dda3c07da287b5
            env:
              QUERY_LOG_TYPE: timescale
              QUERY_LOG_TARGET:
                secretKeyRef:
                  name: blocky-db-app
                  key: uri
              BLOCKY_API_URL: http://blocky-k8s:4000
            probes:
              liveness:
                enabled: true
                type: HTTP
              readiness:
                enabled: true
                type: HTTP
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop:
                  - ALL
    service:
      blocky-ui:
        controller: blocky-ui
        ports:
          http:
            port: 3000
    route:
      blocky-ui:
        hostnames:
          - blocky.${SECRET_DOMAIN}
        parentRefs:
          - name: internal
            namespace: gateway-system
