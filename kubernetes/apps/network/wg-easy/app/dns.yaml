---
# yaml-language-server: $schema=https://k8s-versioned-schemas.pages.dev/external-dns/0.20.0/dnsendpoint_v1alpha1.json
apiVersion: externaldns.k8s.io/v1alpha1
kind: DNSEndpoint
metadata:
  name: wg-easy
spec:
  endpoints:
    - dnsName: wireguard.${SECRET_DOMAIN}
      recordType: CNAME
      targets:
        - house.${SECRET_DOMAIN}
