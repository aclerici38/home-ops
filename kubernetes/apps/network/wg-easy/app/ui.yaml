---
apiVersion: v1
kind: Service
metadata:
  name: wg-easy-ui
spec:
  clusterIP: None
  ports:
    - name: http
      port: 51821
      protocol: TCP
      targetPort: 51821
---
apiVersion: discovery.k8s.io/v1
kind: EndpointSlice
metadata:
  name: wg-easy-ui
  labels:
    kubernetes.io/service-name: wg-easy-ui
addressType: IPv4
ports:
  - name: http
    port: 51821
    protocol: TCP
endpoints:
  - addresses:
      - 10.0.30.60
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: wg-easy
spec:
  hostnames:
    - wg-easy.${SECRET_DOMAIN}
  parentRefs:
    - name: internal
      namespace: gateway-system
      sectionName: https
  rules:
    - backendRefs:
        - name: wg-easy-ui
          port: 51821
