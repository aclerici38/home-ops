---
# yaml-language-server: $schema=https://k8s-versioned-schemas.pages.dev/flux/2.8.8/helmrelease_v2.json?values=app-template/5.0.1
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: blocky
spec:
  interval: 1h
  maxHistory: 1
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  install:
    timeout: 2m
    remediation:
      retries: 1
  upgrade:
    timeout: 2m
    remediation:
      retries: 1
  values:
    controllers:
      blocky:
        strategy: RollingUpdate
        replicas: 3
        rollingUpdate:
          surge: 1
          unavailable: 1
          affinity:
            podAntiAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
                - labelSelector:
                    matchLabels:
                      app.kubernetes.io/instance: blocky
                  topologyKey: kubernetes.io/hostname
          hostUsers: false
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            seccompProfile: {type: RuntimeDefault}
        containers:
          main:
            image:
              repository: ghcr.io/0xerr0r/blocky
              tag: v0.30.0@sha256:d9f15eddffedded40797406349012cbd5966ef99c286b13321e7a76efddb9bdc
            env:
              PGCONNECT_TIMEOUT: 10
              PGHOST:
                valueFrom:
                  secretKeyRef:
                    name: blocky-db-app
                    key: host
              PGPORT:
                valueFrom:
                  secretKeyRef:
                    name: blocky-db-app
                    key: port
              PGUSER:
                valueFrom:
                  secretKeyRef:
                    name: blocky-db-app
                    key: username
              PGPASSWORD:
                valueFrom:
                  secretKeyRef:
                    name: blocky-db-app
                    key: password
              PGDATABASE:
                valueFrom:
                  secretKeyRef:
                    name: blocky-db-app
                    key: dbname
            probes:
              readiness: &probes
                enabled: true
                custom: true
                spec:
                  exec:
                    command:
                      - /app/blocky
                      - healthcheck
              liveness: *probes
            resources:
              requests:
                cpu: 50m
                memory: 100Mi
              limits:
                memory: 512Mi
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                add:
                  - NET_BIND_SERVICE
                drop:
                  - ALL
    service:
      dns:
        controller: blocky
        type: LoadBalancer
        annotations:
          lbipam.cilium.io/ips: "${BLOCKY_LB_IP}"
          coredns.io/hostname: dot.clerici.tech
        ports: &p
          dns-tcp:
            port: 53
          dns-udp:
            port: 53
            protocol: UDP
          dns-tls:
            port: 853
      k8s:
        controller: blocky
        clusterIP: "${BLOCKY_CLUSTER_IP}"
        ports:
          <<: *p
          http:
            port: &port 4000
    serviceMonitor:
      blocky:
        serviceName: blocky-k8s
        endpoints:
          - port: http
    route:
      blocky-DOH:
        annotations:
          # google.com base64
          gatus.home-operations.com/endpoint: |-
            url: https://dns.clerici.tech/dns-query?dns=AAABAAABAAAAAAAABmdvb2dsZQNjb20AAAEAAQ
        hostnames:
          - dns.clerici.tech
        parentRefs:
          - name: external
            namespace: gateway-system
        rules:
          - matches:
              - path:
                  type: PathPrefix
                  value: /dns-query
            backendRefs:
              - identifier: k8s
                port: *port
    persistence:
      config:
        type: configMap
        name: blocky
        globalMounts:
          - path: /app/config.yml
            subPath: config.yml
      tls:
        type: secret
        name: blocky-tls
        globalMounts:
          - path: /certs/tls.crt
            subPath: tls.crt
          - path: /certs/tls.key
            subPath: tls.key
    configMaps:
      config:
        data:
          config.yml: |-
            caching:
              minTime: 2m
              maxTime: 1h
              maxItemsCount: 0
              prefetching: true
              prefetchExpires: 1h
              prefetchThreshold: 30
              prefetchMaxItemsCount: 0
              cacheTimeNegative: -1
              exclude:
                - '/(^|\\.)clerici\\.tech$/'
                - '/\\.internal$/'
                - '/(^|\\.)cluster\\.local$/'
                - '/(^|\\.)in-addr\\.arpa$/'

            log:
              level: info

            connectIPVersion: v4
            minTlsServeVersion: 1.3
            certFile: /certs/tls.crt
            keyFile: /certs/tls.key
            ports:
              dns: 53
              tls: 853
              http: 4000

            prometheus:
              enable: true

            customDNS:
              mapping:
                wireguard.clerici.tech: 10.0.0.1

            conditional:
              fallbackUpstream: false
              mapping:
                clerici.tech: ${K8S_GATEWAY_CLUSTER_IP}:53

                # House
                internal: ${NODE_GATEWAY}:53
                0.10.in-addr.arpa: ${NODE_GATEWAY}:53

                # kube
                cluster.local: ${COREDNS_CLUSTER_IP}
                16.172.in-addr.arpa: ${COREDNS_CLUSTER_IP}

                # bambi
                bambi.internal: 192.168.8.1:53
                console.gl-inet.com: 192.168.8.1:53
                8.168.192.in-addr.arpa: 192.168.8.1:53

            # ClientLookup is set to blocky so it can conditionally forward it to coredns/apt/house DHCP
            clientLookup:
              upstream: 127.0.0.1
              clients:
                localhost:
                  - 127.0.0.1

            # To resolve devices behind coredns
            ecs:
              useAsClient: true
              forward: false

            bootstrapDns:
              - 8.8.8.8
              - 1.1.1.1
              - 9.9.9.9

            upstreams:
              groups:
                default:
                  - quic://dns.quad9.net
                  - quic://p0.freedns.controld.com
                  # TODO: swap to DoQ when it's supported by these
                  - https://doh.opendns.com/dns-query
                  - https://cloudflare-dns.com/dns-query

            blocking:
              denylists:
                ads:
                  - https://raw.githubusercontent.com/hagezi/dns-blocklists/main/wildcard/multi.txt
                security:
                  - https://raw.githubusercontent.com/hagezi/dns-blocklists/main/wildcard/tif.mini.txt
              allowlists:
                ads:
                  - |
                    epi-graphql.conde.digital
              clientGroupsBlock:
                # all clients
                0.0.0.0/0:
                  - security
                "::/0":
                  - security
                # home
                10.0.20.0/24:
                  - ads
                # cottage
                10.0.40.0/24:
                  - ads

            filtering:
              queryTypes:
                - AAAA

            redis:
              address: blocky-dragonfly-db:6379
              connectionAttempts: 10
              connectionCooldown: 60s

            queryLog:
              type: postgres
              logRetentionDays: 90
              creationAttempts: 5
              creationCooldown: 60s
              flushInterval: 5s
