---
# yaml-language-server: $schema=https://k8s-versioned-schemas.pages.dev/flux/2.8.8/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: multus
spec:
  targetNamespace: multus
  path: ./kubernetes/apps/network/multus/app
  commonMetadata:
    labels:
      app.kubernetes.io/name: multus
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: multus-networks
spec:
  targetNamespace: multus
  dependsOn:
    - name: multus
  path: ./kubernetes/apps/network/multus/networks
  commonMetadata:
    labels:
      app.kubernetes.io/name: multus
