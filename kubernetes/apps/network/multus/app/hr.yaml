---
# yaml-language-server: $schema=https://k8s-versioned-schemas.pages.dev/flux/2.8.4/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: multus
spec:
  interval: 1h
  maxHistory: 1
  chartRef:
    kind: OCIRepository
    name: multus
  install:
    timeout: 2m
    remediation:
      retries: 1
  upgrade:
    timeout: 2m
    remediation:
      retries: 1
  values:
    multus:
      resources:
        requests:
          cpu: 10m
        limits:
          memory: 32Mi