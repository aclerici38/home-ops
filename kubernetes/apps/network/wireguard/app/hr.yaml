---
# yaml-language-server: $schema=https://k8s-versioned-schemas.pages.dev/flux/2.8.3/helmrelease_v2.json?values=app-template/4.6.2
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: wireguard
spec:
  interval: 1h
  maxHistory: 1
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  install:
    timeout: 2m
    remediation:
      retries: 1
  upgrade:
    timeout: 2m
    remediation:
      retries: 1
  values:
    controllers:
      wireguard:
        strategy: RollingUpdate
        pod:
          hostUsers: false
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            seccompProfile: { type: RuntimeDefault }
        containers:
          main:
            image:
              repository: ghcr.io/linuxserver/wireguard
              tag: 1.0.20250521@sha256:fd4a95e233a90070372ccf7f488ef005932eb16ca1b0bd40afbdbb3dae9a3951
            env:
              SERVERURL: house.${SECRET_DOMAIN}
              PERSISTENTKEEPALIVE_PEERS: all
              PEERS: bambi
              PEERDNS: 172.17.0.11 # blocky
              ALLOWEDIPS: 192.168.8.0/24
              S6_YES_I_WANT_A_WORLD_WRITABLE_RUN_BECAUSE_KUBERNETES: 1
              S6_READ_ONLY_ROOT: 1
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop:
                  - ALL
                add:
                  - NET_ADMIN
    service:
      main:
        controller: wireguard
        type: LoadBalancer
        annotations:
          lbipam.cilium.io/ips: 10.38.55.55
          external-dns.alpha.kubernetes.io/hostname: wireguard.${SECRET_DOMAIN}
        ports:
          http:
            port: 51820
            protocol: UDP
    persistence:
      config:
        existingClaim: wireguard
        globalMounts:
          - path: /config
            subPath: config
      run:
        type: emptyDir
    
