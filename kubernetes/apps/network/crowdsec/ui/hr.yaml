---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/refs/tags/app-template-4.6.2/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: crowdsec-ui
spec:
  interval: 1h
  maxHistory: 1
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  install:
    timeout: 2m
    remediation:
      retries: 1
  upgrade:
    timeout: 2m
    remediation:
      retries: 1
  values:
    controllers:
      crowdsec-ui:
        strategy: RollingUpdate
        pod:
          hostUsers: false
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            seccompProfile: { type: RuntimeDefault }
        containers:
          crowdsec-ui:
            image:
              repository: ghcr.io/theduffman85/crowdsec-web-ui
              tag: 2026.3.1@sha256:ecbe5d949126c1bdaf5093499ef667b9f61e51153935d13788b1ff12ecc068ef
            env:
              CROWDSEC_URL: http://crowdsec-service:8080
              CROWDSEC_USER: crowdsec-web-ui
              CROWDSEC_PASSWORD:
                secretKeyRef:
                  name: crowdsec
                  key: WEBUI_PASS
              CROWDSEC_REFRESH_INTERVAL: 30s
            probes:
              liveness: &probe
                enabled: true
                custom: true
                spec:
                  httpGet:
                    port: &port 3000
                    path: /api/health
              readiness: *probe
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop:
                  - ALL
    service:
      crowdsec-ui:
        controller: crowdsec-ui
        ports:
          http:
            port: *port
    route:
      crowdsec-ui:
        hostnames:
          - crowdsec.${SECRET_DOMAIN}
        parentRefs:
          - name: internal
            namespace: gateway-system
            sectionName: https
        rules:
          - backendRefs:
              - identifier: crowdsec-ui
                port: *port
