---
# yaml-language-server: $schema=https://k8s-versioned-schemas.pages.dev/flux/2.8.6/helmrelease_v2.json?values=app-template/4.6.2
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: crowdsec-ui
spec:
  interval: 1h
  maxHistory: 1
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  install:
    timeout: 2m
    remediation:
      retries: 1
  upgrade:
    timeout: 2m
    remediation:
      retries: 1
  values:
    controllers:
      crowdsec-ui:
        pod:
          hostUsers: false
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            seccompProfile: { type: RuntimeDefault }
        containers:
          crowdsec-ui:
            image:
              repository: ghcr.io/theduffman85/crowdsec-web-ui
              tag: 2026.4.12@sha256:bcde0c8a2c42cc37f3a16f01e3490bd7f144ce39433cd5d9dcd227d600a30424
            env:
              CROWDSEC_URL: http://crowdsec-service:8080
              CROWDSEC_USER: crowdsec-web-ui
              CROWDSEC_PASSWORD:
                secretKeyRef:
                  name: crowdsec
                  key: WEBUI_PASS
              CROWDSEC_REFRESH_INTERVAL: 30s
            probes:
              liveness: &probe
                enabled: true
                custom: true
                spec:
                  httpGet:
                    port: &port 3000
                    path: /api/health
              readiness: *probe
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop:
                  - ALL
    service:
      crowdsec-ui:
        controller: crowdsec-ui
        ports:
          http:
            port: *port
    route:
      crowdsec-ui:
        hostnames:
          - crowdsec.${SECRET_DOMAIN}
        parentRefs:
          - name: internal
            namespace: gateway-system
    persistence:
      data:
        existingClaim: crowdsec
        globalMounts:
          - path: /app/data
            subPath: ui
