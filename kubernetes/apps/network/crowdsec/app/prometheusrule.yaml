---
# yaml-language-server: $schema=https://k8s-versioned-schemas.pages.dev/prometheus-operator/0.89.0/prometheusrule_v1.json
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: crowdsec-rules
spec:
  groups:
    - name: crowdsec.lapi
      rules:
        - alert: CrowdSecLocalAlertTriggered
          expr: |-
            increase(cs_alerts[1h]) > 5
          for: 0m
          annotations:
            summary: >-
              CrowdSec local alert {{ $labels.reason }} triggered {{ $value }} times in the last hour
          labels:
            severity: warning

        - alert: CrowdSecActiveDecisionsSpike
          expr: |-
            sum(cs_active_decisions) > 50000
          for: 15m
          annotations:
            summary: >-
              CrowdSec total active decisions exceeded 50k ({{ $value }})
          labels:
            severity: warning

        - alert: CrowdSecBouncerNoPull
          expr: |-
            sum by (bouncer) (increase(cs_lapi_bouncer_requests_total{bouncer!~".*@.*"}[30m])) == 0
          for: 5m
          annotations:
            summary: >-
              Bouncer {{ $labels.bouncer }} has not pulled decisions in 30m
          labels:
            severity: critical

        - alert: CrowdSecAgentNoHeartbeat
          expr: |-
            increase(cs_lapi_machine_requests_total{route="/v1/heartbeat"}[15m]) == 0
          for: 5m
          annotations:
            summary: >-
              CrowdSec agent {{ $labels.machine }} has not sent a heartbeat in 15m
          labels:
            severity: critical

        - alert: CrowdSecLAPIHighLatency
          expr: |-
            histogram_quantile(0.95, sum(rate(cs_lapi_request_duration_seconds_bucket[5m])) by (le, endpoint)) > 1
          for: 10m
          annotations:
            summary: >-
              CrowdSec LAPI endpoint {{ $labels.endpoint }} p95 latency above 1s
          labels:
            severity: warning

    - name: crowdsec.agent
      rules:
        - alert: CrowdSecBucketOverflowRate
          expr: |-
            increase(cs_bucket_overflowed_total[1h]) > 10
          for: 0m
          annotations:
            summary: >-
              CrowdSec scenario {{ $labels.name }} triggered {{ $value }} times in the last hour
          labels:
            severity: critical

        - alert: CrowdSecNoLogsReceived
          expr: |-
            increase(cs_syslogsource_hits_total[15m]) == 0
          for: 5m
          annotations:
            summary: >-
              CrowdSec agent not receiving syslog data from {{ $labels.source }}
          labels:
            severity: critical
