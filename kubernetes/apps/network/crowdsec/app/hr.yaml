---
# yaml-language-server: $schema=https://flux2-schemas.pages.dev/helmrelease/v2/github/crowdsecurity/helm-charts/crowdsec-0.22.1/charts/crowdsec
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: crowdsec
spec:
  interval: 1h
  maxHistory: 1
  # chartRef:
  #   kind: OCIRepository
  #   name: crowdsec
  chart:
    spec:
      chart: charts/crowdsec
      sourceRef:
        kind: GitRepository
        name: crowdsec-chart
  install:
    timeout: 2m
    remediation:
      retries: 1
  upgrade:
    timeout: 2m
    remediation:
      retries: 1
  values:
    container_runtime: containerd
    image:
      repository: ghcr.io/crowdsecurity/crowdsec
      tag: v1.7.6@sha256:63b595fef92de1778573b375897a45dd226637ee9a3d3db9f57ac7355c369493
      pullPolicy: IfNotPresent
    config:
      parsers: {}
      scenarios: {}
      postoverflows:
        s01-whitelist:
          01-whitelist-home.yaml: |-
            name: crowdsec/whitelist-home
            description: "Whitelist home IP ranges"
            whitelist:
              reason: "Home networks"
              cidr:
                - "10.0.0.0/16"
                - "172.16.0.0/12"
      config.yaml.local: |-
        api:
          server:
            auto_registration:
              enabled: true
              token: "$${REGISTRATION_TOKEN}"
              allowed_ranges:
                - "172.16.0.0/16"
        db_config:
          type: postgresql
          host: $${DB_HOST}
          port: $${DB_PORT}
          user: $${DB_USER}
          password: $${DB_PASSWORD}
          db_name: $${DB_NAME}
    lapi:
      replicas: 2
      strategy:
        type: RollingUpdate
      storeCAPICredentialsInSecret: true
      storeLAPICscliCredentialsInSecret: true
      env:
        - name: DB_HOST
          valueFrom:
            secretKeyRef:
              name: crowdsec-db-app
              key: host
        - name: DB_PORT
          valueFrom:
            secretKeyRef:
              name: crowdsec-db-app
              key: port
        - name: DB_USER
          valueFrom:
            secretKeyRef:
              name: crowdsec-db-app
              key: username
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: crowdsec-db-app
              key: password
        - name: DB_NAME
          valueFrom:
            secretKeyRef:
              name: crowdsec-db-app
              key: dbname
      service:
        type: LoadBalancer
        annotations:
          lbipam.cilium.io/ips: 10.38.55.50
      persistentVolume:
        data:
          enabled: false
        config:
          enabled: false
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          memory: 512Mi
      metrics:
        enabled: true
        serviceMonitor:
          enabled: true
    agent:
      enabled: true
      isDeployment: true
      replicas: 2
      strategy:
        type: RollingUpdate
      hostVarLog: false
      env:
        - name: COLLECTIONS
          value: "crowdsecurity/opnsense firewallservices/pf"
        - name: PARSERS
          value: "crowdsecurity/syslog-logs firewallservices/pf-logs"
      additionalAcquisition:
        - source: syslog
          listen_addr: "0.0.0.0"
          listen_port: 514
          labels:
            type: syslog
      service:
        type: LoadBalancer
        annotations:
          lbipam.cilium.io/ips: 10.38.55.51
        ports:
          - name: syslog
            port: 514
            protocol: UDP
            targetPort: 514
      resources:
        requests:
          cpu: 100m
          memory: 128Mi
        limits:
          memory: 256Mi
      metrics:
        enabled: true
        serviceMonitor:
          enabled: true
      acquisition: []
