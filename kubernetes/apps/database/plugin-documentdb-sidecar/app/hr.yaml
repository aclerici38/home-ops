---
# yaml-language-server: $schema=https://k8s-versioned-schemas.pages.dev/flux/2.8.3/helmrelease_v2.json?values=app-template/4.6.2
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: plugin-documentdb-sidecar
spec:
  interval: 1h
  maxHistory: 1
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  install:
    timeout: 2m
    remediation:
      retries: 1
  upgrade:
    timeout: 2m
    remediation:
      retries: 1
  values:
    controllers:
      sidecar:
        strategy: RollingUpdate
        pod:
          hostUsers: false
          securityContext:
            runAsNonRoot: true
            runAsUser: 10001
            runAsGroup: 10001
            seccompProfile: { type: RuntimeDefault }
        containers:
          sidecar:
            image:
              repository: ghcr.io/documentdb/documentdb-kubernetes-operator/sidecar
              tag: 0.1.1-test
            args:
              - plugin
              - --server-cert=/server/tls.crt
              - --server-key=/server/tls.key
              - --client-cert=/client/tls.crt
              - --server-address=:9090
            probes:
              liveness:
                enabled: true
                custom: true
                type: TCP
              readiness:
                enabled: true
                custom: true
                type: TCP
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: { drop: ["ALL"] }
            resources:
              requests:
                cpu: 10m
              limits:
                memory: 128Mi
    service:
      sidecar:
        controller: sidecar
        labels:
          cnpg.io/pluginName: cnpg-i-sidecar-injector.documentdb.io
        annotations:
          cnpg.io/pluginClientSecret: sidecarinjector-client-tls
          cnpg.io/pluginServerSecret: sidecarinjector-server-tls
          cnpg.io/pluginPort: "9090"
        ports:
          grpc:
            port: 9090
    persistence:
      server:
        type: secret
        name: sidecarinjector-server-tls
        globalMounts:
          - path: /server
      client:
        type: secret
        name: sidecarinjector-client-tls
        globalMounts:
          - path: /client
