---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: sidecarinjector-server
spec:
  secretName: sidecarinjector-server-tls
  commonName: sidecar-injector
  dnsNames:
    - plugin-documentdb-sidecar
  duration: 2160h
  renewBefore: 360h
  isCA: false
  usages:
    - server auth
  issuerRef:
    name: selfsigned-issuer
    kind: Issuer
    group: cert-manager.io
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: sidecarinjector-client
spec:
  secretName: sidecarinjector-client-tls
  commonName: sidecarinjector-client
  duration: 2160h
  renewBefore: 360h
  isCA: false
  usages:
    - client auth
  issuerRef:
    name: selfsigned-issuer
    kind: Issuer
    group: cert-manager.io
