---
# yaml-language-server: $schema=https://k8s-versioned-schemas.pages.dev/flux/2.8.4/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: patch
spec:
  patches:
    # patch secret to all namespaces
    - patch: |
        apiVersion: external-secrets.io/v1
        kind: ClusterExternalSecret
        metadata:
          name: patch
        spec:
          namespaceSelectors: [{}]
          externalSecretSpec:
            data:
              - secretKey: versity-access-key-id
                remoteRef:
                  key: versity
                  property: username
              - secretKey: versity-secret-access-key
                remoteRef:
                  key: versity
                  property: password
      target:
        kind: ClusterExternalSecret
        labelSelector: dormammu.io/component=external-secret
