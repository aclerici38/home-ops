---
# yaml-language-server: $schema=https://k8s-versioned-schemas.pages.dev/cloudnative-pg/0.28.0/clusterimagecatalog_v1.json
apiVersion: postgresql.cnpg.io/v1
kind: ClusterImageCatalog
metadata:
  name: postgresql-minimal-trixie
spec:
  images:
    - major: 18
      image: ghcr.io/cloudnative-pg/postgresql:18.3-minimal-trixie@sha256:59e50a79185bfde76057bfbc13b1ab3dd282d67b1a9d6a464b6d5234a2324730
      extensions:
        - name: pgvector
          image:
            reference: ghcr.io/cloudnative-pg/pgvector:0.8.2-18-trixie@sha256:9d7163ba30b61b4e67ea5e443eed6bc4b0d99688af1af375686ea5b809fcdad5
        - name: postgis
          image:
            reference: ghcr.io/cloudnative-pg/postgis-extension:3.6.3-18-trixie@sha256:683877c4412279ed561ce6623fcb722756f6dc1cfb625cc2cce692fa10abf8b0
          ld_library_path:
            - system
          env:
            - name: GDAL_DATA
              value: $${image_root}/share/gdal
            - name: PROJ_DATA
              value: $${image_root}/share/proj
        - name: vchord
          image:
            reference: ghcr.io/tensorchord/vchord-scratch:pg18-v1.1.1@sha256:bdea43bed2a414e21bbf71767bf6f0739747ac480b267b51772dc214ac28dcb3
          dynamic_library_path:
            - /usr/lib/postgresql/18/lib
          extension_control_path:
            - /usr/share/postgresql/18/
        - name: documentdb
          image:
            reference: ghcr.io/documentdb/documentdb-kubernetes-operator/documentdb:0.1.1-test
          dynamic_library_path: ["lib"]
          extension_control_path: ["share"]
          ld_library_path: ["lib", "system"]
      