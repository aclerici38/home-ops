---
# yaml-language-server: $schema=https://k8s-versioned-schemas.pages.dev/external-secrets/2.5.0/clusterexternalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ClusterExternalSecret
metadata:
  name: cloudnative-pg
  labels:
    dormammu.io/component: external-secret
spec:
  namespaceSelectors:
    - {}
  refreshTime: "1m"
  externalSecretSpec:
    secretStoreRef:
      kind: ClusterSecretStore
      name: onepassword-connect
    data:
      - secretKey: versity-access-key-id
        remoteRef:
          key: versity
          property: username
      - secretKey: versity-secret-access-key
        remoteRef:
          key: versity
          property: password
    dataFrom:
      - extract:
          key: cloudnative-pg
