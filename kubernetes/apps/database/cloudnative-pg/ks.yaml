---
# yaml-language-server: $schema=https://k8s-versioned-schemas.pages.dev/flux/2.8.8/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: cloudnative-pg
spec:
  targetNamespace: cloudnative-pg
  path: ./kubernetes/apps/database/cloudnative-pg/app
  commonMetadata:
    labels:
      app.kubernetes.io/name: cloudnative-pg
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: cloudnative-pg-catalogs
spec:
  targetNamespace: cloudnative-pg
  dependsOn:
    - name: cloudnative-pg
  path: ./kubernetes/apps/database/cloudnative-pg/catalogs
  commonMetadata:
    labels:
      app.kubernetes.io/name: cloudnative-pg
