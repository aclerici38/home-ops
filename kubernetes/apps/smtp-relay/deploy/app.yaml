---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: smtp-relay
  namespace: flux-system
spec:
  interval: 1h
  targetNamespace: smtp-relay
  sourceRef:
    kind: OCIRepository
    name: smtp-relay
  path: ./app
  prune: true
  wait: true
  commonMetadata:
    labels:
      app.kubernetes.io/name: smtp-relay
  postBuild:
    substitute:
      NS: smtp-relay
    substituteFrom:
      - kind: ConfigMap
        name: cluster-settings
      - kind: Secret
        name: cluster-secrets
