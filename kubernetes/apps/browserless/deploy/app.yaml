kind: Kustomization
metadata:
  name: browserless
  namespace: flux-system
spec:
  targetNamespace: browserless
  sourceRef:
    kind: OCIRepository
    name: browserless
  path: ./app
  commonMetadata:
    labels:
      app.kubernetes.io/name: browserless
