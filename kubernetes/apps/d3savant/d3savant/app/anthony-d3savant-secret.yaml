---
# yaml-language-server: $schema=https://k8s-versioned-schemas.pages.dev/external-secrets/2.2.0/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: anthony-d3savant
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    template:
      metadata:
        labels:
          cnpg.io/reload: "true" # reloads cluster w/ password if changed
  dataFrom:
    - extract:
        key: anthony-d3savant

