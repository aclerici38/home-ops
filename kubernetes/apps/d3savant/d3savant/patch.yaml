---
# yaml-language-server: $schema=https://k8s-versioned-schemas.pages.dev/flux/2.8.7/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: patch
spec:
  patches:
    # The Pooler is now Helm-rendered, so this patch can no longer target
    # it directly in the kustomize output. Inject it into the HR's
    # postRenderer to apply at chart-render time.
    - patch: |-
        - op: add
          path: /spec/postRenderers/0/kustomize/patches/-
          value:
            target:
              kind: Pooler
              name: d3savant-db-pooler-rw
            patch: |
              apiVersion: postgresql.cnpg.io/v1
              kind: Pooler
              metadata:
                name: d3savant-db-pooler-rw
              spec:
                serviceTemplate:
                  metadata:
                    annotations:
                      lbipam.cilium.io/ips: ${D3SAVANT_LB_IP}
                  spec:
                    type: LoadBalancer
                    externalTrafficPolicy: Local
      target:
        kind: HelmRelease
        name: d3savant-db
