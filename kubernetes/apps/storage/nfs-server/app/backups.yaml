---
# yaml-language-server: $schema=https://datreeio.github.io/CRDs-catalog/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: immich-pvc-backup
spec:
  targetNamespace: ${NS}
  path: ./kubernetes/components/volsync/resources/backup
  dependsOn:
    - name: volsync
    - name: external-secrets
      namespace: cluster-infra
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  wait: true
  prune: true
  interval: 30m
  timeout: 3m
  postBuild:
    substitute:
      APP: immich
      VOLSYNC_SCHEDULE: 0 4 * * *
      VOLSYNC_KOPIA_REPO: volsync-kopia-storj
      VOLSYNC_STORAGECLASS: zfs-tank
      VOLSYNC_SNAPSHOTCLASS: openebs-zfs
