---
# yaml-language-server: $schema=https://k8s-versioned-schemas.pages.dev/flux/2.8.6/helmrelease_v2.json?values=app-template/5.0.0
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: nfs-server
spec:
  interval: 1h
  maxHistory: 1
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  install:
    timeout: 2m
    remediation:
      retries: 1
  upgrade:
    timeout: 2m
    remediation:
      retries: 1
  values:
    controllers:
      nfs-server:
        strategy: RollingUpdate
        pod:
          priorityClassName: nfs-critical
          securityContext:
            runAsUser: 0
            runAsGroup: 0
            fsGroup: 1000
            fsGroupChangePolicy: OnRootMismatch
            runAsNonRoot: false
            seccompProfile: { type: Unconfined }
        containers:
          nfs-server:
            image:
              # Only latest tag is published and digest is overwritten each update so don't pin digest
              # e.g. node boots after update, latest@sha no longer exists, new update not merged == no nfs
              repository: quay.io/aminvakil/alpine-nfs-server
              tag: latest
            env:
              EXPORTS_MOUNTED: true
              NFS_THREADS: 128
            probes:
              startup:
                enabled: true
                custom: true
                spec:
                  exec:
                    command:
                      - sh
                      - -c
                      - "showmount -e localhost | grep -q /export"
              readiness: &probes
                enabled: true
                type: TCP
                port: 2049
                spec:
                  periodSeconds: 3
                  timeoutSeconds: 1
                  failureThreshold: 2
                  successThreshold: 1
              liveness: *probes
            securityContext:
              allowPrivilegeEscalation: true
              readOnlyRootFilesystem: false
              privileged: true
    service:
      nfs-server:
        controller: nfs-server
        type: LoadBalancer
        externalTrafficPolicy: Local
        annotations:
          lbipam.cilium.io/ips: "${NFS_LB_IP:-1.1.1.1}"
          coredns.io/hostname: nfs.${SECRET_DOMAIN}
        ports:
          nfs:
            port: 2049
    persistence:
      exports:
        type: configMap
        name: nfs-exports
        globalMounts:
          - path: /etc/exports
            subPath: exports
      fake-export:
        type: emptyDir
        globalMounts:
          - path: /export
      immich:
        existingClaim: immich
        globalMounts:
          - path: /export/immich
      media:
        existingClaim: media
        globalMounts:
          - path: /export/media
      ssd:
        existingClaim: ssd-csi-pvc
        globalMounts:
          - path: /export/ssd
      tank:
        existingClaim: tank-csi-pvc
        globalMounts:
          - path: /export/tank
