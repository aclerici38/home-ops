---
# yaml-language-server: $schema=https://k8s-versioned-schemas.pages.dev/flux/2.8.8/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: volsync
spec:
  targetNamespace: volsync
  path: ./kubernetes/apps/storage/volsync/app
  commonMetadata:
    labels:
      app.kubernetes.io/name: volsync
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: volsync-kopia
spec:
  targetNamespace: volsync
  dependsOn:
    - name: volsync
  path: ./kubernetes/apps/storage/volsync/kopia
  commonMetadata:
    labels:
      app.kubernetes.io/name: volsync
