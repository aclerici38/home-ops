---
# yaml-language-server: $schema=https://k8s-versioned-schemas.pages.dev/external-secrets/2.4.1/clusterexternalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ClusterExternalSecret
metadata:
  name: volsync-kopia-versity
spec:
  namespaceSelectors: [{}]
  externalSecretSpec:
    secretStoreRef:
      kind: ClusterSecretStore
      name: onepassword-connect
    target:
      template:
        data:
          KOPIA_REPOSITORY: s3://volsync
          AWS_S3_ENDPOINT: http://versitygw.storage.svc.cluster.local:7070
          KOPIA_PASSWORD: "{{ .KOPIA_PASSWORD }}"
          AWS_ACCESS_KEY_ID: "{{ .AWS_ACCESS_KEY_ID }}"
          AWS_SECRET_ACCESS_KEY: "{{ .AWS_SECRET_ACCESS_KEY }}"
          KOPIA_S3_DISABLE_TLS: "true"
    data:
      - secretKey: AWS_ACCESS_KEY_ID
        remoteRef:
          key: versity
          property: username
      - secretKey: AWS_SECRET_ACCESS_KEY
        remoteRef:
          key: versity
          property: password
    dataFrom:
      - extract:
          key: volsync-kopia-versity
---
# yaml-language-server: $schema=https://k8s-versioned-schemas.pages.dev/external-secrets/2.4.1/clusterexternalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ClusterExternalSecret
metadata:
  name: volsync-kopia-backblaze
spec:
  namespaceSelectors: [{}]
  externalSecretSpec:
    secretStoreRef:
      kind: ClusterSecretStore
      name: onepassword-connect
    target:
      template:
        data:
          KOPIA_REPOSITORY: s3://kopia-k8s
          AWS_S3_ENDPOINT: https://s3.us-west-004.backblazeb2.com
          KOPIA_PASSWORD: "{{ .KOPIA_PASSWORD }}"
          AWS_ACCESS_KEY_ID: "{{ .AWS_ACCESS_KEY_ID }}"
          AWS_SECRET_ACCESS_KEY: "{{ .AWS_SECRET_ACCESS_KEY }}"
    dataFrom:
      - extract:
          key: volsync-kopia-backblaze
