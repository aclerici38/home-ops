---
# yaml-language-server: $schema=https://k8s-versioned-schemas.pages.dev/flux/2.8.5/helmrelease_v2.json?values=app-template/4.6.2
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kopia
spec:
  interval: 1h
  maxHistory: 1
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  install:
    timeout: 2m
    remediation:
      retries: 1
  upgrade:
    timeout: 2m
    remediation:
      retries: 1
  values:
    controllers:
      versity:
        containers:
          kopia-versity: &container
            image:
              repository: ghcr.io/home-operations/kopia
              tag: 0.22.3@sha256:17ab64542280197a5368247deaefadc3e3bbe15714ab666c2455a06824e86efd
            env: &env
              KOPIA_WEB_ENABLED: true
              KOPIA_WEB_PORT: &port 8080
              KOPIA_SERVER_USERNAME: anthony
              KOPIA_SERVER_PASSWORD:
                secretKeyRef:
                  name: volsync-kopia-versity
                  key: KOPIA_PASSWORD
              KOPIA_PASSWORD:
                secretKeyRef:
                  name: volsync-kopia-versity
                  key: KOPIA_PASSWORD
              AWS_ACCESS_KEY_ID:
                secretKeyRef:
                  name: volsync-kopia-versity
                  key: AWS_ACCESS_KEY_ID
              AWS_SECRET_ACCESS_KEY:
                secretKeyRef:
                  name: volsync-kopia-versity
                  key: AWS_SECRET_ACCESS_KEY
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: { drop: ["ALL"] }
            resources:
              requests:
                cpu: 100m
              limits:
                memory: 512Mi
      storj:
        containers:
          kopia-storj:
            <<: *container
            env:
              <<: *env
              KOPIA_SERVER_PASSWORD:
                secretKeyRef:
                  name: volsync-kopia-storj
                  key: KOPIA_PASSWORD
              KOPIA_PASSWORD:
                secretKeyRef:
                  name: volsync-kopia-storj
                  key: KOPIA_PASSWORD
              AWS_ACCESS_KEY_ID:
                secretKeyRef:
                  name: volsync-kopia-storj
                  key: AWS_ACCESS_KEY_ID
              AWS_SECRET_ACCESS_KEY:
                secretKeyRef:
                  name: volsync-kopia-storj
                  key: AWS_SECRET_ACCESS_KEY
    defaultPodOptions:
      hostUsers: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile: { type: RuntimeDefault }
    service:
      versity: &svc
        controller: versity
        ports:
          http:
            port: *port
      storj:
        <<: *svc
        controller: storj
    route:
      versity: &route
        hostnames:
          - kopia-versity.${SECRET_DOMAIN}
        parentRefs:
          - name: internal
            namespace: gateway-system
            sectionName: https
        rules:
          - backendRefs:
              - identifier: versity
                port: *port
      storj:
        <<: *route
        hostnames:
          - kopia-storj.${SECRET_DOMAIN}
        rules:
          - backendRefs:
              - identifier: storj
                port: *port
    configMaps:
      config:
        data:
          versity.repository.config: |-
            {
              "storage": {
                "type": "s3",
                "config": {
                  "bucket": "volsync",
                  "endpoint": "versitygw.storage.svc.cluster.local:7070",
                  "doNotUseTLS": true
                }
              },
              "hostname": "volsync.${NS}.svc.cluster.local",
              "username": "volsync",
              "description": "volsync",
              "enableActions": false
            }
          storj.repository.config: |-
            {
              "storage": {
                "type": "s3",
                "config": {
                  "bucket": "kube",
                  "endpoint": "gateway.storjshare.io"
                }
              },
              "hostname": "volsync.${NS}.svc.cluster.local",
              "username": "volsync",
              "description": "volsync",
              "enableActions": false
            }
    persistence:
      config-file:
        type: configMap
        identifier: config
        advancedMounts:
          versity:
            kopia-versity:
              - path: /config/repository.config
                subPath: versity.repository.config
          storj:
            kopia-storj:
              - path: /config/repository.config
                subPath: storj.repository.config
      tmpfs:
        type: emptyDir
        globalMounts:
          - path: /config/cache
            subPath: cache
          - path: /config/logs
            subPath: logs
          - path: /tmp
            subPath: tmp
