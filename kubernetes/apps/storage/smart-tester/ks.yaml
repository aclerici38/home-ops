---
# yaml-language-server: $schema=https://k8s-versioned-schemas.pages.dev/flux/2.8.8/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: short-smart-tester
spec:
  targetNamespace: smart-tester
  path: ./kubernetes/apps/storage/smart-tester/app
  commonMetadata:
    labels:
      app.kubernetes.io/name: smart-tester
  postBuild:
    substitute:
      TEST_TYPE: short
      TEST_SCHEDULE: "0 0 8,16,22 * *"
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: long-smart-tester
spec:
  targetNamespace: smart-tester
  path: ./kubernetes/apps/storage/smart-tester/app
  commonMetadata:
    labels:
      app.kubernetes.io/name: smart-tester
  postBuild:
    substitute:
      TEST_TYPE: long
      TEST_SCHEDULE: "0 2 3 * *"
