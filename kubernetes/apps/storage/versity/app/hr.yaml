---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/refs/tags/app-template-4.6.2/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: versity
spec:
  interval: 1h
  maxHistory: 1
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  install:
    timeout: 2m
    remediation:
      retries: 1
  upgrade:
    timeout: 2m
    remediation:
      retries: 1
  values:
    controllers:
      versity:
        pod:
          priorityClassName: s3-critical
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            fsGroup: 1000
            fsGroupChangePolicy: OnRootMismatch
            seccompProfile: { type: RuntimeDefault }
        containers:
          versity:
            image:
              repository: ghcr.io/versity/versitygw
              tag: v1.3.0@sha256:035ca86a38033c92c31a2a3dd54aa37581737c03e872154130306dac50580ad2
            args:
              - posix
              - /data
            env:
              VGW_HEALTH: /healthz
              VGW_WEBUI_PORT: &uiPort 8080
              ROOT_ACCESS_KEY_ID:
                secretKeyRef:
                  name: versity
                  key: ROOT_ACCESS_KEY_ID
              ROOT_SECRET_ACCESS_KEY:
                secretKeyRef:
                  name: versity
                  key: ROOT_SECRET_ACCESS_KEY
              # VGW_DEBUG: true
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /healthz
                    port: &port 7070
              readiness: *probes
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: { drop: ["ALL"] }
            resources:
              requests:
                cpu: 100m
                memory: 20Mi
              limits:
                memory: 512Mi
    service:
      versity:
        controller: versity
        ports:
          s3:
            port: *port
          ui:
            port: *uiPort
    route:
      s3:
        annotations:
          gatus.home-operations.com/endpoint: |-
            url: https://${APP_URL}/healthz
        hostnames:
          - ${APP_URL}
        parentRefs:
          - name: internal
            namespace: gateway-system
            sectionName: https
        rules:
          - backendRefs:
            - identifier: versity
              port: *port
      ui:
        hostnames:
          - s3.${SECRET_DOMAIN}
        parentRefs:
          - name: internal
            namespace: gateway-system
            sectionName: https
        rules:
          - backendRefs:
            - identifier: versity
              port: *uiPort
    persistence:
      backups:
        existingClaim: backups
        globalMounts:
          - path: /data
