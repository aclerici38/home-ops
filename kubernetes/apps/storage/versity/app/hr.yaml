---
# yaml-language-server: $schema=https://k8s-versioned-schemas.pages.dev/flux/2.8.8/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: versitygw
spec:
  interval: 1h
  maxHistory: 1
  chartRef:
    kind: OCIRepository
    name: versitygw
  install:
    timeout: 2m
    remediation:
      retries: 1
  upgrade:
    timeout: 2m
    remediation:
      retries: 1
  values:
    image:
      repository: ghcr.io/versity/versitygw
      tag: v1.5.0@sha256:7d56e0a6c246f00e2385ba4fe84065981959be1d822648f88a155c82e0e0652d
    serviceAccount:
      create: false
    podSecurityContext:
      runAsUser: 1000
      runAsGroup: 1000
      fsGroup: 1000
    resources:
      requests:
        cpu: 100m
        memory: 20Mi
      limits:
        memory: 512Mi
    persistence:
      enabled: true
      create: false
      claimName: backups
    httpRoute:
      enabled: true
      parentRefs: &gateway
        - name: internal
          namespace: gateway-system
          sectionName: https
      hostnames:
        - s3.clerici.tech
    auth:
      existingSecret: versity
    gateway:
      backend:
        type: posix
        # chart mounts at /mnt/data, need to use s3 subPath
        args: /mnt/data/s3
      debug: false
    webui:
      enabled: true
      apiGateways:
        - https://s3.clerici.tech
      httpRoute:
        enabled: true
        parentRefs: *gateway
        hostnames:
          - versity.clerici.tech
    extraEnv:
      - name: VGW_VERSIONING_DIR
        value: /mnt/data/versioning
      # kopia doesn't support xattrs so we must store metadata separately
      # this prob doesn't matter with no acls but why not
      - name: VGW_META_SIDECAR
        value: /mnt/data/sidecar
  dependsOn:
    - name: versity-resources
