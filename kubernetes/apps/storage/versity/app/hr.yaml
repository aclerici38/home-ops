---
# yaml-language-server: $schema=https://k8s-versioned-schemas.pages.dev/flux/2.8.6/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: versitygw
spec:
  interval: 1h
  maxHistory: 1
  chartRef:
    kind: OCIRepository
    name: versitygw
  install:
    timeout: 2m
    remediation:
      retries: 1
  upgrade:
    timeout: 2m
    remediation:
      retries: 1
  values:
    image:
      repository: ghcr.io/versity/versitygw
      tag: v1.4.0@sha256:6bd4d92bb27ece3097be3c930ea702ebf275288b8711ec91421ccf81d6f36a42
    serviceAccount:
      create: false
    podSecurityContext:
      runAsUser: 1000
      runAsGroup: 1000
      fsGroup: 1000
    resources:
      requests:
        cpu: 100m
        memory: 20Mi
      limits:
        memory: 512Mi
    persistence:
      enabled: true
      create: false
      claimName: backups
    httpRoute:
      enabled: true
      parentRefs: &gateway
        - name: internal
          namespace: gateway-system
          sectionName: https
      hostnames:
        - s3.${SECRET_DOMAIN}
    auth:
      existingSecret: versity
    gateway:
      backend:
        type: posix
        # chart mounts at /mnt/data, need to use s3 subPath
        args: /mnt/data/s3
      debug: false
    webui:
      enabled: true
      apiGateways:
        - https://s3.${SECRET_DOMAIN}
      httpRoute:
        enabled: true
        parentRefs: *gateway
        hostnames:
          - versity.${SECRET_DOMAIN}
    extraEnv:
      - name: VGW_VERSIONING_DIR
        value: /mnt/data/versioning
      # kopia doesn't support xattrs so we must store metadata separately
      # this prob doesn't matter with no acls but why not
      - name: VGW_META_SIDECAR
        value: /mnt/data/sidecar
    