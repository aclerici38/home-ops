---
# yaml-language-server: $schema=https://k8s-versioned-schemas.pages.dev/flux/2.8.8/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: tank-zfs-scrubber
spec:
  targetNamespace: zfs-scrubber
  path: ./kubernetes/apps/storage/zfs-scrubber/app
  commonMetadata:
    labels:
      app.kubernetes.io/name: zfs-scrubber
  postBuild:
    substitute:
      POOL: tank
      SCRUB_SCHEDULE: "0 3 1 * *"
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: ssd-zfs-scrubber
spec:
  targetNamespace: zfs-scrubber
  path: ./kubernetes/apps/storage/zfs-scrubber/app
  commonMetadata:
    labels:
      app.kubernetes.io/name: zfs-scrubber
  postBuild:
    substitute:
      POOL: ssd
      SCRUB_SCHEDULE: "0 0 1,15 * *"
