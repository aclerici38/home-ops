---
# yaml-language-server: $schema=https://k8s-versioned-schemas.pages.dev/gateway-api/1.5.1/gateway_v1.json
# TODO: figure out oracle loadbalancer thing vs nodeport
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: external
  annotations:
    towonel.io/enable: "true"
    towonel.io/gateway-service: kgateway/external:443
    towonel.io/tunnel-ref: towonel-operator/${CLUSTER_NAME}-k8s
    towonel.io/agent-ref: ${CLUSTER_NAME}
spec:
  gatewayClassName: kgateway
  infrastructure:
    parametersRef:
      name: kgateway-params
      group: gateway.kgateway.dev
      kind: GatewayParameters
  listeners:
    - name: http
      protocol: HTTP
      port: 80
      allowedRoutes:
        namespaces:
          from: Same
    - name: https
      protocol: HTTPS
      port: 443
      hostname: "*.clerici.tech"
      allowedRoutes:
        namespaces:
          from: All
      tls:
        certificateRefs:
          - kind: Secret
            name: clerici-tech-tls
