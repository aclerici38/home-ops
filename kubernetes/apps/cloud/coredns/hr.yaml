---
# yaml-language-server: $schema=https://k8s-versioned-schemas.pages.dev/flux/2.8.8/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: coredns
spec:
  interval: 1h
  maxHistory: 1
  chartRef:
    kind: OCIRepository
    name: coredns
  install:
    timeout: 2m
    remediation:
      retries: 1
  upgrade:
    force: true
    timeout: 2m
    remediation:
      retries: 1
  valuesFrom:
    - kind: ConfigMap
      name: coredns-values
      valuesKey: values.yaml
  values:
    servers:
      - zones:
          - zone: .
            scheme: dns://
            use_tcp: true
        port: 53
        plugins:
          - name: errors
          - name: health
            configBlock: |-
              lameduck 5s
          - name: ready
          - name: log
            configBlock: |-
              class error
          - name: prometheus
            parameters: 0.0.0.0:9153
          - name: kubernetes
            parameters: cluster.local in-addr.arpa ip6.arpa
            configBlock: |-
              pods verified
              fallthrough in-addr.arpa ip6.arpa
          # TODO: investigate v6 on oracle
          - name: template
            parameters: ANY AAAA
            configBlock: |-
              rcode NOERROR
          # No blocky on cloud: forward to the node's system resolver.
          - name: forward
            parameters: . /etc/resolv.conf
            configBlock: |-
              except cluster.local
          - name: loop
          - name: reload
