---
# yaml-language-server: $schema=https://k8s-versioned-schemas.pages.dev/flux/2.9.0/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: openebs
spec:
  interval: 1h
  maxHistory: 1
  chartRef:
    kind: OCIRepository
    name: openebs
  install:
    disableHooks: true
    timeout: 2m
    remediation:
      retries: 1
  upgrade:
    disableHooks: true
    timeout: 2m
    remediation:
      retries: 1
  valuesFrom:
    - kind: ConfigMap
      name: openebs-values
  values:
    engines:
      local:
        zfs:
          enabled: false
