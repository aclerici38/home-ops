---
# yaml-language-server: $schema=https://k8s-versioned-schemas.pages.dev/flux/2.9.2/helmrelease_v2.json?values=app-template/5.0.1
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: iroh-relay
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  install:
    timeout: 3m
  upgrade:
    timeout: 3m
  values:
    controllers:
      iroh-relay:
        type: daemonset
        pod:
          # The relay needs a routable address; bind the node's host network so
          # agents/edges can reach :8444 (TCP) and :7842 (UDP) directly.
          hostNetwork: true
          dnsPolicy: ClusterFirstWithHostNet
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            seccompProfile: {type: RuntimeDefault}
        containers:
          iroh-relay:
            image:
              repository: mirror.gcr.io/n0computer/iroh-relay
              tag: v1.0.3@sha256:e9a7ba14287dd9693aca61c339b0d154456d6609f3818a0ef358b07b36aab9cc
            args:
              - "--config-path"
              - "/etc/iroh-relay/relay.toml"
            env:
              # Quiet iroh logs
              RUST_LOG: info,iroh_relay::server::client=error,noq_proto::bloom_token_log=error
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  tcpSocket:
                    port: &httpPort 8080
              readiness:
                enabled: true
                custom: true
                spec:
                  tcpSocket:
                    port: *httpPort
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              seccompProfile: {type: RuntimeDefault}
              capabilities: {drop: ["ALL"]}
    service:
      iroh-relay:
        controller: iroh-relay
        ports:
          http:
            port: *httpPort
          https:
            port: 8444
          quic:
            port: 7842
            protocol: UDP
          metrics:
            port: 9095
    serviceMonitor:
      iroh-relay:
        serviceName: iroh-relay
        endpoints:
          - port: metrics
            interval: 1m
            scrapeTimeout: 10s
    persistence:
      config:
        type: configMap
        name: iroh-relay
        globalMounts:
          - path: /etc/iroh-relay
            readOnly: true
      tls:
        type: secret
        name: iroh-relay-tls
        globalMounts:
          - path: /tls
            readOnly: true
      data:
        type: emptyDir
        globalMounts:
          - path: /data
    configMaps:
      config:
        data:
          relay.toml: |-
            enable_quic_addr_discovery = true
            http_bind_addr = "[::]:8080"
            metrics_bind_addr = "[::]:9095"

            [tls]
            hostname = "vps.clerici.tech"
            cert_mode = "Reloading"
            manual_cert_path = "/tls/tls.crt"
            manual_key_path = "/tls/tls.key"
            https_bind_addr = "[::]:8444"
            quic_bind_addr = "[::]:7842"
