---
# yaml-language-server: $schema=https://k8s-versioned-schemas.pages.dev/cert-manager/1.21.0/certificate_v1.json
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: iroh-relay
spec:
  secretName: iroh-relay-tls
  dnsNames:
    - vps.clerici.tech
  issuerRef:
    kind: ClusterIssuer
    name: letsencrypt-production
  privateKey:
    algorithm: ECDSA
    size: 256
    rotationPolicy: Always
