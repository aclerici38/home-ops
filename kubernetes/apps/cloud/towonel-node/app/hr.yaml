---
# yaml-language-server: $schema=https://k8s-versioned-schemas.pages.dev/flux/2.8.8/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: towonel-node
spec:
  chartRef:
    kind: OCIRepository
    name: towonel-node
  interval: 30m
  dependsOn:
    - name: towonel-node-resources
  values:
    defaultPodOptions:
      hostUsers: false
    controllers:
      main:
        containers:
          main:
            env:
              TOWONEL_HUB_DB_DRIVER: postgres
              TOWONEL_HUB_PUBLIC_URL: https://towonel.clerici.tech
              TOWONEL_HUB_RELAY_URL: &iroh https://vps.clerici.tech:8443
              TOWONEL_EDGE_RELAY_URL: *iroh
              TOWONEL_HUB_DB_DSN:
                secretKeyRef:
                  name: towonel-node-db-app
                  key: uri
              TOWONEL_IDENTITY_KEY:
                secretKeyRef:
                  name: towonel-node
                  key: TOWONEL_IDENTITY_KEY
              TOWONEL_HUB_OPERATOR_API_KEY:
                secretKeyRef:
                  name: towonel-node
                  key: TOWONEL_HUB_OPERATOR_API_KEY
              TOWONEL_HUB_KEK:
                secretKeyRef:
                  name: towonel-node
                  key: TOWONEL_HUB_KEK
              TOWONEL_INVITE_HASH_KEY:
                secretKeyRef:
                  name: towonel-node
                  key: TOWONEL_INVITE_HASH_KEY
              TOWONEL_HUB_LINK_PSK:
                secretKeyRef:
                  name: towonel-node
                  key: TOWONEL_HUB_LINK_PSK
              TOWONEL_HUB_OIDC_CODEBERG_REDIRECT_URI:
                secretKeyRef:
                  name: towonel-node-oidc-credentials
                  key: issuer_url
              TOWONEL_HUB_OIDC_CODEBERG_CLIENT_ID:
                secretKeyRef:
                  name: towonel-node-oidc-credentials
                  key: client_id
              TOWONEL_HUB_OIDC_CODEBERG_CLIENT_SECRET:
                secretKeyRef:
                  name: towonel-node-oidc-credentials
                  key: client_secret
      route:
        towonel-node:
          hostnames:
            - towonel.clerici.tech
          parentRefs:
            - name: external
              namespace: kgateway
              sectionName: https
          rules:
            - backendRefs:
                - identifier: app
                  port: 8443
    serviceMonitor:
      main:
        enabled: true
    monitoring:
      prometheusrule:
        enabled: true
      dashboards:
        enabled: true
        grafanaOperator:
          enabled: true
          matchLabels:
            grafana.internal/instance: grafana
