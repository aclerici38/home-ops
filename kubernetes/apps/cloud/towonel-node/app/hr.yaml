---
# yaml-language-server: $schema=https://k8s-versioned-schemas.pages.dev/flux/2.8.8/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: towonel-node
spec:
  chartRef:
    kind: OCIRepository
    name: towonel-node
  interval: 30m
  dependsOn:
    - name: towonel-node-resources
  values:
    edge:
      bindAddress: "[::]"
      httpsPort: 9443
      httpPort: 9080
    controllers:
      main:
        containers:
          main:
            env:
              # quiet iroh logs
              RUST_LOG: debug
              TOWONEL_HUB_DB_DRIVER: postgres
              TOWONEL_HUB_PUBLIC_URL: https://towonel.cloud.clerici.tech
              TOWONEL_HUB_RELAY_URL: &iroh https://vps.clerici.tech:8444
              TOWONEL_EDGE_RELAY_URL: *iroh
              TOWONEL_EDGE_ADVERTISED_ADDRESSES: vps.clerici.tech:443
              TOWONEL_EDGE_PUBLIC_IPS: ${NODE_V4_IP},${NODE_V6_IP}
              TOWONEL_EDGE_REGION: CA
              # HAproxy in front
              TOWONEL_EDGE_PROXY_PROTOCOL: "true"
              # HAProxy reaches the edge over both loopback families: v4 clients
              # via 127.0.0.1, v6 clients via [::1], so the transport family
              # matches the PROXY-advertised client family.
              TOWONEL_EDGE_PROXY_PROTOCOL_TRUSTED: "127.0.0.1/32,::1/128,::ffff:127.0.0.1/128"
              TOWONEL_HUB_TRUSTED_PROXIES: "172.16.0.0/24,10.40.40.41/32"
              TOWONEL_HUB_DB_DSN:
                secretKeyRef:
                  name: towonel-node-db-app
                  key: uri
              TOWONEL_IDENTITY_KEY:
                secretKeyRef:
                  name: towonel-node
                  key: TOWONEL_IDENTITY_KEY
              TOWONEL_HUB_OPERATOR_API_KEY:
                secretKeyRef:
                  name: towonel-node
                  key: TOWONEL_HUB_OPERATOR_API_KEY
              TOWONEL_HUB_KEK:
                secretKeyRef:
                  name: towonel-node
                  key: TOWONEL_HUB_KEK
              TOWONEL_INVITE_HASH_KEY:
                secretKeyRef:
                  name: towonel-node
                  key: TOWONEL_INVITE_HASH_KEY
              TOWONEL_HUB_LINK_PSK:
                secretKeyRef:
                  name: towonel-node
                  key: TOWONEL_HUB_LINK_PSK
            resources:
              requests: {}
              limits: {}
    route:
      towonel-node:
        annotations:
          towonel.io/tunnel: enable
          towonel.io/tunnel-ref: towonel-operator/${CLUSTER_NAME}-k8s
          towonel.io/agent-ref: ${CLUSTER_NAME}
        hostnames:
          - towonel.cloud.clerici.tech
        parentRefs:
          - name: external
            namespace: kgateway
            sectionName: https
        rules:
          - backendRefs:
              - identifier: main
                port: 8443
    serviceMonitor:
      main:
        enabled: true
    monitoring:
      prometheusrule:
        enabled: true
      dashboards:
        enabled: true
        grafanaOperator:
          enabled: true
          matchLabels:
            grafana.internal/instance: grafana
