---
# yaml-language-server: $schema=https://k8s-versioned-schemas.pages.dev/grafana-operator/5.24.0/grafanadashboard_v1beta1.json
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: haproxy-traffic
spec:
  allowCrossNamespaceImport: true
  instanceSelector:
    matchLabels:
      grafana.internal/instance: grafana
  datasources:
    - datasourceName: prometheus
      inputName: DS_PROMETHEUS
  # NOTE: Grafana template vars / macros are written $$... so Flux's postBuild
  # envsubst leaves them as $... for Grafana to resolve.
  json: |-
    {
      "title": "HAProxy - Inbound Traffic",
      "uid": "haproxy-traffic",
      "tags": ["haproxy", "geo"],
      "timezone": "browser",
      "schemaVersion": 39,
      "time": {"from": "now-7d", "to": "now"},
      "refresh": "1m",
      "templating": {
        "list": [
          {
            "name": "action",
            "label": "Action",
            "type": "custom",
            "query": "allowed,blocked",
            "includeAll": true,
            "allValue": ".*",
            "multi": true,
            "current": {"text": ["All"], "value": ["$$__all"], "selected": true}
          }
        ]
      },
      "panels": [
        {
          "id": 1,
          "type": "geomap",
          "title": "Connections by country",
          "gridPos": {"h": 14, "w": 16, "x": 0, "y": 0},
          "datasource": {"type": "prometheus", "uid": "$${DS_PROMETHEUS}"},
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "$${DS_PROMETHEUS}"},
              "expr": "sum by (country) (increase(haproxy_connections_total{action=~\"$${action}\"}[$$__range]))",
              "format": "table",
              "instant": true,
              "refId": "A"
            }
          ],
          "options": {
            "view": {"id": "fit"},
            "basemap": {"type": "default", "name": "Basemap"},
            "layers": [
              {
                "type": "markers",
                "name": "Connections",
                "location": {
                  "mode": "lookup",
                  "lookup": "country",
                  "gazetteer": "public/gazetteer/countries.json"
                },
                "config": {
                  "style": {
                    "size": {"field": "Value", "min": 4, "max": 30},
                    "color": {"field": "Value"},
                    "opacity": 0.6
                  }
                }
              }
            ]
          },
          "fieldConfig": {
            "defaults": {"color": {"mode": "continuous-YlRd"}, "unit": "short"},
            "overrides": []
          }
        },
        {
          "id": 2,
          "type": "table",
          "title": "Top source countries",
          "gridPos": {"h": 14, "w": 8, "x": 16, "y": 0},
          "datasource": {"type": "prometheus", "uid": "$${DS_PROMETHEUS}"},
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "$${DS_PROMETHEUS}"},
              "expr": "sum by (country) (increase(haproxy_connections_total{action=~\"$${action}\"}[$$__range]))",
              "format": "table",
              "instant": true,
              "refId": "A"
            }
          ],
          "transformations": [
            {"id": "organize", "options": {"excludeByName": {"Time": true}, "renameByName": {"country": "Country", "Value": "Connections"}}}
          ],
          "fieldConfig": {
            "defaults": {"custom": {"align": "auto", "filterable": true}, "unit": "short"},
            "overrides": []
          },
          "options": {"sortBy": [{"displayName": "Connections", "desc": true}]}
        },
        {
          "id": 3,
          "type": "table",
          "title": "Connections by country / SNI / action",
          "gridPos": {"h": 12, "w": 24, "x": 0, "y": 14},
          "datasource": {"type": "prometheus", "uid": "$${DS_PROMETHEUS}"},
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "$${DS_PROMETHEUS}"},
              "expr": "sum by (country, action, sni) (increase(haproxy_connections_total{action=~\"$${action}\"}[$$__range]))",
              "format": "table",
              "instant": true,
              "refId": "A"
            }
          ],
          "transformations": [
            {"id": "organize", "options": {"excludeByName": {"Time": true}, "renameByName": {"country": "Country", "action": "Action", "sni": "SNI", "Value": "Connections"}}}
          ],
          "fieldConfig": {
            "defaults": {"custom": {"align": "auto", "filterable": true}, "unit": "short"},
            "overrides": []
          },
          "options": {"sortBy": [{"displayName": "Connections", "desc": true}]}
        }
      ]
    }
