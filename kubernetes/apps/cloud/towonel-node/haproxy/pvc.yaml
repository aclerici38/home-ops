---
# yaml-language-server: $schema=https://raw.githubusercontent.com/yannh/kubernetes-json-schema/master/v1.36.3-standalone-strict/persistentvolumeclaim-v1.json
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: haproxy-geoip-maps
spec:
  storageClassName: openebs-hostpath
  resources:
    requests:
      storage: 1Gi
  accessModes:
    - ReadWriteOnce
