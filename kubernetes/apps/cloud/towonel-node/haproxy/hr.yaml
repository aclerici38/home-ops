---
# yaml-language-server: $schema=https://k8s-versioned-schemas.pages.dev/flux/2.8.8/helmrelease_v2.json?values=app-template/5.0.1
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: haproxy
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  install:
    timeout: 3m
  upgrade:
    timeout: 3m
  values:
    controllers:
      haproxy:
        type: daemonset
        pod:
          hostNetwork: true
          dnsPolicy: ClusterFirstWithHostNet
          # Lets the updater sidecar signal the haproxy master (SIGUSR2) for a
          # graceful, zero-drop reload after a map refresh.
          shareProcessNamespace: true
          securityContext:
            runAsNonRoot: true
            runAsUser: 10001
            runAsGroup: 10001
            fsGroup: 10001
            seccompProfile: {type: RuntimeDefault}
        initContainers:
          # Build the geoip map before haproxy starts (its config references the
          # map file at parse time, so it must exist).
          geoip-init:
            image:
              repository: mirror.gcr.io/library/alpine
              tag: latest
            command:
              - "/bin/sh"
              - "/scripts/build-geoip-map.sh"
            env:
              MAXMIND_LICENSE_KEY:
                valueFrom:
                  secretKeyRef:
                    name: towonel-node
                    key: MAXMIND_LICENSE_KEY
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: {drop: ["ALL"]}
              seccompProfile: {type: RuntimeDefault}
          geoip-updater:
            dependsOn: geoip-init
            restartPolicy: Always
            image:
              repository: mirror.gcr.io/library/alpine
              tag: latest
            command:
              - "/bin/sh"
              - "/scripts/refresh-loop.sh"
            env:
              REFRESH_INTERVAL: "604800" # weekly
              MAXMIND_LICENSE_KEY:
                valueFrom:
                  secretKeyRef:
                    name: towonel-node
                    key: MAXMIND_LICENSE_KEY
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: {drop: ["ALL"]}
              seccompProfile: {type: RuntimeDefault}
            resources:
              requests: {cpu: 10m, memory: 32Mi}
              limits: {memory: 128Mi}
        containers:
          haproxy:
            image:
              repository: mirror.gcr.io/library/haproxy
              tag: 3.4.0-alpine@sha256:f5437564f819793be4614085ee0bafae45d0579fa2b97f9c76449e60436476e0
            args:
              - "-W"
              - "-S"
              - "/run/haproxy/master.sock"
              - "-f"
              - "/etc/haproxy/haproxy.cfg"
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: {drop: ["ALL"]}
              seccompProfile: {type: RuntimeDefault}
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet: {path: /healthz, port: 8404}
                  periodSeconds: 30
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet: {path: /healthz, port: 8404}
                  periodSeconds: 10
            resources:
              requests: {cpu: 50m, memory: 64Mi}
              limits: {memory: 1Gi}
    service:
      haproxy:
        controller: haproxy
        ports:
          metrics:
            port: 8404
    serviceMonitor:
      haproxy:
        serviceName: haproxy
        endpoints:
          - port: metrics
            path: /metrics
            interval: 1m
            scrapeTimeout: 10s
    persistence:
      haproxy-config:
        type: configMap
        name: haproxy-config
        globalMounts:
          - path: /etc/haproxy/haproxy.cfg
            subPath: haproxy.cfg
            readOnly: true
      scripts:
        type: configMap
        name: haproxy-scripts
        globalMounts:
          - path: /scripts
            readOnly: true
      maps:
        type: emptyDir
        globalMounts:
          - path: /etc/haproxy/maps
      runtime:
        type: emptyDir
        globalMounts:
          - path: /run/haproxy
      tmp:
        type: emptyDir
        globalMounts:
          - path: /tmp
