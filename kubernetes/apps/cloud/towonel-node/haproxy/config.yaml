---
apiVersion: v1
kind: ConfigMap
metadata:
  name: haproxy-config
data:
  haproxy.cfg: |
    global
      log stdout format raw local0 info
      # admin / master-worker CLI socket on the writable emptyDir
      stats socket /run/haproxy/admin.sock mode 660 level admin
      stats timeout 30s
      maxconn 20000
      # bound how long old workers linger after a SIGUSR2 (map refresh) reload
      hard-stop-after 1h

    defaults
      log global
      mode tcp
      timeout connect 5s
      timeout client 30s
      timeout server 30s
      # idle bound for established passthrough connections (HA websockets etc.)
      timeout tunnel 1h

    # Health + Prometheus metrics. Internal only (8404 is not in the OCI security
    # list) and not geo-filtered.
    frontend monitoring
      bind :8404
      mode http
      monitor-uri /healthz
      http-request use-service prometheus-exporter if { path /metrics }
      no log

    # Public TLS (443) and plain-HTTP (80) ingress. The geo decision is source-IP
    # only; non-US is rejected at the content phase (so the drop is logged) but
    # still immediately, since the rule is decided on the source address.
    #
    # The towonel edge sits behind PROXY v2 and matches the advertised client
    # family against the family of the loopback hop it is accepted on, so each
    # family must reach it over its own loopback address. v6only keeps v4-mapped
    # connections off the IPv6 socket; so_id then selects the family-matched backend.

    frontend https_in
      bind ipv4@:443 id 4
      bind ipv6@:443 id 6 v6only
      tcp-request connection set-var(sess.country) src,map_ip(/etc/haproxy/maps/geoip-country.map,XX)
      tcp-request inspect-delay 5s
      # Reject non-US at the content phase so the drop is logged (a connection-phase
      # reject fires before a stream exists and is never logged). The rule is decided
      # on the source IP, so it still rejects immediately, before the ClientHello.
      tcp-request content reject unless { var(sess.country) -m str US }
      # Accepted connections only: sniff SNI for logging once the ClientHello arrives.
      tcp-request content set-var(sess.sni) req.ssl_sni if { req.ssl_hello_type 1 }
      tcp-request content accept if { req.ssl_hello_type 1 }
      log-format "%ci:%cp country=%[var(sess.country)] sni=%[var(sess.sni)] term=%ts dur=%Tt"
      use_backend edge_https_v6 if { so_id 6 }
      default_backend edge_https_v4

    frontend http_in
      bind ipv4@:80 id 4
      bind ipv6@:80 id 6 v6only
      tcp-request connection set-var(sess.country) src,map_ip(/etc/haproxy/maps/geoip-country.map,XX)
      # Content-phase reject (logged); decided on source IP, so it fires immediately.
      tcp-request content reject unless { var(sess.country) -m str US }
      log-format "%ci:%cp country=%[var(sess.country)] proto=http term=%ts dur=%Tt"
      use_backend edge_http_v6 if { so_id 6 }
      default_backend edge_http_v4

    # Per-family loopback hops to the edge (see ingress note above).
    backend edge_https_v4
      server edge 127.0.0.1:9443 send-proxy-v2
    backend edge_https_v6
      server edge [::1]:9443 send-proxy-v2
    backend edge_http_v4
      server edge 127.0.0.1:9080 send-proxy-v2
    backend edge_http_v6
      server edge [::1]:9080 send-proxy-v2
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: haproxy-scripts
data:
  build-geoip-map.sh: |-
    #!/bin/sh
    # Build an HAProxy CIDR->ISO country map from MaxMind GeoLite2-Country-CSV.
    set -eu
    MAP=/etc/haproxy/maps/geoip-country.map
    WORK="$(mktemp -d)"
    trap 'rm -rf "$WORK"' EXIT
    cd "$WORK"

    URL="https://download.maxmind.com/app/geoip_download?edition_id=GeoLite2-Country-CSV&license_key=$${MAXMIND_LICENSE_KEY}&suffix=zip"
    echo "downloading GeoLite2-Country-CSV..."
    wget -q -O db.zip "$URL"
    unzip -q db.zip
    cd GeoLite2-Country-CSV_*/

    # Pass 1: Locations CSV -> geoname_id => ISO country code (field 5).
    # Pass 2+: Blocks CSVs -> emit "<network> <ISO>" using the block's country
    #          geoname_id (field 2), falling back to registered country (field 3).
    awk -F, '
      FNR==NR { if (FNR>1 && $5!="") iso[$1]=$5; next }
      FNR>1 {
        gid=$2; if (gid=="") gid=$3
        if (gid in iso && $1!="") print $1, iso[gid]
      }
    ' GeoLite2-Country-Locations-en.csv \
      GeoLite2-Country-Blocks-IPv4.csv \
      GeoLite2-Country-Blocks-IPv6.csv > map.new

    # Sanity check before swapping in — never install a truncated/empty map
    # (which would default everything to XX and reject all traffic).
    lines="$(wc -l < map.new)"
    if [ "$lines" -lt 100000 ]; then
      echo "ERROR: only $lines entries, refusing to install map" >&2
      exit 1
    fi
    mv map.new "$MAP"
    echo "installed geoip map: $lines entries"
  refresh-loop.sh: |-
    #!/bin/sh
    # Periodically rebuild the geoip map and gracefully reload HAProxy.
    set -eu
    : "$${REFRESH_INTERVAL:=604800}"   # weekly
    while true; do
      sleep "$REFRESH_INTERVAL"
      echo "refreshing geoip map..."
      if /bin/sh /scripts/build-geoip-map.sh; then
        # Lowest-PID haproxy process == the master (workers are forked later and
        # keep higher PIDs across reloads). SIGUSR2 = graceful reload (-sf),
        # existing connections drain. Requires shareProcessNamespace + same uid.
        pid="$(pgrep haproxy | sort -n | head -1 || true)"
        if [ -n "$pid" ]; then
          kill -USR2 "$pid" && echo "sent SIGUSR2 to haproxy master pid $pid"
        else
          echo "WARN: haproxy master not found; map updated but not reloaded" >&2
        fi
      else
        echo "WARN: geoip refresh failed; keeping existing map" >&2
      fi
    done
