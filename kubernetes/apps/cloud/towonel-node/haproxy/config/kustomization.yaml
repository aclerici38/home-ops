---
# yaml-language-server: $schema=https://json.schemastore.org/kustomization
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
# Names must stay stable: hr.yaml references these ConfigMaps by fixed name and
# kustomize cannot rewrite references inside HelmRelease values.
generatorOptions:
  disableNameSuffixHash: true
configMapGenerator:
  - name: haproxy-config
    files:
      - haproxy.cfg
  - name: haproxy-scripts
    files:
      - build-geoip-map.sh
      - refresh-loop.sh
  - name: haproxy-geo-metrics
    files:
      - geo-metrics.lua
