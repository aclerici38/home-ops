---
# yaml-language-server: $schema=https://k8s-versioned-schemas.pages.dev/flux/2.8.8/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: renovate-operator
spec:
  chartRef:
    kind: OCIRepository
    name: renovate-operator
  interval: 30m
  valuesFrom:
    - kind: Secret
      name: &oidcSecret renovate-operator-oidc-credentials
      valuesKey: issuer_url
      targetPath: auth.oidc.issuerUrl
    - kind: Secret
      name: *oidcSecret
      valuesKey: client_id
      targetPath: auth.oidc.clientId
  values:
    forceRename: renovate-operator
    route:
      enabled: true
      annotations:
        towonel.io/tunnel: enable
        towonel.io/tunnel-ref: towonel-operator/${CLUSTER_NAME}-k8s
        towonel.io/agent-ref: ${CLUSTER_NAME}
      hostnames:
        - renovate.cloud.clerici.tech
      parentRefs:
        - name: external
          namespace: kgateway
    config:
      logStorage:
        mode: memory
    logging:
      format: console
    webhook:
      enabled: false
    metrics:
      enabled: true
      serviceMonitor:
        enabled: true
      dashboard:
        enabled: true
        grafanaDashboard:
          allowCrossNamespaceImport: true
    auth:
      oidc:
        enabled: true
        existingSecret: *oidcSecret
        secretKey: client_secret
        redirectUrl: https://renovate.cloud.clerici.tech/auth/callback
  dependsOn:
    - name: renovate-operator-resources
