---
# yaml-language-server: $schema=https://k8s-versioned-schemas.pages.dev/flux/2.9.1/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: renovate-operator-resources
spec:
  interval: 1h
  chart:
    spec:
      chart: kubernetes/charts/resource-bundle
      sourceRef:
        kind: GitRepository
        name: flux-system
        namespace: flux-system
  install:
    timeout: 5m
  upgrade:
    timeout: 5m
  dependsOn:
    - name: external-secrets
      namespace: external-secrets
    - name: pocket-id-operator
      namespace: pocket-id-operator
    - name: dragonfly-operator
      namespace: dragonfly-operator
  values:
    externalSecret: {}
    dragonfly: {}
    pocketId:
      name: renovate
      url: renovate.cloud.clerici.tech
      secretRotation: false
      callbackPaths:
        - /auth/callback
