---
# yaml-language-server: $schema=https://k8s-versioned-schemas.pages.dev/renovate-operator/4.14.0/renovatejob_v1alpha1.json
apiVersion: renovate-operator.mogenius.com/v1alpha1
kind: RenovateJob
metadata:
  name: ${NAME}
spec:
  provider:
    name: github
  discoveryFilters:
    - /aclerici38\/(${REPOS})/
  extraEnv:
    - name: LOG_LEVEL
      value: debug
    - name: RENOVATE_ALLOWED_COMMANDS
      value: >-
        [
          "pnpm run bundle"
        ]
    - name: RENOVATE_ALLOWED_UNSAFE_EXECUTIONS
      value: >-
        [
          "mise"
        ]
    - name: RENOVATE_PLATFORM_COMMIT
      value: enabled
    - name: DOCKERHUB_USERNAME
      valueFrom:
        secretKeyRef:
          name: renovate-operator
          key: DOCKERHUB_USERNAME
    - name: DOCKERHUB_TOKEN
      valueFrom:
        secretKeyRef:
          name: renovate-operator
          key: DOCKERHUB_TOKEN
    - name: RENOVATE_HOST_RULES
      value: >-
        [
          {
            "hostType": "docker",
            "matchHost": "docker.io",
            "username": "$(DOCKERHUB_USERNAME)",
            "password": "$(DOCKERHUB_TOKEN)"
          }
        ]
    - name: RENOVATE_CUSTOM_ENV_VARIABLES
      value: >-
        {"MISE_TRUSTED_CONFIG_PATHS": "/tmp/repos"}
    - name: RENOVATE_REDIS_URL
      value: redis://renovate-operator-dragonfly-db:6379
  image: ghcr.io/renovatebot/renovate:43.247.1@sha256:5775ae52404e86e87a892b772145b015832c7b01e6075bb1fda43adb4e4eec86
  parallelism: 1
  scratchVolume:
    medium: Memory
    sizeLimit: 2Gi
  resources:
    limits:
      cpu: 1000m
      memory: 3Gi
  schedule: "${SCHEDULE}"
  githubAppReference:
    secretName: renovate-operator
    appIdSecretKey: APP_ID
    installationIdSecretKey: INSTALL_ID
    pemSecretKey: PEM
