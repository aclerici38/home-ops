---
# yaml-language-server: $schema=https://k8s-versioned-schemas.pages.dev/renovate-operator/4.12.2/renovatejob_v1alpha1.json
apiVersion: renovate-operator.mogenius.com/v1alpha1
kind: RenovateJob
metadata:
  name: ${NAME}
spec:
  provider:
    name: github
  discoveryFilters:
    - /aclerici38\/(${REPOS})/
  extraEnv:
    - name: LOG_LEVEL
      value: debug
    - name: RENOVATE_ALLOWED_COMMANDS
      value: >-
        [
          "pnpm run bundle"
        ]
    - name: RENOVATE_ALLOWED_UNSAFE_EXECUTIONS
      value: >-
        [
          "mise"
        ]
    - name: RENOVATE_PLATFORM_COMMIT
      value: enabled
    - name: DOCKERHUB_USERNAME
      valueFrom:
        secretKeyRef:
          name: renovate-operator
          key: DOCKERHUB_USERNAME
    - name: DOCKERHUB_TOKEN
      valueFrom:
        secretKeyRef:
          name: renovate-operator
          key: DOCKERHUB_TOKEN
    - name: RENOVATE_HOST_RULES
      value: >-
        [
          {
            "hostType": "docker",
            "matchHost": "docker.io",
            "username": "$(DOCKERHUB_USERNAME)",
            "password": "$(DOCKERHUB_TOKEN)"
          }
        ]
    - name: RENOVATE_CUSTOM_ENV_VARIABLES
      value: >-
        {"MISE_TRUSTED_CONFIG_PATHS": "/tmp/repos"}
  image: ghcr.io/renovatebot/renovate:43.227.1@sha256:98174f03b4d8db564ced5948e11f4694112d3bfc512dc8e141421905ea65ecc5
  parallelism: 2
  resources:
    limits:
      cpu: 500m
      memory: 2Gi
  schedule: "${SCHEDULE}"
  githubAppReference:
    secretName: renovate-operator
    appIdSecretKey: APP_ID
    installationIdSecretKey: INSTALL_ID
    pemSecretKey: PEM
