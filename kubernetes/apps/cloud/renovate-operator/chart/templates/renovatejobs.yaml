{{- range .Values.renovatejobs }}
---
# yaml-language-server: $schema=https://k8s-versioned-schemas.pages.dev/renovate-operator/4.10.0/renovatejob_v1alpha1.json
apiVersion: renovate-operator.mogenius.com/v1alpha1
kind: RenovateJob
metadata:
  name: {{ .name }}
spec:
  provider:
    name: github
  githubAppReference:
    secretName: renovate-github-app
    appIdSecretKey: appId
    installationIdSecretKey: installationId
    pemSecretKey: privateKey
  discoveryFilters:
    - /aclerici38\/({{ .repos }})/
  extraEnv:
    - name: LOG_LEVEL
      value: debug
    - name: RENOVATE_ALLOWED_COMMANDS
      value: >-
        [
          "pnpm run bundle"
        ]
    - name: RENOVATE_PLATFORM_COMMIT
      value: enabled
    - name: DOCKERHUB_USERNAME
      valueFrom:
        secretKeyRef:
          name: renovate-operator
          key: DOCKERHUB_USERNAME
    - name: DOCKERHUB_TOKEN
      valueFrom:
        secretKeyRef:
          name: renovate-operator
          key: DOCKERHUB_TOKEN
    - name: RENOVATE_HOST_RULES
      value: >-
        [
          {
            "hostType": "docker",
            "matchHost": "docker.io",
            "username": "$(DOCKERHUB_USERNAME)",
            "password": "$(DOCKERHUB_TOKEN)"
          }
        ]
    - name: RENOVATE_REDIS_URL
      value: redis://renovate-operator-dragonfly-db:6379
    - name: RENOVATE_REPOSITORY_CACHE
      value: enabled
    - name: RENOVATE_CACHE_PRIVATE_PACKAGES
      value: "true"
    - name: RENOVATE_CUSTOM_ENV_VARIABLES
      value: >-
        {"MISE_TRUSTED_CONFIG_PATHS": "/tmp/repos"}
  image: ghcr.io/renovatebot/renovate:43.198.0@sha256:69212333d87a8d23529f89a6d8c9c87a2d49e7ee76d4a4447815900218c15728
  parallelism: 5
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
  schedule: {{ .schedule | quote }}
{{- end }}
