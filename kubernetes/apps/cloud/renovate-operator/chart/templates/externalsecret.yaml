---
# GitHub App credentials for RenovateJob .spec.githubAppReference.
# The operator mints RENOVATE_TOKEN from these (4.10.0 native GitHub App support).
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: renovate-github-app
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        appId: "1155719"
        installationId: "61553692"
        privateKey: {{ `{{ index . "PRIVATE_KEY.pem" }}` | quote }}
  dataFrom:
    - extract:
        key: renovate-operator-private-key
