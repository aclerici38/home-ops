---
# yaml-language-server: $schema=https://k8s-versioned-schemas.pages.dev/flux/2.8.8/helmrelease_v2.json?values=app-template/5.0.1
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cloudflare-ddns
spec:
  interval: 1h
  maxHistory: 1
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  install:
    timeout: 2m
    remediation:
      retries: 1
  upgrade:
    timeout: 2m
    remediation:
      retries: 1
  dependsOn:
    - name: cloudflare-ddns-resources
  values:
    controllers:
      cloudflare-ddns:
        strategy: RollingUpdate
        pod:
          hostUsers: false
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            seccompProfile: {type: RuntimeDefault}
        containers:
          cloudflare-ddns:
            image:
              repository: ghcr.io/larivierec/cloudflare-ddns
              tag: v1.2.6@sha256:049ce1b25bd9dff39c6ca0d768c93092937b524356016d9ca0f4b297f3a0293c
            args:
              - --zone-name=clerici.tech
              - --record-name=vps.clerici.tech
              - --proxied=false
              - --create-missing=true
            env:
              ACCOUNT_TOKEN:
                secretKeyRef:
                  name: cloudflare-ddns
                  key: CLOUDFLARE_API_TOKEN
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health/alive
                    port: &healthPort 8080
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health/ready
                    port: *healthPort
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop:
                  - ALL
            resources:
              requests:
                memory: 64Mi
                cpu: 10m
              limits:
                memory: 128Mi
    service:
      cloudflare-ddns:
        controller: cloudflare-ddns
        ports:
          http:
            port: 9000
          health:
            port: *healthPort
    serviceMonitor:
      cloudflare-ddns:
        serviceName: cloudflare-ddns
        endpoints:
          - port: health
            scheme: http
