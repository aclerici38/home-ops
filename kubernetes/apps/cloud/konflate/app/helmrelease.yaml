---
# yaml-language-server: $schema=https://k8s-versioned-schemas.pages.dev/flux/2.9.1/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: konflate-${KONFLATE_CLUSTER}
spec:
  interval: 1h
  maxHistory: 1
  chartRef:
    kind: OCIRepository
    name: konflate
  install:
    timeout: 5m
    remediation:
      retries: 1
  upgrade:
    timeout: 5m
    remediation:
      retries: 1
  values:
    config:
      repo: github://aclerici38/home-ops
      clusterPath: ./kubernetes/flux/${KONFLATE_CLUSTER}
      statusChecks: true
      statusCheckName: Konflate (${KONFLATE_CLUSTER})
      publicUrl: https://konflate-${KONFLATE_CLUSTER}.${CLUSTER_NAME}.clerici.tech
      prComments: true

      mcp: false
      verifyImages: true
      restrictEgress: "true"
      prFilterExpr: pr.labels.exists(l, l.name == "cluster/${KONFLATE_CLUSTER}")
      extraEnv:
        - name: KONFLATE_APP_CLIENT_ID
          valueFrom:
            secretKeyRef:
              name: konflate
              key: KONFLATE_APP_CLIENT_ID
        - name: KONFLATE_APP_PRIVATE_KEY
          valueFrom:
            secretKeyRef:
              name: konflate
              key: KONFLATE_APP_PRIVATE_KEY
        - name: KONFLATE_WEBHOOK_SECRET
          valueFrom:
            secretKeyRef:
              name: konflate
              key: KONFLATE_WEBHOOK_SECRET
    httpRoute:
      enabled: true
      parentRefs:
        - name: external
          kind: Gateway
          namespace: kgateway
          sectionName: https
      hostnames:
        - konflate-${KONFLATE_CLUSTER}.${CLUSTER_NAME}.clerici.tech
    monitoring:
      serviceMonitor:
        enabled: true
    networkPolicy:
      enabled: true
      type: cilium
    resources:
      requests:
        cpu: 50m
        memory: 512Mi
      # Memory-backed cache/tmp (below) count against this limit.
      limits:
        memory: 2Gi
  postRenderers:
    - kustomize:
        patches:
          - target:
              kind: Deployment
            patch: |-
              apiVersion: apps/v1
              kind: Deployment
              metadata:
                name: konflate-${KONFLATE_CLUSTER}
              spec:
                template:
                  spec:
                    volumes:
                      - name: cache
                        emptyDir:
                          medium: Memory
                          sizeLimit: 512Mi
                      - name: tmp
                        emptyDir:
                          medium: Memory
                          sizeLimit: 512Mi
