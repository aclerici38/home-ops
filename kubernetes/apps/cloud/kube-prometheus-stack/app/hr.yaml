---
# yaml-language-server: $schema=https://k8s-versioned-schemas.pages.dev/flux/2.9.3/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kube-prometheus-stack
spec:
  interval: 1h
  maxHistory: 1
  chartRef:
    kind: OCIRepository
    name: kube-prometheus-stack
  install:
    timeout: 2m
    remediation:
      retries: 1
  upgrade:
    timeout: 2m
    remediation:
      retries: 1
  valuesFrom:
    - kind: ConfigMap
      name: kube-prometheus-stack-values
      valuesKey: values.yaml
  # cloud: emptyDir storage (no ceph), low retention (alerts only), no gateway routes
  # (port-forward instead). Omitting storage/storageSpec makes the chart use emptyDir.
  values:
    prometheus:
      prometheusSpec:
        retention: 2d
        retentionSize: "2GB"
