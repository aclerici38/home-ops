---
# yaml-language-server: $schema=https://k8s-versioned-schemas.pages.dev/flux/2.8.8/helmrelease_v2.json?values=app-template/5.0.1
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: gatus
spec:
  interval: 1h
  maxHistory: 1
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  install:
    timeout: 2m
    remediation:
      retries: 1
  upgrade:
    timeout: 2m
    remediation:
      retries: 1
  values:
    controllers:
      gatus:
        strategy: RollingUpdate
        pod:
          automountServiceAccountToken: true
          hostUsers: false
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            fsGroup: 1000
            seccompProfile: {type: RuntimeDefault}
        initContainers:
          sidecar:
            restartPolicy: Always
            image:
              repository: ghcr.io/home-operations/gatus-sidecar
              tag: 0.2.0@sha256:1209cfc77224a6336f8126efa3e46edcc29e7ae5c3a9d4c59229f7895aff593c
            args:
              - --auto-httproute
              - --enable-httproute
              - --enable-service
            resources:
              requests:
                cpu: 10m
              limits:
                cpu: 64Mi
            securityContext: &sec
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop:
                  - ALL
        containers:
          gatus:
            image:
              repository: ghcr.io/twin/gatus
              tag: v5.36.0@sha256:c5f210d095fa78e6efaa20ffeb14803f2ba4f10615e16a6d12087697149617f0
            env:
              GATUS_DELAY_START_SECONDS: 5
              GATUS_CONFIG_PATH: /config
              PG_URI:
                secretKeyRef:
                  name: gatus-db-app
                  key: uri
              CLIENT_ID:
                secretKeyRef:
                  name: gatus-oidc-credentials
                  key: client_id
              CLIENT_SECRET:
                secretKeyRef:
                  name: gatus-oidc-credentials
                  key: client_secret
            probes:
              readiness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    port: &port 8080
                    path: /health
              liveness: *probes
            resources:
              requests:
                cpu: 50m
                memory: 100Mi
              limits:
                memory: 512Mi
            securityContext: *sec
    service:
      gatus:
        controller: gatus
        ports:
          http:
            port: *port
    serviceMonitor:
      gatus:
        serviceName: gatus
        endpoints:
          - port: http
    route:
      gatus:
        annotations:
          gatus.home-operations.com/enabled: "false"
        hostnames:
          - gatus.clerici.tech
        parentRefs:
          - name: external
            namespace: kgateway
    rbac:
      roles:
        gatus:
          type: ClusterRole
          rules:
            - apiGroups:
                - ""
              resources:
                - services
              verbs:
                - get
                - list
                - watch
            - apiGroups:
                - gateway.networking.k8s.io
              resources:
                - gateways
                - httproutes
              verbs:
                - get
                - watch
                - list
      bindings:
        gatus:
          type: ClusterRoleBinding
          roleRef:
            identifier: gatus
          subjects:
            - identifier: gatus
    persistence:
      config-file:
        type: configMap
        name: gatus
        globalMounts:
          - path: /config/config.yaml
            subPath: config.yaml
      config-cache:
        existingClaim: gatus-cache
        globalMounts:
          - path: /config
    configMaps:
      config:
        data:
          config.yaml: |-
            # PKCE
            web:
              read-buffer-size: 32768
            connectivity:
              checker:
                target: ${COREDNS_CLUSTER_IP}:53
                interval: 1m

            endpoints:
              - name: Cloudflare
                group: connectivity
                url: tcp://1.1.1.1:53
                interval: 1m
                conditions:
                  - "[CONNECTED] == true"

              - name: Google-DNS
                group: connectivity
                url: tcp://8.8.8.8:53
                interval: 1m
                conditions:
                  - "[CONNECTED] == true"

              - name: Quad9
                group: connectivity
                url: tcp://9.9.9.9:53
                interval: 1m
                conditions:
                  - "[CONNECTED] == true"

              - name: Google-HTTPS
                group: connectivity
                url: tcp://google.com:443
                conditions:
                  - "[CONNECTED] == true"

              - name: Bambi
                group: travel
                url: tcp://192.168.8.1:80
                conditions:
                  - "[CONNECTED] == true"

            metrics: true

            security:
              oidc:
                issuer-url: https://id.clerici.tech
                redirect-url: https://gatus.clerici.tech/authorization-code/callback
                client-id: $${CLIENT_ID}
                client-secret: $${CLIENT_SECRET}
                scopes: [openid]

            storage:
              type: postgres
              caching: true
              path: $${PG_URI}
  dependsOn:
    - name: gatus-resources
