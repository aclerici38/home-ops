---
# yaml-language-server: $schema=https://k8s-versioned-schemas.pages.dev/flux/2.8.8/helmrelease_v2.json?values=gatus-sidecar/0.2.1
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: gatus
spec:
  interval: 1h
  maxHistory: 1
  chartRef:
    kind: OCIRepository
    name: gatus-sidecar
  install:
    timeout: 2m
    remediation:
      retries: 1
  upgrade:
    timeout: 2m
    remediation:
      retries: 1
  dependsOn:
    - name: gatus-resources
  values:
    gatus:
      image:
        repository: ghcr.io/twin/gatus
        tag: v5.36.0
        digest: sha256:c5f210d095fa78e6efaa20ffeb14803f2ba4f10615e16a6d12087697149617f0
      delayStartSeconds: 10
      extraEnv:
        - name: PG_URI
          valueFrom:
            secretKeyRef:
              name: gatus-db-app
              key: uri
        - name: CLIENT_ID
          valueFrom:
            secretKeyRef:
              name: gatus-oidc-credentials
              key: client_id
        - name: CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              name: gatus-oidc-credentials
              key: client_secret
      resources:
        limits:
          memory: 256Mi
        requests:
          cpu: 10m
          memory: 64Mi
    sidecar:
      defaultInterval: 10s
      config:
        existingConfigMap: gatus-sidecar-config
        items:
          - key: config.yaml
            path: config.yaml
      kinds:
        httproute:
          enabled: true
          auto: true
        service:
          enabled: true
      resources:
        requests:
          cpu: 10m
        limits:
          cpu: 64Mi
    persistence:
      enabled: true
      storageClass: ceph-filesystem
      accessMode: ReadWriteMany
      size: 1Gi
    monitoring:
      serviceMonitor:
        enabled: true
    httpRoute:
      enabled: true
      hostnames:
        - gatus.clerici.tech
      parentRefs:
        - name: external
          namespace: kgateway
