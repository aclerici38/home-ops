---
# yaml-language-server: $schema=https://k8s-versioned-schemas.pages.dev/flux/2.9.3/helmrelease_v2.json?values=app-template/5.0.1
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: speech-to-phrase
spec:
  interval: 1h
  maxHistory: 1
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  install:
    timeout: 5m
    remediation:
      retries: 1
  upgrade:
    timeout: 5m
    remediation:
      retries: 1
  dependsOn:
    - name: speech-to-phrase-resources
  values:
    controllers:
      speech-to-phrase:
        pod:
          hostUsers: false
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            fsGroup: 1000
            fsGroupChangePolicy: OnRootMismatch
            seccompProfile:
              type: RuntimeDefault
        containers:
          speech-to-phrase:
            image:
              repository: mirror.gcr.io/rhasspy/wyoming-speech-to-phrase
              tag: 1.4.3@sha256:e532f0dbc6b21285c4c784212003865b9167041927328a767cb0beb1a0beaa20
            env:
              HOME: /tmp
              TMPDIR: /tmp
              HASS_TOKEN:
                valueFrom:
                  secretKeyRef:
                    name: speech-to-phrase
                    key: HASS_TOKEN
            args:
              - --hass-websocket-uri
              - ws://home-assistant.home-assistant.svc.cluster.local:8123/api/websocket
              - --hass-token
              - $(HASS_TOKEN)
              - --retrain-on-start
              - --retrain-seconds
              - "600"
            probes:
              liveness:
                enabled: true
                type: TCP
              readiness:
                enabled: true
                type: TCP
              # --retrain-on-start trains (Kaldi compile) before binding the port;
              # the first run can take minutes, so allow a long startup window.
              startup:
                enabled: true
                custom: true
                spec:
                  tcpSocket:
                    port: 10300
                  periodSeconds: 10
                  failureThreshold: 60
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop:
                  - ALL
            resources:
              requests:
                cpu: 50m
                memory: 256Mi
              limits:
                memory: 1Gi
    service:
      speech-to-phrase:
        controller: speech-to-phrase
        ports:
          wyoming:
            port: 10300
    persistence:
      models:
        existingClaim: speech-to-phrase-models
        globalMounts:
          - path: /models
      train:
        existingClaim: speech-to-phrase-train
        globalMounts:
          - path: /train
      tmp:
        type: emptyDir
        medium: Memory
        globalMounts:
          - path: /tmp
