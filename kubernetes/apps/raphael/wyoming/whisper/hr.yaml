---
# yaml-language-server: $schema=https://k8s-versioned-schemas.pages.dev/flux/2.9.1/helmrelease_v2.json?values=app-template/5.0.1
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: whisper
spec:
  interval: 1h
  maxHistory: 1
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  install:
    timeout: 2m
    remediation:
      retries: 1
  upgrade:
    timeout: 2m
    remediation:
      retries: 1
  values:
    controllers:
      whisper:
        pod:
          hostUsers: false
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            fsGroup: 1000
            fsGroupChangePolicy: OnRootMismatch
            seccompProfile:
              type: RuntimeDefault
        containers:
          whisper:
            image:
              repository: mirror.gcr.io/rhasspy/wyoming-whisper
              tag: 3.5.0@sha256:308b7959a925d0cca381c3e6e77292fed87822695635db39c24199d6b7a9e610
            env:
              HOME: /tmp
              HF_HOME: /data
              # base.en loads via huggingface_hub, which probes the network
              # even when the model is already on the PVC. Bound that probe so
              # offline boots fall back to the cached model quickly.
              HF_HUB_ETAG_TIMEOUT: "5"
            args:
              - --model
              - base.en
              - --compute-type
              - int8
              - --language
              - en
              - --beam-size
              - "5"
              - --initial-prompt
              - "Alexa, turn on the lights and set the brightness to fifty percent. Dim all the lights to warm white, then change them to blue at one hundred percent. Set the air conditioning to seventy two degrees and turn the AC off. Set a timer for ten minutes."
            probes:
              liveness:
                enabled: true
                type: TCP
              readiness:
                enabled: true
                type: TCP
              startup:
                enabled: true
                custom: true
                spec:
                  tcpSocket:
                    port: 10300
                  periodSeconds: 10
                  failureThreshold: 30
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop:
                  - ALL
            resources:
              requests:
                cpu: 100m
                memory: 256Mi
              limits:
                memory: 2Gi
    service:
      whisper:
        controller: whisper
        ports:
          wyoming:
            port: 10300
    persistence:
      data:
        existingClaim: whisper-data
        globalMounts:
          - path: /data
      tmp:
        type: emptyDir
        medium: Memory
        globalMounts:
          - path: /tmp
