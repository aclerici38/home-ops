---
# yaml-language-server: $schema=https://k8s-versioned-schemas.pages.dev/flux/2.9.1/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: towonel-agent
spec:
  interval: 1h
  maxHistory: 1
  chartRef:
    kind: OCIRepository
    name: towonel-agent
  install:
    timeout: 2m
    remediation:
      retries: 1
  upgrade:
    timeout: 2m
    remediation:
      retries: 1
  values:
    defaultPodOptions:
      hostUsers: false
    agent:
      replica: 1
      inviteTokenSecret:
        name: raphael-k8s-token
        key: token
      services:
        - hostname: "raphael.clerici.tech"
          origin: external.kgateway.svc.cluster.local:443
        - hostname: "*.raphael.clerici.tech"
          origin: external.kgateway.svc.cluster.local:443
