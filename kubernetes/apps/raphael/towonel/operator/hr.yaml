---
# yaml-language-server: $schema=https://k8s-versioned-schemas.pages.dev/flux/2.9.0/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: towonel-operator
spec:
  interval: 1h
  maxHistory: 1
  chartRef:
    kind: OCIRepository
    name: towonel-operator
  install:
    timeout: 5m
    remediation:
      retries: 1
  upgrade:
    timeout: 5m
    remediation:
      retries: 1
  dependsOn:
    - name: towonel-operator-resources
  values:
    replicas: 1
    towonel:
      apiURL: https://towonel.cloud.clerici.tech
    credentials:
      existingSecret: towonel-operator
      tokenKey: TOWONEL_HUB_OPERATOR_API_KEY
    agentNodeRBAC:
      create: false
