---
# yaml-language-server: $schema=https://k8s-versioned-schemas.pages.dev/cert-manager/1.21.0/clusterissuer_v1.json
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-production
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    privateKeySecretRef:
      name: letsencrypt-production
    solvers:
      - dns01:
          cloudflare:
            apiTokenSecretRef:
              name: cert-manager
              key: CLOUDFLARE_API_TOKEN
        selector:
          dnsZones:
            - "clerici.tech"
