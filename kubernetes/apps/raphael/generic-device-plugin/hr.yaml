---
# yaml-language-server: $schema=https://k8s-versioned-schemas.pages.dev/flux/2.9.1/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: generic-device-plugin
spec:
  interval: 1h
  maxHistory: 1
  chart:
    spec:
      chart: charts/generic-device-plugin
      sourceRef:
        kind: GitRepository
        name: generic-device-plugin
  install:
    timeout: 2m
    remediation:
      retries: 1
  upgrade:
    timeout: 2m
    remediation:
      retries: 1
  values:
    image:
      repository: ghcr.io/squat/generic-device-plugin
      tag: 0.2.0@sha256:66c8d5c270eb2b721f1064c549b9b7898152a6d2f0163380a5d37dc7636c20ff
      pullPolicy: IfNotPresent
    args:
      - --log-level=info
    devices:
      - name: zigbee
        groups:
          - count: 10
            paths:
              - path: /dev/serial/by-id/usb-Itead_Sonoff_Zigbee_3.0_USB_Dongle_Plus_V2_d4f0088f4c1fef119b9450d0639e525b-if00-port0
