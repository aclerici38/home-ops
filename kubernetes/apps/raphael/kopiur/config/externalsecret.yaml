---
# yaml-language-server: $schema=https://k8s-versioned-schemas.pages.dev/external-secrets/2.8.0/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: kopiur-versity
spec:
  refreshInterval: "1m"
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: kopiur-versity
  data:
    - secretKey: AWS_ACCESS_KEY_ID
      remoteRef:
        key: versity
        property: username
    - secretKey: AWS_SECRET_ACCESS_KEY
      remoteRef:
        key: versity
        property: password
    - secretKey: KOPIA_PASSWORD
      remoteRef:
        key: kopiur-versity
        property: password
