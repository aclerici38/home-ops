---
apiVersion: kopiur.home-operations.com/v1alpha1
kind: ClusterRepository
metadata:
  name: versity
spec:
  backend:
    s3:
      bucket: kopiur
      prefix: raphael/
      endpoint: s3.clerici.tech
      region: us-east-1
      auth:
        secretRef:
          name: kopiur-versity
          namespace: kopiur
  encryption:
    passwordSecretRef:
      name: kopiur-versity
      namespace: kopiur
      key: KOPIA_PASSWORD
  create:
    enabled: true
  allowedNamespaces:
    all: true
  credentialProjection:
    allowed: true
  # Pin the identity derivation (matches kopiur's defaults) so a cross-namespace
  # restore stays resolvable across alpha operator upgrades.
  identityDefaults:
    hostnameExpr: namespace
    usernameExpr: namespace + '-' + policyName
  moverDefaults:
    cache:
      mode: Ephemeral
      contentCacheSizeMb: 500
      metadataCacheSizeMb: 500
    # Movers run as 1000 and use fsGroup to read group-owned data off the staged
    # snapshot (and write restored files); apps on another uid override per-policy.
    securityContext:
      runAsUser: 1000
      runAsGroup: 1000
    podSecurityContext:
      fsGroup: 1000
      fsGroupChangePolicy: OnRootMismatch
    # GC finished mover Jobs/pods so they don't linger as API objects.
    ttlSecondsAfterFinished: 300
  health:
    # NOTE: probe.enabled deadlocks in kopiur 0.7.5 on object-store repos — the
    # first probe's lastProbeAt is only written by finalize_cluster_bootstrap,
    # which is unreachable while probe_due is true (and probe_due stays true until
    # lastProbeAt is written). Result: the bootstrap Job recycles every few
    # seconds forever. Re-enable once upstream fixes the bootstrap-order deadlock.
    probe:
      enabled: false
      interval: 1h
  maintenance:
    enabled: true
    namespace: kopiur
    schedule:
      quick: {cron: "0 4 * * *", jitter: 30m}
      full: {cron: "0 3 * * 0", jitter: 1h}
