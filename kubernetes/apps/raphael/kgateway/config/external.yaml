---
# yaml-language-server: $schema=https://k8s-versioned-schemas.pages.dev/gateway-api/1.6.1/gateway_v1.json
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: external
  annotations:
    external-dns.alpha.kubernetes.io/target: vps.clerici.tech
spec:
  gatewayClassName: kgateway
  infrastructure:
    parametersRef:
      name: kgateway-params-external
      group: gateway.kgateway.dev
      kind: GatewayParameters
  listeners:
    - name: http
      protocol: HTTP
      port: 80
      allowedRoutes:
        namespaces:
          from: Same
    - name: https
      protocol: HTTPS
      port: 443
      hostname: "*.raphael.clerici.tech"
      allowedRoutes:
        namespaces:
          from: All
      tls:
        certificateRefs:
          - kind: Secret
            name: clerici-tech-tls
    # Apex listener: the wildcard above does NOT match raphael.clerici.tech
    # itself, so Home Assistant is served on the bare domain here.
    - name: https-apex
      protocol: HTTPS
      port: 443
      hostname: "raphael.clerici.tech"
      allowedRoutes:
        namespaces:
          from: All
      tls:
        certificateRefs:
          - kind: Secret
            name: clerici-tech-tls
