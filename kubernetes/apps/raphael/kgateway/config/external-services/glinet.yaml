---
apiVersion: v1
kind: Service
metadata:
  name: glinet
spec:
  ports:
    - name: http
      port: 80
      protocol: TCP
      targetPort: 80
---
apiVersion: discovery.k8s.io/v1
kind: EndpointSlice
metadata:
  name: glinet-1
  labels:
    kubernetes.io/service-name: glinet
addressType: IPv4
ports:
  - name: http
    port: 80
    protocol: TCP
endpoints:
  - addresses:
      - 192.168.71.1
---
# yaml-language-server: $schema=https://k8s-versioned-schemas.pages.dev/gateway-api/1.6.0/httproute_v1.json
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: glinet
spec:
  hostnames:
    - gli.raphael.clerici.tech
  parentRefs:
    - name: internal
      namespace: kgateway
      sectionName: https
  rules:
    - backendRefs:
        - name: glinet
          port: 80
