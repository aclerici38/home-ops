---
# yaml-language-server: $schema=https://k8s-versioned-schemas.pages.dev/flux/2.9.2/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: frigate-resources
spec:
  interval: 1h
  chart:
    spec:
      chart: kubernetes/charts/resource-bundle
      sourceRef:
        kind: GitRepository
        name: flux-system
        namespace: flux-system
  install:
    timeout: 5m
  upgrade:
    timeout: 5m
  dependsOn:
    - name: external-secrets
      namespace: external-secrets
    - name: intel-gpu-resource-driver
      namespace: intel-gpu-resource-driver
  values:
    gpu: {}
    externalSecret:
      data:
        - secretKey: FRIGATE_MQTT_PASS
          remoteRef:
            key: mosquitto
            property: FRIGATE_MQTT_PASS
    pocketId:
      clientID: frigate-raphael
      name: Frigate (Raphael)
      url: frigate.raphael.clerici.tech
      group: fam
      secret:
        keys:
          clientID: client-id
          clientSecret: client-secret
      callbackPaths:
        - /oauth2/redirect
    oidc:
      oauth2:
        jwt:
          idToken:
            claimsToHeaders:
              - name: preferred_username
                header: x-forwarded-user
              - name: frigate_role
                header: x-forwarded-groups
