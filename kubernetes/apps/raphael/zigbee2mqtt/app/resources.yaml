---
# yaml-language-server: $schema=https://k8s-versioned-schemas.pages.dev/flux/2.9.2/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: zigbee2mqtt-resources
spec:
  interval: 1h
  chart:
    spec:
      chart: kubernetes/charts/resource-bundle
      sourceRef:
        kind: GitRepository
        name: flux-system
        namespace: flux-system
  install:
    timeout: 5m
  upgrade:
    timeout: 5m
  values:
    kopiur:
      storageClass: miroir
      snapshotClass: miroir
      parallelism: 1
    externalSecret:
      data:
        - secretKey: MQTT_PASSWORD
          remoteRef:
            key: mosquitto
            property: Z2M_MQTT_PASS
