---
# yaml-language-server: $schema=https://k8s-versioned-schemas.pages.dev/flux/2.9.3/helmrelease_v2.json?values=external-dns/1.20.0
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: external-dns-cloudflare
spec:
  interval: 1h
  maxHistory: 1
  chartRef:
    kind: OCIRepository
    name: external-dns
  install:
    timeout: 2m
  upgrade:
    timeout: 2m
  dependsOn:
    - name: external-dns-resources
  values:
    image:
      repository: registry.k8s.io/external-dns/external-dns
      tag: v0.21.0
    provider:
      name: cloudflare
    env:
      - name: CF_API_TOKEN
        valueFrom:
          secretKeyRef:
            name: external-dns
            key: CLOUDFLARE_API_TOKEN
    extraArgs:
      - --cloudflare-dns-records-per-page=1000
      - --gateway-name=external
    policy: sync
    triggerLoopOnEvent: true
    sources:
      - "crd"
      - "gateway-httproute"
      - "service"
    txtPrefix: k8s.
    txtOwnerId: ${CLUSTER_NAME}
    domainFilters:
      - "clerici.tech"
