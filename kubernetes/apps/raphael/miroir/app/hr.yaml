---
# yaml-language-server: $schema=https://k8s-versioned-schemas.pages.dev/flux/2.9.3/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: miroir
spec:
  interval: 1h
  maxHistory: 1
  chartRef:
    kind: OCIRepository
    name: miroir
  install:
    timeout: 5m
    remediation:
      retries: 1
  upgrade:
    timeout: 5m
    remediation:
      retries: 1
  values:
    logging:
      level: error
    drbd:
      # Every volume is a DRBD device even at replicas: 1. Raising the activity-log
      # extents slashes metadata write-amplification on scattered SQLite writes;
      # single-node crash-resync cost is nil (no peer). Prime, < 65534.
      alExtents: 6007
    # Only ever applies to 2-replica volumes — cannot fire at replicas: 1.
    autoTieBreaker: false
    agent:
      # hostPath on the root XFS (reflink=1)
      # Must match spec.pools[].loopfile.baseDir in the MiroirNode CR.
      loopfileBaseDirs:
        - /var/lib/miroir
      # storageCapacity/autoDiskful/autoEvict are all off
      poolStatsInterval: 300s
