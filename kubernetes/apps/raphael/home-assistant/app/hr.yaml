---
# yaml-language-server: $schema=https://k8s-versioned-schemas.pages.dev/flux/2.9.0/helmrelease_v2.json?values=app-template/5.0.1
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: home-assistant
spec:
  interval: 1h
  maxHistory: 1
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  install:
    timeout: 2m
    remediation:
      retries: 1
  upgrade:
    timeout: 2m
    remediation:
      retries: 1
  values:
    controllers:
      home-assistant:
        pod:
          hostNetwork: true
          dnsPolicy: ClusterFirstWithHostNet
          securityContext:
            runAsUser: 0
            runAsGroup: 0
            fsGroup: 0
            fsGroupChangePolicy: OnRootMismatch
            runAsNonRoot: false
            seccompProfile: {type: Unconfined}
        containers:
          home-assistant:
            image:
              repository: ghcr.io/home-assistant/home-assistant
              tag: 2026.7.1@sha256:f73512ba4fe06bb4d57636fe3578d0820cdec46f81e8f837ab59e451662ff3cb
            env:
              S6_READ_ONLY_ROOT: true
              S6_YES_I_WANT_A_WORLD_WRITABLE_RUN_BECAUSE_KUBERNETES: 1
            resources:
              requests:
                cpu: 47m
              limits:
                memory: 1Gi
            securityContext:
              allowPrivilegeEscalation: true
              readOnlyRootFilesystem: false
              capabilities:
                drop:
                  - ALL
                add:
                  - NET_RAW
                  - NET_ADMIN
    service:
      home-assistant:
        controller: home-assistant
        ports:
          http:
            port: 8123
    route:
      home-assistant:
        hostnames:
          - raphael.clerici.tech
        parentRefs:
          - name: internal
            namespace: kgateway
          - name: external
            namespace: kgateway
    persistence:
      config:
        existingClaim: home-assistant
      dbus:
        type: hostPath
        hostPath: /run/dbus
        globalMounts:
          - path: /run/dbus
            readOnly: true
      tmpfs:
        type: emptyDir
        medium: Memory
        globalMounts:
          - path: /.dockerenv
            subPath: dockerenv
          - path: /config/logs
            subPath: logs
          - path: /run
            subPath: run
          - path: /tmp
            subPath: tmp
