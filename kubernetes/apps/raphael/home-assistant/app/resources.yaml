---
# yaml-language-server: $schema=https://k8s-versioned-schemas.pages.dev/flux/2.9.2/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: home-assistant-resources
spec:
  interval: 1h
  chart:
    spec:
      chart: kubernetes/charts/resource-bundle
      sourceRef:
        kind: GitRepository
        name: flux-system
        namespace: flux-system
  install:
    timeout: 5m
  upgrade:
    timeout: 5m
  values:
    kopiur:
      capacity: 10Gi
      # HA runs as root; its .storage/* files are root:root 0600, so the mover
      # must run as root to read them on backup (and own them on restore).
      mover:
        securityContext:
          runAsUser: 0
          runAsGroup: 0
        podSecurityContext:
          fsGroup: 0
