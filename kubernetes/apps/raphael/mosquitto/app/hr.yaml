---
# yaml-language-server: $schema=https://k8s-versioned-schemas.pages.dev/flux/2.9.1/helmrelease_v2.json?values=app-template/5.0.1
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: mosquitto
spec:
  interval: 1h
  maxHistory: 1
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  install:
    timeout: 2m
    remediation:
      retries: 1
  upgrade:
    timeout: 2m
    remediation:
      retries: 1
  dependsOn:
    - name: mosquitto-resources
  values:
    controllers:
      mosquitto:
        strategy: Recreate
        pod:
          hostUsers: false
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            fsGroup: 1000
            fsGroupChangePolicy: OnRootMismatch
        initContainers:
          init-passwd:
            image: &img
              repository: public.ecr.aws/docker/library/eclipse-mosquitto
              tag: 2.0.22@sha256:212f89e1eaeb2c322d6441b64396e3346026674db8fa9c27beac293405c32b3c
            command:
              - sh
              - -c
              - |
                set -eu
                umask 077
                # -c creates/overwrites on the first user, then append the rest
                mosquitto_passwd -c -b /mosquitto/auth/passwords zigbee2mqtt "$Z2M_MQTT_PASS"
                mosquitto_passwd    -b /mosquitto/auth/passwords home-assistant "$HASS_MQTT_PASS"
                mosquitto_passwd    -b /mosquitto/auth/passwords frigate "$FRIGATE_MQTT_PASS"
                mosquitto_passwd    -b /mosquitto/auth/passwords freekiosk "$FREEKIOSK_MQTT_PASS"
            envFrom:
              - secretRef:
                  name: mosquitto
            securityContext: &sec
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: {drop: ["ALL"]}
        containers:
          mosquitto:
            image: *img
            securityContext: *sec
            resources:
              requests:
                cpu: 10m
                memory: 32Mi
              limits:
                memory: 64Mi
            probes:
              liveness:
                enabled: true
                type: TCP
              readiness:
                enabled: true
                type: TCP
    service:
      mosquitto:
        type: LoadBalancer
        ports:
          mqtt:
            port: 1883
    configMaps:
      config:
        data:
          mosquitto.conf: |-
            allow_anonymous false
            password_file /mosquitto/auth/passwords
            connection_messages false
            listener 1883 0.0.0.0
            per_listener_settings false
            persistence false
    persistence:
      config:
        type: configMap
        name: mosquitto
        globalMounts:
          - path: /mosquitto/config/mosquitto.conf
            subPath: mosquitto.conf
      # Written by the init-passwd container, read by mosquitto
      auth:
        type: emptyDir
        globalMounts:
          - path: /mosquitto/auth
      tmp:
        type: emptyDir
        medium: Memory
        advancedMounts:
          mosquitto:
            init-passwd:
              - path: /tmp
