---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: recyclarr
spec:
  refreshInterval: 1m
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: recyclarr
  data:
    - secretKey: SONARR__AUTH__APIKEY
      remoteRef:
        key: sonarr
        property: SONARR__AUTH__APIKEY
    - secretKey: RADARR__AUTH__APIKEY
      remoteRef:
        key: radarr
        property: RADARR__AUTH__APIKEY
