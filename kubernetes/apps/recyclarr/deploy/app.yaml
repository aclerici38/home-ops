---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: recyclarr
  namespace: flux-system
spec:
  targetNamespace: recyclarr
  dependsOn:
    - name: sonarr
    - name: radarr
  sourceRef:
    kind: OCIRepository
    name: recyclarr
  path: ./app
  commonMetadata:
    labels:
      app.kubernetes.io/name: recyclarr
