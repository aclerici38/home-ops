---
# The flux-system namespace's manifests, delivered as ONE OCI artifact (CI packages this whole
# namespace folder). Every Kustomization in deploy/ sources from this. CI moves the mutable
# `main` tag and pokes the receiver; pin ref.tag to an immutable CalVer tag to roll back.
apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  name: flux-system
  namespace: flux-system
  labels:
    app.kubernetes.io/name: flux-system
spec:
  interval: 1h
  url: oci://ghcr.io/aclerici38/home-ops/flux-system
  ref:
    tag: main
  layerSelector:
    mediaType: application/vnd.cncf.flux.content.v1.tar+gzip
    operation: extract
