---
# Deploys the ../flux-operator payload (path is artifact-relative inside the flux-system artifact).
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: flux-operator
  namespace: flux-system
spec:
  targetNamespace: flux-system
  sourceRef:
    kind: OCIRepository
    name: flux-system
  path: ./flux-operator
  commonMetadata:
    labels:
      app.kubernetes.io/name: flux-operator
