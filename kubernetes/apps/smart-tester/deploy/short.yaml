---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: short-smart-tester
  namespace: flux-system
spec:
  targetNamespace: smart-tester
  sourceRef:
    kind: OCIRepository
    name: smart-tester
  path: ./app
  commonMetadata:
    labels:
      app.kubernetes.io/name: smart-tester
  postBuild:
    substitute:
      TEST_TYPE: short
      TEST_SCHEDULE: "0 0 8,16,22 * *"
