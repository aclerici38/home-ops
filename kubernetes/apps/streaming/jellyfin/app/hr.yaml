---
# yaml-language-server: $schema=https://k8s-versioned-schemas.pages.dev/flux/2.8.3/helmrelease_v2.json?values=app-template/4.6.2
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: jellyfin
spec:
  interval: 1h
  maxHistory: 1
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  install:
    timeout: 5m
    remediation:
      retries: 1
  upgrade:
    timeout: 5m
    remediation:
      retries: 1
  values:
    controllers:
      jellyfin:
        pod:
          resourceClaims:
            - name: gpu
              resourceClaimTemplateName: jellyfin-gpu
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            fsGroup: 1000
            fsGroupChangePolicy: OnRootMismatch
            seccompProfile: { type: RuntimeDefault }
        containers:
          main:
            image:
              repository: ghcr.io/jellyfin/jellyfin
              tag: 10.11.7@sha256:2b93aa3830dcd0aab7185c635e20edef1f8dc5d2e999768baf1724e88c078004
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: &port 8096
                  periodSeconds: 5
                  failureThreshold: 20
                  initialDelaySeconds: 10
              readiness: *probes
            securityContext: &sec
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: { drop: ["ALL"] }
            resources:
              requests:
                cpu: 100m
                memory: 500Mi
              limits:
                memory: 16Gi
              claims:
                - name: gpu
    service:
      main:
        controller: jellyfin
        forceRename: jellyfin
        ports:
          http:
            port: *port
    serviceMonitor:
      main:
        serviceName: jellyfin-main
        endpoints:
          - port: http
    route:
      main:
        hostnames:
          - ${APP_URL}
          - tv.${SECRET_DOMAIN}
        rules:
          - backendRefs:
            - identifier: main
              port: *port
        parentRefs:
          - name: external
            namespace: gateway-system
            sectionName: https
    persistence:
      config:
        existingClaim: jellyfin
        advancedMounts:
          jellyfin:
            main:
              - path: /config
      cache:
        existingClaim: jellyfin-cache
        advancedMounts:
          jellyfin:
            main:
              - path: /config/metadata
      media:
        type: nfs
        server: nfs.${SECRET_DOMAIN}
        path: /media
        advancedMounts:
          jellyfin:
            main:
              - path: /allMedia
      tmpfs:
        type: emptyDir
        advancedMounts:
          jellyfin:
            main:
              - path: /cache
                subPath: cache
              - path: /config/log
                subPath: log
        globalMounts:
          - path: /tmp
            subPath: tmp
