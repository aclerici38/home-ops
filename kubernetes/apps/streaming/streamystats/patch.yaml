---
# yaml-language-server: $schema=https://k8s-versioned-schemas.pages.dev/flux/2.8.5/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: patch
spec:
  patches:
    - patch: |-
        apiVersion: postgresql.cnpg.io/v1
        kind: Cluster
        metadata:
          name: patch
        spec:
          postgresql:
            shared_preload_libraries:
              - "vchord.so"
            extensions:
              - name: pgvector
              - name: vchord
      target:
        kind: Cluster
