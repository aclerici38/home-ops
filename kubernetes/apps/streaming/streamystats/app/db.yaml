---
# yaml-language-server: $schema=https://k8s-versioned-schemas.pages.dev/cloudnative-pg/0.27.1/database_v1.json
apiVersion: postgresql.cnpg.io/v1
kind: Database
metadata:
  name: streamystats-db
spec:
  name: app
  owner: app
  cluster:
    name: streamystats-db
  extensions:
    - ensure: present
      name: vector
    - name: vchord
      ensure: present
      # renovate: datasource=github-releases depName=tensorchord/VectorChord 
      version: 1.1.1
