---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: k8tz
  namespace: flux-system
spec:
  interval: 1h
  targetNamespace: k8tz
  sourceRef:
    kind: OCIRepository
    name: k8tz
  path: ./app
  prune: true
  wait: true
  commonMetadata:
    labels:
      app.kubernetes.io/name: k8tz
  postBuild:
    substitute:
      NS: k8tz
    substituteFrom:
      - kind: ConfigMap
        name: cluster-settings
      - kind: Secret
        name: cluster-secrets
