---
# yaml-language-server: $schema=https://k8s-versioned-schemas.pages.dev/gateway-api/1.5.1/gateway_v1.json
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: external
  annotations:
    # Towonel source layer: expose this gateway's listener hostname(s) through the
    # tunnel. Emits one routing entry per listener hostname (here *.clerici.tech)
    # pointing at the gateway's data-plane Service, onto the operator-owned
    # kgateway-external TowonelAgent. The gateway terminates TLS + host-routes.
    towonel.io/tunnel: enable
    towonel.io/tunnel-ref: towonel/towonel
    towonel.io/gateway-service: kgateway/external:443
    towonel.io/agent-ref: kgateway-external
spec:
  gatewayClassName: kgateway
  addresses:
    - type: IPAddress
      value: ${KGATEWAY_EXTERNAL_LB_IP}
  infrastructure:
    annotations:
      lbipam.cilium.io/ips: ${KGATEWAY_EXTERNAL_LB_IP}
    parametersRef:
      name: kgateway-params
      group: gateway.kgateway.dev
      kind: GatewayParameters
  listeners:
    - name: http
      protocol: HTTP
      port: 80
      allowedRoutes:
        namespaces:
          from: Same
    - name: https
      protocol: HTTPS
      port: 443
      hostname: "*.clerici.tech"
      allowedRoutes:
        namespaces:
          from: All
      tls:
        certificateRefs:
          - kind: Secret
            name: clerici-tech-tls
---
apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: kgateway-external
spec:
  jobLabel: kgateway-external
  namespaceSelector:
    matchNames:
      - kgateway
  podMetricsEndpoints:
    - port: http-monitoring
      path: /metrics
      honorLabels: true
  selector:
    matchLabels:
      app.kubernetes.io/name: external
