---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: kgateway-config
  namespace: flux-system
spec:
  targetNamespace: kgateway
  dependsOn:
    - name: kgateway
  sourceRef:
    kind: OCIRepository
    name: kgateway
  path: ./config
  commonMetadata:
    labels:
      app.kubernetes.io/name: kgateway
