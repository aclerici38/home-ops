---
# The kgateway namespace's manifests, delivered as ONE OCI artifact (CI packages this whole
# namespace folder). Every Kustomization in deploy/ sources from this.
apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  name: kgateway
  namespace: flux-system
  labels:
    app.kubernetes.io/name: kgateway
    oci.home/managed: "true"
spec:
  interval: 1h
  url: oci://ghcr.io/aclerici38/home-ops/kgateway
  ref:
    tag: main
  layerSelector:
    mediaType: application/vnd.cncf.flux.content.v1.tar+gzip
    operation: extract
