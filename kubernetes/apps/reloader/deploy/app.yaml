---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: reloader
  namespace: flux-system
spec:
  interval: 1h
  targetNamespace: reloader
  sourceRef:
    kind: OCIRepository
    name: reloader
  path: ./app
  prune: true
  wait: true
  commonMetadata:
    labels:
      app.kubernetes.io/name: reloader
  postBuild:
    substitute:
      NS: reloader
    substituteFrom:
      - kind: ConfigMap
        name: cluster-settings
      - kind: Secret
        name: cluster-secrets
