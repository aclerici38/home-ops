---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: tank-zfs-scrubber
  namespace: flux-system
spec:
  targetNamespace: zfs-scrubber
  sourceRef:
    kind: OCIRepository
    name: zfs-scrubber
  path: ./app
  commonMetadata:
    labels:
      app.kubernetes.io/name: zfs-scrubber
  postBuild:
    substitute:
      POOL: tank
      SCRUB_SCHEDULE: "0 3 1 * *"
