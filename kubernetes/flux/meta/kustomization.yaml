---
# yaml-language-server: $schema=https://json.schemastore.org/kustomization
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: flux-system
resources:
  - ./app-template.yaml
  - ./cluster-settings.yaml
generatorOptions:
  disableNameSuffixHash: true
secretGenerator:
  - name: cluster-settings
    envs:
      - ../../../globals.env
