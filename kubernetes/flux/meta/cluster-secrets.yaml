---
# yaml-language-server: $schema=https://k8s-versioned-schemas.pages.dev/external-secrets/2.4.1/clusterexternalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ClusterExternalSecret
metadata:
  name: cluster-secrets
  namespace: flux-system
spec:
  namespaceSelectors:
    - {} # all ns
  refreshTime: "1m"
  externalSecretSpec:
    secretStoreRef:
      kind: ClusterSecretStore
      name: onepassword-connect
    dataFrom:
      - extract:
          key: cluster-secrets
