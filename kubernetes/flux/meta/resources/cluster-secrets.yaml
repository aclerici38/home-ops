---
# yaml-language-server: $schema=https://k8s-versioned-schemas.pages.dev/external-secrets/2.6.0/externalsecret_v1.json
# Only flux-system needs this Secret (every app Kustomization reads it via
# postBuild.substituteFrom). Apps that need individual keys pull them into their
# own secret through the resource-bundle chart's externalSecret.data.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: cluster-secrets
  namespace: flux-system
spec:
  refreshInterval: "1m"
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  dataFrom:
    - extract:
        key: cluster-secrets
