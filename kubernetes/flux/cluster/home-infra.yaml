---
# yaml-language-server: $schema=https://k8s-versioned-schemas.pages.dev/flux/2.8.2/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &ns home-infra
  namespace: flux-system
spec:
  targetNamespace: *ns
  interval: 30m
  timeout: 5m
  path: ./kubernetes/apps/home-infra
  components:
    - ../../components/namespace
  prune: false
  wait: true
  sourceRef:
    kind: GitRepository
    name: flux-system
