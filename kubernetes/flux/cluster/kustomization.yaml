---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ./apps.yaml
patches:
  - patch: |-
      apiVersion: kustomize.toolkit.fluxcd.io/v1
      kind: Kustomization
      metadata:
        name: patch
      spec:
        dependsOn:
          - name: flux-meta
        postBuild:
          substituteFrom:
            - kind: ConfigMap
              name: cluster-settings
              optional: true
            - kind: Secret
              name: cluster-secrets
    target:
      kind: Kustomization
      group: kustomize.toolkit.fluxcd.io
