---
# yaml-language-server: $schema=https://k8s-versioned-schemas.pages.dev/flux/2.8.8/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: flux-operator
  namespace: flux-system
spec:
  interval: 1h
  targetNamespace: flux-system
  chart:
    spec:
      chart: ./kubernetes/apps/flux-operator
      sourceRef:
        kind: GitRepository
        name: flux-system
        namespace: flux-system
  install:
    timeout: 5m
    remediation:
      retries: 1
  upgrade:
    timeout: 5m
    remediation:
      retries: 1
  valuesFrom:
    - kind: Secret
      name: flux-operator-oidc-credentials
      valuesKey: client_secret
      targetPath: flux-operator.web.config.authentication.oauth2.clientSecret
      optional: true
    - kind: Secret
      name: flux-operator-oidc-credentials
      valuesKey: client_id
      targetPath: flux-operator.web.config.authentication.oauth2.clientID
      optional: true
