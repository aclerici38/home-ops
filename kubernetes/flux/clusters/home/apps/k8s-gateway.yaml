---
# yaml-language-server: $schema=https://k8s-versioned-schemas.pages.dev/flux/2.8.8/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: k8s-gateway
  namespace: flux-system
spec:
  interval: 1h
  targetNamespace: k8s-gateway
  chart:
    spec:
      chart: ./kubernetes/apps/k8s-gateway
      sourceRef:
        kind: GitRepository
        name: flux-system
        namespace: flux-system
  install:
    timeout: 5m
    remediation:
      retries: 1
  upgrade:
    timeout: 5m
    remediation:
      retries: 1
  values:
    k8s-gateway:
      service:
        clusterIP: ${K8S_GATEWAY_CLUSTER_IP}
