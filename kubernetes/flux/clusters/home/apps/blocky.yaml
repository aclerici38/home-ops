---
# yaml-language-server: $schema=https://k8s-versioned-schemas.pages.dev/flux/2.8.8/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: blocky
  namespace: flux-system
spec:
  interval: 1h
  targetNamespace: blocky
  chart:
    spec:
      chart: ./kubernetes/apps/blocky
      sourceRef:
        kind: GitRepository
        name: flux-system
        namespace: flux-system
  install:
    timeout: 5m
    remediation:
      retries: 1
  upgrade:
    timeout: 5m
    remediation:
      retries: 1
  values:
    base:
      service:
        dns:
          annotations:
            lbipam.cilium.io/ips: ${BLOCKY_LB_IP}
        k8s:
          clusterIP: ${BLOCKY_CLUSTER_IP}
