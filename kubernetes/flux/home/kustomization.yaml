---
# yaml-language-server: $schema=https://json.schemastore.org/kustomization
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ./app-template.yaml
  - ./apps.yaml
  - ./shared-apps.yaml
configMapGenerator:
  - name: cluster-settings
    namespace: flux-system
    envs:
      - ../../../globals.env
generatorOptions:
  disableNameSuffixHash: true