---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: AI PR Review

on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.event.number }}
  cancel-in-progress: true

jobs:
  review:
    name: AI PR Review
    # Skip drafts, and only review branches pushed to this repo.
    if: >-
      github.event.pull_request.draft == false &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: home-ops-runners
    # Loop mode does up to 3 planning calls + the review on the local model;
    # cap the job so a hung call can't hold the runner forever.
    timeout-minutes: 22
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup tools
        uses: jdx/mise-action@dba19683ed58901619b14f395a24841710cb4925 # v4.1.0
        env:
          MISE_NO_HOOKS: "1"
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          install_args: github:home-operations/flate

      - name: Review pull request
        id: review
        uses: misospace/pr-reviewer-action@b0d992dbc7fff892b0776cf61b52b5de85a787e9 # v1.2.5
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          ai_base_url: http://mac-mini.cottage.internal:11434/v1
          ai_api_format: openai
          ai_model: gpt-oss:20b
          ai_max_tokens: "8192"
          ai_request_timeout_sec: "600"
          # local model
          context_limit_mode: minimal
          review_scope: auto
          tool_mode: plan_execute_loop
          # Re-plan after each round so the model can chase a lead
          tool_max_rounds: "3"
          tool_max_requests: "6"
          tool_planning_max_tokens: "6144"
          # Let later rounds' planning see more of the accumulated evidence
          tool_planning_max_context_bytes: "80000"
          tool_planning_timeout_sec: "180"
          tool_request_timeout_sec: "30"
          # Allow reading any upstream repo's releases
          tool_allowed_gh_api_repos: "*"
          evidence_providers_file: .github/pr-review-providers.json
          evidence_provider_timeout_sec: "120"
          # Post a native review and let the model approve / request changes.
          publish_mode: review_verdict
          allow_approve: "true"
          skip_if_diff_unchanged: "false"

      - name: Flag non-approval
        if: steps.review.outputs.verdict == 'request_changes'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR: ${{ github.event.pull_request.number }}
          VERDICT: ${{ steps.review.outputs.verdict }}
        run: |
          set -euo pipefail
          gh pr edit "${PR}" --add-assignee aclerici38
          echo "::error title=AI requested changes::verdict=${VERDICT}"
          exit 1
