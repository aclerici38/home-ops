---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Kubernetes

on:
  push:
    branches:
      - "main"
    paths:
      - "kubernetes/**"
      - ".yamllint.yaml"
      - "mise.toml"
      - ".github/workflows/kubernetes.yaml"
  pull_request:
    branches:
      - "main"
    paths:
      - "kubernetes/**"
      - ".yamllint.yaml"
      - "mise.toml"
      - ".github/workflows/kubernetes.yaml"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup mise
        uses: jdx/mise-action@c37c93293d6b742fc901e1406b8f764f6fdefdce # v4.4.3
        with:
          experimental: true

      - name: yamllint
        run: yamllint kubernetes

      - name: Validate rendered manifests
        run: |
          flate build all --path . --allow-missing-secrets -o yaml 2>/dev/null \
            | kubeconform \
                -strict \
                -ignore-missing-schemas \
                -kubernetes-version 1.36.1 \
                -schema-location default \
                -schema-location 'https://k8s-versioned-schemas.pages.dev/{{.Group}}/{{.ResourceKind}}_{{.ResourceAPIVersion}}.json' \
                -summary \
                -

  success:
    if: ${{ !cancelled() }}
    needs:
      - "lint"
    name: Kubernetes - Success
    runs-on: ubuntu-latest
    timeout-minutes: 1
    steps:
      - name: Any jobs failed?
        if: ${{ contains(needs.*.result, 'failure') }}
        run: exit 1

      - name: All jobs passed or skipped?
        if: ${{ !(contains(needs.*.result, 'failure')) }}
        run: echo "All jobs passed or skipped" && echo "${{ toJSON(needs.*.result) }}"
