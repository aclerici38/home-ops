---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Kubernetes

on:
  push:
    branches:
      - "main"
    paths:
      - "kubernetes/**"
      - "globals.env"
      - ".yamllint.yaml"
      - ".mise.toml"
      - ".github/workflows/kubernetes.yaml"
  pull_request:
    branches:
      - "main"
    paths:
      - "kubernetes/**"
      - "globals.env"
      - ".yamllint.yaml"
      - ".mise.toml"
      - ".github/workflows/kubernetes.yaml"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Setup mise
        uses: jdx/mise-action@9e7f7633ff6f6d6048a9418a68d48f288f50eb14 # v4.2.3
        env:
          MISE_NO_HOOKS: "1"
        with:
          experimental: true
          install_args: "yamllint"

      - name: yamllint
        run: yamllint kubernetes

  validate:
    name: Validate (${{ matrix.cluster }})
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    strategy:
      matrix:
        cluster:
          - home
          - cloud
          - raphael
      fail-fast: false
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Setup mise
        uses: jdx/mise-action@9e7f7633ff6f6d6048a9418a68d48f288f50eb14 # v4.2.3
        env:
          MISE_NO_HOOKS: "1"
        with:
          experimental: true
          install_args: "github:home-operations/flate kubeconform"

      # Separate render + validate so a flate render error and a kubeconform
      # schema failure are each visible on their own step (not hidden by a pipe).
      # Each cluster renders from its own flux entrypoint so per-cluster
      # cluster-settings substitutions resolve correctly.
      - name: Render manifests
        env:
          FLATE_IS_UPGRADE: ${{ contains(github.event.pull_request.labels.*.name, 'upgrade') }}
        run: |
          flate build all --path ./kubernetes/flux/${{ matrix.cluster }} --allow-missing-secrets -o yaml > /tmp/manifests.yaml
          echo "Rendered $(grep -c '^kind:' /tmp/manifests.yaml) document(s)"

      - name: Validate with kubeconform
        run: |
          kubeconform \
            -strict \
            -ignore-missing-schemas \
            -schema-location default \
            -schema-location 'https://k8s-versioned-schemas.pages.dev/{{.Group}}/{{.ResourceKind}}_{{.ResourceAPIVersion}}.json' \
            -summary \
            /tmp/manifests.yaml

  success:
    if: ${{ !cancelled() }}
    needs:
      - "lint"
      - "validate"
    name: Kubernetes - Success
    runs-on: ubuntu-latest
    timeout-minutes: 1
    steps:
      - name: Any jobs failed?
        if: ${{ contains(needs.*.result, 'failure') }}
        run: exit 1

      - name: All jobs passed or skipped?
        if: ${{ !(contains(needs.*.result, 'failure')) }}
        run: echo "All jobs passed or skipped" && echo "${{ toJSON(needs.*.result) }}"
