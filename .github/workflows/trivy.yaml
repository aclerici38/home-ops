---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Trivy

on:
  push:
    branches:
      - "main"
    paths:
      - "kubernetes/**"
      - ".github/workflows/trivy.yaml"
  pull_request:
    branches:
      - "main"
    paths:
      - "kubernetes/**"
      - ".github/workflows/trivy.yaml"
  schedule:
    # Daily for new CVEs
    - cron: "0 6 * * *"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  config:
    name: Config Analysis
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Trivy IaC scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        env:
          TRIVY_MISCONFIG_SCANNERS: kubernetes
        with:
          scan-type: "config"
          scan-ref: "kubernetes/"
          hide-progress: true
          format: "sarif"
          output: "trivy-config.sarif"
          exit-code: "0"
          severity: "HIGH,CRITICAL"
          skip-files: "**/*.sops.yaml"

      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@7211b7c8077ea37d8641b6271f6a365a22a5fbfa # v4.36.0
        with:
          sarif_file: "trivy-config.sarif"
          category: "trivy-config"

  image:
    name: Image CVEs
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Setup flate
        uses: home-operations/flate/action@aef47adc856bb97038ff321e5136cf65e0fa23cf # 0.1.27
        with:
          cache: true

      - name: Setup Trivy
        uses: aquasecurity/setup-trivy@3fb12ec12f41e471780db15c232d5dd185dcb514 # v0.2.6
        with:
          cache: true
          # renovate: datasource=github-releases depName=aquasecurity/trivy
          version: v0.70.0

      - name: Collect changed images from PR
        if: github.event_name == 'pull_request'
        run: |
          flate get images --path . --allow-missing-secrets -o name \
            --base "${{ github.event.pull_request.base.sha }}" \
            > /tmp/images.txt || true
          echo "$(wc -l < /tmp/images.txt | tr -d ' ') changed images:"
          cat /tmp/images.txt

      - name: Collect changed images from last commit
        if: github.event_name == 'push'
        run: |
          flate get images --path . --allow-missing-secrets -o name \
            --base "${{ github.event.before }}" \
            > /tmp/images.txt || true
          echo "$(wc -l < /tmp/images.txt | tr -d ' ') changed images:"
          cat /tmp/images.txt

      - name: Collect all image refs
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        run: |
          flate get images --path . --allow-missing-secrets -o name \
            > /tmp/images.txt || true
          echo "$(wc -l < /tmp/images.txt | tr -d ' ') images:"
          cat /tmp/images.txt

      - name: Scan images
        id: scan
        run: |
          mkdir -p /tmp/sarif
          i=0
          while IFS= read -r img; do
            [ -z "$img" ] && continue
            i=$((i+1))
            safe=$(echo "$img" | tr '/:@' '___')
            echo "::group::$img"
            sarif="/tmp/sarif/${i}-${safe}.sarif"
            trivy image \
              --scanners vuln \
              --severity HIGH,CRITICAL \
              --ignore-status will_not_fix,fix_deferred,end_of_life \
              --timeout 10m \
              --exit-code 0 \
              --no-progress \
              --format sarif \
              --output "$sarif" \
              "$img" || true
            jq empty "$sarif" >/dev/null 2>&1 || rm -f "$sarif"
            echo "::endgroup::"
          done < /tmp/images.txt

          shopt -s nullglob
          files=(/tmp/sarif/*.sarif)
          if [ ${#files[@]} -eq 0 ]; then
            echo "No SARIF results to upload"
            echo "uploaded=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Collapse per-image SARIFs into one run
          jq -s '{
            "$schema": "https://json.schemastore.org/sarif-2.1.0.json",
            version: "2.1.0",
            runs: [{
              tool: {
                driver: {
                  name: "Trivy",
                  informationUri: "https://github.com/aquasecurity/trivy",
                  version: (.[0].runs[0].tool.driver.version // ""),
                  rules: ([.[].runs[0].tool.driver.rules // []] | add | unique_by(.id))
                }
              },
              results: ([.[].runs[0].results // []] | add),
              columnKind: "utf16CodeUnits"
            }]
          }' "${files[@]}" > /tmp/trivy-images.sarif

          echo "uploaded=true" >> "$GITHUB_OUTPUT"

      - name: Upload SARIF
        if: always() && steps.scan.outputs.uploaded == 'true'
        uses: github/codeql-action/upload-sarif@7211b7c8077ea37d8641b6271f6a365a22a5fbfa # v4.36.0
        with:
          sarif_file: "/tmp/trivy-images.sarif"
          category: "trivy-image"
