---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Flate

on:
  pull_request:
    branches:
      - main
    paths:
      - kubernetes/**
      - globals.env
      - .mise.toml
      - .github/workflows/flate.yaml
  push:
    branches:
      - main
    paths:
      - kubernetes/**
      - globals.env
      - .mise.toml
      - .github/workflows/flate.yaml

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.event.number || github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Flate Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout Pull Request Branch
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Setup tools
        uses: jdx/mise-action@dba19683ed58901619b14f395a24841710cb4925 # v4.1.0
        env:
          MISE_NO_HOOKS: "1"
        with:
          experimental: true
          install_args: "github:home-operations/flate"

      - name: Run flate test all
        run: |-
          flate test all --skip-secrets=false --path .

  diff:
    if: ${{ github.event_name == 'pull_request' }}
    name: Flate Diff (${{ matrix.resource }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      matrix:
        resource:
          - hr
          - ks
      fail-fast: false
    steps:
      - name: Checkout PR
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Checkout base
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ github.base_ref }}
          path: base
          persist-credentials: false

      - name: Setup tools
        uses: jdx/mise-action@dba19683ed58901619b14f395a24841710cb4925 # v4.1.0
        env:
          MISE_NO_HOOKS: "1"
        with:
          experimental: true
          install_args: "dyff github:home-operations/flate"

      - name: Build both sides
        env:
          FLATE_IS_UPGRADE: ${{ contains(github.event.pull_request.labels.*.name, 'upgrade') }}
          RESOURCE: ${{ matrix.resource }}
        run: |-
          flate build "${RESOURCE}" --path ./base -o yaml 2>/dev/null > /tmp/base.yaml || true
          flate build "${RESOURCE}" --path . -o yaml 2>/dev/null > /tmp/pull.yaml || true

      - name: Compute diff
        id: diff
        run: |-
          {
            echo 'diff<<EOF'
            dyff between --omit-header --exclude-regexp 'checksum/|caBundle$' /tmp/base.yaml /tmp/pull.yaml || true
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - if: ${{ steps.diff.outputs.diff != '' }}
        name: Generate Token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: app-token
        with:
          client-id: ${{ secrets.BOT_APP_CLIENT_ID }}
          private-key: ${{ secrets.BOT_APP_PRIVATE_KEY }}
          permission-pull-requests: write

      - if: ${{ steps.diff.outputs.diff != '' }}
        name: Add Comment
        uses: marocchino/sticky-pull-request-comment@0ea0beb66eb9baf113663a64ec522f60e49231c0 # v3.0.4
        with:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          header: ${{ github.event.pull_request.number }}/kubernetes/${{ matrix.resource }}
          message: |-
            ```
            ${{ steps.diff.outputs.diff }}
            ```

      - if: ${{ matrix.resource == 'hr' }}
        name: List changed images
        id: images
        run: |-
          awk '$1 == "image:" {print $2}' /tmp/base.yaml | sort -u > /tmp/base.images
          awk '$1 == "image:" {print $2}' /tmp/pull.yaml | sort -u > /tmp/pull.images
          images=$(comm -13 /tmp/base.images /tmp/pull.images)
          {
            echo 'images<<EOF'
            echo "${images}"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - if: ${{ matrix.resource == 'hr' && steps.images.outputs.images != '' }}
        name: Inspect changed images
        env:
          IMAGES: ${{ steps.images.outputs.images }}
        run: |-
          while IFS= read -r img; do
            [ -z "${img}" ] && continue
            echo "::group::${img}"
            docker buildx imagetools inspect "${img}" || true
            echo "::endgroup::"
          done <<< "${IMAGES}"

  success:
    if: ${{ !cancelled() && github.event_name == 'pull_request' }}
    needs:
      - test
      - diff
    name: Flate - Success
    runs-on: ubuntu-latest
    permissions: {}
    steps:
      - name: Any jobs failed?
        if: ${{ contains(needs.*.result, 'failure') }}
        run: exit 1

      - name: All jobs passed or skipped?
        if: ${{ !(contains(needs.*.result, 'failure')) }}
        run: echo "All jobs passed or skipped" && echo "${{ toJSON(needs.*.result) }}"
