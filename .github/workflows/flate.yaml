---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Flate

on:
  pull_request:
    branches:
      - main
    paths:
      - kubernetes/**
      - globals.env
      - .mise.toml
      - .github/workflows/flate.yaml
  push:
    branches:
      - main
    paths:
      - kubernetes/**
      - globals.env
      - .mise.toml
      - .github/workflows/flate.yaml

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.event.number || github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Flate Test (${{ matrix.cluster }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      matrix:
        cluster:
          - home
          - cloud
          - raphael
      fail-fast: false
    steps:
      - name: Checkout Pull Request Branch
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Setup tools
        uses: jdx/mise-action@f10502fc09dadecfefb962fff68ce77213930204 # v4.2.2
        env:
          MISE_NO_HOOKS: "1"
        with:
          experimental: true
          install_args: github:home-operations/flate

      - name: Run flate test
        run: flate test all --path ./kubernetes/flux/${{ matrix.cluster }}

  success:
    if: ${{ !cancelled() && github.event_name == 'pull_request' }}
    needs:
      - test
    name: Flate - Success
    runs-on: ubuntu-latest
    permissions: {}
    steps:
      - name: Any jobs failed?
        if: ${{ contains(needs.*.result, 'failure') }}
        run: exit 1

      - name: All jobs passed or skipped?
        if: ${{ !(contains(needs.*.result, 'failure')) }}
        run: echo "All jobs passed or skipped" && echo "${{ toJSON(needs.*.result) }}"
