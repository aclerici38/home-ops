---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Flate

on:
  pull_request:
    branches:
      - main
    paths:
      - kubernetes/**
      - .github/workflows/flate.yaml

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.event.number || github.ref }}
  cancel-in-progress: true

env:
  # renovate: datasource=docker depName=ghcr.io/siderolabs/kubelet
  KUBE_VERSION: v1.36.1
  API_VERSIONS: cert-manager.io/v1,monitoring.coreos.com/v1,monitoring.coreos.com/v1alpha1,gateway.networking.k8s.io/v1,gateway.networking.k8s.io/v1beta1,grafana.integreatly.org/v1beta1,external-secrets.io/v1,volsync.backube/v1alpha1,snapshot.storage.k8s.io/v1

jobs:
  test:
    name: Flate Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout Pull Request Branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          path: pull
          persist-credentials: false

      - name: Setup flate
        uses: home-operations/flate/action@2e8f4c8f439cf99c03a0f7ec64affa8d458b3ae0 # 0.1.25
        with:
          # renovate: datasource=github-tags depName=home-operations/flate
          version: 0.1.25

      - name: Run flate test all
        run: |-
          flate test all \
            --allow-missing-secrets=true \
            --kube-version "${KUBE_VERSION}" \
            --api-versions "${API_VERSIONS}" \
            --skip-crds=false \
            --skip-secrets=false \
            --path ./pull

  diff:
    name: Flate Diff (${{ matrix.resource }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      matrix:
        resource:
          - helmrelease
          - kustomization
      fail-fast: false
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          path: pull
          persist-credentials: false

      - name: Setup flate
        uses: home-operations/flate/action@2e8f4c8f439cf99c03a0f7ec64affa8d458b3ae0 # 0.1.25
        with:
          # renovate: datasource=github-tags depName=home-operations/flate
          version: 0.1.25

      - name: Run flate diff
        id: diff
        env:
          BASE_REF: ${{ github.base_ref }}
          IS_UPGRADE: ${{ contains(github.event.pull_request.labels.*.name, 'upgrade') }}
        run: |-
          args=(
            --allow-missing-secrets=true
            --kube-version "${KUBE_VERSION}"
            --api-versions "${API_VERSIONS}"
            --skip-crds=false
            --skip-secrets=false
            --base "origin/${BASE_REF}"
            --path ./pull
          )
          if [[ "${IS_UPGRADE}" == "true" ]]; then
            args+=(--is-upgrade)
          fi
          {
            echo 'diff<<EOF'
            flate diff ${{ matrix.resource }} "${args[@]}"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - if: ${{ steps.diff.outputs.diff != '' }}
        name: Generate Token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: app-token
        with:
          client-id: ${{ secrets.BOT_APP_CLIENT_ID }}
          private-key: ${{ secrets.BOT_APP_PRIVATE_KEY }}
          permission-pull-requests: write

      - if: ${{ steps.diff.outputs.diff != '' }}
        name: Add Comment
        uses: marocchino/sticky-pull-request-comment@0ea0beb66eb9baf113663a64ec522f60e49231c0 # v3.0.4
        with:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          header: ${{ github.event.pull_request.number }}/kubernetes/${{ matrix.resource }}
          message: |-
            ```diff
            ${{ steps.diff.outputs.diff }}
            ```

  success:
    if: ${{ !cancelled() }}
    needs:
      - test
      - diff
    name: Flate - Success
    runs-on: ubuntu-latest
    permissions: {}
    steps:
      - name: Any jobs failed?
        if: ${{ contains(needs.*.result, 'failure') }}
        run: exit 1

      - name: All jobs passed or skipped?
        if: ${{ !(contains(needs.*.result, 'failure')) }}
        run: echo "All jobs passed or skipped" && echo "${{ toJSON(needs.*.result) }}"
