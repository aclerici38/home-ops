[settings]
lockfile_platforms = ["linux-x64", "macos-arm64"]

[env]
_.file = "globals.env"
FLATE_KUBE_VERSION = "{{ env.KUBE_VERSION }}"
FLATE_API_VERSIONS = "cert-manager.io/v1,monitoring.coreos.com/v1,monitoring.coreos.com/v1alpha1,gateway.networking.k8s.io/v1,gateway.networking.k8s.io/v1beta1,grafana.integreatly.org/v1beta1,external-secrets.io/v1,volsync.backube/v1alpha1,snapshot.storage.k8s.io/v1"
FLATE_ALLOW_MISSING_SECRETS = "true"
FLATE_SKIP_CRDS = "false"

[hooks]
postinstall = "lefthook install"

[tools]
actionlint = "1.7.12"
dyff = "1.12.0"
kubeconform = "0.8.0"
lefthook = "2.1.9"
yamllint = "1.38.0"
yq = "4.53.3"
"github:home-operations/flate" = "v0.3.3"

[tasks.flate-test]
description = "Render & validate all Flux manifests offline (per-namespace OCI artifacts)"
dir = "{{ config_root }}"
shell = "bash -c"
# Work on a throwaway copy so the normalize never mutates the working tree.
# `flate test all` renders the whole cluster from the entrypoint and validates
# every Kustomization + HelmRelease; cross-resource deps resolve because the
# whole repo is present. Referenced verbatim by the CI test job.
run = '''
set -euo pipefail
tmp="$(mktemp -d)"
trap 'rm -rf "$tmp"' EXIT
rsync -a --exclude=.git ./ "$tmp/"
"$tmp/scripts/flate-normalize.sh" "$tmp"
flate test all --skip-secrets=false --path "$tmp"
'''