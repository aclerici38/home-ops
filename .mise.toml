[settings]
experimental = true
lockfile_platforms = ["linux-x64", "macos-arm64"]

[env]
_.file = "globals.env"
FLATE_KUBE_VERSION = "{{ env.KUBE_VERSION }}"
FLATE_API_VERSIONS = "cert-manager.io/v1,monitoring.coreos.com/v1,monitoring.coreos.com/v1alpha1,gateway.networking.k8s.io/v1,gateway.networking.k8s.io/v1beta1,grafana.integreatly.org/v1beta1,external-secrets.io/v1,volsync.backube/v1alpha1,snapshot.storage.k8s.io/v1"
FLATE_ALLOW_MISSING_SECRETS = "true"
FLATE_SKIP_CRDS = "false"

[hooks]
postinstall = "lefthook install"

[tasks."talos:gen"]
description = "Regenerate Talos cluster configs from talconfig.yaml into clusterconfig/"
dir = "talos"
run = "talhelper genconfig"

[tasks."talos:apply"]
description = "Apply Talos config to all nodes, or a single node: mise run talos:apply [node]"
dir = "talos"
run = """
#!/usr/bin/env bash
set -euo pipefail

diff=$(talhelper genconfig --dry-run 2>&1 | grep -v "^no changes found" || true)
if [[ -n "$diff" ]]; then
  echo "ERROR: clusterconfig is out of sync with talconfig.yaml. Run 'mise run talos:gen' first and review the changes."
  echo ""
  echo "$diff"
  exit 1
fi

node="${1:-}"
if [[ -n "$node" ]]; then
  talhelper gencommand apply --node "$node" | bash
else
  talhelper gencommand apply | bash
fi
"""

[tools]
actionlint = "1.7.12"
dyff = "1.12.0"
kubeconform = "0.8.0"
lefthook = "2.1.9"
yamllint = "1.38.0"
"github:home-operations/flate" = "v0.4.4"
