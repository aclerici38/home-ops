[settings]
experimental = true
lockfile_platforms = ["linux-x64", "macos-arm64"]

[env]
_.file = "globals.env"
SOPS_AGE_KEY_FILE = "{{ config_root }}/age.key"
FLATE_KUBE_VERSION = "{{ env.KUBE_VERSION }}"
FLATE_API_VERSIONS = "cert-manager.io/v1,monitoring.coreos.com/v1,monitoring.coreos.com/v1alpha1,gateway.networking.k8s.io/v1,gateway.networking.k8s.io/v1beta1,grafana.integreatly.org/v1beta1,external-secrets.io/v1,volsync.backube/v1alpha1,snapshot.storage.k8s.io/v1"
FLATE_ALLOW_MISSING_SECRETS = "true"
FLATE_SKIP_CRDS = "false"

[hooks]
postinstall = "lefthook install"

[tasks."sops:encrypt"]
description = "Encrypt <dir>/sops.decrypted.yaml -> <dir>/secrets.sops.yaml: mise run sops:encrypt [raphael|.] (default raphael)"
run = """
#!/usr/bin/env bash
set -euo pipefail
dir="${1:-raphael}"
[[ -f "$dir/sops.decrypted.yaml" ]] || { echo "ERROR: $dir/sops.decrypted.yaml not found" >&2; exit 1; }
sops encrypt --output "$dir/secrets.sops.yaml" "$dir/sops.decrypted.yaml"
echo "encrypted $dir/sops.decrypted.yaml -> $dir/secrets.sops.yaml"
"""

[tasks."sops:decrypt"]
description = "Decrypt <dir>/secrets.sops.yaml -> <dir>/sops.decrypted.yaml: mise run sops:decrypt [raphael|.] (default raphael)"
run = """
#!/usr/bin/env bash
set -euo pipefail
dir="${1:-raphael}"
[[ -f "$dir/secrets.sops.yaml" ]] || { echo "ERROR: $dir/secrets.sops.yaml not found" >&2; exit 1; }
sops decrypt --output "$dir/sops.decrypted.yaml" "$dir/secrets.sops.yaml"
echo "decrypted $dir/secrets.sops.yaml -> $dir/sops.decrypted.yaml"
"""

[tasks."talos:gen"]
description = "Regenerate Talos configs for a cluster: mise run talos:gen [home|cloud] (default home)"
dir = "talos"
run = """
#!/usr/bin/env bash
set -euo pipefail
cluster="${1:-}"
[[ -n "$cluster" ]] || { echo "ERROR: specify a cluster: home|cloud" >&2; exit 1; }
cd "$cluster"
talhelper genconfig
"""

[tasks."talos:apply"]
description = "Apply Talos config: mise run talos:apply [home|cloud] [node] (cluster default home)"
dir = "talos"
run = """
#!/usr/bin/env bash
set -euo pipefail
cluster="${1:-}"
[[ -n "$cluster" ]] || { echo "ERROR: specify a cluster: home|cloud" >&2; exit 1; }
cd "$cluster"

diff=$(talhelper genconfig --dry-run 2>&1 | grep -v "^no changes found" || true)
if [[ -n "$diff" ]]; then
  echo "ERROR: $cluster clusterconfig is out of sync with talconfig.yaml. Run 'mise run talos:gen $cluster' first and review the changes."
  echo ""
  echo "$diff"
  exit 1
fi

node="${2:-}"
if [[ -n "$node" ]]; then
  talhelper gencommand apply --node "$node" | bash
else
  talhelper gencommand apply | bash
fi
"""

[tasks."bootstrap:secrets"]
description = "Apply bootstrap namespaces + the 1Password Connect secret to a kube context (shared by bootstrap:resources and bootstrap:raphael)"
hide = true
run = """
#!/usr/bin/env bash
set -euo pipefail
ctx="${1:?ERROR: kube context required}"
namespaces="${2:-flux-system onepassword-connect}"
echo "==> applying namespaces + 1Password secret to $ctx"

op user get --me >/dev/null
export VAULT="${VAULT:-Kubernetes}"
export KCTX="$ctx"

for ns in $namespaces; do
  kubectl --context "$ctx" create namespace "$ns" --dry-run=client --output yaml \
    | kubectl --context "$ctx" apply --server-side --filename -
done

op run --env-file kubernetes/bootstrap/.secrets.env --no-masking -- bash -c '
  set -euo pipefail
  kubectl --context "$KCTX" create secret generic onepassword-connect --namespace onepassword-connect \
    --from-literal=1password-credentials.json="$(echo "$ONEPASSWORD_CREDENTIALS" | base64)" \
    --from-literal=token="$ONEPASSWORD_CONNECT_TOKEN" \
    --dry-run=client --output yaml | kubectl --context "$KCTX" apply --server-side --filename -
'
"""

[tasks."bootstrap:resources"]
description = "Bootstrap namespaces + secrets: mise run bootstrap:resources <home|cloud>"
run = """
#!/usr/bin/env bash
set -euo pipefail
cluster="${1:-}"
[[ -n "$cluster" ]] || { echo "ERROR: specify a cluster: home|cloud" >&2; exit 1; }
case "$cluster" in
  home)  export CLUSTER_NAME=dormammu ;;
  cloud) export CLUSTER_NAME=cloud ;;
  *) echo "ERROR: unknown cluster '$cluster' (expected home|cloud)" >&2; exit 1 ;;
esac
ctx="admin@${CLUSTER_NAME}"
kubectl config get-contexts --output name | grep -qx "$ctx" || {
  echo "ERROR: kube context '$ctx' not found; merge it first (e.g. talosctl kubeconfig)" >&2; exit 1; }
kubectl config use-context "$ctx" >/dev/null
mise run bootstrap:secrets "$ctx" "flux-system onepassword-connect kgateway"
"""

[tasks."bootstrap:helmfile"]
description = "Bootstrap helmfile (cilium, coredns, cert-manager, 1p-connect, external-secrets, flux): mise run bootstrap:helmfile <home|cloud>"
run = """
#!/usr/bin/env bash
set -euo pipefail
cluster="${1:-}"
[[ -n "$cluster" ]] || { echo "ERROR: specify a cluster: home|cloud" >&2; exit 1; }
case "$cluster" in
  home)  export CLUSTER_NAME=dormammu ;;
  cloud) export CLUSTER_NAME=cloud ;;
  *) echo "ERROR: unknown cluster '$cluster' (expected home|cloud)" >&2; exit 1 ;;
esac
ctx="admin@${CLUSTER_NAME}"
kubectl config get-contexts --output name | grep -qx "$ctx" || {
  echo "ERROR: kube context '$ctx' not found; merge it first (e.g. talosctl kubeconfig)" >&2; exit 1; }
kubectl config use-context "$ctx" >/dev/null
echo "==> [$cluster] applying helmfile to $ctx"

# globals.env (loaded by mise) holds the home defaults; overlay this cluster's
# settings on top so ${VARS} in the Flux manifests resolve per-cluster.
export ROOT_DIR="${MISE_PROJECT_ROOT:-$(git rev-parse --show-toplevel)}"
export CLUSTER="$cluster"
settings="$ROOT_DIR/kubernetes/flux/$cluster/cluster-settings.yaml"
if [[ -f "$settings" ]]; then
  while IFS= read -r kv; do export "$kv"; done \
    < <(yq -r '.data | to_entries[] | .key + "=" + .value' "$settings")
fi

helmfile --kube-context "$ctx" --file kubernetes/bootstrap/apps/helmfile.yaml.gotmpl apply --skip-diff-on-install --suppress-diff
"""

[tasks."bootstrap:apps"]
description = "Full bootstrap (namespaces + secrets, then helmfile): mise run bootstrap:apps <home|cloud>"
run = """
#!/usr/bin/env bash
set -euo pipefail
cluster="${1:-}"
[[ -n "$cluster" ]] || { echo "ERROR: specify a cluster: home|cloud" >&2; exit 1; }
mise run bootstrap:resources "$cluster"
mise run bootstrap:helmfile "$cluster"
"""

[tasks."bootstrap:raphael"]
description = "Bootstrap the raphael k3s cluster (namespaces + 1Password secret + Flux): mise run bootstrap:raphael [kube-context]"
run = """
#!/usr/bin/env bash
set -euo pipefail
# k3s ships flannel + CoreDNS already, so unlike the Talos clusters this only
# seeds the 1Password secret and installs Flux; Flux does the rest.
ctx="${1:-raphael}"
kubectl config get-contexts --output name | grep -qx "$ctx" || {
  echo "ERROR: kube context '$ctx' not found; merge raphael's k3s kubeconfig first" >&2
  echo "  (k3s.nix emits a ready-to-use /etc/rancher/k3s/raphael.yaml: scp it over and merge into ~/.kube/config)" >&2
  exit 1; }
kubectl config use-context "$ctx" >/dev/null
echo "==> [raphael] bootstrapping cluster on context $ctx"

# 1) Namespaces + the 1Password Connect secret — the one secret Flux can't
#    bootstrap itself; everything else flows through external-secrets after.
mise run bootstrap:secrets "$ctx"

# 2) Flux operator + instance. Once flux-instance is up it reconciles
#    kubernetes/flux/raphael (synced from main) and pulls in everything else.
export ROOT_DIR="${MISE_PROJECT_ROOT:-$(git rev-parse --show-toplevel)}"
helmfile --kube-context "$ctx" --file kubernetes/bootstrap/raphael/helmfile.yaml.gotmpl apply --skip-diff-on-install --suppress-diff
"""

[tasks."kubeconfig:raphael"]
description = "Fetch raphael's kubeconfig and merge it into ~/.kube/config: mise run kubeconfig:raphael [user@host]"
run = """
#!/usr/bin/env bash
set -euo pipefail
remote="${1:-anthony@raphael.clerici.tech}"
# k3s.nix emits /etc/rancher/k3s/raphael.yaml (context "raphael", server at the
# real API address). It's 0600 root, so stage a readable copy via sudo (prompts
# once), then pull it over a clean scp channel (no TTY newline mangling).
staged=/tmp/raphael-kubeconfig.yaml
local="$(mktemp)"
trap 'rm -f "$local"' EXIT
echo "==> staging kubeconfig on $remote (sudo may prompt)"
ssh -t "$remote" 'sudo install -m600 -o "$(id -un)" /etc/rancher/k3s/raphael.yaml /tmp/raphael-kubeconfig.yaml'
scp -q "$remote:$staged" "$local"
ssh "$remote" 'rm -f /tmp/raphael-kubeconfig.yaml'

mkdir -p "$HOME/.kube"
if [[ -f "$HOME/.kube/config" ]]; then
  cp "$HOME/.kube/config" "$HOME/.kube/config.bak"
  KUBECONFIG="$HOME/.kube/config:$local" kubectl config view --flatten > "$HOME/.kube/config.merged"
  mv "$HOME/.kube/config.merged" "$HOME/.kube/config"
  echo "==> merged 'raphael' context (backup: ~/.kube/config.bak)"
else
  cp "$local" "$HOME/.kube/config"
  echo "==> wrote ~/.kube/config"
fi
chmod 600 "$HOME/.kube/config"
kubectl config use-context raphael >/dev/null
echo "==> current context: $(kubectl config current-context)"
"""

[tasks."cleanse-pods"]
description = "Cleanse pods with a Failed/Pending/Succeeded phase"
run = """
#!/usr/bin/env bash
set -euo pipefail
for phase in Failed Pending Succeeded; do
  kubectl delete pods --all-namespaces --field-selector "status.phase=${phase}" --ignore-not-found=true
done
"""

[tools]
actionlint = "1.7.12"
dyff = "1.12.0"
kubeconform = "0.8.0"
lefthook = "2.1.9"
yamlfmt = "0.21.0"
yamllint = "1.38.0"
"github:home-operations/flate" = "v0.4.10"
node = "latest"
oxfmt = "0.58.0"
