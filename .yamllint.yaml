---
extends: default

ignore: |
  .git/
  clusterconfig/
  talos/clusterconfig/
  *.sops.yaml
  nix-config/
  .pytest_cache/
  kubernetes/charts/*/templates/

rules:
  line-length: disable
  truthy:
    check-keys: false
  comments:
    min-spaces-from-content: 1
  document-start:
    present: true
  indentation:
    spaces: 2
    indent-sequences: true
  braces:
    max-spaces-inside: 1
  brackets:
    max-spaces-inside: 1
