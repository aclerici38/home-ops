pre-commit:
  parallel: true
  commands:
    nixfmt:
      glob: "nix-config/**/*.nix"
      run: nixfmt --check {staged_files}
      stage_fixed: true
    actionlint:
      glob: ".github/{workflows,actions}/**/*.{yaml,yml}"
      run: actionlint {staged_files}
    talhelper-talconfig:
      glob: "talos/talconfig.yaml"
      run: talhelper validate talconfig talos/talconfig.yaml
    talhelper-nodeconfig:
      glob: "talos/{talconfig.yaml,patches/**}"
      run: |-
        for f in talos/clusterconfig/*.yaml; do
          [ -e "$f" ] || continue
          talhelper validate nodeconfig "$f" || exit 1
        done
    helm-dep-update:
      glob: "kubernetes/{apps,charts}/*/Chart.yaml"
      run: |-
        for f in {staged_files}; do
          d=$(dirname "$f")
          helm dependency update "$d" || exit 1
          [ -f "$d/Chart.lock" ] && git add "$d/Chart.lock"
        done
