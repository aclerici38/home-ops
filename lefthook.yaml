---
# remotes:
#   - git_url: "https://github.com/home-operations/.github"
#     ref: "main"
#     configs:
#       - "lefthook.common.toml"
pre-commit:
  parallel: true
  commands:
    nixfmt:
      glob: "nix-config/**/*.nix"
      run: nixfmt --check {staged_files}
      stage_fixed: true
    yaml:
      glob: "kubernetes/**/*.{yaml,yml}"
      exclude:
        - "**/*.sops.yaml"
        - "kubernetes/charts/*/templates/**"
      # Auto-fix formatting first (trailing whitespace, EOF newline, indent),
      # then lint so anything yamlfmt can't fix blocks here instead of in CI.
      run: yamlfmt {staged_files} && yamllint {staged_files}
      stage_fixed: true
    actionlint:
      glob: ".github/{workflows,actions}/**/*.{yaml,yml}"
      run: actionlint {staged_files}
    talhelper-talconfig:
      glob: "talos/talconfig.yaml"
      run: talhelper validate talconfig talos/talconfig.yaml
    talhelper-nodeconfig:
      glob: "talos/{talconfig.yaml,patches/**}"
      run: |-
        for f in talos/clusterconfig/*.yaml; do
          [ -e "$f" ] || continue
          talhelper validate nodeconfig "$f" || exit 1
        done
